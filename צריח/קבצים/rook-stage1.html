<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שלב 1 — אספו מטבעות 🪙</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --cell:58px; --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --score-col:#7EC8E3;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center;
  padding: max(18px, env(safe-area-inset-top)) 12px 24px;
  overflow-x:hidden; user-select:none; overscroll-behavior:none;
}
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap { position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:10px; width:100%; }

.hdr {
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:calc(var(--board-size) + 26px); /* board + border(6) + ranks(15) + gap(5) */
  margin-bottom:8px; z-index:1;
}
.stage-badge { justify-self:start; font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(244,208,63,.12); border:1.5px solid rgba(244,208,63,.35);
  border-radius:50px; padding:3px 14px; color:var(--gold); letter-spacing:.5px; }
.score-right { display:flex; align-items:center; gap:8px; justify-self:end; }
.game-subtitle { font-family:'Fredoka One',cursive; font-size:1.9rem;
  color:#FFFFFF; text-shadow:0 2px 12px rgba(0,0,0,.5);
  text-align:center; margin-bottom:10px; z-index:1;
  width:calc(var(--board-size) + 26px); }
.score-box { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--gold);
  background:rgba(255,255,255,.07); border:1.5px solid rgba(244,208,63,.3);
  border-radius:50px; padding:4px 16px; white-space:nowrap; }
.score-box.bump { animation:score-bump .35s cubic-bezier(.175,.885,.32,1.5); }
@keyframes score-bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
.btn-mute { background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0; }
.btn-mute:hover { background:rgba(255,255,255,.18); }

.coins-row { display:flex; align-items:center; gap:8px; font-family:'Fredoka One',cursive;
  font-size:.88rem; color:rgba(255,255,255,.5); margin-bottom:4px; }
.ci { width:20px; height:20px; border-radius:50%; background:rgba(244,208,63,.15);
  border:2px solid rgba(244,208,63,.35); transition:all .3s; flex-shrink:0; }
.ci.got { background:var(--gold); border-color:var(--gold);
  box-shadow:0 0 10px rgba(244,208,63,.7); animation:ci-pop .4s cubic-bezier(.175,.885,.32,1.5); }
@keyframes ci-pop { 0%{transform:scale(0)} 70%{transform:scale(1.4)} 100%{transform:scale(1)} }

.board-section { display:flex; justify-content:center; z-index:1; margin-bottom:8px; }
.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels { display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.72rem;
  color:var(--gold); opacity:.8; width:15px; text-align:center; }
.file-labels { display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.72rem; opacity:.8; color:var(--gold); }

.board-outer { position:relative; width:var(--board-size); height:var(--board-size);
  border:3px solid var(--gold-dark); border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 1px rgba(244,208,63,.25), 0 0 28px rgba(244,208,63,.3), 0 10px 40px rgba(0,0,0,.7); }
.board-outer.glow { animation:board-glow .5s ease-in-out 5 alternate; }
@keyframes board-glow {
  from{box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7)}
  to{box-shadow:0 0 0 7px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.5)} }
.board-outer.shake { animation:board-shake .55s ease-in-out; }
@keyframes board-shake {
  0%,100%{transform:translate(0,0)} 10%{transform:translate(-9px,2px)}
  20%{transform:translate(9px,-3px)} 30%{transform:translate(-7px,3px)}
  40%{transform:translate(7px,-2px)} 50%{transform:translate(-5px,1px)}
  60%{transform:translate(5px,0)} 70%{transform:translate(-3px,0)}
  80%{transform:translate(2px,0)} 90%{transform:translate(-1px,0)} }

.board { display:grid; grid-template-columns:repeat(8,var(--cell)); grid-template-rows:repeat(8,var(--cell)); }
.cell { width:var(--cell); height:var(--cell); position:relative;
  display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:default; }
.cl { background:var(--cell-light); } .cd { background:var(--cell-dark); }
.cell.err-flash { animation:err .22s ease-in-out 2; }
@keyframes err { 0%,100%{background:var(--red) !important} 50%{background:transparent !important} }

.coin { position:absolute; width:44px; height:44px; border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#FFE566,#F4D03F 50%,#C9A227);
  box-shadow:0 3px 12px rgba(244,208,63,.65),inset 0 2px 4px rgba(255,255,255,.5);
  display:flex; align-items:center; justify-content:center;
  font-size:1.25rem; font-weight:900; color:rgba(180,130,0,.7);
  animation:coin-spin 2.8s linear infinite; z-index:4; pointer-events:none; }
@keyframes coin-spin {
  0%{transform:rotateY(0deg) scaleX(1)} 25%{transform:rotateY(90deg) scaleX(.12)}
  50%{transform:rotateY(180deg) scaleX(1)} 75%{transform:rotateY(270deg) scaleX(.12)}
  100%{transform:rotateY(360deg) scaleX(1)} }

#rook-piece { position:absolute; display:flex; align-items:center; justify-content:center;
  z-index:10; pointer-events:none;
  transition:top .35s cubic-bezier(.4,0,.2,1),left .35s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.7)); }
#rook-piece.pop { animation:rp-pop .4s cubic-bezier(.175,.885,.32,1.5); }
@keyframes rp-pop { 0%{transform:scale(1) translateY(0)} 50%{transform:scale(1.3) translateY(-8px)} 100%{transform:scale(1) translateY(0)} }
#rook-piece.spin-win { animation:rp-spin 1.1s linear 2; }
@keyframes rp-spin { from{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.3)} to{transform:rotate(360deg) scale(1)} }
#rook-piece.explode { animation:rp-explode .5s ease-out forwards; }
@keyframes rp-explode { 0%{transform:scale(1);opacity:1} 30%{transform:scale(1.5) rotate(20deg)} 100%{transform:scale(0) rotate(90deg);opacity:0} }

.burst,.fw,.fire-particle { position:fixed; border-radius:50%; pointer-events:none; z-index:200; }
.burst { animation:burst-out ease-out forwards; }
@keyframes burst-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0)} }
.fw { animation:fw-out ease-out forwards; z-index:300; }
@keyframes fw-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--fx),var(--fy)) scale(0)} }
.fire-particle { animation:fire-out ease-out forwards; z-index:250; }
@keyframes fire-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)} }

/* ── CINEMATIC TRANSITION (between scenarios) ── */
.scene-tr { position:fixed; inset:0; z-index:500;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .5s ease; }
.scene-tr.show { opacity:1; pointer-events:all; }
.scene-bg { position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 45%,#1e3d5c 0%,#0a1f35 60%,#060E1A 100%); }
.scene-bg::before { content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,rgba(126,200,227,.04) 0px,rgba(126,200,227,.04) 2px,transparent 2px,transparent 40px),
             repeating-linear-gradient(-45deg,rgba(126,200,227,.04) 0px,rgba(126,200,227,.04) 2px,transparent 2px,transparent 40px); }
.scene-content { position:relative; z-index:2; text-align:center;
  animation:sceneIn .55s cubic-bezier(.175,.885,.32,1.5) both; }
@keyframes sceneIn { from{transform:scale(.6) translateY(28px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
.scene-icon { font-size:5rem; margin-bottom:10px;
  animation:iconBounce 1.1s ease-in-out infinite alternate; }
@keyframes iconBounce { from{transform:scale(1) rotate(-4deg);} to{transform:scale(1.12) rotate(4deg);} }
.scene-title { font-family:'Fredoka One',cursive; font-size:2.6rem; color:var(--gold);
  text-shadow:0 0 30px rgba(244,208,63,1); margin-bottom:10px; }
.scene-coins { font-size:2.2rem; letter-spacing:6px; margin-bottom:14px;
  animation:coinsIn .8s .3s both; }
@keyframes coinsIn { from{opacity:0;transform:translateY(18px) scale(.7);} to{opacity:1;transform:none;} }
.scene-next { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--score-col);
  text-shadow:0 0 20px rgba(126,200,227,.8);
  animation:nextBlink 1s ease-in-out infinite alternate; }
@keyframes nextBlink { from{opacity:.6;} to{opacity:1;} }

/* ── WIN OVERLAY (end of all scenarios) ── */
.win-overlay { position:fixed; inset:0; background:rgba(6,14,26,.93);
  display:flex; align-items:center; justify-content:center;
  z-index:600; opacity:0; pointer-events:none; transition:opacity .4s; }
.win-overlay.show { opacity:1; pointer-events:all; }
.win-card { background:linear-gradient(150deg,#1a3a5c,#0f2336);
  border:2.5px solid var(--gold); border-radius:22px;
  padding:30px 40px; text-align:center; max-width:340px; width:90%;
  box-shadow:0 0 80px rgba(244,208,63,.55);
  animation:sceneIn .45s cubic-bezier(.175,.885,.32,1.5) both; }
.win-trophy { font-size:3.8rem;
  animation:trophy 1.1s ease-in-out infinite alternate; display:block; margin-bottom:4px; }
@keyframes trophy { from{transform:translateY(0);} to{transform:translateY(-10px);} }
.win-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:6px; }
.win-feedback { font-family:'Fredoka One',cursive; font-size:1.05rem;
  color:#A8E6CF; margin-bottom:6px;
  text-shadow:0 0 12px rgba(82,183,136,.5); }
.win-score { font-size:1.15rem; color:var(--score-col); font-weight:900; margin-bottom:22px;
  line-height:1.6; }
.btn-next { background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  color:#060E1A; border:none; border-radius:14px;
  padding:12px 34px; font-family:'Fredoka One',cursive; font-size:1.2rem;
  cursor:pointer; touch-action:manipulation;
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s,box-shadow .15s; display:block; width:100%; margin-bottom:10px;   margin-bottom:max(8px,env(safe-area-inset-bottom));
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry { background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s,border-color .2s; display:block; width:100%; }
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }
/* Stage 1 specific */
.cell.s1-coin-cell { cursor:pointer; }
.cell.s1-coin-cell:hover { filter:brightness(1.12); }

/* ── WIN STARS ── */
.win-stars {
  font-size:2rem; letter-spacing:4px;
  margin:8px 0 4px;
  animation:starsIn .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes starsIn {
  from{opacity:0;transform:scale(.4);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">שלב 1 · תרחיש 1/3</div>
    <div class="score-right">
      
      <button class="btn-mute" id="muteBtn" title="השתק/הפעל צלילים">🔊</button>
    </div>
  </div>

  <div class="game-subtitle" id="game-subtitle">בכל מהלך הגיעו למטבע! 🪙</div>

  <div class="coins-row" id="coins-row">
    <span>מטבעות:</span>
    <div class="ci" id="ci0"></div><div class="ci" id="ci1"></div>
    <div class="ci" id="ci2"></div><div class="ci" id="ci3"></div>
    <div class="ci" id="ci4"></div><div class="ci" id="ci5"></div>
    <div class="ci" id="ci6"></div><div class="ci" id="ci7"></div>
    <div class="ci" id="ci8"></div><div class="ci" id="ci9"></div>
  </div>

  <div class="board-section">
    <div class="coord-wrap">
      <div class="rank-labels" id="ranks"></div>
      <div>
        <div class="board-outer" id="board-outer">
          <div class="board" id="board"></div>
          <div id="rook-piece"><img src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 45 45%22%3E%3Cg style=%22fill:%23fff;stroke:%23000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4%22%3E%3Cpath d=%22M9,39h27v-3H9z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12.5,32l1.5-2.5h17l1.5,2.5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12,36v-4h21v4z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M14,29.5v-13h17v13z%22 style=%22stroke-linecap:butt;stroke-linejoin:miter%22/%3E%3Cpath d=%22M14,16.5l-3-2.5h23l-3,2.5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M11,14V9h4v2h5V9h5v2h5V9h4v5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12,35.5h21M13,31.5h19%22 style=%22fill:none;stroke:%23000;stroke-width:1%22/%3E%3C/g%3E%3C/svg%3E" style="width:90%;height:90%;object-fit:contain;display:block;margin:auto;" alt="♖"></div>
        </div>
        <div class="file-labels" id="files"></div>
      </div>
    </div>
  </div>
</div>

<!-- CINEMATIC TRANSITION (between scenarios) -->
<div class="scene-tr" id="scene-tr">
  <div class="scene-bg"></div>
  <div class="scene-content">
    <div class="scene-icon" id="scene-icon">✨</div>
    <div class="scene-title" id="scene-title">תרחיש הושלם!</div>
    <div class="scene-coins" id="scene-coins">🪙🪙🪙🪙</div>
    <div class="scene-next" id="scene-next">תרחיש הבא מתחיל...</div>
  </div>
</div>

<!-- WIN OVERLAY (end of stage) -->
<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <span class="win-trophy">🏆</span>
    <div class="win-title">שלב 1 הושלם! 🎉</div>
    <div class="win-stars" id="win-stars"></div>
    <div class="win-feedback" id="win-feedback"></div>
    <div id="win-score"></div>
    <button class="btn-next" onclick="goNext()">לשלב 2 ←</button>
    <button class="btn-retry" id="retry-btn" onclick="retryStage()">🔄 נסו שוב</button>
  </div>
</div>

<script>
// ═══ SCENARIOS ═══
const S1_SCENARIOS = [
  // Scenario 1: 4 pawns — a6→e6→e3→h3
  [
    {row:2,col:0,order:1},
    {row:2,col:4,order:2},
    {row:5,col:4,order:3},
    {row:5,col:7,order:4},
  ],
  // Scenario 2: 6 coins — e1→e6→b6→b8→h8→h3
  [
    {row:7,col:4,order:1},
    {row:2,col:4,order:2},
    {row:2,col:1,order:3},
    {row:0,col:1,order:4},
    {row:0,col:7,order:5},
    {row:5,col:7,order:6},
  ],
  // Scenario 3: 10 pawns — a6→d6→d3→g3→g7→b7→b2→h2→h8→c8
  [
    {row:2,col:0,order:1},  // A6
    {row:2,col:3,order:2},  // D6
    {row:5,col:3,order:3},  // D3
    {row:5,col:6,order:4},  // G3
    {row:1,col:6,order:5},  // G7
    {row:1,col:1,order:6},  // B7
    {row:6,col:1,order:7},  // B2
    {row:6,col:7,order:8},  // H2
    {row:0,col:7,order:9},  // H8
    {row:0,col:2,order:10}, // C8
  ],
];
let s1ScIdx=0, coinCount=0;

// ═══ COMMON UTILS ═══
let score=0, busy=false, rookPos=[7,0];
let mistakes=0;
let coins=[], mines=[];

function getCellPx(){
  const w=window.innerWidth;
  if(w<=360)return 40; if(w<=390)return 44; if(w<=430)return 48; if(w<=480)return 53; return 58;
}
const getCell   = (r,c)=>document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);

function updateScore(){ /* score display removed v2 */ }


function buildStars(){
  const bg=document.getElementById('stars-bg');
  for(let i=0;i<55;i++){
    const s=document.createElement('div'); s.className='star-dot';
    const sz=Math.random()*2.4+.7;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
}
function buildCoords(){
  const rl=document.getElementById('ranks'),fl=document.getElementById('files');
  rl.innerHTML=''; fl.innerHTML='';
  for(let r=0;r<8;r++){const d=document.createElement('div');d.textContent=8-r;rl.appendChild(d);}
  'ABCDEFGH'.split('').forEach(f=>{const d=document.createElement('div');d.textContent=f;fl.appendChild(d);});
}


function syncCellVar(){
  const px=getCellPx();
  document.documentElement.style.setProperty('--cell',px+'px');
  document.documentElement.style.setProperty('--board-size',(px*8)+'px');
}
function snapRook(){
  const rk=document.getElementById('rook-piece');
  rk.style.transition='none';
  requestAnimationFrame(()=>{
    const px=getCellPx();
    rk.style.width=rk.style.height=px+'px';
    rk.style.top=rookPos[0]*px+'px'; rk.style.left=rookPos[1]*px+'px';
    setTimeout(()=>rk.style.transition='',20);
  });
}
function slideRook(r,c,cb){
  const rk=document.getElementById('rook-piece'), px=getCellPx();
  rk.style.width=rk.style.height=px+'px';
  rk.style.transition='top .35s cubic-bezier(.4,0,.2,1),left .35s cubic-bezier(.4,0,.2,1)';
  rk.style.top=r*px+'px'; rk.style.left=c*px+'px';
  setTimeout(cb,380);
}

function calcRookMoves(r,c){
  const out=[];
  for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){
    let nr=r+dr, nc=c+dc;
    while(nr>=0&&nr<8&&nc>=0&&nc<8){
      out.push([nr,nc]);
      if(coins.some(co=>co.alive&&co.row===nr&&co.col===nc)) break;
      nr+=dr; nc+=dc;
    }
  }
  return out;
}

function errorFlash(r,c){
  const cell=getCell(r,c);
  if(cell){ cell.classList.remove('err-flash'); void cell.offsetWidth; cell.classList.add('err-flash');
    setTimeout(()=>cell.classList.remove('err-flash'),500); }
  playSound('error');
}

function showSceneTr(icon, title, coins, next, onDone, delay=3000){
  document.getElementById('scene-icon').textContent  = icon;
  document.getElementById('scene-title').textContent = title;
  document.getElementById('scene-coins').textContent = coins;
  document.getElementById('scene-next').textContent  = next;
  document.getElementById('scene-tr').classList.add('show');
  setTimeout(()=>{
    document.getElementById('scene-tr').classList.remove('show');
    onDone();
  }, delay);
}


function saveStageState(){
  try{
    const perfect = mistakes <= 2;                 // עד 2 טעויות בכל תרחישי השלב = מושלם (3⭐)
    const data = JSON.parse(localStorage.getItem('chess_rook') || '{}');
    const prev = data.stage1 || {};
    data.stage1 = {
      done: true,
      perfect: perfect,                            // תאימות לאחור — זהה ל-lastPerfect
      lastPerfect: perfect,                        // הביצוע האחרון (לתצוגת מסך הסיום)
      bestPerfect: !!prev.bestPerfect || perfect   // השיא לצבירת המודול — לעולם לא יורד
    };
    localStorage.setItem('chess_rook', JSON.stringify(data));
  }catch(e){}
}

function showWin(){
  saveStageState();
  const perfect = mistakes <= 2;
  // כוכבים
  const starsEl = document.getElementById('win-stars');
  if(starsEl) starsEl.textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
  // הודעה
  const el=document.getElementById('win-score');
  el.innerHTML = perfect
    ? `<span style="color:#F4D03F;">ביצוע מושלם! 🎉</span>`
    : `<span style="color:#7EC8E3;">כל הכבוד! 💪</span>`;
  // כפתור retry
  const retryBtn = document.getElementById('retry-btn');
  if(retryBtn) retryBtn.textContent = perfect ? '🔄 שחקו שוב' : '🔄 נסו שוב';
  document.getElementById('win-overlay').classList.add('show');
  fireworks(); setTimeout(fireworks, 900);
  playSound('fanfare');
}

function goNext(){
  window.location.href='rook-stage2.html';
}
function retryStage(){
  document.getElementById('win-overlay').classList.remove('show');
  score=0; mistakes=0; updateScore(); s1ScIdx=0; loadStage1(); busy=false;
}

// ═══ PARTICLES ═══
function burst(cx,cy){
  const cols=['#F4D03F','#FFE580','#C9A227','#FFFFFF','#52B788','#FF6B35'];
  for(let i=0;i<20;i++){
    const el=document.createElement('div'); el.className='burst';
    const sz=5+Math.random()*9, a=(i/20)*Math.PI*2, d=45+Math.random()*70;
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${cx-sz/2}px;top:${cy-sz/2}px;animation-duration:${.5+Math.random()*.3}s;`;
    el.style.setProperty('--bx',Math.cos(a)*d+'px'); el.style.setProperty('--by',Math.sin(a)*d+'px');
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);
  }
}
function fireworks(){
  const cols=['#F4D03F','#52B788','#3498DB','#E74C3C','#9B59B6','#FF6B35','#FFF'];
  [[20,30],[80,20],[50,50],[15,70],[85,60],[50,15],[70,80]].forEach(([ox,oy],i)=>{
    setTimeout(()=>{
      for(let j=0;j<24;j++){
        const el=document.createElement('div'); el.className='fw';
        const sz=4+Math.random()*8, a=(j/24)*Math.PI*2, d=55+Math.random()*90;
        el.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[j%cols.length]};left:${ox}vw;top:${oy}vh;animation-duration:${.7+Math.random()*.4}s;`;
        el.style.setProperty('--fx',Math.cos(a)*d+'px'); el.style.setProperty('--fy',Math.sin(a)*d+'px');
        document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
      }
    },i*200);
  });
}

// ═══ SOUND ═══
let actx=null, muted=false;
document.getElementById('muteBtn').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
});
function ac(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); return actx; }
function playSound(type){
  if(muted) return;
  try{
    const ctx=ac(), now=ctx.currentTime;
    const mk=()=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); return [o,g]; };
    if(type==='slide'){
      const [o,g]=mk(); o.type='sine';
      o.frequency.setValueAtTime(380,now); o.frequency.exponentialRampToValueAtTime(260,now+.3);
      g.gain.setValueAtTime(.15,now); g.gain.exponentialRampToValueAtTime(.001,now+.35);
      o.start(now); o.stop(now+.35);
    } else if(type==='collect'){
      const [o,g]=mk(),[o2,g2]=mk();
      o.frequency.setValueAtTime(880,now); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.001,now+.28); o.start(now); o.stop(now+.28);
      o2.frequency.setValueAtTime(1100,now+.12); g2.gain.setValueAtTime(.17,now+.12); g2.gain.exponentialRampToValueAtTime(.001,now+.45); o2.start(now+.12); o2.stop(now+.45);
    } else if(type==='error'){
      const [o,g]=mk(); o.type='sawtooth';
      o.frequency.setValueAtTime(240,now); o.frequency.exponentialRampToValueAtTime(100,now+.28);
      g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.3);
      o.start(now); o.stop(now+.3);
    } else if(type==='boom'){
      const buf=ctx.createBuffer(1,ctx.sampleRate*.8,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.15));
      const src=ctx.createBufferSource(); src.buffer=buf;
      const g=ctx.createGain(); g.gain.setValueAtTime(.7,now); g.gain.exponentialRampToValueAtTime(.001,now+.8);
      const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=400;
      src.connect(lpf); lpf.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.8);
      const [o,gv]=mk(); o.type='square';
      o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(40,now+.2);
      gv.gain.setValueAtTime(.4,now); gv.gain.exponentialRampToValueAtTime(.001,now+.25);
      o.start(now); o.stop(now+.25);
    } else if(type==='victory'){
      [523,659,784,1047].forEach((freq,i)=>{ const [o,g]=mk(),t=now+i*.15;
        o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.45); o.start(t); o.stop(t+.45); });
    } else if(type==='fanfare'){
      [523,659,784,1047,1319].forEach((freq,i)=>{ const [o,g]=mk(),t=now+i*.15;
        o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.45); o.start(t); o.stop(t+.45); });
    }
  }catch(e){}
}
function buildBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.dataset.r=r; cell.dataset.c=c;
    board.appendChild(cell);
  }
  placeCoins(); snapRook();
}
function placeCoins(){
  document.querySelectorAll('.coin').forEach(el=>el.remove());
  coins.forEach((coin,i)=>{
    if(!coin.alive) return;
    const cell=getCell(coin.row,coin.col); if(!cell) return;
    const el=document.createElement('div');
    el.className='coin'; el.id='coin-'+i; el.textContent='✦';
    cell.appendChild(el);
    cell.classList.add('s1-coin-cell');
  });
}
function handleS1(r,c){
  const coinObj=coins.find(co=>co.alive&&co.row===r&&co.col===c);
  if(!coinObj){ errorFlash(r,c); return; }
  const nextOrder=Math.min(...coins.filter(co=>co.alive).map(co=>co.order));
  if(coinObj.order!==nextOrder){
    mistakes++; errorFlash(r,c); busy=true;
    document.getElementById('board-outer').classList.remove('shake');
    void document.getElementById('board-outer').offsetWidth;
    document.getElementById('board-outer').classList.add('shake');
    setTimeout(()=>{ s1ResetScene(); },1500);
    return;
  }
  const reachable=calcRookMoves(rookPos[0],rookPos[1]);
  if(!reachable.some(([vr,vc])=>vr===r&&vc===c)){
    playSound('error'); return;
  }
  busy=true;
  const idx=coins.indexOf(coinObj); rookPos=[r,c]; playSound('slide');
  slideRook(r,c,()=>{
    coinObj.alive=false;
    document.getElementById('coin-'+idx)?.remove();
    getCell(r,c)?.classList.remove('s1-coin-cell');
    coinCount++;
    document.getElementById('ci'+(coinCount-1))?.classList.add('got');
    const bo=document.getElementById('board-outer').getBoundingClientRect(), px=getCellPx();
    burst(bo.left+c*px+px/2, bo.top+r*px+px/2);
    playSound('collect');
    const rk=document.getElementById('rook-piece');
    rk.classList.remove('pop'); void rk.offsetWidth; rk.classList.add('pop');
    setTimeout(()=>{
      busy=false;
      if(!coins.some(co=>co.alive)) endStage1();
    },300);
  });
}
function s1ResetScene(){
  const sc=S1_SCENARIOS[s1ScIdx%S1_SCENARIOS.length];
  coins=sc.map((c,i)=>(({...c,id:i,alive:true})));
  coinCount=0; rookPos=[7,0];
  for(let i=0;i<10;i++) document.getElementById('ci'+i)?.classList.remove('got');
  document.querySelectorAll('.coin').forEach(el=>el.remove());
  document.querySelectorAll('.s1-coin-cell').forEach(el=>el.classList.remove('s1-coin-cell'));
  const rk=document.getElementById('rook-piece'), px=getCellPx();
  rk.style.transition='none'; rk.style.width=rk.style.height=px+'px';
  rk.style.top=(7*px)+'px'; rk.style.left='0px';
  setTimeout(()=>{ rk.style.transition=''; },20);
  placeCoins(); busy=false;
}
function loadStage1(){
  syncCellVar(); rookPos=[7,0]; coinCount=0; busy=false;
  const sc=S1_SCENARIOS[s1ScIdx%S1_SCENARIOS.length];
  coins=sc.map((c,i)=>(({...c,id:i,alive:true})));
  document.getElementById('stage-badge').textContent=`שלב 1 · תרחיש ${s1ScIdx+1}/3`;
  const n=sc.length;
  for(let i=0;i<10;i++){
    const el=document.getElementById('ci'+i);
    if(el){ el.style.display=i<n?'':'none'; el.classList.remove('got'); }
  }
  buildBoard();
}
function endStage1(){
  document.getElementById('rook-piece').classList.add('spin-win');
  document.getElementById('board-outer').classList.add('glow');
  fireworks(); playSound('victory');
  s1ScIdx++;
  const allDone=(s1ScIdx>=S1_SCENARIOS.length);

  const coinCount_snap = S1_SCENARIOS[(s1ScIdx-1)%S1_SCENARIOS.length].length;
  const coinEmoji = '🪙'.repeat(Math.min(coinCount_snap, 8));

  showSceneTr(
    allDone ? '🏆' : '✨',
    allDone ? 'שלב 1 הושלם! 🎉' : `תרחיש ${s1ScIdx} הושלם! 🎉`,
    coinEmoji,
    allDone ? '✨ עוברים לתוצאות...' : `תרחיש ${s1ScIdx+1} מתחיל...`,
    ()=>{
      document.getElementById('board-outer').classList.remove('glow');
      document.getElementById('rook-piece').classList.remove('spin-win');
      if(allDone) showWin();
      else loadStage1();
    },
    3000
  );
}
function initHandlers(){
  document.getElementById('board').addEventListener('click',e=>{
    if(busy) return;
    const cell=e.target.closest('.cell'); if(!cell) return;
    handleS1(+cell.dataset.r, +cell.dataset.c);
  });
}
window.addEventListener('DOMContentLoaded',()=>{
  buildStars(); buildCoords();
window.addEventListener('resize',()=>{ syncCellVar(); snapRook(); });
  setTimeout(()=>{ loadStage1(); initHandlers(); },0);
});
</script>
