<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>הצריח הישר ♜</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:16px 12px 28px;
  user-select:none; overflow-x:hidden; overflow-y:auto;
  overscroll-behavior:none; -webkit-tap-highlight-color:transparent;
}

/* ── STARS ── */
.star-dot {
  position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none;
}
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* ── TITLE ── */
.main-title {
  font-family:'Fredoka One',cursive;
  font-size:2.4rem; color:#F4D03F;
  text-shadow:0 0 28px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.4),0 2px 8px rgba(0,0,0,.6);
  text-align:center; margin-bottom:6px; margin-top:8px;
  animation:sp-in .7s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes sp-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* ── ROOK ARENA ── */
.rook-arena {
  position:relative; width:160px; height:160px;
  margin-bottom:12px; flex-shrink:0;
}
.arena-svg {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:3; pointer-events:none;
}

/* Straight beam lines (4 directions) */
.beam-line {
  stroke:#7EC8E3; stroke-width:2.5; stroke-linecap:round;
  opacity:0; fill:none;
  animation:beamPulse 3.2s ease-in-out infinite;
}
.beam-line:nth-child(1){ stroke:#F4D03F; animation-delay:0s; }
.beam-line:nth-child(2){ stroke:#7EC8E3; animation-delay:.8s; }
.beam-line:nth-child(3){ stroke:#F4D03F; animation-delay:1.6s; }
.beam-line:nth-child(4){ stroke:#7EC8E3; animation-delay:2.4s; }

@keyframes beamPulse {
  0%   { opacity:0; stroke-width:1.5; }
  15%  { opacity:1; stroke-width:4; }
  55%  { opacity:.5; }
  100% { opacity:0; stroke-width:1.5; }
}

/* Traveling dot along beam */
.beam-dot {
  r:5; fill:#FFD700;
  filter:drop-shadow(0 0 6px rgba(255,215,0,.9));
  opacity:0;
  animation:dotFade 3.2s ease-in-out infinite;
}
.beam-dot:nth-child(5){ animation-delay:.2s; }
.beam-dot:nth-child(6){ animation-delay:1.0s; }
.beam-dot:nth-child(7){ animation-delay:1.8s; }
.beam-dot:nth-child(8){ animation-delay:2.6s; }

@keyframes dotFade {
  0%   { opacity:0; }
  10%  { opacity:1; }
  80%  { opacity:1; }
  100% { opacity:0; }
}

/* Rook center */
.rook-center {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:5.72rem; z-index:5; color:#FFFFFF;
  filter:drop-shadow(0 0 22px rgba(126,200,227,.8)) drop-shadow(0 0 40px rgba(244,208,63,.4));
  animation:rookPulse 2.4s ease-in-out infinite;
}
@keyframes rookPulse {
  0%,100%{ transform:scale(1); }
  50%    { transform:scale(1.08);
           filter:drop-shadow(0 0 32px rgba(126,200,227,1)) drop-shadow(0 0 55px rgba(244,208,63,.6)); }
}

/* ── BOARD ── */
:root {
  --cell: min(
    max(
      min(
        calc((100vh - 440px) / 8),
        calc((100vw -  48px) / 8)
      ),
      34px
    ),
    80px
  );
}

/* ── MEDIUM SCREENS: iPhone 14, iPad Mini ── */
@media (max-height: 820px) {
  .rook-arena  { width:120px; height:120px; margin-bottom:8px; }
  .rook-center { font-size:4.3rem; }
  .stage-pill  { font-size:.82rem; padding:5px 11px; }
  :root {
    --cell: min(
      max(
        min(
          calc((100vh - 400px) / 8),
          calc((100vw -  48px) / 8)
        ),
        34px
      ),
      80px
    );
  }
}
.board-section { position:relative; margin-bottom:14px; }
.board-wrap {
  position:relative;
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.15);
}
.board-grid {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr;
}
.sq { width:var(--cell); height:var(--cell); position:relative;
      display:flex; align-items:center; justify-content:center;
      transition:background .25s; }
.sq.l { background:#C9E4F5; }
.sq.d { background:#4A7FA5; }

/* FIX: beam colors — תקני per design-skill */
.sq.beam-h { background:rgba(126,200,227,.45) !important; }
.sq.beam-v { background:rgba(82,183,136,.45)  !important; }
.sq.beam-center { background:rgba(255,255,255,.15) !important; }

.pc {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:2.19rem; line-height:1;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
  z-index:2;
}
/* צריח צף — נע על גבי הלוח */
.rook-float {
  position:absolute;
  transform:translate(-50%,-50%);
  font-size:3.02rem; line-height:1;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.8)) drop-shadow(0 2px 4px rgba(0,0,0,.7));
  z-index:10; pointer-events:none;
  transition:left .638s ease-in-out, top .638s ease-in-out;
}

/* ── DIRECTION ARROWS — חיצים שנמתחים מהצריח ב-4 הכיוונים ── */
.dir-arrows {
  position:absolute; top:0; left:0;
  z-index:6; pointer-events:none; overflow:visible;
}
.dir-arrows .arrow {
  stroke:#F4D03F; stroke-width:5; stroke-linecap:round; fill:none;
  filter:drop-shadow(0 0 5px rgba(244,208,63,.85));
}

/* ── STAGE PILLS ── */
.stages-wrap {
  display:flex; gap:6px; margin:4px 0 16px;
  flex-wrap:wrap; justify-content:center;
}
.stage-pill {
  font-family:'Fredoka One',cursive;
  font-size:.95rem; padding:6px 15px;
  border-radius:50px; border:2px solid;
  letter-spacing:.3px; white-space:nowrap;
}
.stage-pill.s1{ color:#52B788; border-color:#52B788; background:rgba(82,183,136,.12); }
.stage-pill.s2{ color:#7EC8E3; border-color:#7EC8E3; background:rgba(126,200,227,.12); }
.stage-pill.s3{ color:#F4D03F; border-color:#F4D03F; background:rgba(244,208,63,.10); }
.stage-pill.s4{ color:#FF6B35; border-color:#FF6B35; background:rgba(255,107,53,.10); }
.stage-pill.s5{ color:#C39BD3; border-color:#C39BD3; background:rgba(195,155,211,.10); }

/* ── BUTTON — standard gold ── */
.btn-start {
  font-family:'Fredoka One',cursive;
  font-size:1.5rem; padding:14px 50px;
  border-radius:50px; border:none; cursor:pointer;
  color:white; letter-spacing:1px;
  background:linear-gradient(135deg,#F4D03F 0%,#C9A227 50%,#9A7B1A 100%);
  box-shadow:0 0 28px rgba(244,208,63,.55),0 6px 20px rgba(0,0,0,.4);
  transition:transform .15s ease,box-shadow .15s ease;
  position:relative; overflow:hidden;
  touch-action:manipulation;
  margin-bottom:max(12px, env(safe-area-inset-bottom));
  animation:btnPop .6s .3s cubic-bezier(.175,.885,.32,1.5) both,
            btnPulse 2s ease-in-out 1.5s infinite;
}
.btn-start::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);
  border-radius:inherit;
}
.btn-start:hover  { transform:scale(1.06); }
.btn-start:active { transform:scale(.97); }
@keyframes btnPop   { from{opacity:0;transform:scale(.4);} to{opacity:1;transform:scale(1);} }
@keyframes btnPulse {
  0%,100%{ box-shadow:0 0 28px rgba(244,208,63,.55),0 6px 20px rgba(0,0,0,.4); }
  50%    { box-shadow:0 0 55px rgba(244,208,63,.9), 0 6px 28px rgba(0,0,0,.4); }
}

/* ── SPARKS ── */
.pspark {
  position:fixed; width:6px; height:6px; border-radius:50%;
  pointer-events:none; animation:psparkFly ease-out forwards; z-index:999;
}
@keyframes psparkFly {
  from{ opacity:1; transform:translate(0,0) scale(1); }
  to  { opacity:0; transform:translate(var(--px),var(--py)) scale(.2); }
}
</style>
</head>
<body>

<div class="main-title">♜ הצריח הישר!</div>

<!-- ROOK ARENA — צריח עליון עם 4 קרניים + נקודות זזות (כיווני התנועה) -->
<div class="rook-arena">
  <svg class="arena-svg" viewBox="0 0 160 160" id="arena-svg">
    <line class="beam-line" id="bl-up"    x1="80" y1="80" x2="80"  y2="8"/>
    <line class="beam-line" id="bl-right" x1="80" y1="80" x2="152" y2="80"/>
    <line class="beam-line" id="bl-down"  x1="80" y1="80" x2="80"  y2="152"/>
    <line class="beam-line" id="bl-left"  x1="80" y1="80" x2="8"   y2="80"/>
    <circle class="beam-dot" id="bd-up"    cx="80" cy="80"/>
    <circle class="beam-dot" id="bd-right" cx="80" cy="80"/>
    <circle class="beam-dot" id="bd-down"  cx="80" cy="80"/>
    <circle class="beam-dot" id="bd-left"  cx="80" cy="80"/>
  </svg>
  <div class="rook-center">♖</div>
</div>

<!-- BOARD -->
<div class="board-section">
  <div class="board-wrap">
    <div class="board-grid" id="board"></div>
    <svg class="dir-arrows" id="dir-arrows" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- STAGE PILLS — כל 5 שלבים -->
<div class="stages-wrap">
  <div class="stage-pill s1">שלב 1 — אספו את המטבעות 🪙</div>
  <div class="stage-pill s2">שלב 2 — תכננו 2 מהלכים 🎯</div>
  <div class="stage-pill s3">שלב 3 — זהירות מוקשים! 💣</div>
  <div class="stage-pill s4">שלב 4 — זהירות עטלף! 🦇</div>
  <div class="stage-pill s5">שלב 5 — המבחן המסכם! 🏆</div>
</div>

<!-- BUTTON -->
<button class="btn-start" onclick="onStart(event)">🎮 בואו נשחק!</button>

<script>
// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

// ── Traveling dots — צריח עליון, 4 כיוונים ──
const BEAMS = [
  { dotId:'bd-up',    attr:'cy', from:80, to:8   },
  { dotId:'bd-right', attr:'cx', from:80, to:152 },
  { dotId:'bd-down',  attr:'cy', from:80, to:152 },
  { dotId:'bd-left',  attr:'cx', from:80, to:8   },
];
const DELAYS = [0.2, 1.0, 1.8, 2.6];
const PERIOD = 3200;

function animateDots(){
  BEAMS.forEach((b, i) => {
    const el = document.getElementById(b.dotId);
    if(!el) return;
    function runAnim(){
      let start = null;
      const dur = 2600;
      function stepDot(ts){
        if(!start) start=ts;
        const t = Math.min((ts-start)/dur, 1);
        const ease = t<.5 ? 2*t*t : -1+(4-2*t)*t;
        el.setAttribute(b.attr, b.from + (b.to - b.from)*ease);
        el.setAttribute(b.attr==='cy'?'cx':'cy', 80);
        if(t<1) requestAnimationFrame(stepDot);
      }
      requestAnimationFrame(stepDot);
    }
    setTimeout(()=>{ runAnim(); setInterval(runAnim, PERIOD); }, DELAYS[i]*1000);
  });
}
animateDots();

// ── Build board — FIX: (r+c)%2===0 → light (A1 = dark, כנדרש) ──
const boardEl = document.getElementById('board');
for(let r=0;r<8;r++) for(let c=0;c<8;c++){
  const sq=document.createElement('div');
  sq.className='sq '+((r+c)%2===0?'l':'d');   // ← תוקן
  sq.id=`sq_${r}_${c}`;
  boardEl.appendChild(sq);
}

function getSq(r,c){ return document.getElementById(`sq_${r}_${c}`); }

// ── Floating rook piece ──
const RR=3, RC=3;
// ← מקור-אמת יחיד: נמדד מהתא שה-CSS עיצב בפועל (ללא שכפול לוגיקת ה---cell)
function getCELL(){
  const sq = boardEl.querySelector('.sq');
  return sq ? sq.getBoundingClientRect().width : 0;
}
let CELL = getCELL();
window.addEventListener('resize', () => {
  CELL = getCELL();
  rookEl.style.left = (RC*CELL + CELL/2) + 'px';
  rookEl.style.top  = (RR*CELL + CELL/2) + 'px';
  drawArrows();
});

const rookEl = document.createElement('div');
rookEl.className = 'rook-float';
rookEl.textContent = '♖';
rookEl.style.left = (RC*CELL + CELL/2) + 'px';
rookEl.style.top  = (RR*CELL + CELL/2) + 'px';
document.querySelector('.board-wrap').appendChild(rookEl);

// ── חיצים שנמתחים מהצריח (במרכז) ב-4 הכיוונים המותרים: אופקי + אנכי ──
const arrowsSvg = document.getElementById('dir-arrows');

// בונה/מעדכן את 4 החיצים לפי גודל הלוח הנוכחי
function drawArrows(){
  const size = 8 * CELL;
  arrowsSvg.setAttribute('width',  size);
  arrowsSvg.setAttribute('height', size);
  arrowsSvg.setAttribute('viewBox', `0 0 ${size} ${size}`);
  const cx = RC*CELL + CELL/2, cy = RR*CELL + CELL/2;
  const m  = CELL*0.30;   // מרווח קטן מקצה הלוח
  const ends = { up:[cx,m], down:[cx,size-m], left:[m,cy], right:[size-m,cy] };

  arrowsSvg.innerHTML =
    '<defs><marker id="ah" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">' +
    '<path d="M0,0 L6,3 L0,6 Z" fill="#F4D03F"/></marker></defs>';

  Object.values(ends).forEach(([ex,ey]) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    const len  = Math.hypot(ex-cx, ey-cy);
    line.setAttribute('class','arrow');
    line.setAttribute('x1',cx); line.setAttribute('y1',cy);
    line.setAttribute('x2',ex); line.setAttribute('y2',ey);
    // dasharray / dashoffset / marker-end כ-attributes (לא CSS) — רינדור עקבי בכל הדפדפנים
    line.setAttribute('marker-end','url(#ah)');
    line.setAttribute('stroke-dasharray', len);
    line.setAttribute('stroke-dashoffset', len);   // מתחיל מוסתר
    line.dataset.len = len;
    arrowsSvg.appendChild(line);
  });
}

// אנימציית "מתיחה": החיצים נמתחים החוצה מהמרכז → נשארים רגע → נעלמים → וחוזר חלילה
function animateArrows(){
  function draw(){
    const lines = [...arrowsSvg.querySelectorAll('.arrow')]; // מרענן אחרי resize
    const t0 = performance.now(), dur = 650;
    lines.forEach(l => { l.style.opacity = 1; });
    function grow(now){
      const ease = 1 - Math.pow(1 - Math.min((now-t0)/dur,1), 3);
      lines.forEach(l => l.setAttribute('stroke-dashoffset', (+l.dataset.len)*(1-ease)));
      if((now-t0) < dur) requestAnimationFrame(grow);
      else setTimeout(fade, 1300);
    }
    function fade(){
      const f0 = performance.now();
      (function ff(now){
        const t = Math.min((now-f0)/450, 1);
        lines.forEach(l => l.style.opacity = 1-t);
        if(t<1) requestAnimationFrame(ff); else setTimeout(draw, 600);
      })(performance.now());
    }
    requestAnimationFrame(grow);
  }
  draw();
}

drawArrows();
animateArrows();

// רשת ביטחון: מדידה נוספת בסיום הטעינה המלאה (פונטים/פריסה) — מתקנת מיקום אם המדידה הראשונה הקדימה את ה-layout
window.addEventListener('load', () => {
  CELL = getCELL();
  if(CELL){
    rookEl.style.left = (RC*CELL + CELL/2) + 'px';
    rookEl.style.top  = (RR*CELL + CELL/2) + 'px';
    drawArrows();
  }
});

// ── Button sparks + navigate — FIX: קישור מתוקן ──
function onStart(e){
  spawnSparks(e);
  setTimeout(()=>{ window.location.href='rook-stage1.html'; }, 350);
}
function spawnSparks(e){
  const colors=['#F4D03F','#7EC8E3','#52B788','#FF6B35','#FFFFFF'];
  const rect=e.target.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<18;i++){
    const sp=document.createElement('div'); sp.className='pspark';
    const a=Math.random()*Math.PI*2, d=60+Math.random()*80;
    sp.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};animation-duration:${.5+Math.random()*.4}s;`;
    sp.style.setProperty('--px',Math.cos(a)*d+'px');
    sp.style.setProperty('--py',Math.sin(a)*d+'px');
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),900);
  }
}
</script>
</body>
</html>
