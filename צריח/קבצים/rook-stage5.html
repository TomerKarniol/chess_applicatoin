<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שלב 5 — המבחן המסכם!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --cell:58px; --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --score-col:#7EC8E3;
}
@media(max-width:360px){:root{--cell:40px}}
@media(min-width:361px) and (max-width:390px){:root{--cell:44px}}
@media(min-width:391px) and (max-width:430px){:root{--cell:48px}}
@media(min-width:431px) and (max-width:480px){:root{--cell:53px}}
@media(min-width:481px){:root{--cell:58px}}
body {
  overscroll-behavior:none;
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; user-select:none;
}
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap { position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:14px; padding:16px 0; width:100%; box-sizing:border-box; }

.hdr { display:flex; align-items:center; justify-content:space-between; width:calc(var(--board-size) + 8px); }
.stage-badge { font-family:'Fredoka One',cursive; font-size:.78rem;
  background:rgba(244,208,63,.12); border:1.5px solid rgba(244,208,63,.35);
  border-radius:50px; padding:3px 12px; color:var(--gold); letter-spacing:.3px;
  white-space:nowrap; }
.game-title { font-family:'Fredoka One',cursive; font-size:1.35rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); white-space:normal; text-align:center; }

.btn-mute { background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0; }
.btn-mute:hover { background:rgba(255,255,255,.18); }

.scene-tr { position:fixed; inset:0; z-index:500; display:flex; align-items:center;
  justify-content:center; opacity:0; pointer-events:none; transition:opacity .5s; }
.scene-tr.show { opacity:1; pointer-events:all; }
.scene-bg { position:absolute; inset:0; background:rgba(6,14,26,.93); }
.scene-content { position:relative; z-index:1; text-align:center; }
.scene-icon  { font-size:3.5rem; margin-bottom:12px; }
.scene-title { font-family:'Fredoka One',cursive; font-size:1.8rem; color:var(--gold);
  text-shadow:0 0 20px rgba(244,208,63,.6); margin-bottom:8px; }
.scene-coins { font-size:1.6rem; letter-spacing:4px; margin-bottom:8px; }
.scene-next  { font-family:'Fredoka One',cursive; font-size:1.1rem;
  color:rgba(255,255,255,.65); }

.coins-row { display:flex; align-items:center; gap:8px; font-family:'Fredoka One',cursive;
  font-size:.88rem; color:rgba(255,255,255,.5); }
.ci { width:22px; height:22px; border-radius:50%; background:rgba(244,208,63,.15);
  border:2px solid rgba(244,208,63,.35); transition:all .3s; }
.ci.got { background:var(--gold); border-color:var(--gold);
  box-shadow:0 0 10px rgba(244,208,63,.7); animation:ci-pop .4s cubic-bezier(.175,.885,.32,1.5); }
@keyframes ci-pop { 0%{transform:scale(0)} 70%{transform:scale(1.4)} 100%{transform:scale(1)} }


.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels { display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.78rem;
  opacity:.82; color:var(--gold); width:15px; text-align:center;
  text-shadow:0 0 6px rgba(244,208,63,.5); }
.file-labels { display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.78rem;
  opacity:.82; color:var(--gold); text-shadow:0 0 6px rgba(244,208,63,.5); }

.board-outer { position:relative; width:var(--board-size); height:var(--board-size);
  border:4px solid rgba(244,208,63,.85); border-radius:6px; overflow:hidden;
  transition:box-shadow .3s ease;
  box-shadow:0 0 0 3px rgba(244,208,63,.35),0 0 22px rgba(244,208,63,.25),0 16px 50px rgba(0,0,0,.7); }
.board-outer.glow { animation:board-glow .5s ease-in-out 5 alternate; }
@keyframes board-glow {
  from{box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7)}
  to{box-shadow:0 0 0 7px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.5)} }
.board-outer.shake { animation:board-shake .55s ease-in-out; }
@keyframes board-shake {
  0%,100%{transform:translate(0,0)} 10%{transform:translate(-9px,2px)}
  20%{transform:translate(9px,-3px)} 30%{transform:translate(-7px,3px)}
  40%{transform:translate(7px,-2px)} 50%{transform:translate(-5px,1px)}
  60%{transform:translate(5px,0)} 70%{transform:translate(-3px,0)}
  80%{transform:translate(2px,0)} 90%{transform:translate(-1px,0)} }

.board { display:grid; grid-template-columns:repeat(8,var(--cell)); grid-template-rows:repeat(8,var(--cell)); }
.cell { width:var(--cell); height:var(--cell); position:relative;
  display:flex; align-items:center; justify-content:center; font-size:2rem; cursor:default; }
.cl { background:var(--cell-light); } .cd { background:var(--cell-dark); }
.cell.err-flash { animation:err .22s ease-in-out 2; }
@keyframes err { 0%,100%{background:var(--red) !important} 50%{background:transparent !important} }

.coin { position:absolute; width:44px; height:44px; border-radius:50%;
  background:radial-gradient(circle at 38% 32%,#FFE566,#F4D03F 50%,#C9A227);
  box-shadow:0 3px 12px rgba(244,208,63,.65),inset 0 2px 4px rgba(255,255,255,.5);
  display:flex; align-items:center; justify-content:center;
  font-size:1.25rem; font-weight:900; color:rgba(180,130,0,.7);
  animation:coin-spin 2.8s linear infinite; z-index:4; pointer-events:none; }
@keyframes coin-spin {
  0%{transform:rotateY(0deg) scaleX(1)} 25%{transform:rotateY(90deg) scaleX(.12)}
  50%{transform:rotateY(180deg) scaleX(1)} 75%{transform:rotateY(270deg) scaleX(.12)}
  100%{transform:rotateY(360deg) scaleX(1)} }

#rook-piece { position:absolute; display:flex; align-items:center; justify-content:center;
  z-index:10; pointer-events:none;
  transition:top .35s cubic-bezier(.4,0,.2,1),left .35s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.7)); }
#rook-piece.pop { animation:rp-pop .4s cubic-bezier(.175,.885,.32,1.5); }
@keyframes rp-pop { 0%{transform:scale(1) translateY(0)} 50%{transform:scale(1.3) translateY(-8px)} 100%{transform:scale(1) translateY(0)} }
#rook-piece.spin-win { animation:rp-spin 1.1s linear 2; }
@keyframes rp-spin { from{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.3)} to{transform:rotate(360deg) scale(1)} }
#rook-piece.explode { animation:rp-explode .5s ease-out forwards; }
@keyframes rp-explode { 0%{transform:scale(1);opacity:1} 30%{transform:scale(1.5) rotate(20deg)} 100%{transform:scale(0) rotate(90deg);opacity:0} }

.burst { position:fixed; border-radius:50%; pointer-events:none; z-index:200; animation:burst-out ease-out forwards; }
@keyframes burst-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0)} }
.fw { position:fixed; border-radius:50%; pointer-events:none; z-index:300; animation:fw-out ease-out forwards; }
@keyframes fw-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--fx),var(--fy)) scale(0)} }
@keyframes pill-blink{0%,100%{background:rgba(244,208,63,.12);box-shadow:0 0 4px rgba(244,208,63,.3);transform:scale(1);}50%{background:rgba(244,208,63,.55);box-shadow:0 0 18px rgba(244,208,63,1),0 0 35px rgba(244,208,63,.5);transform:scale(1.06);}}
.fire-particle { position:fixed; border-radius:50%; pointer-events:none; z-index:250; animation:fire-out ease-out forwards; }
@keyframes fire-out { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0)} }

/* @keyframes card-in + clap-anim — בשימוש במסכי הניצחון */
@keyframes card-in { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes clap-anim { from{transform:rotate(-12deg) scale(1)} to{transform:rotate(12deg) scale(1.12)} }
.btn-main { background:linear-gradient(145deg,#F7DC6F,var(--gold-dark)); color:#1B3A2A;
  border:none; border-radius:50px; padding:14px 40px; font-family:'Fredoka One',cursive;
  font-size:1.3rem; cursor:pointer; box-shadow:0 5px 0 #9A7B1A,0 8px 20px rgba(0,0,0,.4);
  transition:all .15s; touch-action:manipulation;   margin-bottom:max(8px,env(safe-area-inset-bottom));
}
.btn-main:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #9A7B1A; }
.btn-main:active { transform:translateY(3px); box-shadow:0 2px 0 #9A7B1A; }
/* Stage 5 specific */
.s4-bat {
  position:absolute; font-size:2.2rem; z-index:8; pointer-events:none;
  filter:drop-shadow(0 0 10px rgba(150,0,255,.8));
  animation:bat-flap .18s ease-in-out infinite alternate;
}
@keyframes bat-flap {
  0%   { transform:scale(1,1) rotate(-8deg); }
  50%  { transform:scale(1.3,.7) rotate(0deg); }
  100% { transform:scale(0.85,1.2) rotate(8deg); }
}
/* Win screens */
#win-screen1, #win-screen2 {
  position:fixed; inset:0; z-index:600;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.93); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-screen1.show, #win-screen2.show { opacity:1; pointer-events:all; }
.win-crown { font-family:'Fredoka One',cursive; font-size:2.6rem; color:#7EC8E3; margin-bottom:6px;
  text-shadow:0 0 20px rgba(126,200,227,.7); }
.win-monster-tease { font-family:'Fredoka One',cursive; font-size:1.3rem;
  color:rgba(255,255,255,.65); margin-top:6px; margin-bottom:4px; }
.trading-card {
  width:min(380px, 92vw);
  background:linear-gradient(160deg,#0a1a30 0%,#162D4A 50%,#0a1a30 100%);
  border:4px solid #7EC8E3; border-radius:20px;
  box-shadow:0 0 40px rgba(126,200,227,.8),0 0 80px rgba(244,208,63,.3),inset 0 0 30px rgba(126,200,227,.1);
  overflow:hidden; animation:cardReveal .8s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes cardReveal { from{opacity:0;transform:scale(.5) rotateY(90deg);} to{opacity:1;transform:scale(1) rotateY(0deg);} }
@keyframes monsterPulse {
  0%,100%{filter:drop-shadow(0 0 20px rgba(126,200,227,.7)) drop-shadow(0 0 40px rgba(244,208,63,.3));}
  50%{filter:drop-shadow(0 0 35px rgba(126,200,227,1)) drop-shadow(0 0 60px rgba(244,208,63,.6));}
}
.card-header { font-family:'Fredoka One',cursive; font-size:1.2rem; color:#F4D03F; text-align:center;
  padding:10px 16px 6px;
  background:linear-gradient(90deg,transparent,rgba(244,208,63,.15),transparent);
  border-bottom:1px solid rgba(126,200,227,.4); text-shadow:0 0 12px rgba(244,208,63,.9); }
.card-img-wrap { padding:10px; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; }
.card-monster-img { width:100%; border-radius:10px; animation:monsterPulse 2s ease-in-out infinite; }
.btn-album { margin-top:16px; background:linear-gradient(145deg,#2980b9,#1a6fa8);
  box-shadow:0 5px 0 #1a5276,0 0 20px rgba(41,128,185,.5); }
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>
<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">שלב 5 · המבחן המסכם</div>
    <div class="game-title" id="game-title">מבחן מסכם — זהירות עטלפים! 🦇</div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק/הפעל">🔊</button>
  </div>
  <div style="display:flex;align-items:center;gap:18px;">
    <div class="coins-row">
      <span>מטבעות:</span>
      <div class="ci" id="ci0"></div><div class="ci" id="ci1"></div>
      <div class="ci" id="ci2"></div><div class="ci" id="ci3"></div>
      <div class="ci" id="ci4"></div><div class="ci" id="ci5"></div>
      <div class="ci" id="ci6"></div><div class="ci" id="ci7"></div>
    </div>
  </div>
  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
        <div id="rook-piece"><img src="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 45 45%22%3E%3Cg style=%22fill:%23fff;stroke:%23000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4%22%3E%3Cpath d=%22M9,39h27v-3H9z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12.5,32l1.5-2.5h17l1.5,2.5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12,36v-4h21v4z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M14,29.5v-13h17v13z%22 style=%22stroke-linecap:butt;stroke-linejoin:miter%22/%3E%3Cpath d=%22M14,16.5l-3-2.5h23l-3,2.5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M11,14V9h4v2h5V9h5v2h5V9h4v5z%22 style=%22stroke-linecap:butt%22/%3E%3Cpath d=%22M12,35.5h21M13,31.5h19%22 style=%22fill:none;stroke:%23000;stroke-width:1%22/%3E%3C/g%3E%3C/svg%3E" style="width:90%;height:90%;object-fit:contain;display:block;margin:auto;" alt="♖"></div>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>
</div>

<!-- SCENE TRANSITION -->
<div class="scene-tr" id="scene-tr">
  <div class="scene-bg"></div>
  <div class="scene-content">
    <div class="scene-icon"  id="scene-icon">✨</div>
    <div class="scene-title" id="scene-title">תרחיש הושלם!</div>
    <div class="scene-coins" id="scene-coins">🦇🦇</div>
    <div class="scene-next"  id="scene-next">תרחיש הבא מתחיל...</div>
  </div>
</div>
<div id="scene-fade" style="position:fixed;inset:0;background:#060E1A;z-index:98;opacity:0;pointer-events:none;transition:opacity .25s ease;"></div>
<!-- WIN SCREEN 1 -->
<div id="win-screen1">
  <div style="background:linear-gradient(145deg,#152B45,#0D1E30);border:2px solid var(--gold);border-radius:22px;padding:36px 48px 44px;max-width:440px;text-align:center;box-shadow:0 0 50px rgba(244,208,63,.4);animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;">
    <div style="font-size:4rem;margin-bottom:12px;animation:clap-anim .4s ease-in-out infinite alternate;">👑</div>
    <div style="font-family:'Fredoka One',cursive;font-size:2.1rem;color:var(--gold);margin-bottom:4px;">הוכתרתם ע"י המורה ברוך</div>
    <div class="win-crown">כמפלצת הצריח!</div>
    <div id="final-score-display" style="margin:14px 0;"></div>
    <div class="win-monster-tease">זכיתם בקלף מפלצת הצריח! 🃏</div>
    <button class="btn-main" onclick="showWinScreen2()" style="margin-top:20px;">הצג את הקלף ←</button>
  </div>
</div>

<!-- WIN SCREEN 2 -->
<div id="win-screen2">
  <div style="display:flex;flex-direction:column;align-items:center;gap:16px;">
    <div class="trading-card">
      <div class="card-header">⚔️ מפלצת הצריח ⚔️</div>
      <div class="card-img-wrap">
        <img class="card-monster-img" src="../../מסך הפתיחה/rook.png" alt="מפלצת הצריח">
      </div>
    </div>
    <div id="card-stars" style="font-family:'Fredoka One',cursive;font-size:2rem;letter-spacing:6px;text-align:center;margin-bottom:4px;"></div>
    <button class="btn-main btn-album" onclick="goToAlbum()">📌 הצמד לאלבום!</button>
    <button class="btn-main" onclick="tryAgain()"
      style="background:linear-gradient(145deg,#2ecc71,#27ae60);box-shadow:0 5px 0 #1a7a43;">
      🔄 שחקו שוב!
    </button>
  </div>
</div>

<script>
// ═══ SCENARIOS ═══
const S5_SCENARIOS = [
  // תרחיש 1 — מפוזר | batSpeed 0.8 (בסיס 1.0, -20%) — (1,0) הוחלף ב-(1,2) למניעת לכידה ישירה מ-A1
  { iceCream:[{row:0,col:4},{row:1,col:2},{row:1,col:7},{row:2,col:3},{row:5,col:1},{row:5,col:5},{row:6,col:2},{row:6,col:7}], batSpeed:0.8, bats:2 },
  // תרחיש 2 — גל 🌊 | batSpeed 0.88 (בסיס 1.1, -20%) — (7,3) הוחלף ב-(4,3) למניעת לכידה ישירה מ-A1
  { iceCream:[{row:0,col:1},{row:1,col:6},{row:2,col:2},{row:3,col:4},{row:4,col:3},{row:4,col:6},{row:5,col:2},{row:6,col:5}], batSpeed:0.88, bats:2 },
  // תרחיש 3 — פינות + שוליים 🔲 | batSpeed 0.96 (בסיס 1.2, -20%) — (6,0)→(6,3), (7,5)→(5,6) תוקנו
  { iceCream:[{row:0,col:2},{row:1,col:6},{row:2,col:7},{row:3,col:1},{row:4,col:3},{row:5,col:5},{row:5,col:6},{row:6,col:3}], batSpeed:0.96, bats:2 },
];
const ORIGINAL_S5_SCENARIOS = JSON.parse(JSON.stringify(S5_SCENARIOS));
let s5ScIdx=0;
let SCENARIO = S5_SCENARIOS[0];
// ═══ COMMON UTILS ═══
let busy=false, rookPos=[7,0];
let s5ScHits=[0,0,0]; // פגיעות לכל תרחיש
let coins=[];

function getCellPx(){
  const w=window.innerWidth;
  if(w<=360)return 40; if(w<=390)return 44;
  if(w<=430)return 48; if(w<=480)return 53; return 58;
}
const getCell   = (r,c)=>document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);

function buildStars(){
  const bg=document.getElementById('stars-bg');
  for(let i=0;i<55;i++){
    const s=document.createElement('div'); s.className='star-dot';
    const sz=Math.random()*2.4+.7;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
}
function buildCoords(){
  const rl=document.getElementById('ranks'),fl=document.getElementById('files');
  rl.innerHTML=''; fl.innerHTML='';
  for(let r=0;r<8;r++){const d=document.createElement('div');d.textContent=8-r;rl.appendChild(d);}
  'ABCDEFGH'.split('').forEach(f=>{const d=document.createElement('div');d.textContent=f;fl.appendChild(d);});
}

// ═══ BOARD BUILD ═══
function buildBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.dataset.r=r; cell.dataset.c=c;
    board.appendChild(cell);
  }
  placeCoins(); snapRook();
}

function placeCoins(){
  document.querySelectorAll('.coin').forEach(el=>el.remove());
  coins.forEach((coin,i)=>{
    if(!coin.alive) return;
    const cell=getCell(coin.row,coin.col); if(!cell) return;
    const el=document.createElement('div');
    el.className='coin'; el.id='coin-'+i;
    el.textContent='✦';
    cell.appendChild(el);
  });
}

function syncCellVar(){
  const px=getCellPx();
  document.documentElement.style.setProperty('--cell',px+'px');
  document.documentElement.style.setProperty('--board-size',(px*8)+'px');
}
function snapRook(){
  const rk=document.getElementById('rook-piece');
  rk.style.transition='none';
  requestAnimationFrame(()=>{
    const px=getCellPx();
    rk.style.width=rk.style.height=px+'px';
    rk.style.top=rookPos[0]*px+'px'; rk.style.left=rookPos[1]*px+'px';
    setTimeout(()=>rk.style.transition='',20);
  });
}

function calcRookMoves(r,c){
  const out=[];
  for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){
    let nr=r+dr, nc=c+dc;
    while(nr>=0&&nr<8&&nc>=0&&nc<8){
      out.push([nr,nc]);
      if(coins.some(co=>co.alive&&co.row===nr&&co.col===nc)) break;
      nr+=dr; nc+=dc;
    }
  }
  return out;
}

function errorFlash(r,c){
  const cell=getCell(r,c);
  if(cell){ cell.classList.remove('err-flash'); void cell.offsetWidth; cell.classList.add('err-flash');
    setTimeout(()=>cell.classList.remove('err-flash'),500); }
  playSound('error');
}

// ═══ PARTICLES ═══
function burst(cx,cy){
  const cols=['#F4D03F','#FFE580','#C9A227','#FFFFFF','#52B788','#FF6B35'];

    el.style.setProperty('--bx',Math.cos(a)*d+'px'); el.style.setProperty('--by',Math.sin(a)*d+'px');
    document.body.appendChild(el); setTimeout(()=>el.remove(),900);

}
function fireParticles(cx,cy){

function fireworks(){

// ═══ SOUND ═══
let isMuted=false;
function toggleMute(){
  isMuted=!isMuted;
  document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';
}
let actx=null;
function ac(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
// חימום/פתיחת קשר האודיו באינטראקציה הראשונה (pointerdown קודם ל-click) — מונע פצפוץ בצליל הראשון
function warmAudio(){
  try{
    const ctx=ac();
    const o=ctx.createOscillator(), g=ctx.createGain();
    g.gain.value=0;                       // שקט — רק "מחמם" את צינור האודיו
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.02);
  }catch(e){}
}
document.addEventListener('pointerdown', warmAudio, {once:true});
function playSound(type){
  if(isMuted) return;
  try{
    const ctx=ac(), now=ctx.currentTime;
    const mk=()=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); return [o,g]; };
    if(type==='slide'){
      const [o,g]=mk(); o.type='sine';
      o.frequency.setValueAtTime(380,now); o.frequency.exponentialRampToValueAtTime(260,now+.3);
      g.gain.setValueAtTime(.15,now); g.gain.exponentialRampToValueAtTime(.001,now+.35);
      o.start(now); o.stop(now+.35);
    } else if(type==='collect'){
      const [o,g]=mk(),[o2,g2]=mk();
      o.frequency.setValueAtTime(880,now); g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.001,now+.28); o.start(now); o.stop(now+.28);
      o2.frequency.setValueAtTime(1100,now+.12); g2.gain.setValueAtTime(.17,now+.12); g2.gain.exponentialRampToValueAtTime(.001,now+.45); o2.start(now+.12); o2.stop(now+.45);
    } else if(type==='error'){
      const [o,g]=mk(); o.type='sawtooth';
      o.frequency.setValueAtTime(240,now); o.frequency.exponentialRampToValueAtTime(100,now+.28);
      g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.3);
      o.start(now); o.stop(now+.3);
    } else if(type==='boom'){
      const buf=ctx.createBuffer(1,ctx.sampleRate*.8,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.15));
      const src=ctx.createBufferSource(); src.buffer=buf;
      const g=ctx.createGain(); g.gain.setValueAtTime(.7,now); g.gain.exponentialRampToValueAtTime(.001,now+.8);
      const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=400;
      src.connect(lpf); lpf.connect(g); g.connect(ctx.destination); src.start(now); src.stop(now+.8);
      const [o,gv]=mk(); o.type='square';
      o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(40,now+.2);
      gv.gain.setValueAtTime(.4,now); gv.gain.exponentialRampToValueAtTime(.001,now+.25);
      o.start(now); o.stop(now+.25);
    } else if(type==='victory'){
      [523,659,784,1047].forEach((freq,i)=>{ const [o,g]=mk(),t=now+i*.15;
        o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.45); o.start(t); o.stop(t+.45); });
    } else if(type==='fanfare'){
      [523,659,784,1047,1319].forEach((freq,i)=>{ const [o,g]=mk(),t=now+i*.15;
        o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.45); o.start(t); o.stop(t+.45); });
    }
  }catch(e){}
}

// ═══ BAT SYSTEM (2 bats) ═══
let batAnimHandle=null, batBusy=false;
let iceBats=[], rookPx={x:0,y:0}, iceCount=0, lastTime=0;

function batLoop(ts){
  if(!lastTime){ lastTime=ts; batAnimHandle=requestAnimationFrame(batLoop); return; }
  const dt=Math.min((ts-lastTime)/1000,0.05); lastTime=ts;
  const px=getCellPx(), speed=SCENARIO.batSpeed*px;
  // קואורדינטות יחסיות ללוח (board-relative)
  rookPx={ x:rookPos[1]*px+px/2, y:rookPos[0]*px+px/2 };
  let hit=false;
  iceBats.forEach((bat,i)=>{
    if(dt>0){
      let distToRook;
      if(i===0){
        // Bat 0: chaser
        const dx=rookPx.x-bat.x, dy=rookPx.y-bat.y;
        distToRook=Math.sqrt(dx*dx+dy*dy);
        if(distToRook>0){ bat.x+=(dx/distToRook)*speed*dt; bat.y+=(dy/distToRook)*speed*dt; }
        const el=document.getElementById('bat-'+i);
        if(el){ el.style.left=(bat.x-17)+'px'; el.style.top=(bat.y-17)+'px'; el.style.transform=dx<0?'scaleX(-1)':''; }
        if(distToRook<px*0.55) hit=true;
      } else {
        // Bat 1: diagonal bouncer (10% faster)
        const bounceSpeed=speed*1.1;
        bat.x+=bat.dx*bounceSpeed*dt; bat.y+=bat.dy*bounceSpeed*dt;
        const bL=0, bR=px*8, bT=0, bB=px*8;
        const w=()=>(Math.random()*.5+.75);
        if(bat.x<=bL+px*.3){ bat.dx=Math.abs(bat.dx)*w(); bat.dy*=w(); bat.x=bL+px*.3; const l=Math.sqrt(bat.dx*bat.dx+bat.dy*bat.dy); bat.dx/=l; bat.dy/=l; }
        if(bat.x>=bR-px*.3){ bat.dx=-Math.abs(bat.dx)*w(); bat.dy*=w(); bat.x=bR-px*.3; const l=Math.sqrt(bat.dx*bat.dx+bat.dy*bat.dy); bat.dx/=l; bat.dy/=l; }
        if(bat.y<=bT+px*.3){ bat.dy=Math.abs(bat.dy)*w(); bat.dx*=w(); bat.y=bT+px*.3; const l=Math.sqrt(bat.dx*bat.dx+bat.dy*bat.dy); bat.dx/=l; bat.dy/=l; }
        if(bat.y>=bB-px*.3){ bat.dy=-Math.abs(bat.dy)*w(); bat.dx*=w(); bat.y=bB-px*.3; const l=Math.sqrt(bat.dx*bat.dx+bat.dy*bat.dy); bat.dx/=l; bat.dy/=l; }
        const el=document.getElementById('bat-'+i);
        if(el){ el.style.left=(bat.x-17)+'px'; el.style.top=(bat.y-17)+'px'; el.style.transform=bat.dx<0?'scaleX(-1)':''; }
        distToRook=Math.sqrt((rookPx.x-bat.x)**2+(rookPx.y-bat.y)**2);
        if(distToRook<px*0.55) hit=true;
      }
    }
  });
  if(hit&&!batBusy){ batBusy=true; cancelAnimationFrame(batAnimHandle); batHit(); return; }
  batAnimHandle=requestAnimationFrame(batLoop);
}
function batHit(){
  s5ScHits[s5ScIdx]++;  // ספירה מצטברת לכל תרחיש (לא מתאפסת!)
  playSound('boom');
  const rk=document.getElementById('rook-piece'); rk.classList.add('explode');
  document.getElementById('board-outer').classList.remove('shake');
  void document.getElementById('board-outer').offsetWidth;
  document.getElementById('board-outer').classList.add('shake');
  const bo=document.getElementById('board-outer').getBoundingClientRect(), px=getCellPx();
  fireParticles(bo.left+rookPos[1]*px+px/2, bo.top+rookPos[0]*px+px/2);
  setTimeout(()=>{ document.getElementById('board-outer').classList.remove('shake'); loadScene(); },1200);
}
function handleBatClick(r,c){
  if(batBusy||busy) return;
  if(r===rookPos[0]&&c===rookPos[1]) return;
  const reachable=calcRookMoves(rookPos[0],rookPos[1]);
  if(!reachable.some(([vr,vc])=>vr===r&&vc===c)){ errorFlash(r,c); return; }
  rookPos=[r,c]; playSound('slide');
  const rk=document.getElementById('rook-piece'), px=getCellPx();
  rk.style.top=r*px+'px'; rk.style.left=c*px+'px';
  const ice=coins.find(co=>co.alive&&co.row===r&&co.col===c);
  if(ice){
    ice.alive=false;
    document.getElementById('coin-'+ice.id)?.remove();
    iceCount++;
    document.getElementById('ci'+(iceCount-1))?.classList.add('got');
    const bo=document.getElementById('board-outer').getBoundingClientRect();
    burst(bo.left+c*px+px/2, bo.top+r*px+px/2); playSound('collect');
    if(iceCount>=SCENARIO.iceCream.length){
      batBusy=true; cancelAnimationFrame(batAnimHandle);
      setTimeout(()=>scenarioWin(), 400);
    }
  }
}
function placeBats(){
  document.querySelectorAll('.s4-bat').forEach(el=>el.remove());
  const boEl=document.getElementById('board-outer');
  iceBats.forEach((bat,i)=>{
    const el=document.createElement('div'); el.className='s4-bat'; el.id='bat-'+i;
    el.textContent='🦇';
    el.style.left=(bat.x-17)+'px'; el.style.top=(bat.y-17)+'px';
    boEl.appendChild(el);
  });
}
function fadeScene(thenDo){
  const el=document.getElementById('scene-fade');
  el.style.opacity='1';
  setTimeout(()=>{
    thenDo();
    setTimeout(()=>{ el.style.opacity='0'; }, 50);
  }, 280);
}
function loadScene(){
  syncCellVar();
  SCENARIO=S5_SCENARIOS[s5ScIdx];
  iceCount=0; batBusy=false; rookPos=[7,0];
  const n=SCENARIO.iceCream.length;
  document.getElementById('stage-badge').textContent=
    `שלב 5 · תרחיש ${s5ScIdx+1}/${S5_SCENARIOS.length}`;
  for(let i=0;i<8;i++){
    const el=document.getElementById('ci'+i);
    if(el){ el.style.display=i<n?'':'none'; el.classList.remove('got'); }
  }
  coins=SCENARIO.iceCream.map((c,i)=>(({...c,id:i,alive:true})));
  const rk=document.getElementById('rook-piece');
  rk.classList.remove('explode','spin-win'); rk.style.opacity='1';
  const px=getCellPx();
  rk.style.transition='none'; rk.style.width=rk.style.height=px+'px';
  rk.style.top=(7*px)+'px'; rk.style.left='0px';
  setTimeout(()=>{ rk.style.transition='top .35s cubic-bezier(.4,0,.2,1),left .35s cubic-bezier(.4,0,.2,1)'; },20);
  document.querySelectorAll('.s4-bat').forEach(el=>el.remove());
  buildBoard();
  // Init 2 bats: H8 + A8
  const s5Corners=[[0,7],[0,0]];
  iceBats=s5Corners.slice(0,2).map((([cr,cc],b)=>{
    const dx=b===1?(Math.random()>.5?1:-1):0;
    const dy=b===1?(Math.random()>.5?1:-1):0;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    return {
      x:cc*px+px/2, y:cr*px+px/2,
      dx:dx/len, dy:dy/len
    };
  }));
  rookPx={ x:rookPos[1]*px+px/2, y:rookPos[0]*px+px/2 };
  placeBats();
  if(batAnimHandle) cancelAnimationFrame(batAnimHandle);
  lastTime=0; batAnimHandle=requestAnimationFrame(batLoop);
}
function showSceneTr(icon,title,coins,next,onDone,delay=2800){
  document.getElementById('scene-icon').textContent=icon;
  document.getElementById('scene-title').textContent=title;
  document.getElementById('scene-coins').textContent=coins;
  document.getElementById('scene-next').textContent=next;
  document.getElementById('scene-tr').classList.add('show');
  setTimeout(()=>{
    document.getElementById('scene-tr').classList.remove('show');
    setTimeout(onDone, 520);
  }, delay);
}
function showStageTransition(){
  const msgs=['','🎉 מעולה! עוברים לתרחיש 2','🔥 וואו! עוברים לתרחיש האחרון!'];
  showSceneTr('🎉', msgs[s5ScIdx], '', '', loadScene);
}
const TOTAL_STAGES = 5;
const PERFECT_THRESHOLD = 5; // כל 5 השלבים מושלמים = 3 כוכבים

// ── קריאה מהמפתח המאוחד chess_rook (תואם שלבים 1-4) ──
function getModuleData(){
  try{ return JSON.parse(localStorage.getItem('chess_rook')||'{}') || {}; }catch(e){ return {}; }
}
// נתוני שלב בודד (1-based) מתוך chess_rook.stageN
function getStageData(n){
  const s = getModuleData()['stage'+n];
  return s || null;
}
function getModuleStars(){
  let done=0, perfect=0;
  for(let n=1;n<=TOTAL_STAGES;n++){
    const d=getStageData(n);
    if(d?.done) done++;
    if(d?.bestPerfect || d?.perfect) perfect++;   // שיא (best-of) עם נפילה אחורה לנתונים ישנים
  }
  if(done < TOTAL_STAGES) return 0;
  // 3 כוכבים: כל השלבים מושלמים — אפס שלבים לשיפור
  if(perfect >= PERFECT_THRESHOLD) return 3;
  // 2 כוכבים: כל הושלמו, אבל יש 🔄 — מקסימום כשיש שלב לשיפור
  return 2;
}
function buildStageRow(modulePrefix){
  const pills=[];
  for(let n=1;n<=TOTAL_STAGES;n++){
    const d=getStageData(n);
    if(d?.bestPerfect || d?.perfect){
      pills.push(`<span style="display:inline-flex;align-items:center;gap:3px;font-family:'Fredoka One',cursive;font-size:.75rem;padding:5px 10px;border-radius:50px;border:1.5px solid rgba(82,183,136,.4);color:rgba(82,183,136,.7);margin:2px;">שלב ${n} ⭐</span>`);
    } else {
      const icon=d?.done?'🔄':'○';
      const url=modulePrefix+n+'.html';
      pills.push(`<button onclick="window.location.href='${url}'" style="display:inline-flex;align-items:center;gap:3px;font-family:'Fredoka One',cursive;font-size:.75rem;padding:6px 12px;border-radius:50px;border:2px solid var(--gold);background:rgba(244,208,63,.12);color:var(--gold);cursor:pointer;margin:2px;min-height:36px;touch-action:manipulation;animation:pill-blink 1.2s ease-in-out infinite;" title="שחקו שלב ${n}">שלב ${n} ${icon}</button>`);
    }
  }
  return pills.join('');
}
function saveModuleState(){
  try{
    // perfect: עד 3 פגיעות עטלף בסך הכל על פני 3 התרחישים (סף גבוה יותר משלב 4 — כאן 2 עטלפים)
    const totalHits = s5ScHits.reduce((a,b)=>a+b,0);
    const perfect = totalHits <= 3;
    // ── מיזוג stage5 לתוך chess_rook המאוחד — לא דורסים שלבים 1-4 ──
    const data = getModuleData();
    const prev = data.stage5 || {};
    data.stage5 = {
      done: true,
      perfect: !!perfect,                            // תאימות לאחור — זהה ל-lastPerfect
      lastPerfect: !!perfect,                         // הביצוע האחרון
      bestPerfect: !!prev.bestPerfect || !!perfect    // best-of — לעולם לא יורד אחרי tryAgain
    };
    localStorage.setItem('chess_rook', JSON.stringify(data));

    // סימון השלמת המודול
    let completed = [];
    try{ completed = JSON.parse(localStorage.getItem('chess_completed')||'[]'); }catch(e){}
    if(!completed.includes('rook')){ completed.push('rook'); localStorage.setItem('chess_completed', JSON.stringify(completed)); }
  }catch(e){}
}
function showFinalScore(){
  saveModuleState();
  const stars = getModuleStars();
  const starsStr = '⭐'.repeat(stars);
  const el=document.getElementById('final-score-display');
  if(el) el.innerHTML=`<div style="font-family:'Fredoka One',cursive;font-size:2.4rem;letter-spacing:6px;">${starsStr}</div>`;
  const cardStars=document.getElementById('card-stars');
  if(cardStars){
    cardStars.innerHTML=`<div>${starsStr}</div><div style="display:flex;flex-wrap:wrap;justify-content:center;margin-top:8px;">${buildStageRow('rook-stage')}</div>`;
  }
}
function scenarioWin(){
  // s5ScHits[s5ScIdx] מתעדכן ישירות ב-batHit() — הוא ה-tracker לכוכבים
  document.getElementById('rook-piece').classList.add('spin-win');
  document.getElementById('board-outer').classList.add('glow');
  fireworks(); setTimeout(fireworks,600); setTimeout(fireworks,1200);
  playSound('fanfare');
  setTimeout(()=>{
    document.getElementById('board-outer').classList.remove('glow');
    document.getElementById('rook-piece').classList.remove('spin-win');
    if(s5ScIdx < S5_SCENARIOS.length-1){
      s5ScIdx++;
      showStageTransition();
    } else {
      showFinalScore();
      document.getElementById('win-screen1').classList.add('show');
    }
  },1800);
}
function showWinScreen2(){
  document.getElementById('win-screen1').classList.remove('show');
  document.getElementById('win-screen2').classList.add('show');
  fireworks(); setTimeout(fireworks,700);
}
function goToAlbum(){
  try{
    // עדכון chess_completed
    const completed = JSON.parse(localStorage.getItem('chess_completed')||'[]');
    if(!completed.includes('rook')){ completed.push('rook'); localStorage.setItem('chess_completed', JSON.stringify(completed)); }
    // עדכון chess_cards
    const cards = JSON.parse(localStorage.getItem('chess_cards')||'[]');
    if(!cards.includes('rook')){ cards.push('rook'); localStorage.setItem('chess_cards', JSON.stringify(cards)); }
    // סימון השלמה אחרונה
    localStorage.setItem('chess_just_completed','rook');
  }catch(e){}
  window.location.href='../../מסך הפתיחה/index.html';
}
function tryAgain(){
  window.location.reload();
}
function initHandlers(){
  document.getElementById('board').addEventListener('click',e=>{
    if(batBusy||busy) return;
    const cell=e.target.closest('.cell'); if(!cell) return;
    handleBatClick(+cell.dataset.r, +cell.dataset.c);
  });
}
window.addEventListener('DOMContentLoaded',()=>{
  buildStars(); buildCoords();
window.addEventListener('resize',()=>{ syncCellVar(); snapRook(); });
  setTimeout(()=>{ loadScene(); initHandlers(); },0);
});
