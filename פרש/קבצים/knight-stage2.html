<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>הפרש הקופץ — שלב 2 🪙</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
:root{
  --gold:#F4D03F;--gold-dark:#C9A227;--green:#52B788;--blue:#7EC8E3;--orange:#FF6B35;--red:#FF4466;
  --bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;
  /* נוסחה פלואידית דו-כיוונית (סקיל הפריסה): cap 58px, מתכווץ לפי רוחב/גובה ללא breakpoints.
     250px = chrome אנכי מקסימלי (כותרת+נקודות+title+level-panel/explosion-dots) */
  --cell:58px;
  --cell-light:#C9E4F5;--cell-dark:#4A7FA5;
}
body{
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:14px 10px calc(28px + env(safe-area-inset-bottom));user-select:none;overflow-x:hidden;
  overscroll-behavior:none;
}
.star-dot{position:fixed;border-radius:50%;background:#fff;pointer-events:none;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.08;transform:scale(.7)}to{opacity:.9;transform:scale(1.3)}}

/* Header */
.hdr{width:100%;max-width:620px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stage-badge{
  font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--bg2);
  background:var(--gold);padding:4px 14px;border-radius:50px;
  box-shadow:0 0 14px rgba(244,208,63,.6);
}

/* Move counter */
.move-counter{
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);
  padding:4px 16px;border-radius:50px;
  display:none;
}
.move-counter.visible{display:block;}
.move-counter span{color:var(--gold);}

/* Explosion counter (minefield only) */
.explosion-dots{
  display:none;gap:10px;align-items:center;
  margin-bottom:10px;direction:rtl;
  background:rgba(255,68,102,.08);
  border:2px solid rgba(255,68,102,.3);
  padding:6px 18px;border-radius:50px;
  font-family:'Fredoka One',cursive;
  font-size:.95rem;color:rgba(255,255,255,.75);
}
.explosion-dots.visible{display:flex;}
.exp-dot{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,68,102,.5);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;line-height:1;
  transition:all .3s;
}
.exp-dot.used{
  background:rgba(255,68,102,.9);
  border-color:var(--red);
  box-shadow:0 0 10px rgba(255,68,102,.7);
  animation:dotExplode .4s ease;
}
@keyframes dotExplode{
  0%{transform:scale(.6)}
  50%{transform:scale(1.35)}
  100%{transform:scale(1)}
}

/* Hint reveal — transient text below board */
.hint-reveal{
  margin-top:14px;width:100%;max-width:480px;min-height:42px;
  text-align:center;
  font-family:'Fredoka One',cursive;font-size:1.3rem;
  color:var(--gold);
  text-shadow:0 0 22px rgba(244,208,63,.75), 0 2px 6px rgba(0,0,0,.5);
  direction:rtl; unicode-bidi:bidi-override;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.hint-reveal.show{opacity:1;}

/* Scenario title — prominent header above the board */
.scenario-title{
  font-family:'Fredoka One',cursive;
  font-size:1.7rem;
  color:var(--gold);
  text-shadow:0 0 22px rgba(244,208,63,.7), 0 2px 6px rgba(0,0,0,.5);
  text-align:center;
  margin:6px 0 14px;
  direction:rtl; unicode-bidi:bidi-override;
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Board layout */
.coord-wrap{display:flex;align-items:center;gap:8px;direction:ltr;}
.rank-labels{
  display:flex;flex-direction:column;align-items:center;justify-content:space-around;
  height:calc(var(--cell)*8);
  font-family:'Fredoka One',cursive;font-size:.8rem;font-weight:900;color:#F4D03F;
  width:18px;
}
.file-labels{
  display:flex;justify-content:space-around;
  width:calc(var(--cell)*8);
  font-family:'Fredoka One',cursive;font-size:.8rem;font-weight:900;color:#F4D03F;
  margin-top:3px;
}
.board-outer{
  position:relative;
  border:3px solid var(--gold-dark);border-radius:8px;overflow:visible;
  box-shadow:0 8px 40px rgba(0,0,0,.7),0 0 30px rgba(244,208,63,.12);
}
.board{
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  border-radius:5px;overflow:hidden;
}
.cell{
  width:var(--cell);height:var(--cell);
  position:relative;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,filter .15s;touch-action:manipulation;
}
.cell.light{background:var(--cell-light);}
.cell.dark{background:var(--cell-dark);}
.cell.reachable{
  background:rgba(82,183,136,.38)!important;
  cursor:pointer;
  animation:reachPulse 1s ease infinite;
}
.cell.reachable:hover{filter:brightness(1.3);}
.cell.flash-reach{background:rgba(82,183,136,.55)!important;transition:background .1s;}
.cell.flash-path{background:rgba(244,208,63,.45)!important;transition:background .1s;}
.cell.wrong{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.cell.explode{animation:explodeCell .5s ease;}
@keyframes explodeCell{0%{background:rgba(255,80,80,.8)!important}100%{}}

/* Floating knight */
#floating-knight{
  position:absolute;font-size:2.3rem;line-height:1;
  pointer-events:none;z-index:20;
  filter:drop-shadow(0 0 14px rgba(244,208,63,.9)) drop-shadow(0 2px 4px rgba(0,0,0,.8));
  transition:left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1);
  will-change:left,top;
}

/* Mine on board */
.board-mine{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:1.5rem;z-index:5;pointer-events:none;
  animation:minePulse 2s ease-in-out infinite alternate;
}
@keyframes minePulse{from{transform:translate(-50%,-50%) scale(.92)}to{transform:translate(-50%,-50%) scale(1.08)}}

/* Queen on board */
.board-queen{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2.2rem;z-index:5;pointer-events:none;
  filter:drop-shadow(0 0 10px rgba(244,208,63,.8));
  animation:queenBeacon 1.2s ease-in-out infinite alternate;
}
@keyframes queenBeacon{
  from{
    filter:drop-shadow(0 0 8px rgba(244,208,63,.55));
    transform:translate(-50%,-50%) scale(1);
  }
  to{
    filter:drop-shadow(0 0 26px rgba(244,208,63,1));
    transform:translate(-50%,-50%) scale(1.14);
  }
}

/* Coins on board — all identical, always full brightness */
.board-coin{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:1.6rem;z-index:5;pointer-events:none;
  animation:coinBob 1.2s ease-in-out infinite alternate;
}
@keyframes coinBob{from{transform:translate(-50%,-50%) scale(.88)}to{transform:translate(-50%,-50%) scale(1.12)}}
.board-coin.dimmed{filter:grayscale(1) brightness(0.4);animation:none;transform:translate(-50%,-50%) scale(0.85);}
.board-coin.next-coin{filter:drop-shadow(0 0 8px #F4D03F);animation:coinBob 0.7s ease-in-out infinite alternate;}
.coin-num{
  position:absolute;top:2px;right:4px;
  font-family:'Fredoka One',cursive;font-size:0.7rem;
  color:rgba(12,30,48,.45);
  background:rgba(244,208,63,.35);
  border-radius:50%;
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  z-index:6;pointer-events:none;
  transition:all .25s;
}
.coin-num.active{
  color:#0C1E30;
  background:var(--gold);
  box-shadow:0 0 8px rgba(244,208,63,.9);
  animation:numPulse .85s ease-in-out infinite alternate;
}
@keyframes numPulse{
  from{box-shadow:0 0 5px rgba(244,208,63,.7);}
  to  {box-shadow:0 0 14px rgba(244,208,63,1),0 0 22px rgba(244,208,63,.45);}
}

/* Explosion overlay */
.boom-overlay{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:2.2rem;z-index:30;pointer-events:none;
  animation:boomPop .6s ease forwards;
}
@keyframes boomPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3);}
  40%{opacity:1;transform:translate(-50%,-50%) scale(1.4);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1);}
}

/* X mark */
.x-mark{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:1.8rem;color:#FF4444;font-weight:900;
  z-index:15;pointer-events:none;
  animation:xPop .4s ease forwards;
}
@keyframes xPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}

/* Progress dots */
.prog-row{display:flex;gap:8px;margin-bottom:10px;}
.prog-dot{
  width:12px;height:12px;border-radius:50%;
  background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.25);transition:background .3s;
}
.prog-dot.done{background:var(--green);border-color:var(--green);}
.prog-dot.active{background:var(--gold);border-color:var(--gold);animation:dotPulse .8s ease infinite alternate;}
@keyframes dotPulse{from{transform:scale(1)}to{transform:scale(1.4)}}

/* ── Level buttons ── */
.level-panel{
  display:flex;flex-direction:column;gap:12px;
  justify-content:center;align-items:center;
  margin-right:8px;
}
.btn-level{
  font-family:'Fredoka One',cursive;
  font-size:1rem;
  padding:0;
  border-radius:16px;
  border:1.5px solid rgba(126,200,227,.25);
  cursor:pointer;
  width:78px;height:78px;
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;
  transition:all .22s ease;
  position:relative;overflow:hidden;
  touch-action:manipulation;
  /* DualSense base — dark matte body */
  background:linear-gradient(160deg,#1c2e42 0%,#0e1c2b 60%,#091420 100%);
  color:rgba(126,200,227,.45);
  box-shadow:
    0 4px 18px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 -1px 0 rgba(0,0,0,.4);
}
/* Top sheen — plastic gloss */
.btn-level::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:42%;
  background:linear-gradient(180deg,rgba(255,255,255,.09) 0%,transparent 100%);
  border-radius:16px 16px 0 0;
  pointer-events:none;
}
/* Bottom ridge line — controller groove detail */
.btn-level::after{
  content:'';position:absolute;
  bottom:10px;left:18%;right:18%;height:2px;
  background:linear-gradient(90deg,transparent,rgba(126,200,227,.2),transparent);
  border-radius:2px;
  pointer-events:none;
}
.btn-level:hover{
  transform:scale(1.07) translateY(-1px);
  border-color:rgba(126,200,227,.5);
  box-shadow:
    0 8px 24px rgba(0,0,0,.6),
    0 0 16px rgba(126,200,227,.2),
    inset 0 1px 0 rgba(255,255,255,.1);
}
.btn-level:active{transform:scale(.96) translateY(1px);}

/* INACTIVE STATES */
.btn-level.help{
  color:rgba(82,183,136,.4);
  border-color:rgba(82,183,136,.15);
}
.btn-level.solo{
  color:rgba(126,200,227,.4);
  border-color:rgba(126,200,227,.15);
}

/* ACTIVE — מתחיל (green — DualSense glow green) */
.btn-level.help.active{
  color:#fff;
  background:linear-gradient(160deg,#1d3d30 0%,#0f2820 60%,#07160f 100%);
  border-color:rgba(82,183,136,.8);
  box-shadow:
    0 0 0 1px rgba(82,183,136,.3),
    0 0 22px rgba(82,183,136,.5),
    0 0 42px rgba(82,183,136,.2),
    0 6px 20px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.1);
  text-shadow:0 0 12px rgba(82,183,136,.9);
}

/* ACTIVE — מתקדם (blue — DualSense signature blue glow) */
.btn-level.solo.active{
  color:#fff;
  background:linear-gradient(160deg,#162840 0%,#0b1c30 60%,#060f1e 100%);
  border-color:rgba(94,184,226,.9);
  box-shadow:
    0 0 0 1px rgba(94,184,226,.35),
    0 0 26px rgba(94,184,226,.6),
    0 0 50px rgba(94,184,226,.25),
    0 6px 20px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.1);
  text-shadow:0 0 14px rgba(126,200,227,1);
}

.btn-icon{font-size:1.5rem;line-height:1;}
.btn-label{font-size:.88rem;line-height:1;letter-spacing:.3px;}
.err-counter{display:block;font-size:.68rem;margin-top:2px;opacity:.9;font-weight:700;}

/* Overlays */
.all-found-overlay{
  display:none;position:fixed;inset:0;background:rgba(6,14,26,.82);
  z-index:100;align-items:center;justify-content:center;
}
.all-found-overlay.show{display:flex;}
.all-found-card{
  background:linear-gradient(160deg,#162D4A,#0C1E30);
  border:2px solid var(--gold);border-radius:24px;
  padding:36px 44px;text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.25);
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.all-found-card .emoji{font-size:3.5rem;margin-bottom:8px;}
.all-found-card .title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);margin-bottom:6px;}
.all-found-card .sub{font-size:1rem;color:rgba(255,255,255,.75);margin-bottom:20px;line-height:1.5;}
.all-found-card .diamond-badge{
  font-family:'Fredoka One',cursive;font-size:1.3rem;color:#00E6FF;
  text-shadow:0 0 18px rgba(0,230,255,.85), 0 0 8px rgba(0,230,255,.6);
  margin-bottom:16px;letter-spacing:1.5px;
  animation:diamondPulse 1.6s ease-in-out infinite alternate;
}
@keyframes diamondPulse{
  from{transform:scale(1);text-shadow:0 0 12px rgba(0,230,255,.6);}
  to  {transform:scale(1.06);text-shadow:0 0 22px rgba(0,230,255,1),0 0 8px rgba(0,230,255,.8);}
}
.btn-next{
  font-family:'Fredoka One',cursive;font-size:1.2rem;
  padding:12px 36px;border-radius:50px;border:none;cursor:pointer;color:#0C1E30;
  background:linear-gradient(135deg,var(--gold),#e8b820);
  box-shadow:0 4px 18px rgba(244,208,63,.4);transition:transform .15s;
  touch-action:manipulation;
}
.btn-next:hover{transform:scale(1.06);}
.btn-retry{
  font-family:'Fredoka One',cursive;font-size:1rem;
  padding:10px 28px;border-radius:50px;border:2px solid rgba(255,255,255,.3);
  cursor:pointer;color:#fff;background:transparent;
  transition:transform .15s;margin-top:10px;display:block;width:100%;
  touch-action:manipulation;
}
.btn-retry:hover{transform:scale(1.04);}

/* ── Responsive breakpoints ── */
/* Panel drops below the board before the side-by-side layout would clip (≤540) */
@media (max-width:767px){
  :root{ --cell:44px; }
}
@media (max-width:540px){
  .coord-wrap{ flex-wrap:wrap; justify-content:center; gap:6px; }
  .level-panel{
    flex-direction:row !important;
    width:calc(var(--cell)*8);
    justify-content:center;
    gap:16px;
    margin-top:2px;
  }
}
/* Small phones */
@media (max-width:479px){
  :root{ --cell:40px; }
  body{ padding:10px 8px calc(20px + env(safe-area-inset-bottom)); }
  .btn-level{ width:64px; height:64px; }
  .btn-icon{ font-size:1.3rem; }
  .scenario-title{ font-size:1.4rem; }
}
.confetti-dot{
  position:fixed;border-radius:3px;pointer-events:none;z-index:999;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@keyframes coinCollect{
  0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  60%{transform:translate(-50%,-80%) scale(1.5);opacity:.7;}
  100%{transform:translate(-50%,-120%) scale(0);opacity:0;}
}
.coin-collect-anim{animation:coinCollect .5s ease forwards!important;}
@keyframes reachPulse{
  0%,100%{box-shadow:inset 0 0 0 2px rgba(82,183,136,.5);}
  50%{box-shadow:inset 0 0 0 3px rgba(82,183,136,.9);}
}
.btn-mute{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;
  font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;flex-shrink:0;
}
.btn-mute:hover{background:rgba(255,255,255,.18);}
</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="stage-badge" id="stage-badge">שלב 2 · תרחיש 1/3</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="move-counter" id="move-counter">מהלכים: <span id="move-num">0</span> / 6</div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק">🔊</button>
  </div>
</div>

<!-- Progress dots -->
<div class="prog-row" id="prog-row"></div>

<!-- Scenario title (dynamic per scenario type) -->
<div class="scenario-title" id="scenario-title">🪙 אוספים מטבעות</div>

<!-- Explosion counter (only visible in minefield) -->
<div class="explosion-dots" id="explosion-dots">
  <span class="label">💣 פיצוצים</span>
  <div class="exp-dot" id="exp-dot-0"></div>
  <div class="exp-dot" id="exp-dot-1"></div>
  <div class="exp-dot" id="exp-dot-2"></div>
</div>

<!-- Board + coords + level buttons -->
<div class="coord-wrap" id="coord-wrap">
  <div class="rank-labels" id="rank-labels"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
    </div>
    <div class="file-labels" id="file-labels"></div>
  </div>
  <!-- Level buttons (hidden in scenario 3) -->
  <div class="level-panel" id="level-panel">
    <button class="btn-level help" id="btn-help" onclick="setLevel('help')">
      <span class="btn-icon">💡</span>
      <span class="btn-label">מתחיל</span>
    </button>
    <button class="btn-level solo active" id="btn-solo" onclick="setLevel('solo')">
      <span class="btn-icon">🧠</span>
      <span class="btn-label">מתקדם</span>
      <span class="err-counter" id="err-counter"></span>
    </button>
  </div>
</div>

<!-- Hint reveal (transient — shows when player earns a hint after 3 explosions) -->
<div class="hint-reveal" id="hint-reveal"></div>

<!-- All-found overlay -->
<div class="all-found-overlay" id="all-found-overlay">
  <div class="all-found-card">
    <div class="emoji" id="af-emoji">🎉</div>
    <div class="title" id="af-title">כל הכבוד!</div>
    <div class="sub" id="af-sub"></div>
    <div id="af-stars" style="font-size:2rem;letter-spacing:4px;margin:8px 0;display:none;"></div>
    <div id="af-diamond" style="display:none">💎 אלוף סולו 💎</div>
    <button class="btn-next" id="btn-next" onclick="nextScenario()">המשיכו ←</button>
    <button class="btn-retry" id="btn-retry" onclick="retryScenario()" style="display:none">🔄 נסו שוב</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// COORDS: row 0=rank8…row7=rank1 | col 0=A…col7=H
// ══════════════════════════════════════════════
function sq(file, rank){ return {row:8-rank, col:'ABCDEFGH'.indexOf(file)}; }

// ── מלכה שחורה — cburnett SVG קנוני (מקור: bishop-stage5) ──

/* ── KnightState — v2.1 (אחרון לתצוגה, שיא לצבירה) ── */
const KnightState={
  MODULE_KEY:'chess_knight',
  STAGE_KEYS:['stage1','stage2','stage3','stage4','final'], // ⚠️ inert בשלב ביניים — לאשר בשלב המסכם + index
  PERFECT_THRESHOLD:5,  // N (5/5) — מיושר לקנון; inert בשלב 2 (getModuleStars לא נקרא כאן)

  save(stageKey,perfect){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev=d[stageKey]||{};
      // השיא נצבר ב-OR ולעולם לא יורד (כולל מיגרציה מ-perfect ישן)
      const bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;
      d[stageKey]={done:true,perfect,lastPerfect:perfect,bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },

  // מחזיר {best,last} — תמיד last ≤ best
  getModuleStars(){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const done=this.STAGE_KEYS.filter(k=>d[k]?.done).length;
      if(done<this.STAGE_KEYS.length) return {best:0,last:0};
      const bestP=this.STAGE_KEYS.filter(k=>(d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP=this.STAGE_KEYS.filter(k=>(d[k]?.lastPerfect ?? d[k]?.perfect)).length;
      const toStars=p=>p>=this.PERFECT_THRESHOLD?3:2;
      return {best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return {best:0,last:0};}
  }
};

// ── KNIGHT MOVES ───────────────────────────────
function knightMoves(row,col){
  return [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]]
    .map(([dr,dc])=>({r:row+dr,c:col+dc}))
    .filter(({r,c})=>r>=0&&r<8&&c>=0&&c<8);
}
function isReachable(r,c){
  return knightMoves(knightRow,knightCol).some(m=>m.r===r&&m.c===c);
}

// ── FLOATING KNIGHT ────────────────────────────
function getCellSize(){
  // קרא את הגודל האמיתי מהתא המרונדר — לא לחשב מחדש מטבלה קשיחה
  const cell=document.querySelector('.cell');
  if(cell){
    const w=cell.getBoundingClientRect().width;
    if(w) return w;
  }
  // גיבוי: קרא את --cell ישירות מה-CSS
  const v=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell'));
  return v||52;
}

function positionKnight(r,c,animate=true){
  const fk=document.getElementById('floating-knight'); if(!fk) return;
  const sz=getCellSize();
  // הלוח LTR (direction:ltr על coord-wrap): col=0(A) בשמאל
  const left=c*sz+sz/2, top=r*sz+sz/2;
  if(!animate) fk.style.transition='none';
  else fk.style.transition='left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1)';
  fk.style.left=left+'px'; fk.style.top=top+'px';
  fk.style.transform='translate(-50%,-50%)';
}

function jumpKnightTo(tr,tc,callback){
  const dr=tr-knightRow, dc=tc-knightCol;
  let midR,midC;
  if(Math.abs(dr)===2){midR=knightRow+dr;midC=knightCol;}
  else{midR=knightRow;midC=knightCol+dc;}
  positionKnight(midR,midC,true);
  setTimeout(()=>{
    positionKnight(tr,tc,true);
    knightRow=tr; knightCol=tc;
    setTimeout(()=>{ if(callback) callback(); },400);
  },390);
}

// ── BUILD BOARD ────────────────────────────────
function buildBoard(){
  const sc=SCENARIOS[scenIdx];
  knightRow=sc.knight.row; knightCol=sc.knight.col;
  busy=false; soloErrors=0; moveCount=0; explosions=0; mistakesMade=0;

  // ברירת מחדל solo בתרחישי מטבעות (מאפשר 3⭐); help הוא opt-in. במינפילד — מוסתר
  const isMinefield=(sc.type==='minefield');
  // איפוס מונה וריאנטים רק כשנכנסים לתרחיש 3 מחדש
  if(isMinefield){ sc3TotalHits=0; sc3VariantIdx=0; sc3HintUsed=false; }

  document.getElementById('level-panel').style.display=isMinefield?'none':'flex';
  document.getElementById('move-counter').classList.toggle('visible', isMinefield);
  document.getElementById('explosion-dots').classList.toggle('visible', isMinefield);
  resetExplosionDots();
  document.getElementById('hint-reveal').classList.remove('show');

  if(!isMinefield){
    level='solo';
    document.getElementById('btn-help').classList.remove('active');
    document.getElementById('btn-solo').classList.add('active');
    updateErrCounter();
  }

  updateMoveCounter();

  if(sc.type==='coins'){
    nextCoinIdx=0;
    coins=sc.coins.map((c,i)=>({row:c.row,col:c.col,collected:false,idx:i}));
  }

  // Update dynamic scenario title
  const titleEl = document.getElementById('scenario-title');
  if(titleEl) titleEl.textContent = sc.type==='coins'
    ? '🪙 אוספים מטבעות'
    : '🐴 הגיעו למלכה בלי לדרוך על מוקש! יש לכם 6 מהלכים';

  document.getElementById('stage-badge').textContent=`שלב 2 · תרחיש ${scenIdx+1}/${SCENARIOS.length}`;
  buildProgDots(); buildCoords();

  const boardEl=document.getElementById('board'); boardEl.innerHTML='';
  const reaches=new Set(knightMoves(knightRow,knightCol).map(m=>m.r+','+m.c));

  // Build lookup maps
  const coinMap={};
  const mineSet=new Set();
  let queenPos=null;
  if(sc.type==='coins') sc.coins.forEach((c,i)=>{ coinMap[c.row+','+c.col]=i; });
  if(sc.type==='minefield'){
    // השתמש בוריאנט הפעיל
    const variant = SC3_VARIANTS[sc3VariantIdx];
    variant.mines.forEach(m=>mineSet.add(m.row+','+m.col));
    queenPos=sc.queen;
  }

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const cell=document.createElement('div');
      cell.className='cell '+((r+c)%2===0?'light':'dark');
      cell.id=`cell_${r}_${c}`;
      cell.dataset.r=r; cell.dataset.c=c;

      const key=r+','+c;
      const isKnight=(r===knightRow&&c===knightCol);

      // Coins
      if(sc.type==='coins' && key in Object.fromEntries(sc.coins.map((c,i)=>[c.row+','+c.col,i]))){
        const idx=coinMap[key];
        const coinEl=document.createElement('div');
        coinEl.className='board-coin';
        coinEl.id=`board-coin-${idx}`; coinEl.textContent='🪙';
        cell.appendChild(coinEl);
        const num=document.createElement('div');
        num.className='coin-num'+(idx===0?' active':'');
        num.id=`coin-num-${idx}`;
        num.textContent=idx+1; cell.appendChild(num);
      }

      // Mines
      if(mineSet.has(key)){
        const mine=document.createElement('div');
        mine.className='board-mine'; mine.textContent='💣';
        cell.appendChild(mine);
      }

      // Queen
      if(queenPos && r===queenPos.row && c===queenPos.col){
        const queen=document.createElement('div');
        queen.className='board-queen';
        const qimg=document.createElement('img');
        qimg.src='data:image/svg+xml,'+encodeURIComponent(BLACK_QUEEN_SVG);
        qimg.alt='מלכה'; qimg.draggable=false;
        qimg.style.cssText='width:calc(var(--cell)*0.9);height:calc(var(--cell)*0.9);object-fit:contain;display:block;pointer-events:none;';
        queen.appendChild(qimg);
        cell.appendChild(queen);
      }

      // Reachable for help mode only (coin scenarios only)
      if(!isMinefield && level==='help' && !isKnight && reaches.has(key)){
        cell.classList.add('reachable');
      }

      cell.addEventListener('click',()=>onCellClick(r,c,cell));
      boardEl.appendChild(cell);
    }
  }

  // Floating knight
  const old=document.getElementById('floating-knight'); if(old) old.remove();
  const fk=document.createElement('div');
  fk.id='floating-knight'; fk.appendChild(makeKnightImg());
  document.getElementById('board-outer').appendChild(fk);
  requestAnimationFrame(()=>{
    positionKnight(knightRow,knightCol,false);
    requestAnimationFrame(()=>{
      fk.style.transition='left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1)';
    });
  });
}

// ── REACHABLE ──────────────────────────────────
function clearReachable(){
  document.querySelectorAll('.cell.reachable').forEach(c=>c.classList.remove('reachable'));
}
function refreshReachable(){
  clearReachable();
  if(SCENARIOS[scenIdx].type==='minefield') return;
  if(level!=='help') return;
  knightMoves(knightRow,knightCol).forEach(({r,c})=>{
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell) cell.classList.add('reachable');
  });
}
function flashReachable(){
  const cells=[];
  knightMoves(knightRow,knightCol).forEach(({r,c})=>{
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell){ cell.classList.add('flash-reach'); cells.push(cell); }
  });
  setTimeout(()=>cells.forEach(c=>c.classList.remove('flash-reach')), 1800);
}

// טעינה מחדש של מינפילד עם הוריאנט הנוכחי (ללא איפוס sc3VariantIdx)
function reloadMinefield(){
  const sc=SCENARIOS[scenIdx];
  busy=false; moveCount=0; explosions=0; mistakesMade=0; sc3HintUsed=false;
  knightRow=sc.knight.row; knightCol=sc.knight.col;
  resetExplosionDots();
  updateMoveCounter();
  document.getElementById('hint-reveal').classList.remove('show');

  const variant=SC3_VARIANTS[sc3VariantIdx];
  const mineSet=new Set(variant.mines.map(m=>m.row+','+m.col));

  // רענן רק את המוקשים על הלוח הקיים
  document.querySelectorAll('.board-mine').forEach(el=>el.remove());
  variant.mines.forEach(m=>{
    const cell=document.getElementById(`cell_${m.row}_${m.col}`);
    if(cell){
      const mine=document.createElement('div');
      mine.className='board-mine'; mine.textContent='💣';
      cell.appendChild(mine);
    }
  });
  // הסר מוקשים ישנים שלא שייכים לוריאנט הנוכחי
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const key=r+','+c;
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(!cell) continue;
    const mines=cell.querySelectorAll('.board-mine');
    if(mines.length>0 && !mineSet.has(key)) mines.forEach(m=>m.remove());
  }
  // שחזר את נראות המלכה — נסתרה (opacity:0) כשנתפסה בוריאנט הקודם
  const queenEl = document.querySelector('.board-queen');
  if(queenEl) queenEl.style.opacity = '';

  positionKnight(knightRow,knightCol,true);

  // הצג הודעת וריאנט
  const varLabels=['א','ב','ג'];
  showHintReveal(`🗺️ מסלול ${varLabels[sc3VariantIdx]} — בהצלחה!`, 2000);
}

// Flash hint path (accepts explicit path or falls back to current variant)
function flashHintPath(path){
  const sc=SCENARIOS[scenIdx];
  const usePath = path || SC3_VARIANTS[sc3VariantIdx].hintPath;
  if(!usePath) return;
  const cells=[];
  usePath.slice(1).forEach(pos=>{
    const cell=document.getElementById(`cell_${pos.row}_${pos.col}`);
    if(cell){ cell.classList.add('flash-path'); cells.push(cell); }
  });
  setTimeout(()=>cells.forEach(c=>c.classList.remove('flash-path')), 3000);
}

// ── REFRESH COINS ──────────────────────────────
function refreshCoins(){
  if(!coins) return;
  coins.forEach((coin,i)=>{
    const el=document.getElementById(`board-coin-${i}`);
    const numEl=document.getElementById(`coin-num-${i}`);
    if(!el) return;
    if(coin.collected){
      el.style.display='none';
      if(numEl) numEl.style.display='none';
    } else {
      el.className='board-coin';
      if(numEl) numEl.className='coin-num'+(i===nextCoinIdx?' active':'');
    }
  });
}

// ── EXPLOSION DOTS + HINT REVEAL ───────────────
function resetExplosionDots(){
  for(let i=0;i<MAX_EXPLOSIONS;i++){
    const d=document.getElementById(`exp-dot-${i}`);
    if(d){ d.classList.remove('used'); d.textContent=''; }
  }
}
function markExplosionDot(idx){
  const d=document.getElementById(`exp-dot-${idx}`);
  if(d){ d.classList.add('used'); d.textContent='💥'; }
}
function showHintReveal(text, duration=2500){
  const el=document.getElementById('hint-reveal');
  if(!el) return;
  el.textContent=text;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), duration);
}

// ── EXPLOSION CANVAS (chess-explosion-skill) ───────────────
function showExplosion(row, col){
  const SZ=getCellSize();
  const boardOuter=document.getElementById('board-outer');
  const W=SZ*8, H=SZ*8;
  const cx=col*SZ+SZ/2, cy=row*SZ+SZ/2;

  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  canvas.style.cssText=`position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const c=canvas.getContext('2d');

  const COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts=Array.from({length:45},(_,i)=>{
    const a=(i/45)*Math.PI*2+Math.random()*0.4, spd=3.5+Math.random()*9;
    return {x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
            r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
            alpha:1,decay:0.018+Math.random()*0.022,gravity:0.18+Math.random()*0.12};
  });

  let frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    // Phase 1 — Flash
    if(frame<8){
      const t=frame/7, r=SZ*0.9*t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);
      g.addColorStop(0.35,`rgba(255,230,80,${(1-t)*0.9})`);
      g.addColorStop(0.7,`rgba(255,100,0,${(1-t)*0.5})`);
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(r,1),0,Math.PI*2); c.fill();
    }
    // Phase 2 — Fireball
    if(frame>=1&&frame<22){
      const t=(frame-1)/21, r=SZ*0.75*t, a=1-t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);
      g.addColorStop(0.2,`rgba(255,180,0,${a*0.95})`);
      g.addColorStop(0.55,`rgba(210,50,0,${a*0.7})`);
      g.addColorStop(0.85,`rgba(100,15,0,${a*0.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(r,1),0,Math.PI*2); c.fill();
    }
    // Phase 3 — Shockwave ring
    if(frame>=3&&frame<14){
      const t=(frame-3)/11;
      c.beginPath(); c.arc(cx,cy,SZ*0.5*t+SZ*0.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${0.6*(1-t)})`; c.lineWidth=3*(1-t); c.stroke();
    }
    // Phase 4 — Smoke puffs
    if(frame>10){
      const age=frame-10;
      for(let i=0;i<4;i++){
        const sa=Math.max(0,0.18-age*0.004); if(sa<=0) break;
        c.beginPath();
        c.arc(cx+Math.sin(i*1.7+age*0.04)*age*0.5,cy-age*0.35+i*4,age*2.8+i*9,0,Math.PI*2);
        c.fillStyle=`rgba(55,55,55,${sa/(i*0.4+1)})`; c.fill();
      }
    }
    // Debris particles
    c.save();
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.95;
      p.alpha=Math.max(0,p.alpha-p.decay); if(p.alpha<=0) return;
      c.globalAlpha=p.alpha;
      c.beginPath(); c.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color; c.fill();
    });
    c.restore();
    frame++; if(frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

// ── EXPLOSION (scenario 3) ──────────────────────
function explodeKnight(landR, landC, callback){
  // שניהם מופעלים בו-זמנית בדיוק ברגע הנחיתה על המוקש
  showExplosion(landR, landC);
  playBoom();
  setTimeout(callback, 900); // המתן לסיום הפיצוץ (~917ms)
}

// ── CELL CLICK ─────────────────────────────────
function onCellClick(r,c,cell){
  if(busy) return;
  const sc=SCENARIOS[scenIdx];
  if(r===knightRow&&c===knightCol) return;

  const reach=isReachable(r,c);

  // ══ MINEFIELD MODE ══
  if(sc.type==='minefield'){
    if(!reach){
      mistakesMade++;
      cell.classList.add('wrong');
      const x=document.createElement('div'); x.className='x-mark'; x.textContent='✕'; cell.appendChild(x);
      setTimeout(()=>{ x.remove(); cell.classList.remove('wrong'); },700);
      return;
    }

    busy=true;
    const key=r+','+c;
    // חובה: השתמש במוקשי הוריאנט הנוכחי — לא במוקשי sc.mines המקוריים!
    const mineSet=new Set(SC3_VARIANTS[sc3VariantIdx].mines.map(m=>m.row+','+m.col));
    const isQueen=(r===sc.queen.row && c===sc.queen.col);
    const isMine=mineSet.has(key);

    jumpKnightTo(r,c,()=>{
      moveCount++;
      updateMoveCounter();

      // Hit mine!
      if(isMine){
        mistakesMade++;
        sc3TotalHits++;
        explodeKnight(r,c,()=>{
          markExplosionDot(explosions);
          explosions++;
          const startR=sc.knight.row, startC=sc.knight.col;
          knightRow=startR; knightCol=startC;
          moveCount=0; updateMoveCounter();
          positionKnight(startR,startC,true);
          setTimeout(()=>{
            if(explosions>=MAX_EXPLOSIONS){
              explosions=0;
              // רמז לוריאנט הנוכחי — ילד ממשיך עם אותם מוקשים
              const variant=SC3_VARIANTS[sc3VariantIdx];
              flashHintPath(variant.hintPath);
              sc3HintUsed=true;
              setTimeout(resetExplosionDots, 3000);
            }
            busy=false;
          },500);
        });
        return;
      }

      // Reached queen!
      if(isQueen){
        // פיצוץ + סאונד מהסקיל — מופעלים ברגע הנחיתה על המלכה
        showExplosion(r, c);
        playBoom();
        // הסר את אייקון המלכה מהלוח
        const queenEl = document.querySelector('.board-queen');
        if(queenEl) queenEl.style.opacity = '0';

        spawnConfetti();
        awardScore();

        // אם השתמשו ברמז — עוברים לוריאנט הבא לביסוס הבנה
        if(sc3HintUsed && sc3VariantIdx < SC3_VARIANTS.length-1){
          document.getElementById('af-emoji').textContent='🎉';
          document.getElementById('af-title').textContent='הגעתם למלכה!';
          document.getElementById('af-sub').textContent= helpUsed ? 'יפה! בחרו ברמת המתקדם כדי לזכות ב-3 כוכבים' : '';
          const rb0=document.getElementById('btn-retry');
          rb0.textContent='שחקו שוב 🔄'; rb0.style.display='block';
          document.getElementById('btn-next').textContent='לאתגר הבא ←';
          // btn-next יטען וריאנט חדש במקום להמשיך לשלב 3
          document.getElementById('btn-next').onclick=()=>{
            document.getElementById('all-found-overlay').classList.remove('show');
            sc3VariantIdx++;
            sc3HintUsed=false;
            reloadMinefield();
          };
          setTimeout(()=>document.getElementById('all-found-overlay').classList.add('show'),500);
          busy=false;
          return;
        }

        const perfect = mistakesMade===0;
        document.getElementById('af-emoji').textContent = perfect ? '👑' : '🎉';
        document.getElementById('af-title').textContent = perfect ? 'ביצוע מושלם!' : 'הגעתם למלכה!';
        const isLastMF=(scenIdx===SCENARIOS.length-1);
        document.getElementById('af-sub').textContent = (isLastMF && helpUsed)
          ? 'יפה! בחרו ברמת המתקדם כדי לזכות ב-3 כוכבים'
          : perfect ? '' : 'נסו שוב ללא דריכה על מוקשים! 💪';
        const rb=document.getElementById('btn-retry');
        rb.textContent=perfect?'שחקו שוב 🔄':'נסו שוב 🔄';
        rb.style.display='block';
        document.getElementById('btn-next').onclick=nextScenario;
        document.getElementById('btn-next').textContent=
          scenIdx===SCENARIOS.length-1 ? 'שלב הבא ←' : 'המשיכו ←';
        setTimeout(()=>document.getElementById('all-found-overlay').classList.add('show'),500);
        busy=false;
        return;
      }

      // נגמרו 6 המהלכים בלי להגיע למלכה → ניסיון כושל, נספר במונה 3-הניסיונות
      if(moveCount>=sc.maxMoves){
        sc3TotalHits++;
        markExplosionDot(explosions);
        explosions++;
        showHintReveal('⏱ נגמרו המהלכים! חזרתם להתחלה 🔄', 2000);
        const startR=sc.knight.row, startC=sc.knight.col;
        knightRow=startR; knightCol=startC;
        moveCount=0; updateMoveCounter();
        positionKnight(startR,startC,true);
        setTimeout(()=>{
          if(explosions>=MAX_EXPLOSIONS){
            explosions=0;
            const variant=SC3_VARIANTS[sc3VariantIdx];
            flashHintPath(variant.hintPath);
            sc3HintUsed=true;
            mistakesMade++;   // הרמז הופעל → נספר כשגיאה
            setTimeout(resetExplosionDots, 3000);
          }
          busy=false;
        }, 700);
        return;
      }

      // Normal move — continue
      busy=false;
    });
    return;
  }

  // ══ COINS MODE ══
  if(!reach){
    mistakesMade++;
    cell.classList.add('wrong');
    const x=document.createElement('div'); x.className='x-mark'; x.textContent='✕'; cell.appendChild(x);
    setTimeout(()=>{ x.remove(); cell.classList.remove('wrong'); },700);
    if(level==='solo'){
      soloErrors++; updateErrCounter();
      if(soloErrors>=SOLO_FLASH_THRESHOLD){
        flashReachable(); soloErrors=0; updateErrCounter();
      }
    }
    return;
  }

  const coin=coins?coins.find(co=>co.row===r&&co.col===c&&!co.collected):null;

  if(coin && coin.idx!==nextCoinIdx){
    mistakesMade++;
    cell.classList.add('wrong');
    const x=document.createElement('div'); x.className='x-mark'; x.textContent='✕'; cell.appendChild(x);
    setTimeout(()=>{ x.remove(); cell.classList.remove('wrong'); },700);
    return;
  }

  if(coin && coin.idx===nextCoinIdx){
    busy=true; soloErrors=0; updateErrCounter();
    jumpKnightTo(r,c,()=>{
      playCollect();
      const coinEl=document.getElementById(`board-coin-${coin.idx}`);
      const numEl=document.getElementById(`coin-num-${coin.idx}`);
      if(coinEl) coinEl.classList.add('coin-collect-anim');
      setTimeout(()=>{ if(coinEl) coinEl.style.display='none'; if(numEl) numEl.style.display='none'; },450);
      coin.collected=true; nextCoinIdx++;
      refreshCoins(); refreshReachable();
      if(nextCoinIdx>=coins.length){
        spawnConfetti();
        awardScore();
        const perfect = mistakesMade===0;
        document.getElementById('af-emoji').textContent = perfect ? '🏆' : '🎉';
        document.getElementById('af-title').textContent = perfect ? 'ביצוע מושלם!' : 'אספתם הכל!';
        const isLastCoins=(scenIdx===SCENARIOS.length-1);
        document.getElementById('af-sub').textContent = (isLastCoins && helpUsed)
          ? 'יפה! בחרו ברמת המתקדם כדי לזכות ב-3 כוכבים'
          : perfect ? '' : 'נסו שוב ללא טעויות! 💪';
        const rb=document.getElementById('btn-retry');
        rb.textContent=perfect?'שחקו שוב 🔄':'נסו שוב 🔄';
        rb.style.display='block';
        document.getElementById('btn-next').textContent=scenIdx===SCENARIOS.length-1?'שלב הבא ←':'תרחיש הבא ←';
        setTimeout(()=>document.getElementById('all-found-overlay').classList.add('show'),500);
      } else {
        busy=false;
      }
    });
    return;
  }

  // Legal move to empty square
  busy=true; soloErrors=0; updateErrCounter();
  jumpKnightTo(r,c,()=>{
    refreshReachable();
    busy=false;
  });
}

// ── NEXT / RETRY ───────────────────────────────
function nextScenario(){
  document.getElementById('all-found-overlay').classList.remove('show');
  if(scenIdx===SCENARIOS.length-1){ goStage3(); return; }
  scenIdx++; buildBoard();
}
function retryScenario(){
  document.getElementById('all-found-overlay').classList.remove('show');
  buildBoard();
}
function goStage3(){ window.location.href='knight-stage3.html'; }

// ── CONFETTI ───────────────────────────────────
function spawnConfetti(n=50){
  const colors=['#F4D03F','#52B788','#7EC8E3','#FF6B35','#fff','#FF69B4'];
  for(let i=0;i<n;i++){
    const dot=document.createElement('div'); dot.className='confetti-dot';
    const sz=6+Math.random()*8;
    dot.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:-${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.2+Math.random()*1.5}s;animation-delay:${Math.random()*.6}s;`;
    document.body.appendChild(dot); setTimeout(()=>dot.remove(),3000);
  }
}

// ── SOUNDS ─────────────────────────────────────
let audioCtx=null;
let isMuted = ['true','1'].includes(localStorage.getItem('chess_muted')); // קריאה סובלנית: מקבל true/false וגם 1/0
function getCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();  // אחרת באייפון/כרום הצליל לא יישמע
  return audioCtx;
}
function toggleMute(){
  isMuted=!isMuted;
  localStorage.setItem('chess_muted', isMuted);
  const btn=document.getElementById('muteBtn');
  if(btn) btn.textContent = isMuted ? '🔇' : '🔊';
}
document.addEventListener('click', ()=>getCtx(), { once:true });
(function initMuteBtn(){
  const btn=document.getElementById('muteBtn');
  if(btn) btn.textContent = isMuted ? '🔇' : '🔊';
})();
function playCollect(){
  if(isMuted) return;
  try{
    const ctx=getCtx(),t=ctx.currentTime;
    [523.25,659.25,783.99].forEach((freq,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.type='sine'; osc.frequency.value=freq;
      const st=t+i*0.10;
      gain.gain.setValueAtTime(0,st);
      gain.gain.linearRampToValueAtTime(0.22,st+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,st+0.32);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(st); osc.stop(st+0.35);
    });
  }catch(e){}
}
function playBoom(){
  if(isMuted) return;
  try{
    const ctx=getCtx(), n=ctx.currentTime;
    // Layer 1: sub-bass thud — heavy punch
    const thud=ctx.createOscillator(), thudG=ctx.createGain();
    thud.connect(thudG); thudG.connect(ctx.destination);
    thud.type='sine'; thud.frequency.setValueAtTime(90,n);
    thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n); thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n); thud.stop(n+.6);
    // Layer 2: mid-range punch — impact body
    const punch=ctx.createOscillator(), punchG=ctx.createGain();
    punch.connect(punchG); punchG.connect(ctx.destination);
    punch.type='sine'; punch.frequency.setValueAtTime(200,n);
    punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n); punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n); punch.stop(n+.22);
    // Layer 3: noise burst — explosion debris
    const bufSz=Math.floor(ctx.sampleRate*.35);
    const nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource(); nSrc.buffer=nBuf;
    const nFilt=ctx.createBiquadFilter();
    nFilt.type='bandpass'; nFilt.frequency.value=500; nFilt.Q.value=.5;
    const nGain=ctx.createGain();
    nGain.gain.setValueAtTime(.55,n); nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
    nSrc.start(n); nSrc.stop(n+.35);
    // Layer 4: sharp transient crack — instant attack
    const crack=ctx.createOscillator(), crackG=ctx.createGain();
    crack.connect(crackG); crackG.connect(ctx.destination);
    crack.type='sawtooth'; crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n); crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n); crack.stop(n+.06);
  }catch(e){}
}
