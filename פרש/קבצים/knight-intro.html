<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>הפרש הקופץ 🐴</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { -webkit-text-size-adjust:100%; }
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:16px 12px max(28px, env(safe-area-inset-bottom));
  user-select:none; overflow-x:hidden;
  overscroll-behavior:none;
}
.star-dot {
  position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none;
}
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* TITLE */
.main-title {
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.8rem, 6vw, 2.4rem); color:#F4D03F;
  text-shadow:0 0 28px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.4),0 2px 8px rgba(0,0,0,.6);
  text-align:center; margin-bottom:8px; margin-top:8px;
  animation:sp-in .7s cubic-bezier(.175,.885,.32,1.5) both;
}
.sub-title {
  font-family:'Fredoka One',cursive;
  font-size:clamp(.9rem, 3vw, 1.1rem); color:#7EC8E3;
  text-align:center; margin-bottom:14px; line-height:1.6;
  animation:sp-in .7s .1s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes sp-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* KNIGHT ARENA */
.knight-arena {
  position:relative; width:160px; height:160px;
  margin-bottom:12px; flex-shrink:0;
}
.arena-svg {
  position:absolute; inset:0; width:100%; height:100%;
  z-index:3; pointer-events:none;
}
/* L-shaped pulse lines */
.l-line {
  stroke:#F4D03F; stroke-width:2.5; stroke-linecap:round;
  opacity:0; fill:none;
  animation:lPulse 3.2s ease-in-out infinite;
}
.l-line:nth-child(1){animation-delay:0s;}
.l-line:nth-child(2){animation-delay:.4s;}
.l-line:nth-child(3){animation-delay:.8s;}
.l-line:nth-child(4){animation-delay:1.2s;}
.l-line:nth-child(5){animation-delay:1.6s;}
.l-line:nth-child(6){animation-delay:2.0s;}
.l-line:nth-child(7){animation-delay:2.4s;}
.l-line:nth-child(8){animation-delay:2.8s;}
@keyframes lPulse {
  0%  {opacity:0; stroke-width:1.5;}
  20% {opacity:1; stroke-width:3.5;}
  60% {opacity:.5;}
  100%{opacity:0; stroke-width:1.5;}
}
/* Orbiting dots */
.orbit-dot {
  position:absolute;
  width:14px; height:14px; border-radius:50%;
  top:calc(50% - 7px); left:calc(50% - 7px); z-index:2;
}
/* svg הוא nth-child(1), לכן oc0=2, oc7=9 */
.orbit-dot:nth-child(2){background:#F4D03F;box-shadow:0 0 10px 4px rgba(244,208,63,.8);}
.orbit-dot:nth-child(3){background:#FF6B35;box-shadow:0 0 10px 4px rgba(255,107,53,.8);}
.orbit-dot:nth-child(4){background:#52B788;box-shadow:0 0 10px 4px rgba(82,183,136,.8);}
.orbit-dot:nth-child(5){background:#7EC8E3;box-shadow:0 0 10px 4px rgba(126,200,227,.8);}
.orbit-dot:nth-child(6){background:#F4D03F;box-shadow:0 0 10px 4px rgba(244,208,63,.8);}
.orbit-dot:nth-child(7){background:#FF6B35;box-shadow:0 0 10px 4px rgba(255,107,53,.8);}
.orbit-dot:nth-child(8){background:#52B788;box-shadow:0 0 10px 4px rgba(82,183,136,.8);}
.orbit-dot:nth-child(9){background:#7EC8E3;box-shadow:0 0 10px 4px rgba(126,200,227,.8);}
/* Knight center */
.knight-center {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:5.2rem; z-index:5; color:#FFFFFF;
  filter:drop-shadow(0 0 22px rgba(255,255,255,.8)) drop-shadow(0 0 40px rgba(126,200,227,.5));
  animation:knightPulse 2s ease-in-out infinite;
}
.kc-img{ width:5rem; height:5rem; object-fit:contain; display:block; pointer-events:none; }
@keyframes knightPulse {
  0%,100%{transform:scale(1) rotate(-5deg);}
  50%    {transform:scale(1.1) rotate(5deg);}
}

/* BOARD */
:root { --cell: min(38px, calc((100vw - 24px) / 8)); }
@media (min-width:600px){ :root{ --cell: min(44px, calc((100vw - 24px) / 8)); } }  /* מסך רחב → תאים גדולים (מבוסס-רוחב, יציב מול סרגל הכתובת) */
@media (max-width:380px){ :root{ --cell: min(32px, calc((100vw - 24px) / 8)); } } /* טלפון צר → תאים קטנים */
.board-section { position:relative; margin-bottom:14px; }
.board-wrap {
  position:relative;
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.15);
}
.board-grid {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr;
}
.sq { width:var(--cell); height:var(--cell); position:relative; display:flex; align-items:center; justify-content:center; transition:background .3s; touch-action:manipulation; }
.sq.l { background:#C9E4F5; }
.sq.d { background:#4A7FA5; }

.pc {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:1.9rem; line-height:1;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
  transition:filter .3s,transform .3s; z-index:2;
}
.pc.w { color:#fff; text-shadow:0 0 6px rgba(0,0,0,.9); }

/* Coin on board */
.sq-coin {
  width:62%; height:62%; border-radius:50%;
  box-shadow:0 0 12px rgba(244,208,63,.85),0 0 22px rgba(244,208,63,.3),0 2px 6px rgba(0,0,0,.5);
  z-index:3;
  animation:coinBob 1.5s ease-in-out infinite alternate;
}
.sq-coin svg{ width:100%; height:100%; display:block; }
.coin-inline {
  display:inline-block; width:1.05em; height:1.05em; border-radius:50%;
  vertical-align:-0.16em; margin-inline-start:.18em;
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,220,.9) 0%, transparent 48%),
    radial-gradient(circle at 68% 74%, rgba(0,0,0,.28) 0%, transparent 52%),
    linear-gradient(135deg,#FFF8C0 0%,#F4D03F 28%,#C9A227 60%,#9A7B1A 100%);
  box-shadow:0 0 8px rgba(244,208,63,.7),inset 0 1px 3px rgba(255,255,200,.6),inset 0 -1px 3px rgba(0,0,0,.3);
}
@keyframes coinBob { from{transform:scale(.85)} to{transform:scale(1.1)} }

/* STAGE PILLS */
.stages-wrap {
  display:flex; gap:8px; margin:4px 0 16px;
  flex-wrap:wrap; justify-content:center;
}
.stage-pill {
  font-family:'Fredoka One',cursive;
  font-size:.88rem; padding:6px 16px;
  border-radius:50px; border:2px solid;
  letter-spacing:.3px; white-space:nowrap;
}
.stage-pill.s1{color:#52B788;border-color:#52B788;background:rgba(82,183,136,.12);}
.stage-pill.s2{color:#7EC8E3;border-color:#7EC8E3;background:rgba(126,200,227,.12);}
.stage-pill.s3{color:#F4D03F;border-color:#F4D03F;background:rgba(244,208,63,.10);}
.stage-pill.s4{color:#FF6B35;border-color:#FF6B35;background:rgba(255,107,53,.10);}
.stage-pill.s5{color:#C39BD3;border-color:#C39BD3;background:rgba(195,155,211,.10);}

/* BUTTON */
.btn-start {
  font-family:'Fredoka One',cursive;
  font-size:1.5rem; padding:14px 50px;
  border-radius:50px; border:none; cursor:pointer;
  color:white; letter-spacing:1px;
  background:linear-gradient(135deg,#52B788 0%,#2D9A63 50%,#1e7a4d 100%);
  box-shadow:0 0 28px rgba(82,183,136,.55),0 6px 20px rgba(0,0,0,.4);
  transition:transform .15s ease,box-shadow .15s ease;
  position:relative; overflow:hidden; touch-action:manipulation;
  animation:btnPop .6s .3s cubic-bezier(.175,.885,.32,1.5) both,btnPulse 2s ease-in-out 1.5s infinite;
}
.btn-start::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
  border-radius:inherit;
}
.btn-start:hover  { transform:scale(1.06); }
.btn-start:active { transform:scale(.97); }
@keyframes btnPop   { from{opacity:0;transform:scale(.4);}  to{opacity:1;transform:scale(1);} }
@keyframes btnPulse {
  0%,100%{box-shadow:0 0 28px rgba(82,183,136,.55),0 6px 20px rgba(0,0,0,.4);}
  50%    {box-shadow:0 0 55px rgba(82,183,136,.9), 0 6px 28px rgba(0,0,0,.4);}
}
/* Sparks */
.pspark {
  position:fixed; width:6px; height:6px; border-radius:50%;
  pointer-events:none; animation:psparkFly ease-out forwards; z-index:999;
}
@keyframes psparkFly {
  from{opacity:1;transform:translate(0,0) scale(1);}
  to  {opacity:0;transform:translate(var(--px),var(--py)) scale(.2);}
}

/* RESPONSIVE BREAKPOINTS */
@media (max-width: 767px) {
  .knight-arena { width:140px; height:140px; }
  .stages-wrap  { gap:6px; }
  .stage-pill   { font-size:.8rem; padding:5px 12px; }
}
@media (max-width: 479px) {
  .knight-arena { width:120px; height:120px; }
  body          { padding:10px 8px max(20px, env(safe-area-inset-bottom)); }
  .btn-start    { font-size:1.3rem; padding:12px 36px; }
}
</style>
</head>
<body>

<div class="main-title">♞ הפרש הקופץ!</div>
<div class="sub-title">אחד, שתיים הצידה! ♞</div>

<!-- KNIGHT ARENA -->
<div class="knight-arena">
  <!-- L-shaped pulse lines from center -->
  <svg class="arena-svg" viewBox="0 0 160 160">
    <!-- 8 קשתות קפיצה — עיקול כלפי מעלה מהמרכז לכל יעד L. הקשת ממחישה קפיצה מעל משבצות, לא הליכה דרכן. -->
    <!-- ימין-למעלה: קפיצה ל-(108,28) -->
    <path class="l-line" d="M 80,80 Q 94,29 108,28"/>
    <!-- ימין-למעלה: קפיצה ל-(132,52) -->
    <path class="l-line" d="M 80,80 Q 106,41 132,52"/>
    <!-- ימין-למטה: קפיצה ל-(108,132) -->
    <path class="l-line" d="M 80,80 Q 94,81 108,132"/>
    <!-- ימין-למטה: קפיצה ל-(132,108) -->
    <path class="l-line" d="M 80,80 Q 106,69 132,108"/>
    <!-- שמאל-למעלה: קפיצה ל-(52,28) -->
    <path class="l-line" d="M 80,80 Q 66,29 52,28"/>
    <!-- שמאל-למעלה: קפיצה ל-(28,52) -->
    <path class="l-line" d="M 80,80 Q 54,41 28,52"/>
    <!-- שמאל-למטה: קפיצה ל-(52,132) -->
    <path class="l-line" d="M 80,80 Q 66,81 52,132"/>
    <!-- שמאל-למטה: קפיצה ל-(28,108) -->
    <path class="l-line" d="M 80,80 Q 54,69 28,108"/>
  </svg>
  <div class="orbit-dot" id="oc0"></div>
  <div class="orbit-dot" id="oc1"></div>
  <div class="orbit-dot" id="oc2"></div>
  <div class="orbit-dot" id="oc3"></div>
  <div class="orbit-dot" id="oc4"></div>
  <div class="orbit-dot" id="oc5"></div>
  <div class="orbit-dot" id="oc6"></div>
  <div class="orbit-dot" id="oc7"></div>
  <div class="knight-center"><img class="kc-img" alt="פרש" draggable="false"></div>
</div>

<!-- BOARD — Knight at D4 with all 8 target squares lit -->
<div class="board-section">
  <div class="board-wrap">
    <div class="board-grid" id="board"></div>

  </div>
</div>

<!-- STAGE PILLS -->
<div class="stages-wrap">
  <div class="stage-pill s1">שלב 1 — אחד שתיים הצידה ♞</div>
  <div class="stage-pill s2">שלב 2 — אוספים מטבעות <span class="coin-inline"></span></div>
  <div class="stage-pill s3">שלב 3 — מרוץ הלבבות ⏱️</div>
  <div class="stage-pill s4">שלב 4 — הפרש שאוהב גזר! 🥕</div>
  <div class="stage-pill s5">שלב 5 — מבחן מסכם 🏆</div>
</div>

<!-- BUTTON -->
<button class="btn-start" onclick="onStart(event)">🎮 בואו נשחק!</button>

<script>
// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

// ── Orbit coins (8 coins in circle) ──
const ocs=[0,1,2,3,4,5,6,7].map(i=>document.getElementById('oc'+i));
let angle=0;
(function animOrbit(){
  angle+=0.35;
  ocs.forEach((el,i)=>{
    const a=(angle+i*45)*Math.PI/180;
    const r=62;
    el.style.transform=`translate(${Math.cos(a)*r}px,${Math.sin(a)*r}px)`;
  });
  requestAnimationFrame(animOrbit);
})();

// ── Build board ──
const boardEl=document.getElementById('board');
for(let r=0;r<8;r++) for(let c=0;c<8;c++){
  const sq=document.createElement('div');
  sq.className='sq '+((r+c)%2===0?'l':'d');
  sq.id=`sq_${r}_${c}`;
  boardEl.appendChild(sq);
}

function getSq(r,c){ return document.getElementById(`sq_${r}_${c}`); }

// פרש לבן — cburnett SVG (זהה למודול הפרש)
const WHITE_KNIGHT_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18" style="fill:#fff;stroke:#000"/><path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/><path d="M9.5,25.5A.5.5,0,1,1,8.5,25.5.5.5,0,1,1,9.5,25.5z" style="fill:#000;stroke:#000"/><path d="M15,15.5A.5,1.5,0,1,1,14,15.5.5,1.5,0,1,1,15,15.5z" style="fill:#000;stroke:#000" transform="rotate(30,14.5,15.5)"/></g></svg>`;
function placePiece(r,c,sym,isW){
  const sq=getSq(r,c); if(!sq) return;
  const pc=document.createElement('div');
  pc.className='pc '+(isW?'w':'b');
  if(sym==='♞'){                      // פרש → SVG במקום glyph
    const img=document.createElement('img');
    img.src='data:image/svg+xml,'+encodeURIComponent(WHITE_KNIGHT_SVG);
    img.alt='פרש'; img.draggable=false;
    img.style.cssText='width:calc(var(--cell)*0.82);height:calc(var(--cell)*0.82);object-fit:contain;display:block;pointer-events:none;';
    pc.appendChild(img);
  } else {
    pc.textContent=sym;
  }
  sq.appendChild(pc);
}

// Knight at D4 = row4, col3
const KR=4, KC=3;
placePiece(KR,KC,'♞',true);

// 8 target squares — calculated from D4
const MOVES=[
  {r:2,c:2},{r:2,c:4}, // C6, E6
  {r:3,c:1},{r:3,c:5}, // B5, F5
  {r:5,c:1},{r:5,c:5}, // B3, F3
  {r:6,c:2},{r:6,c:4}  // C2, E2
];
function coinSVG(i){
  return `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="goldG${i}" cx="36%" cy="30%" r="72%"><stop offset="0%" stop-color="#FFF6C2"/><stop offset="32%" stop-color="#F4D03F"/><stop offset="68%" stop-color="#C9A227"/><stop offset="100%" stop-color="#8A6B16"/></radialGradient></defs><circle cx="20" cy="20" r="17" fill="url(#goldG${i})" stroke="#7A5E12" stroke-width="1"/><ellipse cx="14" cy="12.5" rx="5.5" ry="3.8" fill="#FFFDEA" opacity=".7"/></svg>`;
}
MOVES.forEach((m,i)=>{
  const sq=getSq(m.r,m.c); if(!sq) return;
  const coin=document.createElement('div');
  coin.className='sq-coin';
  coin.style.animationDelay=(i*0.18)+'s';
  coin.innerHTML=coinSVG(i);
  sq.appendChild(coin);
});

// ── L-path lighting animation ──
// For each move, calculate the 3 cells that form the L:
// step1, step2 (along long axis), then target
function getLPath(kr,kc,mr,mc){
  const dr=mr-kr, dc=mc-kc;
  if(Math.abs(dr)===2){
    // go vertical first (2 steps), then horizontal
    return [
      {r:kr+Math.sign(dr),   c:kc},
      {r:kr+dr,              c:kc},
      {r:mr,                 c:mc},
    ];
  } else {
    // go horizontal first (2 steps), then vertical
    return [
      {r:kr,  c:kc+Math.sign(dc)},
      {r:kr,  c:kc+dc},
      {r:mr,  c:mc},
    ];
  }
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));

function lightCell(r,c, color){
  const sq=getSq(r,c); if(!sq) return;
  sq.style.background=color;
  sq.style.boxShadow=`inset 0 0 14px ${color}`;
  sq.style.transition='background .15s, box-shadow .15s';
}
function dimCell(r,c){
  const sq=getSq(r,c); if(!sq) return;
  sq.style.background='';
  sq.style.boxShadow='';
}
function dimAll(){
  for(let r=0;r<8;r++) for(let c=0;c<8;c++) dimCell(r,c);
}

async function runLAnimation(){
  await sleep(600);
  // Repeat animation loop forever
  while(true){
    for(let i=0;i<MOVES.length;i++){
      const m=MOVES[i];
      const path=getLPath(KR,KC,m.r,m.c);
      // Light up step by step
      lightCell(path[0].r, path[0].c, 'rgba(244,208,63,0.55)');
      await sleep(220);
      lightCell(path[1].r, path[1].c, 'rgba(244,208,63,0.55)');
      await sleep(220);
      // Target cell brighter
      lightCell(path[2].r, path[2].c, 'rgba(255,180,0,0.85)');
      await sleep(1000);
      // Dim all
      dimAll();
      await sleep(180);
    }
    await sleep(400);
  }
}

// הזרקת פרש cburnett למרכז הזירה
{ const kc=document.querySelector('.kc-img'); if(kc) kc.src='data:image/svg+xml,'+encodeURIComponent(WHITE_KNIGHT_SVG); }

runLAnimation();

// ── Button sparks ──
function onStart(e){
  spawnSparks(e);
  setTimeout(()=>{ window.location.href='knight-stage1.html'; },350);
}
function spawnSparks(e){
  const colors=['#F4D03F','#52B788','#7EC8E3','#FF6B35','#FFFFFF'];
  const rect=e.target.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<18;i++){
    const sp=document.createElement('div'); sp.className='pspark';
    const a=Math.random()*Math.PI*2, d=60+Math.random()*80;
    sp.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};animation-duration:${.5+Math.random()*.4}s;`;
    sp.style.setProperty('--px',Math.cos(a)*d+'px');
    sp.style.setProperty('--py',Math.sin(a)*d+'px');
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),900);
  }
}
</script>
</body>
</html>
