<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שח ב-2 מהלכים! ♞</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#F4D03F; --gold-dark:#C9A227; --gold-deep:#9A7B1A;
  --green:#52B788; --blue:#7EC8E3; --red:#E74C3C; --orange:#FF6B35;
  --bg1:#162D4A; --bg2:#0C1E30; --bg3:#060E1A;
  --cell:68px; --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --score-col:#7EC8E3;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  background:radial-gradient(ellipse at 50% 0%, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; font-family:'Nunito',sans-serif;
  user-select:none; overflow-x:hidden; padding:16px 12px 28px;
  overscroll-behavior:none;
  padding-bottom:max(28px, env(safe-area-inset-bottom));
}
.star-dot {
  position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none;
}
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }
@keyframes sp-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* GAME WRAP */
.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:12px; padding:16px 12px;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

/* HEADER */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  width:var(--board-size);
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(126,200,227,.15); border:1.5px solid rgba(126,200,227,.35);
  color:var(--score-col); border-radius:50px; padding:3px 14px;
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.8rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.5);
}
/* PROGRESS */
.progress-row { display:flex; gap:10px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(126,200,227,.3);
  transition:all .4s;
}
.prog-dot.done { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(126,200,227,.4); border-color:#7EC8E3; animation:dot-pulse .8s ease-in-out infinite alternate; }

/* MOVE INDICATOR */
.move-indicator {
  font-family:'Fredoka One',cursive; font-size:1rem;
  color:#E0F7FF; background:rgba(126,200,227,.1);
  border:1.5px solid rgba(126,200,227,.3);
  border-radius:50px; padding:5px 18px;
  transition:all .3s;
}
.move-indicator.move2 {
  color:#F4D03F; background:rgba(244,208,63,.1);
  border-color:rgba(244,208,63,.4);
}

/* BOARD */
.coord-wrap { display:flex; align-items:center; gap:12px; direction:ltr; max-width:100%; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.8rem;
  color:#F4D03F; font-weight:bold; width:15px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.8rem;
  color:#F4D03F; font-weight:bold;
}
.board-outer {
  position:relative;
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board.glow { animation:board-glow .5s ease-in-out 4 alternate; }
@keyframes board-glow {
  from{box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7)}
  to{box-shadow:0 0 0 7px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.5)}
}
.board {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
}
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:linear-gradient(145deg,#D8EEFF 0%,#C2DDEF 55%,#A8CBDF 100%); }
.cd { background:linear-gradient(145deg,#5A8FBF 0%,#3D7099 55%,#2C5880 100%); }

/* HINT HIGHLIGHTS */
.cell.hint-mid {
  animation: hint-blink .7s ease-in-out infinite alternate;
}
@keyframes hint-blink {
  from { background: var(--cell-color, inherit); }
  to   { background: rgba(244,208,63,.6) !important; }
}
.hint-smiley {
  position:absolute; inset:0; z-index:8; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  font-size:1.8rem;
  animation:star-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
}

/* FOUND STAR */
.found-star {
  position:absolute; inset:0; z-index:6; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem;
  animation:star-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes star-pop { from{transform:scale(0) rotate(-30deg)} to{transform:scale(1) rotate(0deg)} }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }
.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }

/* PIECE */
.piece {
  position:absolute; z-index:10;
  line-height:1; display:flex; align-items:center; justify-content:center;
  width:var(--cell); height:var(--cell);
  transition:top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.piece.white-piece {
  color:#FFFFFF;
  filter:drop-shadow(0 2px 8px rgba(255,255,255,.5)) drop-shadow(0 3px 6px rgba(0,0,0,.5));
}
.piece.black-piece {
  color:#111111;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.8)) drop-shadow(0 0 6px rgba(255,255,255,.3));
}
.piece.selected {
  filter:drop-shadow(0 0 16px rgba(244,208,63,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:piece-sel .5s ease-in-out infinite alternate;
}
@keyframes piece-sel { from{transform:scale(1)} to{transform:scale(1.1)} }

/* KING DANGER */
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.75);
  animation:king-danger-pulse .4s ease-in-out 6 alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to{opacity:1;background:rgba(231,76,60,.85)}
}
.check-label {
  position:absolute; top:-36px; left:50%; transform:translateX(-50%);
  font-family:'Fredoka One',cursive; font-size:1.1rem; color:#FF4444;
  background:rgba(0,0,0,.7); border:2px solid #FF4444;
  border-radius:20px; padding:2px 14px; white-space:nowrap;
  direction:rtl; unicode-bidi:bidi-override;
  animation:check-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none; z-index:30;
}
@keyframes check-pop { from{transform:translateX(-50%) scale(0)} to{transform:translateX(-50%) scale(1)} }
@keyframes king-shake {
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-6px,0);}
  40%{transform:translate(6px,0);}
  60%{transform:translate(-4px,0);}
  80%{transform:translate(4px,0);}
}

/* HINT ROW */
.hint-row {
  display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center;
  justify-content:center; gap:10px; direction:ltr; margin-top:4px;
}
.hint-bar {
  font-family:'Fredoka One',cursive; font-size:1.1rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  flex:1; min-width:0; min-height:40px;
  transition:background .3s, border-color .3s, color .3s, opacity .3s;
  direction:rtl; unicode-bidi:bidi-override;
}
.hint-bar.ok  { background:rgba(82,183,136,.15);  border-color:rgba(82,183,136,.5);  color:#52B788; }
.hint-bar.bad { background:rgba(255,68,68,.12);   border-color:rgba(255,68,68,.4);   color:#FF8080; }
.hint-bar.warn{ background:rgba(244,208,63,.12);  border-color:rgba(244,208,63,.4);  color:var(--gold); }
.btn-hint {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:8px 22px; border-radius:50px; white-space:nowrap;
  border:2px solid rgba(126,200,227,.6); cursor:pointer; flex-shrink:0;
  color:#E0F7FF; letter-spacing:.3px;
  background:linear-gradient(145deg, #1A5276, #0E2F44);
  box-shadow:0 5px 0 #0A1F2E, 0 8px 20px rgba(0,0,0,.4);
  transition:all .15s ease;
  animation:btnHintPulse 2s ease-in-out 1s infinite;
  touch-action:manipulation;
}
@keyframes btnHintPulse {
  0%,100% { box-shadow:0 5px 0 #0A1F2E, 0 8px 20px rgba(0,0,0,.4); }
  50%     { box-shadow:0 5px 0 #0A1F2E, 0 8px 28px rgba(126,200,227,.4); }
}
.btn-hint:hover   { transform:translateY(-2px); box-shadow:0 7px 0 #0A1F2E, 0 10px 24px rgba(0,0,0,.4); }
.btn-hint:active  { transform:translateY(3px);  box-shadow:0 2px 0 #0A1F2E, 0 4px 12px rgba(0,0,0,.4); }
.btn-hint:disabled{ opacity:.35; cursor:default; transform:none; box-shadow:none; animation:none; }


/* LASER */
.laser-line { position:absolute; z-index:30; pointer-events:none; transform-origin:left center; }
.laser-core {
  position:absolute; top:50%; left:0; width:100%; transform:translateY(-50%);
  height:4px;
  background:linear-gradient(90deg,transparent,#fff 20%,#FF4444 50%,#fff 80%,transparent);
  border-radius:2px;
  box-shadow:0 0 6px 2px #FF0000,0 0 12px 4px #FF4444,0 0 24px 8px rgba(255,60,60,.6);
  animation:laser-core-anim 1.5s ease-out forwards;
}
.laser-glow {
  position:absolute; top:50%; left:0; width:100%; transform:translateY(-50%);
  height:14px;
  background:linear-gradient(90deg,transparent,rgba(255,80,80,.4) 30%,rgba(255,200,200,.3) 50%,rgba(255,80,80,.4) 70%,transparent);
  border-radius:7px;
  animation:laser-core-anim 1.5s ease-out forwards;
}
@keyframes laser-core-anim {
  0%  {opacity:0;clip-path:inset(0 100% 0 0);}
  8%  {opacity:1;clip-path:inset(0 0% 0 0);}
  80% {opacity:1;}
  100%{opacity:0;}
}
.laser-spark {
  position:absolute; pointer-events:none; z-index:35;
  width:10px; height:10px; border-radius:50%;
  background:#FF6666; box-shadow:0 0 8px 4px rgba(255,80,80,.8);
  animation:spark-anim .4s ease-out forwards;
}
@keyframes spark-anim { 0%{transform:scale(0);opacity:1;} 60%{transform:scale(2.5);opacity:.8;} 100%{transform:scale(0);opacity:0;} }

/* TRANSITION OVERLAY */
#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.85); opacity:0; pointer-events:none;
  transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:#F4D03F; margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:#7EC8E3; margin-bottom:4px; }
.tr-next  { font-family:'Fredoka One',cursive; font-size:.95rem; color:rgba(255,255,255,.5); }

/* WIN OVERLAY */
#win-overlay {
  position:fixed; inset:0; z-index:450;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.9); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-overlay.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:50px 70px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.5rem; color:#F4D03F; margin-bottom:10px; }
.win-sub   { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#7EC8E3; margin-bottom:24px; }
.win-best  { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--gold,#F4D03F); background:rgba(244,208,63,.12); border:1.5px solid rgba(244,208,63,.4); border-radius:50px; padding:5px 18px; margin-bottom:16px; display:none; }
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s, box-shadow .15s;
  display:block; width:100%; margin-bottom:10px;
  touch-action:manipulation;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s, border-color .2s; display:block; width:100%;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }

/* BURST */
.burst {
  position:fixed; border-radius:50%; pointer-events:none; z-index:600;
  animation:burst-anim .6s ease-out forwards;
}
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0;} }
</style>
</head>
<body>

<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<!-- GAME -->
<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1/4</div>
    <div class="game-title" id="game-title">שח ב-2 מהלכים!</div>
    <button class="btn-mute" id="mute-btn" onclick="toggleMute()" title="השתק">🔊</button>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="move-indicator" id="move-indicator">מהלך ראשון 1️⃣</div>

  <div class="coord-wrap" id="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>

  <div class="hint-row">
    <div class="hint-bar" id="hint-bar">בחרו משבצת ביניים לפרש 🐴</div>
    <button class="btn-hint" id="hint-btn" onclick="giveHint()">💡 רמז</button>
  </div>
</div>

<!-- TRANSITION -->
<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon" id="tr-icon">🎉</span>
    <div class="tr-title" id="tr-title">שח!</div>
    <div class="tr-sub"   id="tr-sub">כל הכבוד!</div>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-card">
    <div style="font-size:4rem;margin-bottom:10px;">🏆</div>
    <div class="win-title">כל הכבוד!</div>
    <div id="win-stars" style="font-size:2rem;margin-bottom:8px;">⭐⭐⭐</div>
    <div id="win-best" style="display:none;font-family:'Fredoka One',cursive;font-size:1rem;color:#F4D03F;background:rgba(244,208,63,.12);border:1.5px solid rgba(244,208,63,.4);border-radius:50px;padding:5px 18px;margin-bottom:16px;">🏆 השיא שלך: ⭐⭐⭐</div>
    <div class="win-sub" id="win-sub">סיימתם את שלב 4! 🌟</div>
    <button class="btn-next" onclick="goToNext()">שלב הבא ←</button>
    <button class="btn-retry" onclick="fullReset()">שחקו שוב 🎮</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// SVG PIECES
// ════════════════════════════════════════
const BLACK_SVG = {
  '♚': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6" style="fill:none;stroke:#fff;stroke-linejoin:miter"/><path d="M20,8h5" style="fill:none;stroke:#fff;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#000;stroke:#fff;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37"/><path d="M11.5,30c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/><path d="M11.5,33.5c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/><path d="M11.5,37c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/></g></svg>`,
  '♞': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18" style="stroke:#fff"/><path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/><path d="M9.5,25.5A.5.5,0,1,1,8.5,25.5.5.5,0,1,1,9.5,25.5z" style="fill:#fff;stroke:#fff"/><path d="M15,15.5A.5,1.5,0,1,1,14,15.5.5,1.5,0,1,1,15,15.5z" style="fill:#fff;stroke:#fff" transform="rotate(30,14.5,15.5)"/></g></svg>`,
};
const WHITE_SVG = {

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  img.style.cssText = `width:90%;height:90%;object-fit:contain;display:block;margin:auto;pointer-events:none;`;
  if(!isWhite) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  return img;
}

// CHECK STATE — v2.1 קנוני (אחרון לתצוגה, שיא לצבירה)
// תבנית זהה בכל 5 שלבי המודול — להעתיק verbatim ל-check-stage1..5.
// ════════════════════════════════════════
const CheckState = {
  MODULE_KEY: 'chess_check',
  STAGE_KEYS: ['stage1','stage2','stage3','stage4','stage5'],
  PERFECT_THRESHOLD: 5, // החלטה פדגוגית: כל 5 השלבים perfect = ⭐⭐⭐ (N מתוך N — מחמיר)

  save(stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const prev = d[stageKey] || {};
      // v2.1: האחרון מתעדכן תמיד (גם כלפי מטה); השיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = { done: true, perfect, lastPerfect: perfect, bestPerfect };
      localStorage.setItem(this.MODULE_KEY, JSON.stringify(d));
    } catch(e) {}
  },

  // v2.1 — תצוגה כפולה: מחזיר { best, last } (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars() {
    try {
      const d    = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const done = this.STAGE_KEYS.filter(k => d[k]?.done).length;
      if (done < this.STAGE_KEYS.length) return { best: 0, last: 0 };
      const bestP = this.STAGE_KEYS.filter(k => (d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP = this.STAGE_KEYS.filter(k => (d[k]?.lastPerfect ?? d[k]?.perfect)).length;
      const toStars = p => p >= this.PERFECT_THRESHOLD ? 3 : 2;
      return { best: toStars(bestP), last: toStars(lastP) };
    } catch(e) { return { best: 0, last: 0 }; }
  }
};

// ── Responsive cell ──
// The board row needs: 8*cell + 6px(frame) + 15px(rank col) + 12px(gap) + 24px(body padding)
// of horizontal space. Derive the cell from the REAL viewport so nothing is clipped on mobile
// (the previous fixed breakpoints overflowed narrow phones and hid the 1–8 rank labels).
function computeCell(){
  const CHROME = 6 + 15 + 12 + 24 + 4; // frame + ranks + gap + body padding + safety
  const avail  = Math.min(window.innerWidth, 720) - CHROME;
  const ideal  = window.innerWidth <= 600 ? 60 : 68;   // preferred size on roomy screens
  const cell   = Math.max(32, Math.min(ideal, Math.floor(avail / 8)));
  document.documentElement.style.setProperty('--cell', cell+'px');
}
computeCell();

// ── Reposition pieces on viewport change ──
// Reads each piece's square straight from the DOM (top/left ÷ cell), so it re-places the
// knight even after it has moved. oldPx is captured before computeCell changes --cell.
function repositionPieces(oldPx, newPx){
  document.querySelectorAll('.piece').forEach(el=>{
    const r = Math.round(parseFloat(el.style.top)  / oldPx);
    const c = Math.round(parseFloat(el.style.left) / oldPx);
    el.style.top  = (r*newPx)+'px';
    el.style.left = (c*newPx)+'px';
  });
}
let _resizeTimer=null;
function handleViewportChange(){
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    const oldPx=getCellPx();
    computeCell();
    const newPx=getCellPx();
    repositionPieces(oldPx,newPx);
    clearHintHighlights();   // size-dependent highlights/smiley — drop rather than leave stale
  }, 150);
}

  lastSoundTime[name]=now;

}

function buildBoard() {

    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');

      cell.dataset.c = c;

// REACHABLE SQUARES
// ════════════════════════════════════════
const KNIGHT_MOVES = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];

function knightReachable(r, c) {
  return KNIGHT_MOVES
    .map(([dr,dc]) => [r+dr, c+dc])
    .filter(([nr,nc]) => nr>=0 && nr<8 && nc>=0 && nc<8);
}

}

// ════════════════════════════════════════
// CLICK HANDLER
// ════════════════════════════════════════
function onCellClick(e) {
  if (busy) return;
  const r = parseInt(e.currentTarget.dataset.r);
  const c = parseInt(e.currentTarget.dataset.c);
  const sc = SCENARIOS[scenIdx];
  const key = `${r},${c}`;

  if (movePhase === 1) {
    // ── מהלך ראשון ──
    // לחיצה על הפרש עצמו — אין כלום
    if (r === sc.knight.r && c === sc.knight.c) return;

    // בדוק שהמשבצת נגישה בכלל
    const knightMoves = knightReachable(sc.knight.r, sc.knight.c);
    const isReachable = knightMoves.some(([nr,nc]) => nr===r && nc===c);

    if (!isReachable) {
      // לא משבצת של פרש בכלל
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    if (!sc.validFirst.has(key)) {
      // משבצת נגישה אבל לא מובילה לשח
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    // בדוק שיש עדיין שח שלא נמצא ממשבצת ביניים זו
    const checksFromHere = sc.checkMap[key] || [];
    const hasUnfoundCheck = checksFromHere.some(({r:cr,c:cc}) => !foundChecks.has(`${cr},${cc}`));
    if (!hasUnfoundCheck) {
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    // מהלך ביניים תקין!
    midSquare = { r, c };
    movePhase = 2;
    movePieceTo('knight-piece', r, c);
    updateMoveIndicator();

    // אין הדגשות — השחקן מוצא בעצמו
      setHint('');
    hintLevel = 0; // reset hint for move 2
    document.getElementById('hint-btn').disabled = false;
    document.getElementById('hint-btn').innerHTML = '💡 רמז';
    playSound('move');

  } else {
    // ── מהלך שני — שח ──
    const checkList = sc.checkMap[`${midSquare.r},${midSquare.c}`] || [];
    const isCheck = checkList.some(({r:cr,c:cc}) => cr===r && cc===c);

    // בדוק שהמשבצת נגישה מהמשבצת הביניים
    const knightMoves2 = knightReachable(midSquare.r, midSquare.c);
    const isReachable2 = knightMoves2.some(([nr,nc]) => nr===r && nc===c);

    if (!isReachable2) {
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    if (!isCheck) {
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    // שח! ✅
    if (foundChecks.has(key)) {
      // כבר נמצאה האפשרות הזו
      totalWrongClicks++; flashCell(r, c);
      setHint('');
      return;
    }

    busy = true;
    foundChecks.add(key);
    // score removed — v2 star system
    updateScore();

    // זוז לשח
    movePieceTo('knight-piece', r, c);

    setTimeout(async () => {
      // לייזר
      await fireLaser(r, c, sc.king.r, sc.king.c);

      // כוכב על משבצת השח
      markFoundSquare(r, c);

      // אנימציה על המלך — overlay על המשבצת + רעידה + תווית "שח!" צפה (כמו שאר השלבים)
      const kingCell = getCell(sc.king.r, sc.king.c);
      if (kingCell) {
        const danger = document.createElement('div');
        danger.className = 'king-danger-overlay';
        kingCell.appendChild(danger);
        setTimeout(() => danger.remove(), 1200);
      }
      const kingEl = document.getElementById('king-piece');
      if (kingEl) {
        kingEl.style.animation = 'king-shake .5s ease-in-out';
        const label = document.createElement('div');
        label.className = 'check-label';
        label.textContent = (sc.king.isWhite ? '♔' : '♚') + ' שח!';
        kingEl.appendChild(label);
        setTimeout(() => { label.remove(); kingEl.style.animation = ''; }, 1400);
      }

      playSound('check');

      const total = totalCheckSquares();
      const allFound = foundChecks.size === total;

      if (allFound) {
        // כל האפשרויות נמצאו — עבור לתרחיש הבא
  
        const isLast = scenIdx === SCENARIOS.length - 1;
        setTimeout(() => {
          document.getElementById('tr-icon').textContent  = isLast ? '🏆' : '⭐';
          document.getElementById('tr-title').textContent = isLast ? 'כל הכבוד!' : 'מצוין!';
          document.getElementById('tr-sub').textContent   = isLast ? 'שמרנו את התוצאה שלכם 💾' : 'עוברים לתרחיש הבא...';
          document.getElementById('transition-overlay').classList.add('show');
          setTimeout(() => {
            document.getElementById('transition-overlay').classList.remove('show');
            if (isLast) {
              // v2.1: קרא את השיא הקודם *לפני* השמירה (best — לתג "השיא שלך")
              const _prev     = (JSON.parse(localStorage.getItem(CheckState.MODULE_KEY)||'{}'))['stage4'] || {};
              const _prevBest = (_prev.bestPerfect ?? _prev.perfect) || false;
              const perfect = (totalWrongClicks <= 2 && hintsUsed === 0);
              CheckState.save('stage4', perfect);   // מעדכן lastPerfect + מעלה bestPerfect ב-OR
              const starsEl = document.getElementById('win-stars');
              if(starsEl) starsEl.textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
              const bestEl = document.getElementById('win-best');
              if(bestEl) bestEl.style.display = (_prevBest && !perfect) ? 'block' : 'none';
              const subEl = document.getElementById('win-sub');
              if(subEl) subEl.textContent = perfect ? 'ביצוע מושלם! 🎉' : 'נסו שוב לקבל 3 כוכבים! 💪';
              document.getElementById('win-overlay').classList.add('show');
              spawnBursts();
            } else {
              loadScenario(scenIdx + 1);
            }
          }, 2500);
        }, 600);
      } else {
        // חזור למשבצת המוצא
        setTimeout(() => {
          movePieceTo('knight-piece', sc.knight.r, sc.knight.c);
          movePhase = 1;
          midSquare = null;
          busy = false;
          clearHintHighlights();
          hintLevel = 0;
          document.getElementById('hint-btn').disabled = false;
          document.getElementById('hint-btn').innerHTML = '💡 רמז';
          updateMoveIndicator();
          updateHintCount();
        }, 800);
      }
    }, 400);
  }
}

// ════════════════════════════════════════
// COUNT HELPER
function totalCheckSquares() {
  const sc = SCENARIOS[scenIdx];
  const all = new Set();
  Object.values(sc.checkMap).forEach(arr => arr.forEach(({r,c}) => all.add(`${r},${c}`)));
  return all.size;
}

function updateHintCount() {
  const total = totalCheckSquares();
  const found = foundChecks.size;
  const remaining = total - found;
  if (remaining === 0) {
    setHint('');
  } else if (found === 0) {
    setHint(`מצאו את כל ${total} האפשרויות לשח ב-2 מהלכים! 🐴`);
  } else {
    setHint('');
  }
}

// ════════════════════════════════════════
// HINT
// ════════════════════════════════════════
function giveHint() {
  const sc = SCENARIOS[scenIdx];
  const btn = document.getElementById('hint-btn');
  clearHintHighlights();

  if (movePhase === 2 && midSquare) {
    // השחקן כבר במשבצת ביניים — הצג סמיילי על משבצת שח מהמיקום הנוכחי
    hintsUsed++;
    const midKey = `${midSquare.r},${midSquare.c}`;
    const checks = sc.checkMap[midKey] || [];
    const unfound = checks.filter(({r,c}) => !foundChecks.has(`${r},${c}`));
    if (unfound.length > 0) {
      const {r,c} = unfound[0];
      const cell = getCell(r, c);
      if (cell) {
        const sm = document.createElement('div');
        sm.className = 'hint-smiley';
        sm.textContent = '😊';
        cell.appendChild(sm);
      }
    }
    setHint('', 'warn');
    btn.innerHTML = 'אין יותר רמזים 😊';
    btn.disabled = true;

  } else {
    // שלב 1 — רמז ויזואלי יחיד: הדגשת משבצת הקפיצה הראשונה החוקית בלבד.
    // לא חושפים כאן את משבצת השח הסופית — זו תשובת שלב 2 (אסור לדלוף בין שלבים).
    hintsUsed++;
    let midHint = null;
    for (const key of Array.from(sc.validFirst)) {
      const checks = sc.checkMap[key] || [];
      if (checks.some(({r,c}) => !foundChecks.has(`${r},${c}`))) {
        const [mr,mc] = key.split(',').map(Number);
        midHint = {r:mr, c:mc};
        break;
      }
    }
    if (midHint) {
      const cell = getCell(midHint.r, midHint.c);
      if (cell) cell.classList.add('hint-mid');
    }
    setHint('');
    btn.innerHTML = 'אין יותר רמזים 😊';
    btn.disabled = true;
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function flashCell(r, c) {
  const cell = getCell(r, c);
  if (!cell) return;
  cell.classList.remove('err-flash');
  void cell.offsetWidth;
  cell.classList.add('err-flash');
  setTimeout(() => cell.classList.remove('err-flash'), 400);
}

function buildStars() {
  const bg = document.getElementById('stars-bg');
  bg.innerHTML = '';
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const sz = Math.random() * 2.2 + .7;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
}

function spawnBursts() {
  const colors = ['#F4D03F','#7EC8E3','#52B788','#FF6B35','#E74C3C','#FFFFFF'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'burst';
      const sz = 8 + Math.random() * 14;
      const cx = Math.random() * window.innerWidth;
      const cy = Math.random() * window.innerHeight;
      const angle = Math.random() * Math.PI * 2;
      const dist  = 80 + Math.random() * 160;
      b.style.cssText = `width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};`;
      b.style.setProperty('--bx', Math.cos(angle)*dist+'px');
      b.style.setProperty('--by', Math.sin(angle)*dist+'px');
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 700);
    }, i * 80);
  }
}

function playSound(type) {
  if(muted) return;
  throttleSound(type, ()=>{
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'move') {
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
      } else if (type === 'check') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.setValueAtTime(660, ctx.currentTime + 0.1);
        osc.frequency.setValueAtTime(880, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      }
    } catch(e) {}
  });
}


// ════════════════════════════════════════
// MARK FOUND
function clearHintHighlights() {
  document.querySelectorAll('.hint-mid').forEach(c => c.classList.remove('hint-mid'));
  document.querySelectorAll('.hint-smiley').forEach(s => s.remove());
}

function markFoundSquare(r, c) {
  const cell = getCell(r, c);
  if (!cell) return;
  cell.querySelectorAll('.found-star').forEach(el => el.remove());
  const star = document.createElement('div');
  star.className = 'found-star';
  star.textContent = '⭐';
  cell.appendChild(star);
}

// ════════════════════════════════════════
// LASER
// ════════════════════════════════════════
function getCellPx() {
  const s = document.querySelector('.cell');
  return s ? s.getBoundingClientRect().width : 68;
}

function fireLaser(fromRow, fromCol, toRow, toCol) {
  return new Promise(resolve => {
    const bo = document.getElementById('board-outer');
    const px = getCellPx();
    const x1 = fromCol*px + px/2, y1 = fromRow*px + px/2;
    const x2 = toCol*px  + px/2, y2 = toRow*px  + px/2;
    const len   = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
    const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;

    const laser = document.createElement('div');
    laser.className = 'laser-line';
    laser.style.cssText = `width:${len}px;height:20px;top:${y1-10}px;left:${x1}px;transform:rotate(${angle}deg);`;
    const glow = document.createElement('div'); glow.className = 'laser-glow'; laser.appendChild(glow);
    const core = document.createElement('div'); core.className = 'laser-core'; laser.appendChild(core);
    bo.appendChild(laser);

    playLaserSound();

    setTimeout(() => {
      for (let i = 0; i < 6; i++) {
        const spark = document.createElement('div'); spark.className = 'laser-spark';
        const a = Math.random()*Math.PI*2, d = 10+Math.random()*20;
        spark.style.cssText = `left:${x2+Math.cos(a)*d-5}px;top:${y2+Math.sin(a)*d-5}px;`;
        bo.appendChild(spark);
        setTimeout(() => spark.remove(), 500);
      }
    }, 150);

    setTimeout(() => { laser.remove(); resolve(); }, 1600);
  });
}

function playLaserSound() {
  if(muted) return;
  try {
    const ctx = getAudioCtx();
    const o1 = ctx.createOscillator(); const g1 = ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(880, ctx.currentTime);
    o1.frequency.exponentialRampToValueAtTime(110, ctx.currentTime+0.4);
    g1.gain.setValueAtTime(0.3, ctx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.5);
    o1.start(); o1.stop(ctx.currentTime+0.5);
  } catch(e) {}
}

// ════════════════════════════════════════
// RESET / NAV
// ════════════════════════════════════════
function goToNext() {
  window.location.href = 'check-stage5.html';
}

function fullReset() {
  location.reload();
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
function startGame() {
  const gw = document.getElementById('game-wrap');
  gw.classList.add('visible');
  buildStars();
  buildCoords();
  loadScenario(0);
}

window.addEventListener('DOMContentLoaded', startGame);
</script>
