<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שח – זהירות! המלך בסכנה</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Nunito', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #162D4A 0%, #0C1E30 55%, #060E1A 100%);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 16px 12px max(28px, env(safe-area-inset-bottom));
  user-select: none;
  overflow-x: hidden;
  overscroll-behavior: none;
}

/* ── STARS ── */
.star-dot {
  position: fixed; border-radius: 50%; background: white;
  animation: twinkle ease-in-out infinite alternate; pointer-events: none;
}
@keyframes twinkle {
  from { opacity:.1; transform:scale(.8); }
  to   { opacity:.85; transform:scale(1.2); }
}

/* ── TITLE ── */
.main-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.4rem; color: #F4D03F;
  text-shadow: 0 0 28px rgba(244,208,63,.9), 0 0 60px rgba(244,208,63,.4), 0 2px 8px rgba(0,0,0,.6);
  text-align: center; margin-bottom: 4px;
  animation: sp-in .7s cubic-bezier(.175,.885,.32,1.5) both;
}
.sub-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.05rem; color: #7EC8E3;
  text-align: center; line-height: 1.6;
  margin-bottom: 12px;
  animation: sp-in .7s .1s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes sp-in {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:none; }
}

/* ── KING ARENA ── */
.king-arena {
  position: relative;
  width: 160px; height: 160px;
  margin-bottom: 10px; flex-shrink: 0;
}
.laser-svg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  z-index: 3; pointer-events: none;
}
.laser-line {
  stroke: #E74C3C; stroke-width: 2.5; stroke-linecap: round;
  opacity: 0; animation: laserPulse 3s ease-in-out infinite;
}
.laser-line:nth-child(1){animation-delay:0s;}
.laser-line:nth-child(2){animation-delay:.75s;}
.laser-line:nth-child(3){animation-delay:1.5s;}
.laser-line:nth-child(4){animation-delay:2.25s;}
@keyframes laserPulse {
  0%  {opacity:0;stroke-width:1.5;}
  20% {opacity:1;stroke-width:3.5;}
  60% {opacity:.6;}
  100%{opacity:0;stroke-width:1.5;}
}
.laser-spark {
  position: absolute;
  width:6px; height:6px; border-radius:50%;
  background:#FFD700; box-shadow:0 0 7px 3px rgba(255,200,0,.8);
  pointer-events:none; z-index:4;
  top:calc(50% - 3px); left:calc(50% - 3px);
  animation: sparkTravel 3s ease-in-out infinite;
}
.laser-spark:nth-child(1){animation-delay:.2s; --sx0:-75px;--sy0:-75px;--sx1:75px;--sy1:75px;}
.laser-spark:nth-child(2){animation-delay:.95s;--sx0:75px;--sy0:-75px;--sx1:-75px;--sy1:75px;}
.laser-spark:nth-child(3){animation-delay:1.7s;--sx0:-75px;--sy0:75px;--sx1:75px;--sy1:-75px;}
.laser-spark:nth-child(4){animation-delay:2.45s;--sx0:75px;--sy0:75px;--sx1:-75px;--sy1:-75px;}
@keyframes sparkTravel {
  0%  {opacity:0;transform:translate(var(--sx0),var(--sy0));}
  10% {opacity:1;}
  90% {opacity:1;}
  100%{opacity:0;transform:translate(var(--sx1),var(--sy1));}
}
.king-crown {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  width:72px; height:72px;
  margin:auto;
  z-index:5;
  filter:drop-shadow(0 0 22px rgba(231,76,60,.9));
  animation:kingPulse 2s ease-in-out infinite;
}
.king-crown img {
  width:100%; height:100%; object-fit:contain; display:block; pointer-events:none;
}
@keyframes kingPulse {
  0%,100%{transform:scale(1);filter:drop-shadow(0 0 22px rgba(231,76,60,.8));}
  50%    {transform:scale(1.08);filter:drop-shadow(0 0 44px rgba(231,76,60,1));}
}
.orbit-piece {
  position:absolute;
  width:38px; height:38px;
  display:flex; align-items:center; justify-content:center;
  filter:drop-shadow(0 0 6px rgba(244,208,63,.7));
  top:calc(50% - 19px); left:calc(50% - 19px); z-index:2;
}
.orbit-piece img {
  width:88%; height:88%; object-fit:contain; display:block; pointer-events:none;
}

/* ── BOARD ── */
:root { --cell: 38px; }
/* --cell is sized dynamically by computeCell() to fit the viewport; SVG arrows stretch to match. */
.board-section { position: relative; margin-bottom: 14px; }

.board-wrap {
  position: relative;
  direction: ltr;                /* CRITICAL: keep board LTR to match SVG arrow math */
  border: 3px solid #C9A227; border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 6px 28px rgba(0,0,0,.6), 0 0 20px rgba(244,208,63,.15);
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(8, var(--cell));
  grid-template-rows:    repeat(8, var(--cell));
}
.sq { width:var(--cell); height:var(--cell); position:relative; display:flex; align-items:center; justify-content:center; transition: background .3s; }
.sq.l { background:#C9E4F5; }
.sq.d { background:#4A7FA5; }
/* .sq.danger removed — king glow handles check state */
.sq.highlight { background:#F4D03F !important; }

/* King in check — solid red square fill behind the king (matches check / check-defense stages) */
.sq.in-check {
  animation: sqInCheck 1.2s ease-in-out infinite;
}
@keyframes sqInCheck {
  0%,100% { background: rgba(230,48,34,.6) !important; }
  50%     { background: rgba(230,48,34,1)  !important; }
}
.pc.in-check {
  animation: kingInCheck 1.2s ease-in-out infinite;
}
@keyframes kingInCheck {
  0%,100% { filter: brightness(1.2) drop-shadow(0 0 6px rgba(231,76,60,1)); }
  50%     { filter: brightness(1.6) drop-shadow(0 0 12px rgba(231,76,60,1)); }
}

.pc {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:calc(var(--cell)*0.88); height:calc(var(--cell)*0.88);
  display:flex; align-items:center; justify-content:center;
  z-index: 2;
  transition: filter .3s, transform .3s;
}
.pc img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
.pc.active { transform: translate(-50%,-50%) scale(1.25);
  filter: drop-shadow(0 0 10px rgba(244,208,63,1)); }

/* Arrow SVG overlay */
.board-svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; overflow:visible; z-index:10;
}



/* ── STAGE PILLS ── */
.stages-wrap {
  display:flex; gap:8px;
  margin: 4px 0 16px;
  flex-wrap:wrap; justify-content:center;
}
.stage-pill {
  font-family:'Fredoka One',cursive;
  font-size:.99rem; padding:6px 16px;
  border-radius:50px; border:2px solid;
  letter-spacing:.3px; white-space:nowrap;
}
.stage-pill.s1{color:#52B788;border-color:#52B788;background:rgba(82,183,136,.12);}
.stage-pill.s2{color:#7EC8E3;border-color:#7EC8E3;background:rgba(126,200,227,.12);}
.stage-pill.s3{color:#F4D03F;border-color:#F4D03F;background:rgba(244,208,63,.12);}
.stage-pill.s4{color:#FF6B35;border-color:#FF6B35;background:rgba(255,107,53,.12);}
.stage-pill.s5{color:#C39BD3;border-color:#C39BD3;background:rgba(195,155,211,.12);}

/* ── BUTTON ── */
.btn-start {
  font-family:'Fredoka One',cursive;
  font-size:1.5rem; padding:14px 50px;
  border-radius:50px; border:none; cursor:pointer;
  color:white; letter-spacing:1px;
  background:linear-gradient(135deg,#E74C3C 0%,#C0392B 50%,#922B21 100%);
  box-shadow:0 0 28px rgba(231,76,60,.55),0 6px 20px rgba(0,0,0,.4);
  touch-action: manipulation;
  transition:transform .15s ease,box-shadow .15s ease;
  position:relative; overflow:hidden;
  animation:btnPop .6s .2s cubic-bezier(.175,.885,.32,1.5) both, btnPulse 2s ease-in-out 1.5s infinite;
}
.btn-start::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%);
  border-radius:inherit;
}
.btn-start:hover{transform:scale(1.06);}
.btn-start:active{transform:scale(.97);}
@keyframes btnPop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 28px rgba(231,76,60,.55),0 6px 20px rgba(0,0,0,.4);}
  50%    {box-shadow:0 0 55px rgba(231,76,60,.9),0 6px 28px rgba(0,0,0,.4);}
}

/* Sparks */
.pspark{
  position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;
  animation:psparkFly ease-out forwards;z-index:999;
}
@keyframes psparkFly{
  from{opacity:1;transform:translate(0,0) scale(1);}
  to{opacity:0;transform:translate(var(--px),var(--py)) scale(.2);}
}
</style>
</head>
<body>

<!-- TITLE -->
<div class="main-title">שח = זהירות, המלך בסכנה!</div>


<!-- KING ARENA -->
<div class="king-arena">
  <svg class="laser-svg" viewBox="0 0 160 160">
    <line class="laser-line" x1="0"   y1="0"   x2="80" y2="80"/>
    <line class="laser-line" x1="160" y1="0"   x2="80" y2="80"/>
    <line class="laser-line" x1="0"   y1="160" x2="80" y2="80"/>
    <line class="laser-line" x1="160" y1="160" x2="80" y2="80"/>
  </svg>
  <div class="laser-spark"></div>
  <div class="laser-spark"></div>
  <div class="laser-spark"></div>
  <div class="laser-spark"></div>
  <div class="orbit-piece" id="op0"></div>
  <div class="orbit-piece" id="op1"></div>
  <div class="orbit-piece" id="op2"></div>
  <div class="orbit-piece" id="op3"></div>
  <div class="orbit-piece" id="op4"></div>
  <div class="king-crown"  id="king-crown"></div>
</div>

<!-- BOARD -->
<div class="board-section">
  <div class="board-wrap">
    <div class="board-grid" id="board"></div>
    <svg class="board-svg" id="board-svg" viewBox="0 0 304 304"></svg>
  </div>

</div>

<!-- STAGE PILLS -->
<div class="stages-wrap">
  <div class="stage-pill s1">שלב 1 — שח מתחילים</div>
  <div class="stage-pill s2">שלב 2 — מסיבת שחים</div>
  <div class="stage-pill s3">שלב 3 — שח מתקדם</div>
  <div class="stage-pill s4">שלב 4 — שח ב-2 מהלכים</div>
  <div class="stage-pill s5">שלב 5 — מבחן מסכם 🏆</div>
</div>

<!-- BUTTON -->
<button class="btn-start" onclick="onStart(event)">🎮 בואו נשחק</button>

<script>
function computeCell(){
  // Fit the board to the viewport (board is 8 cells + 3px frame each side + ~24px body padding).
  const avail = Math.min(window.innerWidth, 560) - (6 + 24 + 4);
  const cell  = Math.max(30, Math.min(56, Math.floor(avail / 8)));
  document.documentElement.style.setProperty('--cell', cell + 'px');
  return cell;
}
computeCell();
requestAnimationFrame(computeCell);            // catch corrected innerWidth after viewport-meta applies
window.addEventListener("load", computeCell);   // backstop after full load (mobile first-paint fix)
// Arrows/pieces live inside an SVG with a FIXED logical viewBox that CSS stretches to the real
// board size (width/height:100%). So arrow math uses fixed logical units (C) and stays aligned
// at every screen size — no per-resize arrow recompute needed.
const C = 38;
document.getElementById('board-svg').setAttribute('viewBox', `0 0 ${C*8} ${C*8}`);
// Keep --cell in sync with the viewport on resize/rotate (board + pieces are CSS-grid based,
// the SVG stretches automatically, so this single line is enough to stay responsive).
let _rt=null;
function onViewport(){ clearTimeout(_rt); _rt=setTimeout(computeCell, 150); }
window.addEventListener('resize', onViewport);
window.addEventListener('orientationchange', onViewport);
const FILES = ['A','B','C','D','E','F','G','H'];

// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div');s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

// ── Orbit ──
const ORBIT_R = 68;
const ops = [0,1,2,3,4].map(i=>document.getElementById('op'+i));
let angle = 0;
(function animOrbit(){
  angle += 0.4;
  ops.forEach((el,i)=>{
    const a=(angle + i*(360/5))*Math.PI/180;
    el.style.transform=`translate(${Math.cos(a)*ORBIT_R}px,${Math.sin(a)*ORBIT_R}px)`;
  });
  requestAnimationFrame(animOrbit);
})();

// ── Build board ──
const boardEl = document.getElementById('board');
for(let r=0;r<8;r++) for(let c=0;c<8;c++){
  const sq=document.createElement('div');
  sq.className='sq '+((r+c)%2===0?'l':'d');
  sq.id=`sq_${r}_${c}`;
  boardEl.appendChild(sq);
}

function pos(file,rank){ return {r:8-parseInt(rank), c:FILES.indexOf(file)}; }

// ── cburnett SVG piece dictionaries ──
const WHITE_SVG = {
  '♖': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4"><path d="M9,39h27v-3H9z" style="stroke-linecap:butt"/><path d="M12.5,32l1.5-2.5h17l1.5,2.5z" style="stroke-linecap:butt"/><path d="M12,36v-4h21v4z" style="stroke-linecap:butt"/><path d="M14,29.5v-13h17v13z" style="stroke-linecap:butt;stroke-linejoin:miter"/><path d="M14,16.5l-3-2.5h23l-3,2.5z" style="stroke-linecap:butt"/><path d="M11,14V9h4v2h5V9h5v2h5V9h4v5z" style="stroke-linecap:butt"/><path d="M12,35.5h21M13,31.5h19" style="fill:none;stroke:#000;stroke-width:1"/></g></svg>`,
  '♘': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18" style="fill:#fff;stroke:#000"/><path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/><path d="M9.5,25.5A.5.5,0,1,1,8.5,25.5.5.5,0,1,1,9.5,25.5z" style="fill:#000;stroke:#000"/><path d="M15,15.5A.5,1.5,0,1,1,14,15.5.5,1.5,0,1,1,15,15.5z" style="fill:#000;stroke:#000" transform="rotate(30,14.5,15.5)"/></g></svg>`,
  '♙': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="13 7 20 30"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#fff" stroke="none"/></svg>`,
  '♕': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><circle cx="6" cy="12" r="2.75"/><circle cx="14" cy="9" r="2.75"/><circle cx="22.5" cy="8" r="2.75"/><circle cx="31" cy="9" r="2.75"/><circle cx="39" cy="12" r="2.75"/><path d="M9,26c8.5-1.5,21-1.5,27,0l2.5-12.5L31,25l-.3-14.1L22.5,24.5l-8.2-13.6L14,25,6.5,13.5z"/><path d="M9,26c0,2,1.5,2,2.5,4,1,1.5,1,1,.5,3.5-1.5,1-1.5,2.5-1.5,2.5-1,1.5,1,2.5,1,2.5,6.5,1,16.5,1,23,0,0,0,1.5-1,.5-2.5,0,0,.5-1.5-1-2.5-.5-2.5-.5-2,.5-3.5,1-2,2.5-2,2.5-4-8.5-1.5-18.5-1.5-27,0z"/><path d="M11.5,30c3.5-1,17.5-1,22,0M12,33.5c3.5-1,17.5-1,21,0" style="fill:none;stroke:#000;stroke-width:1"/></g></svg>`,
  '♗': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="#fff" stroke-linecap="butt"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z"/></g><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#000" stroke-linejoin="miter"/></g></svg>`,
};
const BLACK_SVG = {
  '♚': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6" style="fill:none;stroke:#fff;stroke-linejoin:miter"/><path d="M20,8h5" style="fill:none;stroke:#fff;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#000;stroke:#fff;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37"/><path d="M11.5,30c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/><path d="M11.5,33.5c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/><path d="M11.5,37c5.5-3,15.5-3,21,0" style="fill:none;stroke:#fff"/></g></svg>`,
};

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  const isPawn = sym === '♙';
  const sz = isPawn ? (isWhite ? '72%' : '68%') : '88%';
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  img.style.cssText = `width:${sz};height:${sz};object-fit:contain;display:block;pointer-events:none;`;
  if(!isWhite) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9))';
  return img;
}

// ── אתחול ארנה — כלים מסתובבים + מלך מרכזי (cburnett SVG) ──
const ORBIT_PIECES = [
  { id:'op0', sym:'♖', isWhite:true  },  // צריח לבן
  { id:'op1', sym:'♗', isWhite:true  },  // רץ לבן
  { id:'op2', sym:'♕', isWhite:true  },  // מלכה לבנה
  { id:'op3', sym:'♘', isWhite:true  },  // פרש לבן
  { id:'op4', sym:'♙', isWhite:true  },  // רגלי לבן
];
ORBIT_PIECES.forEach(({id, sym, isWhite}) => {
  const el = document.getElementById(id);
  const img = makePieceSVG(sym, isWhite);
  if(img) el.appendChild(img);
});
// מלך שחור מרכזי
(function(){
  const crown = document.getElementById('king-crown');
  const img = makePieceSVG('♚', false);
  if(img){ img.style.width='100%'; img.style.height='100%'; crown.appendChild(img); }
})();

function placePiece(file,rank,sym,isW,id){
  const {r,c}=pos(file,rank);
  const sq=document.getElementById(`sq_${r}_${c}`);
  const pc=document.createElement('div');
  pc.className='pc '+(isW?'w':'b');
  if(id) pc.id=id;
  const img = makePieceSVG(sym, isW);
  if(img) pc.appendChild(img);
  sq.appendChild(pc);
}

// ── Place pieces (cburnett SVG) ──
// ♖ Rook   D8  (white)
// ♘ Knight F6  (white)
// ♚ King   D5  (black) ← target
// ♙ Pawn   C4  (white)
// ♕ Queen  D1  (white)
// ♗ Bishop H1  (white)
placePiece('D','8','♖',true,'pc-rook');
placePiece('F','6','♘',true,'pc-knight');
placePiece('D','5','♚',false,'pc-king');
placePiece('C','4','♙',true,'pc-pawn');
placePiece('D','1','♕',true,'pc-queen');
placePiece('H','1','♗',true,'pc-bishop');

// King in check — pulsing red glow contained within square
const kingPos = pos('D','5');
document.getElementById(`sq_${kingPos.r}_${kingPos.c}`).classList.add('in-check');
document.getElementById('pc-king').classList.add('in-check');

// ── Arrow drawing ──
const svg = document.getElementById('board-svg');

function sqCenter(file,rank){
  const {r,c}=pos(file,rank);
  return {x:c*C+C/2, y:r*C+C/2};
}

function makeArrow(id, x1,y1,x2,y2, color){
  // shorten end point so arrow stops before piece center
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const ex=x2-(dx/len)*(C*0.45), ey=y2-(dy/len)*(C*0.45);
  const markId='mk_'+id;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='arrow_'+id; g.style.opacity='0';
  g.innerHTML=`
    <defs><marker id="${markId}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L5,2.5 z" fill="${color}"/>
    </marker></defs>
    <line x1="${x1}" y1="${y1}" x2="${ex}" y2="${ey}"
      stroke="${color}" stroke-width="3.5" stroke-opacity=".92"
      marker-end="url(#${markId})"/>`;
  svg.appendChild(g);
}

function makeKnightArrow(id, x1,y1,xm,ym,x2,y2, color){
  const dx=x2-xm,dy=y2-ym,len=Math.sqrt(dx*dx+dy*dy);
  const ex=x2-(dx/len)*(C*0.45), ey=y2-(dy/len)*(C*0.45);
  const markId='mk_'+id;
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.id='arrow_'+id; g.style.opacity='0';
  g.innerHTML=`
    <defs><marker id="${markId}" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L5,2.5 z" fill="${color}"/>
    </marker></defs>
    <polyline points="${x1},${y1} ${xm},${ym} ${ex},${ey}"
      fill="none" stroke="${color}" stroke-width="3.5" stroke-opacity=".92"
      stroke-dasharray="none" marker-end="url(#${markId})"/>`;
  svg.appendChild(g);
}

// King pos center
const kc = sqCenter('D','5');

// Rook D8 → D5 (vertical)
const rc = sqCenter('D','8');
makeArrow('rook', rc.x,rc.y, kc.x,kc.y, '#7EC8E3');

// Knight F6 → D5 (L-shape via F5)
const nc = sqCenter('F','6');
const nm = sqCenter('F','5'); // mid point for L
makeKnightArrow('knight', nc.x,nc.y, nm.x,nm.y, kc.x,kc.y, '#52B788');

// Pawn C4 → D5 (diagonal)
const pc2 = sqCenter('C','4');
makeArrow('pawn', pc2.x,pc2.y, kc.x,kc.y, '#FF6B6B');

// Queen D1 → D5 (vertical)
const qc = sqCenter('D','1');
makeArrow('queen', qc.x,qc.y, kc.x,kc.y, '#F4D03F');

// Bishop H1 → D5 (diagonal)
const bc = sqCenter('H','1');
makeArrow('bishop', bc.x,bc.y, kc.x,kc.y, '#C39BD3');

// ── Animation sequence ──
const sequence = [
  { arrowId:'rook',   pieceId:'pc-rook',   delay:0    },
  { arrowId:'knight', pieceId:'pc-knight', delay:2200 },
  { arrowId:'pawn',   pieceId:'pc-pawn',   delay:4400 },
  { arrowId:'queen',  pieceId:'pc-queen',  delay:6600 },
  { arrowId:'bishop', pieceId:'pc-bishop', delay:8800 },
];
const STEP_DUR = 2000; // ms each step visible
const CYCLE = 11500;   // total cycle before reset



function showStep(step){
  const arrow = document.getElementById('arrow_'+step.arrowId);
  const piece  = document.getElementById(step.pieceId);

  arrow.style.transition='opacity .4s';
  arrow.style.opacity='1';
  if(piece) piece.classList.add('active');

  setTimeout(()=>{
    arrow.style.opacity='0';
    if(piece) piece.classList.remove('active');
  }, STEP_DUR);
}

function runCycle(){
  sequence.forEach(step=>{
    setTimeout(()=>showStep(step), step.delay);
  });
}

// Start cycle
runCycle();
setInterval(runCycle, CYCLE);

// ── Sparks ──
function spawnSparks(e){
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');sp.className='pspark';
    const a=(i/22)*Math.PI*2,d=40+Math.random()*70;
    sp.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px;animation-duration:${.35+Math.random()*.35}s;background:${['#F4D03F','#FF3B2F','#7EC8E3','#fff'][Math.floor(Math.random()*4)]};`;
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),700);
  }
}

function onStart(e){
  spawnSparks(e);
  setTimeout(()=>{ window.location.href='check-stage1.html'; },350);
}
</script>
