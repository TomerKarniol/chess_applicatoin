<!DOCTYPE html>
<html lang="he" dir="rtl" style="-webkit-text-size-adjust:100%;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שח מתקדם ♛</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root {
  --cell:68px; --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --score-col:#7EC8E3;
}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#1A2D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; user-select:none;
  overscroll-behavior:none;
  padding-bottom:max(0px, env(safe-area-inset-bottom));
}
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }


/* GAME */
.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:12px; padding:16px 12px;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

.hdr { display:flex; align-items:center; justify-content:space-between; width:var(--board-size); }
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(126,200,227,.15); border:1.5px solid rgba(126,200,227,.35);
  border-radius:50px; padding:3px 14px; color:var(--score-col);
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.8rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); text-align:center;
}
.game-title.blink { animation:title-blink .7s ease-in-out infinite alternate; }
@keyframes title-blink {
  from{opacity:1;color:#E0F7FF;} to{opacity:.2;color:#FFF;}
}
/* PROGRESS */
.progress-row { display:flex; gap:8px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(126,200,227,.3); transition:all .4s;
}
.prog-dot.done   { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(126,200,227,.4); border-color:#7EC8E3; animation:dot-pulse .8s ease-in-out infinite alternate; }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

/* HINT BAR */
.hint-row {
  display:flex; flex-direction:row; flex-wrap:nowrap; align-items:center;
  justify-content:center; gap:10px; direction:ltr; margin-top:4px;
}
.hint-bar {
  font-family:'Fredoka One',cursive; font-size:1.1rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  flex:1; min-width:0; min-height:40px;
  direction:rtl; unicode-bidi:bidi-override;
}

/* BOARD */
.coord-wrap { display:flex; align-items:center; gap:6px; direction:ltr; max-width:100%; padding-right:18px; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.8rem;
  color:#F4D03F; font-weight:bold; width:12px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.8rem; color:#F4D03F; font-weight:bold;
}
.board-outer {
  position:relative;
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board.glow { animation:board-glow .5s ease-in-out 5 alternate; }
@keyframes board-glow {
  from{box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7)}
  to{box-shadow:0 0 0 7px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.5)}
}
.board { display:grid; grid-template-columns:repeat(8,var(--cell)); grid-template-rows:repeat(8,var(--cell));
}
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:linear-gradient(145deg,#D8EEFF 0%,#C2DDEF 55%,#A8CBDF 100%); }
.cd { background:linear-gradient(145deg,#5A8FBF 0%,#3D7099 55%,#2C5880 100%); }
.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }

/* PIECES */
.piece {
  position:absolute; z-index:10;
  line-height:1; display:flex; align-items:center; justify-content:center;
  width:var(--cell); height:var(--cell);
  transition:top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.piece.white-piece {
  color:#FFFFFF;
  filter:drop-shadow(0 2px 8px rgba(255,255,255,.5)) drop-shadow(0 3px 6px rgba(0,0,0,.5));
}
.piece.black-piece {
  color:#1a1a1a;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));
  cursor:default;
}
.piece.selected {
  filter:drop-shadow(0 0 16px rgba(244,208,63,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:piece-sel .5s ease-in-out infinite alternate;
}
.piece.hint-glow {
  filter:drop-shadow(0 0 18px rgba(82,183,136,1)) drop-shadow(0 0 8px rgba(82,183,136,.8)) !important;
  animation:hint-glow-anim .5s ease-in-out infinite alternate;
}
@keyframes piece-sel { from{transform:scale(1)} to{transform:scale(1.1)} }
@keyframes hint-glow-anim { from{transform:scale(1)} to{transform:scale(1.15)} }

/* WRONG PIECE FLASH */
.piece.wrong-flash {
  animation:wrong-piece .5s ease-in-out;
  filter:drop-shadow(0 0 16px rgba(231,76,60,1)) !important;
}
@keyframes wrong-piece {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}

/* LASER */
.laser-line { position:absolute; z-index:30; pointer-events:none; transform-origin:left center; }
.laser-core {
  position:absolute; top:50%; left:0; width:100%; transform:translateY(-50%);
  height:4px;
  background:linear-gradient(90deg,transparent,#fff 20%,#FF4444 50%,#fff 80%,transparent);
  border-radius:2px;
  box-shadow:0 0 6px 2px #FF0000,0 0 12px 4px #FF4444,0 0 24px 8px rgba(255,60,60,.6);
  animation:laser-core-anim 2.5s ease-out forwards;
}
.laser-glow {
  position:absolute; top:50%; left:0; width:100%; transform:translateY(-50%);
  height:14px;
  background:linear-gradient(90deg,transparent,rgba(255,80,80,.4) 30%,rgba(255,200,200,.3) 50%,rgba(255,80,80,.4) 70%,transparent);
  border-radius:7px;
  animation:laser-core-anim 2.5s ease-out forwards;
}
@keyframes laser-core-anim {
  0%  {opacity:0;clip-path:inset(0 100% 0 0);}
  8%  {opacity:1;clip-path:inset(0 0% 0 0);}
  80% {opacity:1;}
  100%{opacity:0;}
}
.laser-spark {
  position:absolute; pointer-events:none; z-index:35;
  width:10px; height:10px; border-radius:50%;
  background:#FF6666; box-shadow:0 0 8px 4px rgba(255,80,80,.8);
  animation:spark-anim .4s ease-out forwards;
}
@keyframes spark-anim { 0%{transform:scale(0);opacity:1;} 60%{transform:scale(2.5);opacity:.8;} 100%{transform:scale(0);opacity:0;} }

/* KING DANGER */
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.75);
  animation:king-danger-pulse .4s ease-in-out 6 alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to{opacity:1;background:rgba(231,76,60,.85)}
}
@keyframes king-shake {
  0%,100%{transform:translate(0,0);}
  20%{transform:translate(-6px,0);}
  40%{transform:translate(6px,0);}
  60%{transform:translate(-4px,0);}
  80%{transform:translate(4px,0);}
}
.check-label {
  position:absolute; top:-36px; left:50%; transform:translateX(-50%);
  font-family:'Fredoka One',cursive; font-size:1.1rem; color:#FF4444;
  background:rgba(0,0,0,.7); border:2px solid #FF4444;
  border-radius:20px; padding:2px 14px; white-space:nowrap;
  direction:rtl; unicode-bidi:bidi-override;
  animation:check-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none; z-index:30;
}
@keyframes check-pop { from{transform:translateX(-50%) scale(0)} to{transform:translateX(-50%) scale(1)} }

/* HINT SMILEY */
.hint-smiley {
  position:absolute; inset:0; z-index:15; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  font-size:1.6rem;
  animation:marker-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes marker-pop { from{transform:scale(0) rotate(-30deg)} to{transform:scale(1) rotate(0deg)} }

/* FOUND MARKER */
.found-marker {
  position:absolute; inset:0; z-index:6; pointer-events:none;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
  animation:marker-pop .4s cubic-bezier(.175,.885,.32,1.5) both;
}

/* TRANSITION */
#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.97); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon  { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:#F4D03F; margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:#7EC8E3; }
.tr-next  { font-family:'Fredoka One',cursive; font-size:.95rem; color:rgba(255,255,255,.5); margin-top:4px; }

/* WIN */
#win-overlay {
  position:fixed; inset:0; z-index:450;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.97); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-overlay.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:50px 70px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.5rem; color:#F4D03F; margin-bottom:10px; }
.win-sub   { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#7EC8E3; margin-bottom:24px; }
.win-best  { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--gold,#F4D03F); background:rgba(244,208,63,.12); border:1.5px solid rgba(244,208,63,.4); border-radius:50px; padding:5px 18px; margin-bottom:16px; display:none; }
.btn-main {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  background:linear-gradient(145deg,#F7DC6F,var(--gold-dark)); color:#1B3A2A;
  border:none; border-radius:50px; padding:14px 44px; cursor:pointer;
  box-shadow:0 5px 0 #9A7B1A; transition:all .15s;
}
.btn-main:hover  { transform:translateY(-2px); box-shadow:0 7px 0 #9A7B1A; }
.btn-main:active { transform:translateY(3px);  box-shadow:0 2px 0 #9A7B1A; }

/* TURN INDICATOR */
.turn-row {
  display:flex; align-items:center; gap:12px;
  font-family:'Fredoka One',cursive; font-size:1rem; color:#B0D8F0;
  opacity:0; transition:opacity .3s ease;
  pointer-events:none;
}
.turn-circle {
  width:26px; height:26px; border-radius:50%;
  border:3px solid transparent; transition:all .3s;
}
.turn-circle.white {
  background:#FFFFFF;
  box-shadow:0 0 0 3px rgba(255,255,255,.3);
}
.turn-circle.black {
  background:#1a1a1a;
  box-shadow:0 0 0 3px rgba(0,0,0,.5);
}
.turn-circle.blink-white {
  animation:blink-w .6s ease-in-out infinite alternate;
}
.turn-circle.blink-black {
  animation:blink-b .6s ease-in-out infinite alternate;
}
@keyframes blink-w {
  from{box-shadow:0 0 0 3px rgba(255,255,255,.3); transform:scale(1);}
  to  {box-shadow:0 0 0 10px rgba(255,255,255,.7); transform:scale(1.2);}
}
@keyframes blink-b {
  from{box-shadow:0 0 0 3px rgba(80,80,80,.5); transform:scale(1);}
  to  {box-shadow:0 0 0 10px rgba(80,80,80,.9); transform:scale(1.2);}
}
.hint-btn-wrap { display:flex; align-items:center; justify-content:center; height:var(--board-size); }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
.btn-hint {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:8px 22px; border-radius:50px; white-space:nowrap;
  border:2px solid rgba(126,200,227,.6); cursor:pointer; flex-shrink:0;
  color:#E0F7FF; letter-spacing:.3px;
  background:linear-gradient(145deg, #1A5276, #0E2F44);
  box-shadow:0 5px 0 #0A1F2E, 0 8px 20px rgba(0,0,0,.4);
  transition:all .15s ease;
  animation:btnHintPulse 2s ease-in-out 1s infinite;
  touch-action:manipulation;
}
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s, box-shadow .15s;
  display:block; width:100%; margin-bottom:10px;
  touch-action:manipulation;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s, border-color .2s; display:block; width:100%;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }
@keyframes btnHintPulse {
  0%,100% { box-shadow:0 5px 0 #0A1F2E, 0 8px 20px rgba(0,0,0,.4); }
  50%     { box-shadow:0 5px 0 #0A1F2E, 0 8px 28px rgba(126,200,227,.4); }
}
.btn-hint:hover   { transform:translateY(-2px); box-shadow:0 7px 0 #0A1F2E, 0 10px 24px rgba(0,0,0,.4); }
.btn-hint:active  { transform:translateY(3px);  box-shadow:0 2px 0 #0A1F2E, 0 4px 12px rgba(0,0,0,.4); }
.btn-hint:disabled{ opacity:.35; cursor:default; transform:none; box-shadow:none; animation:none; }

/* BURST */
.burst {
  position:fixed; border-radius:50%; pointer-events:none; z-index:600;
  animation:burst-anim .6s ease-out forwards;
}
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0;} }
</style>
</head>
<body>

<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<!-- GAME -->
<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1</div>
    <div class="game-title blink" id="game-title">שח מתקדם!</div>
    <button class="btn-mute" id="mute-btn" onclick="toggleMute()" title="השתק">🔊</button>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>

  <div class="turn-row" id="turn-row">
    <div class="turn-circle" id="turn-circle"></div>
  </div>

  <div class="hint-row" style="display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;justify-content:center;gap:10px;direction:ltr;margin-top:4px;align-self:stretch;">
    <div class="hint-bar" id="hint-bar">זהו את הכלי שיכול לאיים בשח ולחצו עליו!</div>
    <button class="btn-hint" id="hint-btn" onclick="giveHint()">💡 רמז</button>
  </div>
</div>

<!-- TRANSITION -->
<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon" id="tr-icon">🎉</span>
    <div class="tr-title" id="tr-title">שח!</div>
    <div class="tr-sub"   id="tr-sub">כל הכבוד!</div>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-card">
    <div style="font-size:4rem;margin-bottom:10px;">🏆</div>
    <div class="win-title">כל הכבוד!</div>
    <div id="win-stars" style="font-size:2rem;margin-bottom:8px;">⭐⭐⭐</div>
    <div id="win-best" style="display:none;font-family:'Fredoka One',cursive;font-size:1rem;color:#F4D03F;background:rgba(244,208,63,.12);border:1.5px solid rgba(244,208,63,.4);border-radius:50px;padding:5px 18px;margin-bottom:16px;">🏆 השיא שלך: ⭐⭐⭐</div>
    <div class="win-sub" id="win-sub">סיימתם את שלב 3! 🌟</div>
    <button class="btn-next" onclick="goToNext()">שלב הבא ←</button>
    <button class="btn-retry" onclick="fullReset()">שחקו שוב 🎮</button>
  </div>
</div>

<script>
// ════════════════════════════════════════
// SVG PIECE DICTIONARIES (cburnett set)
// ════════════════════════════════════════

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  const isPawn = sym==='♙'||sym==='♟';
  const sz = isWhite && isPawn ? 50 : !isWhite && isPawn ? 48 : 90;
  img.style.cssText = `width:${sz}%;height:${sz}%;object-fit:contain;display:block;margin:auto;pointer-events:none;`;
  if(!isWhite) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  if(isWhite && isPawn) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
  return img;
}

// CHECK STATE — v2.1 קנוני (אחרון לתצוגה, שיא לצבירה)
// תבנית זהה בכל 5 שלבי המודול — להעתיק verbatim ל-check-stage1..5.
// ════════════════════════════════════════
const CheckState = {
  MODULE_KEY: 'chess_check',
  STAGE_KEYS: ['stage1','stage2','stage3','stage4','stage5'],
  PERFECT_THRESHOLD: 5, // החלטה פדגוגית: כל 5 השלבים perfect = ⭐⭐⭐ (N מתוך N — מחמיר)

  save(stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const prev = d[stageKey] || {};
      // v2.1: האחרון מתעדכן תמיד (גם כלפי מטה); השיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = { done: true, perfect, lastPerfect: perfect, bestPerfect };
      localStorage.setItem(this.MODULE_KEY, JSON.stringify(d));
    } catch(e) {}
  },

  // v2.1 — תצוגה כפולה: מחזיר { best, last } (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars() {
    try {
      const d    = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const done = this.STAGE_KEYS.filter(k => d[k]?.done).length;
      if (done < this.STAGE_KEYS.length) return { best: 0, last: 0 };
      const bestP = this.STAGE_KEYS.filter(k => (d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP = this.STAGE_KEYS.filter(k => (d[k]?.lastPerfect ?? d[k]?.perfect)).length;
      const toStars = p => p >= this.PERFECT_THRESHOLD ? 3 : 2;
      return { best: toStars(bestP), last: toStars(lastP) };
    } catch(e) { return { best: 0, last: 0 }; }
  }
};

// ── Responsive cell (S2) ──
function computeCell(){
  // Derive the cell from the REAL viewport so the rank column + board always fit with no
  // horizontal clipping on mobile. Row needs 8*cell + 6(frame) + 15(ranks) + 12(gap) + 24(body pad).
  const CHROME = 6 + 12 + 6 + 18 + 24 + 4;
  const avail  = Math.min(window.innerWidth, 720) - CHROME;
  const ideal  = window.innerWidth <= 600 ? 60 : 68;
  const cell   = Math.max(32, Math.min(ideal, Math.floor(avail / 8)));
  document.documentElement.style.setProperty('--cell', cell+'px');
}
computeCell();
requestAnimationFrame(handleViewportChange);          // B11: full re-fit (cell+pieces) after viewport-meta applies
window.addEventListener("load", handleViewportChange); // B11: backstop after full load

// ── Reposition pieces on viewport change ──
// Reads each piece's square straight from the DOM (top/left ÷ cell), so it correctly
// re-places white, black, moved-black, AND the synthetic king — without relying on
// the white-only livePieces model. oldPx is captured before computeCell changes --cell.
function repositionPieces(oldPx, newPx){
  const BD=0;
  document.querySelectorAll('.piece').forEach(el=>{
    const r=Math.round((parseFloat(el.style.top)  - BD)/oldPx);
    const c=Math.round((parseFloat(el.style.left) - BD)/oldPx);
    el.style.top  =(r*newPx+BD)+'px';
    el.style.left =(c*newPx+BD)+'px';
  });
}
let _resizeTimer=null;
function handleViewportChange(){
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    const oldPx=getCellPx();
    computeCell();
    const newPx=getCellPx();
    repositionPieces(oldPx,newPx);
    clearHintMarkers();   // size-dependent glow/smiley — drop rather than leave stale
  }, 150);
}
window.addEventListener('resize', handleViewportChange);
window.addEventListener('orientationchange', handleViewportChange);

function throttleSound(name, fn, minInterval=300){
  const now=Date.now();
  if(lastSoundTime[name] && now-lastSoundTime[name]<minInterval) return;
  lastSoundTime[name]=now;
  fn();
}

function buildBoard(){
  const board=document.getElementById('board'); board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.dataset.r=r; cell.dataset.c=c;
    board.appendChild(cell);
  }
  placePieces();
}

function activeKing(){
  const sc=currentScen;
  if(sc.twoTurns) return currentTurn===1 ? sc.turn1.king : sc.turn2.king;
  return sc.king;
}

function placePieces(){
  document.querySelectorAll('.piece').forEach(el=>el.remove());
  const sc=currentScen;
  const px=getCellPx();
  const bo=document.getElementById('board-outer');

  function makeEl(sym, isWhite, id, row, col, clickable, extraData){
    const el=document.createElement('div');
    el.className='piece';
    if(id) el.id=id;
    el.dataset.color = isWhite ? 'white' : 'black';
    if(clickable && extraData) Object.assign(el.dataset, extraData);
    const BD=0; el.style.top=(row*px+BD)+'px'; el.style.left=(col*px+BD)+'px';
    el.style.display='flex'; el.style.alignItems='center'; el.style.justifyContent='center';
    if(!clickable) el.style.cursor='default';
    const img=makePieceSVG(sym, isWhite);
    if(img) el.appendChild(img);
    bo.appendChild(el);
    return el;
  }

  // Target king — tracks the ACTIVE turn (twoTurns: turn1 and turn2 target different kings)
  const tk = activeKing();
  const isBlackTurn = sc.turnColor==='black' || (sc.twoTurns && currentTurn===2);
  const kingSymbol  = isBlackTurn ? '♔' : '♚';
  makeEl(kingSymbol, isBlackTurn, 'king-piece', tk.row, tk.col, false);

  // Black pieces — skip a king that sits on the active target square (the synthetic
  // king-piece already represents it) to avoid a duplicate overlapping king.
  sc.blackPieces.forEach(p=>{
    if(p.type==='king' && p.row===tk.row && p.col===tk.col) return;
    const clickable = sc.twoTurns || sc.turnColor==='black';
    makeEl(p.symbol, false, p.id, p.row, p.col, clickable, {pieceId:p.id});
  });

  // White pieces — same skip
  livePieces.forEach(p=>{
    if(p.type==='king' && p.row===tk.row && p.col===tk.col) return;
    makeEl(p.symbol, true, p.id, p.row, p.col, true, {pieceId:p.id});
  });
}

// CLICK HANDLER
// ════════════════════════════════════════
function initHandlers(){
  document.getElementById('board-outer').addEventListener('click',e=>{
    if(busy) return;
    document.getElementById('game-title').classList.remove('blink');

    const pieceEl=e.target.closest('[data-piece-id]');
    if(pieceEl){
      handlePieceClick(pieceEl.dataset.pieceId);
      return;
    }

    // Click on cell or black piece — only valid if correct piece selected
    if(!selectedId) return;
    // Allow clicking on black pieces (captures) — get their cell
    const clickedPiece=e.target.closest('.piece');
    let cell=e.target.closest('.cell');
    if(!cell && clickedPiece && clickedPiece.dataset.color==='black'){
      const px=getCellPx();
      const r=Math.round(parseFloat(clickedPiece.style.top)/px);
      const c=Math.round(parseFloat(clickedPiece.style.left)/px);
      handleCellClick(r,c);
      return;
    }
    if(!cell) return;
    const r=+cell.dataset.r, c=+cell.dataset.c;
    handleCellClick(r,c);
  });
}

function handlePieceClick(id){
  const sc=currentScen;
  const correctId = sc.twoTurns
    ? (currentTurn===1 ? sc.turn1.correctId : sc.turn2.correctId)
    : sc.correctId;

  // In turn 2 or black turn, only black pieces are clickable
  if((sc.twoTurns && currentTurn===2) || sc.turnColor==='black'){
    const el=document.getElementById(id);
    const isBlack=el && el.dataset.color==='black';
    if(!isBlack) return;
  }

  if(id===correctId){
    clearHintMarkers();
    selectPiece(id);
    const turnColor=sc.twoTurns?(currentTurn===1?'הלבן':'השחור'):'';
    setHint(`כל הכבוד! לחצו על המשבצת שתאיים בשח 🎯`);
  } else {
    const el=document.getElementById(id);
    if(el){ el.classList.add('wrong-flash'); setTimeout(()=>el.classList.remove('wrong-flash'),500); }
    totalWrongClicks++; playSound('error');
    setHint('הכלי הזה לא יכול לתת שח! נסו שוב 💪');
    if(selectedId){ deselectAll(); selectedId=null; }
  }
}

function selectPiece(id){
  deselectAll();
  selectedId=id;
  const el=document.getElementById(id);
  if(el) el.classList.add('selected');
}

function deselectAll(){
  document.querySelectorAll('[data-piece-id]').forEach(el=>{
    el.classList.remove('selected','hint-glow');
  });
}

async function handleCellClick(r,c){
  const sc=currentScen;
  const turnData = sc.twoTurns ? (currentTurn===1 ? sc.turn1 : sc.turn2) : sc;
  const correctId = turnData.correctId;
  if(selectedId!==correctId) return;

  const sol=turnData.solution;
  if(r===sol.row && c===sol.col){
    // ✅ Correct!
    busy=true;
    clearHintMarkers();
    deselectAll();

    const px=getCellPx();
    const pieceEl=document.getElementById(correctId);

    // Remove captured piece on target square
    const allPieces=document.querySelectorAll('.piece');
    allPieces.forEach(el=>{
      if(el.id===correctId) return;
      const t=parseFloat(el.style.top), l=parseFloat(el.style.left);
      if(Math.abs(t-r*px)<2 && Math.abs(l-c*px)<2) el.remove();
    });

    // Move piece
    const piece=livePieces.find(p=>p.id===correctId);
    if(piece){ piece.row=r; piece.col=c; }
    pieceEl.style.top=(r*px+3)+'px';
    pieceEl.style.left=(c*px+3)+'px';
    await new Promise(res=>setTimeout(res,380));

    // Laser + king danger
    const king=turnData.king;
    await Promise.all([
      fireLaser(r,c, king.row,king.col),
      triggerKingDanger(king.row,king.col)
    ]);



    if(sc.twoTurns && currentTurn===1){
      // Move to turn 2 — re-render so the target-king marker tracks turn 2 (D3, not E7)
      currentTurn=2;
      selectedId=null;
      hintLevel=0; resetHintBtn();
      buildBoard();
      showTurnIndicator('black');
      setHint('זהו את הכלי שיכול לאיים בשח ולחצו עליו!');
      busy=false;
    } else {
      // Scenario done!
      hideTurnIndicator();
      fireworks();
      document.getElementById('board').classList.add('glow');
      await new Promise(res=>setTimeout(res,800));
      document.getElementById('board').classList.remove('glow');
      showTransition();
    }
  } else {
    const cell=getCell(r,c);
    if(cell){ cell.classList.add('err-flash'); setTimeout(()=>cell.classList.remove('err-flash'),400); }
    totalWrongClicks++; playSound('error');
    setHint('לא נכון! נסו משבצת אחרת 💪');
  }
}

// TRANSITION
// ════════════════════════════════════════
function showTransition(){
  const isLast=(scenIdx===SCENARIOS.length-1);
  document.getElementById('tr-icon').textContent=isLast?'🏆':'⭐';
  document.getElementById('tr-title').textContent=isLast?'כל הכבוד!':'מצוין!';
  document.getElementById('tr-sub').textContent=isLast?'שמרנו את התוצאה שלכם 💾':'עוברים לתרחיש הבא...';
  document.getElementById('transition-overlay').classList.add('show');
  setTimeout(()=>{
    document.getElementById('transition-overlay').classList.remove('show');
    if(isLast){
      // v2.1: קרא את השיא הקודם *לפני* השמירה (best — לתג "השיא שלך")
      const _prev     = (JSON.parse(localStorage.getItem(CheckState.MODULE_KEY)||'{}'))['stage3'] || {};
      const _prevBest = (_prev.bestPerfect ?? _prev.perfect) || false;
      // הביצוע של הריצה הזו = ה"אחרון" (אמת הרגע — יכול גם לרדת)
      const perfect = (totalWrongClicks <= 2 && hintsUsed === 0);
      CheckState.save('stage3', perfect);   // מעדכן lastPerfect + מעלה bestPerfect ב-OR
      // מסך סיום השלב מציג את הביצוע האחרון
      const starsEl = document.getElementById('win-stars');
      if(starsEl) starsEl.textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
      // תג השיא — רק כשהשיא טוב מהריצה הנוכחית (הילד החליק משיא קודם)
      const bestEl = document.getElementById('win-best');
      if(bestEl) bestEl.style.display = (_prevBest && !perfect) ? 'block' : 'none';
      const subEl = document.getElementById('win-sub');
      if(subEl) subEl.textContent = perfect ? 'ביצוע מושלם! 🎉' : 'נסו שוב לקבל 3 כוכבים! 💪';
      document.getElementById('win-overlay').classList.add('show');
    } else {
      loadScenario(scenIdx+1);
      busy=false;
    }
  },3000);
}

function goToNext(){
  window.location.href='check-stage4.html';
}

// ════════════════════════════════════════
// HINT SYSTEM
// ════════════════════════════════════════
function giveHint(){
  if(busy) return;
  const sc=currentScen;
  const turnData=sc.twoTurns?(currentTurn===1?sc.turn1:sc.turn2):sc;
  const maxHints=2;
  hintLevel++;
  hintsUsed++;
  clearHintMarkers();

  if(hintLevel===1){
    const el=document.getElementById(turnData.correctId);
    if(el){
      el.classList.add('hint-glow');
      // ⚠️ visual fade ONLY — do NOT reset hintLevel or re-enable the button here, so the next
      // 💡 click escalates to the exact hint (level 2). Reset happens on the level-2 timeout,
      // on a correct move (loadScenario / turn-2 transition), not on this fade.
      setTimeout(()=>{ el.classList.remove('hint-glow'); },3000);
    }
  } else if(hintLevel>=maxHints){
    const sol=turnData.solution;
    const cell=getCell(sol.row,sol.col);
    if(cell){
      const s=document.createElement('div');
      s.className='hint-smiley'; s.id='hint-smiley'; s.textContent='😊';
      cell.appendChild(s);
      document.getElementById('hint-btn').disabled=true;
      setTimeout(()=>{ const sm=document.getElementById('hint-smiley'); if(sm) sm.remove(); hintLevel=0; resetHintBtn(); },3000);
    }
  }
}

function clearHintMarkers(){
  document.querySelectorAll('[data-piece-id]').forEach(el=>el.classList.remove('hint-glow'));
  const sm=document.getElementById('hint-smiley'); if(sm) sm.remove();
}

function resetHintBtn(){
  const hb=document.getElementById('hint-btn');
  if(hb){ hb.disabled=false; hb.innerHTML='💡 רמז'; }
}

// ════════════════════════════════════════
// LASER
// ════════════════════════════════════════
function fireLaser(fromRow,fromCol,toRow,toCol){
  return new Promise(resolve=>{
    const bo=document.getElementById('board-outer');
    const px=getCellPx();
    const x1=fromCol*px+px/2+3, y1=fromRow*px+px/2+3;
    const x2=toCol*px+px/2+3,   y2=toRow*px+px/2+3;
    const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
    const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;

    const laser=document.createElement('div');
    laser.className='laser-line';
    laser.style.cssText=`width:${len}px;height:20px;top:${y1-10}px;left:${x1}px;transform:rotate(${angle}deg);`;
    const glow=document.createElement('div'); glow.className='laser-glow'; laser.appendChild(glow);
    const core=document.createElement('div'); core.className='laser-core'; laser.appendChild(core);
    bo.appendChild(laser);

    playLaserSound();

    setTimeout(()=>{
      for(let i=0;i<6;i++){
        const spark=document.createElement('div'); spark.className='laser-spark';
        const a=Math.random()*Math.PI*2, d=10+Math.random()*20;
        spark.style.cssText=`left:${x2+Math.cos(a)*d-5}px;top:${y2+Math.sin(a)*d-5}px;`;
        bo.appendChild(spark); setTimeout(()=>spark.remove(),500);
      }
    },150);
    setTimeout(()=>{ laser.remove(); resolve(); },2600);
  });
}

// ════════════════════════════════════════
// KING DANGER
// ════════════════════════════════════════
function triggerKingDanger(kr,kc){
  return new Promise(resolve=>{
    const kingEl=document.getElementById('king-piece');
    if(!kingEl){resolve();return;}
    const cell=getCell(kr,kc);
    if(cell){
      const ov=document.createElement('div'); ov.className='king-danger-overlay';
      cell.appendChild(ov); setTimeout(()=>ov.remove(),1200);
    }
    kingEl.style.animation='king-shake .5s ease-in-out';
    // label glyph must match the king actually under attack (white king ♔ on black turns)
    const _atkBlackTurn = currentScen.turnColor==='black' || (currentScen.twoTurns && currentTurn===2);
    const label=document.createElement('div'); label.className='check-label'; label.textContent=(_atkBlackTurn?'♔':'♚')+' שח!';
    kingEl.appendChild(label);
    setTimeout(()=>{ label.remove(); kingEl.style.animation=''; resolve(); },1400);
  });
}

// ════════════════════════════════════════
// SOUND
// ════════════════════════════════════════
function playSound(type){
  if(muted) return;
  throttleSound('error', ()=>{
    try{
      const ctx=getAudioCtx();
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      if(type==='error'){ o.frequency.value=220; o.type='sawtooth'; g.gain.setValueAtTime(.3,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3); o.start(); o.stop(ctx.currentTime+.3); }
    }catch(e){}
  });
}

function playLaserSound(){
  if(muted) return;
  try{
    const ctx=getAudioCtx();
    const o1=ctx.createOscillator(), g1=ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(1200,ctx.currentTime);
    o1.frequency.exponentialRampToValueAtTime(80,ctx.currentTime+0.6);
    g1.gain.setValueAtTime(0.35,ctx.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.6);
    o1.start(); o1.stop(ctx.currentTime+0.6);

    const bufSize=ctx.sampleRate*0.15;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
    const noise=ctx.createBufferSource(); noise.buffer=buf;
    const ng=ctx.createGain(); noise.connect(ng); ng.connect(ctx.destination);
    ng.gain.setValueAtTime(0.2,ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    noise.start(); noise.stop(ctx.currentTime+0.15);
  }catch(e){}
}

// ════════════════════════════════════════
// FIREWORKS
// ════════════════════════════════════════
function fireworks(){
  const cols=['#F4D03F','#FFE580','#C9A227','#FFFFFF','#52B788','#FF6B35','#FF4444'];
  for(let i=0;i<35;i++){
    const el=document.createElement('div'); el.className='burst';
    const sz=5+Math.random()*9, cx=window.innerWidth/2, cy=window.innerHeight/2;
    const a=(i/35)*Math.PI*2, d=60+Math.random()*140;
    el.style.cssText=`width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};left:${cx}px;top:${cy}px;animation-duration:${.6+Math.random()*.4}s;`;
    el.style.setProperty('--bx',Math.cos(a)*d+'px'); el.style.setProperty('--by',Math.sin(a)*d+'px');
    document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
  }
}
