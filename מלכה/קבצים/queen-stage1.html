<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>המלכה הכול-יכולה — שלב 1 ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#F4D03F;--gold-dark:#C9A227;--gold-deep:#9A7B1A;
  --purple:#C39BD3;--blue:#7EC8E3;--green:#52B788;--red:#E74C3C;
  --bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;
  --cell: clamp(38px, min(calc((100vw - 52px) / 8), calc((100vh - 210px) / 8)), 54px);
  --cell-light:#C9E4F5;--cell-dark:#4A7FA5;
}
body{
  font-family:'Nunito',sans-serif;color:white;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:14px 10px max(28px, env(safe-area-inset-bottom));user-select:none;overflow-x:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
}
.star-dot{position:fixed;border-radius:50%;background:#fff;pointer-events:none;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.08;transform:scale(.7)}to{opacity:.9;transform:scale(1.3)}}
.hdr{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.stage-badge{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--bg2);
  background:var(--gold);padding:4px 14px;border-radius:50px;box-shadow:0 0 14px rgba(244,208,63,.6);}
.prog-row{display:flex;gap:8px;margin-bottom:10px;}
.prog-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
.prog-dot.done{background:var(--green);}
.prog-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(244,208,63,.7);}
.hint-box{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#fff;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  padding:8px 20px;border-radius:50px;text-align:center;
  min-height:40px;display:flex;align-items:center;justify-content:center;
  transition:all .3s;max-width:480px;width:100%;margin-bottom:10px;
  unicode-bidi:plaintext;direction:rtl;}
.coord-wrap{direction:ltr;}
.board-and-coords{display:inline-flex;flex-direction:column;align-items:flex-start;}
/* קואורדינטות — תואמות לסגנון מודול הצריח */
.coords-row{display:flex;align-items:flex-start;gap:5px;}
.rank-labels{display:flex;flex-direction:column;justify-content:space-around;
  height:calc(var(--cell)*8);width:15px;text-align:center;
  font-family:'Fredoka One',cursive;font-size:.72rem;color:var(--gold);opacity:.8;}
.file-labels{display:flex;justify-content:space-around;
  width:calc(var(--cell)*8);margin-top:4px;
  font-family:'Fredoka One',cursive;font-size:.72rem;color:var(--gold);opacity:.8;}
.board-outer{position:relative;
  border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);}
.board{display:grid;grid-template-columns:repeat(8,var(--cell));grid-template-rows:repeat(8,var(--cell));}
.cell{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;touch-action:manipulation;transition:background .15s;}
.cell.light{background:var(--cell-light);}
.cell.dark{background:var(--cell-dark);}
.cell.wrong-flash{animation:wrongFlash .4s ease;}
@keyframes wrongFlash{0%,100%{background:inherit}40%{background:rgba(231,76,60,.55)}}
.floating-queen{position:absolute;pointer-events:none;z-index:20;
  width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 0 10px rgba(244,208,63,.9)) drop-shadow(0 0 22px rgba(195,155,211,.6));
  transition:left .35s cubic-bezier(.4,0,.2,1),top .35s cubic-bezier(.4,0,.2,1);
  transform:translate(-50%,-50%);}
.board-star{font-size:1.6rem;line-height:1;pointer-events:none;}
.board-star.collected{opacity:0;transform:scale(0);transition:opacity .2s,transform .2s;}
/* ── CINEMATIC TRANSITION (between scenarios) ── */
.scene-tr{position:fixed;inset:0;z-index:500;display:flex;align-items:center;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s ease;}
.scene-tr.show{opacity:1;pointer-events:all;}
.scene-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 45%,#1e3350 0%,#0a1a30 60%,#060E1A 100%);}
.scene-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(244,208,63,.04) 0,rgba(244,208,63,.04) 2px,transparent 2px,transparent 40px),
             repeating-linear-gradient(-45deg,rgba(244,208,63,.04) 0,rgba(244,208,63,.04) 2px,transparent 2px,transparent 40px);}
.scene-content{position:relative;z-index:2;text-align:center;
  animation:sceneIn .55s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes sceneIn{from{transform:scale(.6) translateY(28px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.scene-icon{font-size:5rem;margin-bottom:10px;animation:iconBounce 1.1s ease-in-out infinite alternate;}
@keyframes iconBounce{from{transform:scale(1) rotate(-4deg);}to{transform:scale(1.12) rotate(4deg);}}
.scene-title{font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--gold);
  text-shadow:0 0 30px rgba(244,208,63,1);margin-bottom:10px;}


/* ── WIN OVERLAY ── */
#win-overlay{display:none;position:fixed;inset:0;background:rgba(6,14,26,.93);
  z-index:600;align-items:center;justify-content:center;}
#win-overlay.show{display:flex;}
.win-card{background:linear-gradient(160deg,#162D4A,#0C1E30);border:3px solid var(--gold);
  border-radius:28px;padding:44px 56px;text-align:center;max-width:340px;width:90%;
  box-shadow:0 0 80px rgba(244,208,63,.35);animation:sceneIn .45s cubic-bezier(.175,.885,.32,1.5) both;}
.win-card .trophy{font-size:4rem;margin-bottom:10px;display:block;
  animation:trophyBounce 1.1s ease-in-out infinite alternate;}
@keyframes trophyBounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.win-card .win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:10px;}
.win-stars{font-size:2rem;margin-bottom:18px;letter-spacing:4px;}
.btn-next{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 34px;
  border-radius:14px;border:none;cursor:pointer;color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);transition:transform .15s,box-shadow .15s;
  display:block;width:100%;margin-bottom:10px;
  touch-action:manipulation;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7);}
.btn-retry{font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 26px;
  border-radius:14px;border:1.5px solid rgba(255,255,255,.22);
  cursor:pointer;color:rgba(255,255,255,.6);background:transparent;
  transition:color .2s,border-color .2s;display:block;width:100%;
  touch-action:manipulation;}
.btn-retry:hover{color:white;border-color:rgba(255,255,255,.5);}
.confetti-dot{position:fixed;border-radius:3px;pointer-events:none;z-index:999;
  animation:confettiFall linear forwards;}
/* כפתור השתקה — בתוך ה-hdr (קנוני: רץ/צריח) */
.score-right{display:flex;align-items:center;gap:8px;}
.btn-mute{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;
  font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;
  flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}
@keyframes confettiFall{
  0%{transform:translate(0,0) rotate(0deg);opacity:1;}
  100%{transform:translate(var(--fx,0px),var(--fy,110vh)) rotate(720deg);opacity:0;}}
/* RESPONSIVE — chess-mobile-responsive-skill */
@media (max-width: 479px) {
  .hint-box { font-size: 1rem; padding: 6px 14px; }
  .win-card { padding: 32px 24px; }
}
@media (max-height: 700px) {
  :root { --cell: clamp(30px, min(calc((100vw - 52px) / 8), calc((100vh - 170px) / 8)), 46px); }
  .hint-box { font-size: .95rem; padding: 5px 12px; min-height: 34px; margin-bottom: 6px; }
  .prog-row { margin-bottom: 6px; }
  .hdr { margin-bottom: 6px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="stage-badge" id="stage-badge">שלב 1 · תרחיש 1/4</div>
  <div class="score-right">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק">🔊</button>
  </div>
</div>
<div class="prog-row" id="prog-row"></div>
<div class="hint-box" id="hint-box">אכלו את הכוכבים — כל כוכב במהלך אחד!</div>

<div class="coord-wrap" id="coord-wrap">
  <div class="board-and-coords">
    <div class="coords-row">
      <div class="rank-labels" id="rank-labels"></div>
      <div>
        <div class="board-outer" id="board-outer">
          <div class="board" id="board"></div>
          <div class="floating-queen" id="floating-queen"></div>
        </div>
        <div class="file-labels" id="file-labels"></div>
      </div>
    </div>
  </div>
</div>

<!-- CINEMATIC TRANSITION (between scenarios) — נעלם אוטומטית -->
<div class="scene-tr" id="scene-tr">
  <div class="scene-bg"></div>
  <div class="scene-content">
    <div class="scene-icon" id="scene-icon">✨</div>
    <div class="scene-title" id="scene-title">מושלם!</div>
  </div>
</div>

<!-- WIN OVERLAY (סוף שלב 1) -->
<div id="win-overlay">
  <div class="win-card">
    <div class="trophy">🏆</div>
    <div class="win-title">שלב 1 הושלם! 👑</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div id="win-msg" style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:12px;">ביצוע מושלם! 🏆</div>
    <button class="btn-next" onclick="goNext()">לשלב 2 ←</button>
    <button class="btn-retry" id="btn-retry" onclick="retryStage()">שחקו שוב 🔄</button>
  </div>
</div>

<script>
// ══ SVG PIECE — cburnett (זהה ל-stage2; מאחד את מראה המלכה במודול) ══
const BLACK_SVG={}; // אין כלים שחורים בשלב זה
const WHITE_SVG={
  '♕':`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><circle cx="6" cy="12" r="2.75"/><circle cx="14" cy="9" r="2.75"/><circle cx="22.5" cy="8" r="2.75"/><circle cx="31" cy="9" r="2.75"/><circle cx="39" cy="12" r="2.75"/><path d="M9,26c8.5-1.5,21-1.5,27,0l2.5-12.5L31,25l-.3-14.1L22.5,24.5l-8.2-13.6L14,25,6.5,13.5z"/><path d="M9,26c0,2,1.5,2,2.5,4,1,1.5,1,1,.5,3.5-1.5,1-1.5,2.5-1.5,2.5-1,1.5,1,2.5,1,2.5,6.5,1,16.5,1,23,0,0,0,1.5-1,.5-2.5,0,0,.5-1.5-1-2.5-.5-2.5-.5-2,.5-3.5,1-2,2.5-2,2.5-4-8.5-1.5-18.5-1.5-27,0z"/><path d="M11.5,30c3.5-1,17.5-1,22,0M12,33.5c3.5-1,17.5-1,21,0" style="fill:none;stroke:#000;stroke-width:1"/></g></svg>`,
};
function makePieceSVG(sym,isWhite){
  const dict=isWhite?WHITE_SVG:BLACK_SVG;if(!dict[sym])return null;
  const img=document.createElement('img');
  img.src='data:image/svg+xml,'+encodeURIComponent(dict[sym]);
  const pct=(!isWhite&&sym==='♜')?99:90;
  img.style.cssText=`width:${pct}%;height:${pct}%;object-fit:contain;display:block;margin:auto;pointer-events:none;`;
  return img;
}
(function(){const _qi=makePieceSVG('♕',true);if(_qi)document.getElementById('floating-queen').appendChild(_qi);})();

// Stars BG
for(let i=0;i<55;i++){
  const s=document.createElement('div');s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(s);
}

// ── SCENARIOS ──────────────────────────────────
// row = 8 - rank,  col = file index (a=0..h=7)
const SCENARIOS = [
  {
    // תרחיש 1: מלכה E7 → נתיב: A3→F3→H5→B5
    queen:{row:1,col:4},
    stars:[{row:5,col:0},{row:5,col:5},{row:3,col:7},{row:3,col:1}]
  },
  {
    // תרחיש 2: מלכה E8 → נתיב: B5→G5→C1→C7→H2→A2
    queen:{row:0,col:4},
    stars:[{row:1,col:2},{row:3,col:1},{row:3,col:6},{row:6,col:0},{row:6,col:7},{row:7,col:2}]
  },
  {
    // FIX #5: תרחיש 3: מלכה A6 → נתיב כפוי: C6→C3→G7→F8→F2→H4
    queen:{row:2,col:0},
    stars:[{row:2,col:2},{row:0,col:5},{row:1,col:6},{row:4,col:7},{row:5,col:2},{row:6,col:5}]
  },
  {
    // תרחיש 4: מלכה A1 → נתיב: G7→C7→H2→F2→F5→D3→B3
    queen:{row:7,col:0},
    stars:[{row:1,col:2},{row:1,col:6},{row:3,col:5},{row:5,col:1},{row:5,col:3},{row:6,col:5},{row:6,col:7}]
  }
];

const ORIGINAL_SCENARIOS = JSON.parse(JSON.stringify(SCENARIOS));

// ════════════════════════════════════════════
//  QUEEN STATE — v2.1 (תואם BishopState הקנוני)
//  כותב למפתח chess_queen. אין להמציא מפתחות אחרים.
//  ⚠️ STAGE_KEYS / PERFECT_THRESHOLD כאן אינרטיים בשלב ביניים
//     (getModuleStars נקראת רק בשלב המסכם + index.html).
//     הערכים האותנטיים ייקבעו בשלב המלכה המסכם.
// ════════════════════════════════════════════
const QueenState = {
  MODULE_KEY: 'chess_queen',
  STAGE_KEYS: ['stage1','stage2','stage3','stage4'],
  PERFECT_THRESHOLD: 4,  // כל 4 השלבים מושלמים = 3⭐ (החלטת ברוך)
  save(stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const prev = d[stageKey] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = { done: true, perfect, lastPerfect: perfect, bestPerfect };
      localStorage.setItem(this.MODULE_KEY, JSON.stringify(d));
    } catch(e) {}
  },
  getModuleStars() {   // מחזיר { best, last } — תואם v2.1
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const done = this.STAGE_KEYS.filter(k => d[k]?.done).length;
      if (done < this.STAGE_KEYS.length) return { best: 0, last: 0 };
      const bestP = this.STAGE_KEYS.filter(k => (d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP = this.STAGE_KEYS.filter(k => (d[k]?.lastPerfect ?? d[k]?.perfect)).length;
      const toStars = p => p >= this.PERFECT_THRESHOLD ? 3 : 2;
      return { best: toStars(bestP), last: toStars(lastP) };
    } catch(e) { return { best: 0, last: 0 }; }
  }
};

// errors = טעויות בתרחיש הנוכחי (לאייקון 🌟/⭐ במעבר בלבד)
// totalWrongClicks = טעויות מצטברות בכל 4 התרחישים → קובע 3⭐. לא מתאפס בין תרחישים!
const HINT_DEFAULT = 'אכלו את הכוכבים — כל כוכב במהלך אחד!';
let scenIdx=0, queenRow, queenCol, stars=[], nextStarIdx=0, busy=false, errors=0, totalWrongClicks=0;

function queenCanMove(fr,fc,tr,tc){
  if(fr===tr&&fc===tc) return false;
  return fr===tr||fc===tc||Math.abs(tr-fr)===Math.abs(tc-fc);
}
function findReachableStar(){
  for(let i=0;i<stars.length;i++){
    if(stars[i].collected) continue;
    if(queenCanMove(queenRow,queenCol,stars[i].row,stars[i].col)) return i;
  }
  return -1;
}
function getC(){
  const cell=document.getElementById('board')?.firstElementChild;
  if(cell) return cell.getBoundingClientRect().width;
  // fallback — חישוב ישיר זהה ל-CSS clamp
  const fromW=(window.innerWidth-52)/8;
  const fromH=(window.innerHeight-210)/8;
  return Math.min(Math.max(Math.min(fromW,fromH),38),54);
}
function getCellSize(){ return getC(); }
function positionQueen(r,c,animate=true){
  const fq=document.getElementById('floating-queen');if(!fq)return;
  const sz=getCellSize();
  if(!animate) fq.style.transition='none';
  else fq.style.transition='left .35s cubic-bezier(.4,0,.2,1),top .35s cubic-bezier(.4,0,.2,1)';
  fq.style.left=(c*sz+sz/2)+'px';
  fq.style.top=(r*sz+sz/2)+'px';
  setTimeout(()=>{if(!animate)fq.style.transition='';},20);
}
function buildBoard(){
  SCENARIOS[scenIdx].stars=ORIGINAL_SCENARIOS[scenIdx].stars.map(s=>({...s}));
  SCENARIOS[scenIdx].queen={...ORIGINAL_SCENARIOS[scenIdx].queen};
  const sc=SCENARIOS[scenIdx];
  queenRow=sc.queen.row; queenCol=sc.queen.col;
  stars=sc.stars.map(s=>({...s,collected:false}));
  nextStarIdx=findReachableStar();
  busy=false; errors=0;
  document.getElementById('stage-badge').textContent=`שלב 1 · תרחיש ${scenIdx+1}/${SCENARIOS.length}`;
  buildProgDots();
  setHint(HINT_DEFAULT);
  const boardEl=document.getElementById('board');
  boardEl.innerHTML='';
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const cell=document.createElement('div');
      cell.className='cell '+((r+c)%2===0?'light':'dark');
      cell.id=`cell_${r}_${c}`;
      cell.addEventListener('click',()=>onCellClick(r,c));
      const si=stars.findIndex(s=>s.row===r&&s.col===c);
      if(si>=0){
        const star=document.createElement('div');
        star.className='board-star';
        star.id=`star_${si}`;star.textContent='⭐';
        cell.appendChild(star);
      }
      boardEl.appendChild(cell);
    }
  }
  setTimeout(()=>positionQueen(queenRow,queenCol,false),30);
}
function onCellClick(r,c){
  if(busy)return;
  if(r===queenRow&&c===queenCol)return;
  const si=stars.findIndex(s=>s.row===r&&s.col===c&&!s.collected);
  if(si>=0){
    if(queenCanMove(queenRow,queenCol,r,c)) collectStar(si,r,c);
    else{ wrongFlash(r,c); errors++; totalWrongClicks++; setHint('המלכה לא מגיעה לשם עכשיו... נסו כיוון אחר! 🤔'); }
  } else { wrongFlash(r,c); setHint('אין כוכב שם! חפשו את הכוכב שהמלכה מגיעה אליו ⭐'); }
}
function collectStar(si,r,c){
  busy=true;
  setHint(HINT_DEFAULT);   // כוכב נכון נאכל → הודעת השגיאה הקודמת נעלמת מיד
  stars[si].collected=true; queenRow=r; queenCol=c;
  positionQueen(r,c,true); playSound('collect');
  setTimeout(()=>{
    const starEl=document.getElementById(`star_${si}`);
    if(starEl) starEl.classList.add('collected');
    burst(r,c);
    nextStarIdx=findReachableStar();
    const remaining=stars.filter(s=>!s.collected).length;
    if(remaining===0) setTimeout(()=>showScenarioComplete(),400);
    else if(nextStarIdx===-1){
      setHint('😬 המורה ברוך ממליץ להתחיל מחדש — הכוכבים לא נגישים מכאן!');
      setTimeout(()=>buildBoard(),2200);
    } else busy=false;
  },380);
}
function showScenarioComplete(){
  busy=false;
  const isLast=scenIdx>=SCENARIOS.length-1;

  if(isLast){
    // תרחיש אחרון — מסך ניצחון מלא
    showWin();
  } else {
    // בין תרחישים — cinematic transition אוטומטי
    document.getElementById('scene-icon').textContent=errors===0?'🌟':'⭐';
    document.getElementById('scene-title').textContent=errors===0?'מושלם!':'כל הכבוד!';
    document.getElementById('scene-tr').classList.add('show');
    confetti();
    setTimeout(()=>{
      document.getElementById('scene-tr').classList.remove('show');
      scenIdx++; buildBoard();
    },2600);
  }
}
function goNext(){
  window.location.href='queen-stage2.html';
}
function retryStage(){
  location.reload();   // ריענון מלא — מאפס הכול ומתחיל מתרחיש 1 (הסטנדרט הקנוני)
}
function showWin(){
  const perfect = totalWrongClicks <= 2;   // עד 2 טעויות בכל 4 התרחישים = 3⭐
  QueenState.save('stage1', perfect);
  document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
  document.getElementById('win-msg').textContent = perfect ? 'ביצוע מושלם! 🏆' : 'כל הכבוד! 🎉';
  document.getElementById('btn-retry').textContent = perfect ? 'שחקו שוב 🔄' : 'נסו שוב 🔄';
  document.getElementById('win-overlay').classList.add('show');
  confetti();confetti();
}
function setHint(txt){document.getElementById('hint-box').textContent=txt;}
function wrongFlash(r,c){
  const cell=document.getElementById(`cell_${r}_${c}`);if(!cell)return;
  cell.classList.remove('wrong-flash');void cell.offsetWidth;
  cell.classList.add('wrong-flash');playSound('error');
}
function burst(r,c){
  // getBoundingClientRect כאן — לגיטימי: קואורדינטות viewport לחלקיקי קונפטי position:fixed
  const board=document.getElementById('board').getBoundingClientRect();
  const sz=getCellSize();
  const x=board.left+c*sz+sz/2,y=board.top+r*sz+sz/2;
  const colors=['#F4D03F','#C39BD3','#7EC8E3','#FFFFFF','#FFD700'];
  for(let i=0;i<14;i++){
    const d=document.createElement('div');d.className='confetti-dot';
    const a=Math.random()*Math.PI*2,dist=50+Math.random()*60,sz2=5+Math.random()*5;
    d.style.cssText=`width:${sz2}px;height:${sz2}px;background:${colors[i%colors.length]};left:${x}px;top:${y}px;animation-duration:${.6+Math.random()*.4}s;`;
    d.style.setProperty('--fx',Math.cos(a)*dist+'px');
    d.style.setProperty('--fy',Math.sin(a)*dist+'px');
    document.body.appendChild(d);setTimeout(()=>d.remove(),1100);
  }
}
function confetti(){
  const colors=['#F4D03F','#C39BD3','#7EC8E3','#52B788','#FF6B35','#FFFFFF'];
  for(let i=0;i<40;i++){
    const d=document.createElement('div');d.className='confetti-dot';
    const sz=6+Math.random()*7,fx=(Math.random()-0.5)*200+'px';
    d.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${Math.random()*100}vw;top:-10px;animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*.6}s;`;
    d.style.setProperty('--fx',fx);d.style.setProperty('--fy','110vh');
    document.body.appendChild(d);setTimeout(()=>d.remove(),3500);
  }
}

// ── AUDIO — singleton + mute ──────────────────────────
let _AC=null, _muted=false;
function getAudioCtx(){return _AC||(_AC=new(window.AudioContext||window.webkitAudioContext)());}
function toggleMute(){
  _muted=!_muted;
  document.getElementById('muteBtn').textContent=_muted?'🔇':'🔊';
  try{localStorage.setItem('chess_muted',_muted?'1':'0');}catch(e){}
}
function playSound(type){
  if(_muted)return;
  try{
    const AC=getAudioCtx();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    if(type==='collect'){
      o.frequency.setValueAtTime(660,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320,AC.currentTime+.15);
      g.gain.setValueAtTime(.25,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);
      o.start();o.stop(AC.currentTime+.3);
    }else{
      o.type='sawtooth';
      o.frequency.setValueAtTime(200,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(100,AC.currentTime+.2);
      g.gain.setValueAtTime(.2,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.25);
      o.start();o.stop(AC.currentTime+.25);
    }
  }catch(e){}
}

function buildCoords(){
  const rl=document.getElementById('rank-labels'),fl=document.getElementById('file-labels');
  rl.innerHTML='';fl.innerHTML='';
  for(let r=0;r<8;r++){
    const d=document.createElement('div');d.textContent=8-r;rl.appendChild(d);
  }
  'ABCDEFGH'.split('').forEach(f=>{
    const d=document.createElement('div');d.textContent=f;fl.appendChild(d);
  });
}
function buildProgDots(){
  const row=document.getElementById('prog-row');row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<scenIdx?' done':i===scenIdx?' active':'');
    row.appendChild(d);
  });
}

buildCoords();
buildBoard();
// שחזור מצב מוט מהגדרות קודמות
try{if(localStorage.getItem('chess_muted')==='1'){_muted=true;document.getElementById('muteBtn').textContent='🔇';}}catch(e){}

// Resize listener — מסנכרן מיקום מלכה לשינוי גודל מסך
window.addEventListener('resize', () => {
  if(queenRow !== undefined) positionQueen(queenRow, queenCol, false);
});
