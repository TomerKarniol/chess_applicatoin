<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>המלכה הכול-יכולה — שלב 2 ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#F4D03F;--gold-dark:#C9A227;--gold-deep:#9A7B1A;
  --purple:#C39BD3;--blue:#7EC8E3;--green:#52B788;--red:#E74C3C;
  --bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;
  --cell: clamp(38px, min(calc((100vw - 52px) / 8), calc((100vh - 210px) / 8)), 54px);
  --cell-light:#C9E4F5;--cell-dark:#4A7FA5;
}
body{font-family:'Nunito',sans-serif;color:white;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:14px 10px max(28px, env(safe-area-inset-bottom));user-select:none;overflow-x:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;}
.star-dot{position:fixed;border-radius:50%;background:#fff;pointer-events:none;z-index:0;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.08;transform:scale(.7)}to{opacity:.9;transform:scale(1.3)}}

/* HEADER */
.hdr{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.stage-badge{font-family:'Fredoka One',cursive;font-size:.9rem;color:var(--bg2);
  background:var(--gold);padding:4px 14px;border-radius:50px;box-shadow:0 0 14px rgba(244,208,63,.6);}
/* PROGRESS */
.prog-row{display:flex;gap:8px;margin-bottom:8px;}
.prog-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s;}
.prog-dot.done{background:var(--green);}
.prog-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(244,208,63,.7);}

/* HINT + COUNTER */
.hint-box{font-family:'Fredoka One',cursive;font-size:1.21rem;color:#fff;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);
  padding:7px 20px;border-radius:50px;margin-bottom:8px;text-align:center;
  max-width:480px;direction:rtl;unicode-bidi:bidi-override;}
.counter-box{font-family:'Fredoka One',cursive;font-size:1rem;color:var(--purple);
  background:rgba(195,155,211,.1);border:2px solid rgba(195,155,211,.3);
  padding:5px 18px;border-radius:50px;margin-bottom:10px;}

/* BOARD */
.coord-wrap{direction:ltr;display:flex;align-items:flex-start;gap:5px;}
.frozen-badge{
  font-family:'Fredoka One',cursive;font-size:.95rem;
  color:var(--blue);
  background:rgba(126,200,227,.1);border:1.5px solid rgba(126,200,227,.35);
  padding:5px 18px;border-radius:50px;margin-top:8px;text-align:center;
  animation:fadeInBadge .5s ease both;
}
@keyframes fadeInBadge{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
/* FIX #4: קואורדינטות — var(--gold) + opacity:.8 לאחידות עם שאר המודולים */
.rank-labels{display:flex;flex-direction:column;height:calc(var(--cell)*8);
  justify-content:space-around;font-family:'Fredoka One',cursive;font-size:.72rem;
  opacity:.8;color:var(--gold);width:15px;text-align:center;}
.file-labels{display:flex;justify-content:space-around;width:calc(var(--cell)*8);
  margin-top:4px;font-family:'Fredoka One',cursive;font-size:.72rem;opacity:.8;color:var(--gold);}
.board-outer{position:relative;border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);}
.board{display:grid;grid-template-columns:repeat(8,var(--cell));grid-template-rows:repeat(8,var(--cell));}
.cell{width:var(--cell);height:var(--cell);display:flex;align-items:center;
  justify-content:center;cursor:pointer;touch-action:manipulation;transition:background .15s;}
.cl{background:var(--cell-light);}.cd{background:var(--cell-dark);}
.cell.found{background:rgba(195,155,211,.55)!important;box-shadow:inset 0 0 0 3px var(--gold)!important;}
.cell.wflash{animation:wf .4s ease;}
@keyframes wf{0%,100%{background:inherit}40%{background:rgba(231,76,60,.6)}}

/* FLOATING PIECES */
.fpiece{position:absolute;pointer-events:none;z-index:20;
  width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;}
.fqueen{z-index:21;
  transition:left .35s cubic-bezier(.4,0,.2,1),top .35s cubic-bezier(.4,0,.2,1);}
.fenemy{z-index:19;}

/* LASER */
#laser-svg{position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:15;overflow:visible;}
.lbeam{stroke:var(--red);stroke-width:3;stroke-linecap:round;
  filter:drop-shadow(0 0 8px rgba(231,76,60,.9));opacity:0;transition:opacity .15s;}
.lbeam.on{opacity:1;}

/* FIX #6: CINEMATIC TRANSITION (בין תרחישים) — במקום .overlay .card */
.scene-tr{position:fixed;inset:0;z-index:500;display:flex;align-items:center;
  justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s ease;}
.scene-tr.show{opacity:1;pointer-events:all;}
.scene-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 45%,#1e3350 0%,#0a1a30 60%,#060E1A 100%);}
.scene-bg::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(244,208,63,.04) 0,rgba(244,208,63,.04) 2px,transparent 2px,transparent 40px),
             repeating-linear-gradient(-45deg,rgba(244,208,63,.04) 0,rgba(244,208,63,.04) 2px,transparent 2px,transparent 40px);}
.scene-content{position:relative;z-index:2;text-align:center;
  animation:sceneIn .55s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes sceneIn{from{transform:scale(.6) translateY(28px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.scene-icon{font-size:5rem;margin-bottom:10px;animation:iconBounce 1.1s ease-in-out infinite alternate;}
@keyframes iconBounce{from{transform:scale(1) rotate(-4deg);}to{transform:scale(1.12) rotate(4deg);}}
.scene-title{font-family:'Fredoka One',cursive;font-size:2.6rem;color:var(--gold);
  text-shadow:0 0 30px rgba(244,208,63,1);}
/* כפתור השתקה — בתוך ה-hdr (קנוני: רץ/צריח) */
.score-right{display:flex;align-items:center;gap:8px;}
.btn-mute{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;
  font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;
  flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}

/* OVERLAYS — נאכל */
.overlay{display:none;position:fixed;inset:0;background:rgba(6,14,26,.85);
  z-index:100;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.card{background:linear-gradient(160deg,#162D4A,#0C1E30);border:2px solid var(--gold);
  border-radius:24px;padding:36px 44px;text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.25);
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.5) both;max-width:340px;width:90%;}
@keyframes popIn{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.card .em{font-size:3.5rem;margin-bottom:8px;display:block;}
.card .ti{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);margin-bottom:6px;}
.bretry{font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 26px;
  border-radius:14px;border:1.5px solid rgba(255,255,255,.22);cursor:pointer;
  color:rgba(255,255,255,.6);background:transparent;transition:color .2s,border-color .2s;
  margin-top:10px;display:block;width:100%;
  touch-action:manipulation;}
.bretry:hover{color:white;border-color:rgba(255,255,255,.5);}

/* WIN OVERLAY */
#win-overlay{display:none;position:fixed;inset:0;background:rgba(6,14,26,.93);
  z-index:600;align-items:center;justify-content:center;}
#win-overlay.show{display:flex;}
.win-card{background:linear-gradient(160deg,#162D4A,#0C1E30);border:3px solid var(--gold);
  border-radius:28px;padding:44px 52px;text-align:center;max-width:340px;width:90%;
  box-shadow:0 0 80px rgba(244,208,63,.35);animation:sceneIn .45s cubic-bezier(.175,.885,.32,1.5) both;}
/* FIX #3: trophy animation */
.win-card .trophy{font-size:4rem;margin-bottom:10px;display:block;
  animation:trophyBounce 1.1s ease-in-out infinite alternate;}
@keyframes trophyBounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.win-card .win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:10px;}
.win-stars{font-size:2rem;margin-bottom:18px;letter-spacing:4px;}
/* FIX #2: כפתורי win */
.btn-next{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 34px;
  border-radius:14px;border:none;cursor:pointer;color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);transition:transform .15s,box-shadow .15s;
  display:block;width:100%;margin-bottom:10px;
  touch-action:manipulation;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7);}
.btn-retry-win{font-family:'Fredoka One',cursive;font-size:1rem;padding:9px 26px;
  border-radius:14px;border:1.5px solid rgba(255,255,255,.22);
  cursor:pointer;color:rgba(255,255,255,.6);background:transparent;
  transition:color .2s,border-color .2s;display:block;width:100%;
  touch-action:manipulation;}
.btn-retry-win:hover{color:white;border-color:rgba(255,255,255,.5);}

/* CONFETTI */
.cdot{position:fixed;border-radius:3px;pointer-events:none;z-index:999;animation:cf linear forwards;}
@keyframes cf{0%{transform:translate(0,0) rotate(0deg);opacity:1;}100%{transform:translate(var(--fx,0px),var(--fy,110vh)) rotate(720deg);opacity:0;}}
.burst-dot{position:fixed;border-radius:50%;pointer-events:none;z-index:999;animation:burstFly ease-out forwards;}
@keyframes burstFly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(.2);}}

/* QUEEN EATEN */
@keyframes boardShake{0%,100%{transform:translate(0,0)}12%{transform:translate(-7px,5px)}25%{transform:translate(7px,-5px)}37%{transform:translate(-5px,7px)}50%{transform:translate(5px,-3px)}62%{transform:translate(-3px,5px)}75%{transform:translate(4px,-3px)}87%{transform:translate(-2px,3px)}}
.board-shake{animation:boardShake .55s ease-out!important;}
@keyframes queenSpin{0%{transform:rotate(0deg) scale(1);opacity:1;}40%{transform:rotate(200deg) scale(1.6);opacity:.9;}100%{transform:rotate(420deg) scale(0);opacity:0;}}
.queen-dying{animation:queenSpin .42s ease-in forwards!important;transition:none!important;}
@keyframes boardFlash{0%{opacity:0;}15%{opacity:.75;}60%{opacity:.35;}100%{opacity:0;}}
.board-flash-el{position:absolute;inset:0;border-radius:6px;background:rgba(231,76,60,.85);pointer-events:none;z-index:30;animation:boardFlash .55s ease-out forwards;}
@keyframes bigBoom{0%{transform:translate(-50%,-50%) scale(.1);opacity:1;}45%{transform:translate(-50%,-50%) scale(1.6);opacity:.9;}100%{transform:translate(-50%,-50%) scale(3);opacity:0;}}

@media (max-width: 479px) {
  .hint-box { font-size: 1rem; padding: 6px 14px; }
  .counter-box { font-size: .88rem; }
  .win-card { padding: 32px 24px; }
}
@media (max-height: 700px) {
  :root { --cell: clamp(30px, min(calc((100vw - 52px) / 8), calc((100vh - 170px) / 8)), 46px); }
  .hint-box { font-size: .95rem; padding: 5px 12px; margin-bottom: 5px; }
  .counter-box { font-size: .82rem; padding: 4px 14px; margin-bottom: 6px; }
  .prog-row { margin-bottom: 5px; }
  .hdr { margin-bottom: 5px; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="stage-badge" id="stage-badge">שלב 2 · תרחיש 1/3</div>
  <div class="score-right">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק">🔊</button>
  </div>
</div>
<div class="prog-row" id="prog-row"></div>
<div class="hint-box" id="hint-box">תוקפים את הצריח! ⚡</div>
<div class="counter-box" id="counter-box">מצאתם 0 / 9 משבצות</div>

<div class="coord-wrap">
  <div class="rank-labels" id="ranks"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
      <svg id="laser-svg"><line id="lline" class="lbeam" x1="0" y1="0" x2="0" y2="0"/></svg>
      <div class="fpiece fqueen" id="fqueen"></div>
    </div>
    <div class="file-labels" id="files"></div>
    <div class="frozen-badge" id="frozen-badge">הצריח פסל — הוא לא יזוז!</div>
  </div>
</div>

<!-- CINEMATIC TRANSITION בין תרחישים -->
<div class="scene-tr" id="scene-tr">
  <div class="scene-bg"></div>
  <div class="scene-content">
    <div class="scene-icon" id="scene-icon">✨</div>
    <div class="scene-title" id="scene-title">מושלם!</div>
  </div>
</div>

<!-- נאכלת — תרחיש 2 -->
<div class="overlay" id="ov-rook-eat">
  <div class="card">
    <span class="em">💥</span>
    <div class="ti">BOOM!</div>
    <button class="bretry" onclick="retryS2()">נסו שוב 🔄</button>
  </div>
</div>

<!-- נאכלת — תרחיש 3 -->
<div class="overlay" id="ov-eaten">
  <div class="card">
    <span class="em">💥</span>
    <div class="ti">BOOM!</div>
    <button class="bretry" onclick="retryS3()">נסו שוב 🔄</button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-card">
    <div class="trophy">🏆</div>
    <div class="win-title">שלב 2 הושלם! 👑</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div id="win-msg" style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:12px;">ביצוע מושלם! 🏆</div>
    <button class="btn-next" onclick="goNext()">לשלב 3 ←</button>
    <button class="btn-retry-win" id="btn-retry-win" onclick="retryStage()">שחקו שוב 🔄</button>
  </div>
</div>

<script>
// ══ SVG PIECES ══════════════════════════════════════════════════════
const BLACK_SVG={
  '♜':`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4"><path d="M9,39h27v-3H9z" style="stroke-linecap:butt"/><path d="M12.5,32l1.5-2.5h17l1.5,2.5z" style="stroke-linecap:butt"/><path d="M12,36v-4h21v4z" style="stroke-linecap:butt"/><path d="M14,29.5v-13h17v13z" style="stroke-linecap:butt;stroke-linejoin:miter"/><path d="M14,16.5l-3-2.5h23l-3,2.5z" style="stroke-linecap:butt"/><path d="M11,14V9h4v2h5V9h5v2h5V9h4v5z" style="stroke-linecap:butt"/><path d="M12,35.5h21" style="fill:none;stroke:#fff;stroke-width:1"/><path d="M13,31.5h19" style="fill:none;stroke:#fff;stroke-width:1"/></g></svg>`,
  '♝':`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" fill-rule="evenodd" stroke-linecap="round" stroke-linejoin="round"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z" fill="#000" stroke="#000" stroke-width="1.5" stroke-linecap="butt"/><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#fff" stroke-width="1.5" stroke-linejoin="miter"/></g></svg>`,
};
const WHITE_SVG={
  '♕':`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><circle cx="6" cy="12" r="2.75"/><circle cx="14" cy="9" r="2.75"/><circle cx="22.5" cy="8" r="2.75"/><circle cx="31" cy="9" r="2.75"/><circle cx="39" cy="12" r="2.75"/><path d="M9,26c8.5-1.5,21-1.5,27,0l2.5-12.5L31,25l-.3-14.1L22.5,24.5l-8.2-13.6L14,25,6.5,13.5z"/><path d="M9,26c0,2,1.5,2,2.5,4,1,1.5,1,1,.5,3.5-1.5,1-1.5,2.5-1.5,2.5-1,1.5,1,2.5,1,2.5,6.5,1,16.5,1,23,0,0,0,1.5-1,.5-2.5,0,0,.5-1.5-1-2.5-.5-2.5-.5-2,.5-3.5,1-2,2.5-2,2.5-4-8.5-1.5-18.5-1.5-27,0z"/><path d="M11.5,30c3.5-1,17.5-1,22,0M12,33.5c3.5-1,17.5-1,21,0" style="fill:none;stroke:#000;stroke-width:1"/></g></svg>`,
};
function makePieceSVG(sym,isWhite){
  const dict=isWhite?WHITE_SVG:BLACK_SVG;if(!dict[sym])return null;
  const img=document.createElement('img');
  img.src='data:image/svg+xml,'+encodeURIComponent(dict[sym]);
  const pct=(!isWhite&&sym==='♜')?99:90;
  img.style.cssText=`width:${pct}%;height:${pct}%;object-fit:contain;display:block;margin:auto;pointer-events:none;`;
  return img;
}

// ══ STARS ═══════════════════════════════════════════════════════════
for(let i=0;i<55;i++){
  const s=document.createElement('div');s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(s);
}
const _qi=makePieceSVG('♕',true);
if(_qi) document.getElementById('fqueen').appendChild(_qi);

// ══ DATA ════════════════════════════════════════════════════════════
const S1_QUEEN_HOME={row:5,col:1}; // B3
const S1_ROOK      ={row:3,col:5}; // F5
const S1_TARGETS=[
  {row:5,col:3},{row:6,col:2},{row:7,col:1},
  {row:5,col:5},{row:1,col:5},
  {row:3,col:3},{row:3,col:1},
  {row:2,col:4},{row:5,col:7},
];
const S2_QUEEN_HOME={row:2,col:0};  // A6
const S2_ROOK      ={row:5,col:5};  // F3
const S2_TARGETS=[
  {row:0,col:0},{row:1,col:1},{row:2,col:2},{row:6,col:4},
];
const S2_MINES=[
  {row:5,col:0},{row:5,col:3},{row:2,col:5},{row:7,col:5},
];
const S3_QUEEN_HOME={row:4,col:4}; // E4
const S3_ENEMIES=[
  {id:'b7',type:'rook',  sym:'♜',row:1,col:1},
  {id:'f7',type:'bishop',sym:'♝',row:1,col:5},
  {id:'c4',type:'rook',  sym:'♜',row:4,col:2},
  {id:'c1',type:'bishop',sym:'♝',row:7,col:2},
];

// ══ STATE ═══════════════════════════════════════════════════════════
// totalWrongClicks = טעויות מצטברות בכל 3 התרחישים → קובע 3⭐ (לא מתאפס בין תרחישים)
// sXErrors נשאר רק לאייקון 🌟/⭐ הפר-תרחישי במעבר
let currentScen=0,totalWrongClicks=0;
let s1Found,s1Errors,s1Busy;
let s2Found,s2Errors,s2Busy2;
let s3QR,s3QC,s3Alive,s3Eaten,s3Errors,s3Busy;

// ══ HELPERS ═════════════════════════════════════════════════════════
function sz(){
  const cell=document.getElementById('board')?.firstElementChild;
  if(cell) return cell.getBoundingClientRect().width;

//  QUEEN STATE — v2.1 (זהה ל-stage1; כותב ל-chess_queen)
//  ⚠️ STAGE_KEYS / PERFECT_THRESHOLD = placeholder, אינרטיים בשלב ביניים.
// ════════════════════════════════════════════
const QueenState = {
  MODULE_KEY: 'chess_queen',
  STAGE_KEYS: ['stage1','stage2','stage3','stage4'],
  PERFECT_THRESHOLD: 4,  // כל 4 השלבים מושלמים = 3⭐ (החלטת ברוך)
  save(stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const prev = d[stageKey] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = { done: true, perfect, lastPerfect: perfect, bestPerfect };
      localStorage.setItem(this.MODULE_KEY, JSON.stringify(d));
    } catch(e) {}
  },
  getModuleStars() {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY) || '{}');
      const done = this.STAGE_KEYS.filter(k => d[k]?.done).length;
      if (done < this.STAGE_KEYS.length) return { best: 0, last: 0 };
      const bestP = this.STAGE_KEYS.filter(k => (d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP = this.STAGE_KEYS.filter(k => (d[k]?.lastPerfect ?? d[k]?.perfect)).length;
      const toStars = p => p >= this.PERFECT_THRESHOLD ? 3 : 2;
      return { best: toStars(bestP), last: toStars(lastP) };
    } catch(e) { return { best: 0, last: 0 }; }
  }
};

// ══ CAPTURE EXPLOSION — chess-explosion-skill (canvas, 4 פאזות ~917ms) ══
// התאמות למודול: SZ=sz() דינמי, BD=0 (הקנבס על board-outer מיושר לרשת — ללא +3).
function showExplosion(row,col){
  const SZ=sz();
  const boardOuter=document.getElementById('board-outer');
  const W=SZ*8,H=SZ*8;
  const cx=col*SZ+SZ/2, cy=row*SZ+SZ/2;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  canvas.style.cssText=`position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const c=canvas.getContext('2d');
  const COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts=Array.from({length:45},(_,i)=>{
    const a=(i/45)*Math.PI*2+Math.random()*0.4;
    const spd=3.5+Math.random()*9;
    return {x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1,decay:0.018+Math.random()*0.022,gravity:0.18+Math.random()*0.12};
  });
  let frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    if(frame<8){
      const t=frame/7,r=SZ*0.9*t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);
      g.addColorStop(0.35,`rgba(255,230,80,${(1-t)*0.9})`);
      g.addColorStop(0.7,`rgba(255,100,0,${(1-t)*0.5})`);
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=1&&frame<22){
      const t=(frame-1)/21,r=SZ*0.75*t,a=1-t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);
      g.addColorStop(0.2,`rgba(255,180,0,${a*0.95})`);
      g.addColorStop(0.55,`rgba(210,50,0,${a*0.7})`);
      g.addColorStop(0.85,`rgba(100,15,0,${a*0.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=3&&frame<14){
      const t=(frame-3)/11;
      c.beginPath();c.arc(cx,cy,SZ*0.5*t+SZ*0.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${0.6*(1-t)})`;c.lineWidth=3*(1-t);c.stroke();
    }
    if(frame>10){
      const age=frame-10;
      for(let i=0;i<4;i++){
        const sa=Math.max(0,0.18-age*0.004);
        if(sa<=0)break;
        c.beginPath();
        c.arc(cx+Math.sin(i*1.7+age*0.04)*age*0.5,cy-age*0.35+i*4,age*2.8+i*9,0,Math.PI*2);
        c.fillStyle=`rgba(55,55,55,${sa/(i*0.4+1)})`;c.fill();
      }
    }
    c.save();
    parts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0)return;
      c.globalAlpha=p.alpha;
      c.beginPath();c.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color;c.fill();
    });
    c.restore();
    frame++;
    if(frame<55)requestAnimationFrame(draw);else canvas.remove();
  }
  requestAnimationFrame(draw);
}

// FIX #1: AudioContext singleton + mute ─────────────────────────────
let _AC=null, _muted=false;
function getAudioCtx(){return _AC||(_AC=new(window.AudioContext||window.webkitAudioContext)());}
function toggleMute(){
  _muted=!_muted;
  document.getElementById('muteBtn').textContent=_muted?'🔇':'🔊';
  try{localStorage.setItem('chess_muted',_muted?'1':'0');}catch(e){}
}
function playSound(type){
  if(_muted)return;
  try{
    const AC=getAudioCtx();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    if(type==='good'||type==='collect'){
      o.frequency.setValueAtTime(660,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320,AC.currentTime+.15);
      g.gain.setValueAtTime(.25,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);
      o.start();o.stop(AC.currentTime+.3);
    } else if(type==='laser'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(880,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(220,AC.currentTime+.4);
      g.gain.setValueAtTime(.15,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);
      o.start();o.stop(AC.currentTime+.4);
    } else if(type==='boom'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(160,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(28,AC.currentTime+.6);
      g.gain.setValueAtTime(.55,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.6);
      o.start();o.stop(AC.currentTime+.6);
      const o2=AC.createOscillator(),g2=AC.createGain();
      o2.connect(g2);g2.connect(AC.destination);
      o2.type='square';
      o2.frequency.setValueAtTime(900,AC.currentTime);
      o2.frequency.exponentialRampToValueAtTime(180,AC.currentTime+.18);
      g2.gain.setValueAtTime(.35,AC.currentTime);
      g2.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.18);
      o2.start();o2.stop(AC.currentTime+.18);
    } else if(type==='capture'){
      const n=AC.currentTime;
      // שכבה 1 — תת-באס עמוק (גוף הפיצוץ)
      const thud=AC.createOscillator(),thudG=AC.createGain();
      thud.connect(thudG);thudG.connect(AC.destination);
      thud.type='sine';
      thud.frequency.setValueAtTime(90,n);
      thud.frequency.exponentialRampToValueAtTime(20,n+.5);
      thudG.gain.setValueAtTime(.9,n);
      thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
      thud.start(n);thud.stop(n+.6);
      // שכבה 2 — אגרוף טווח-ביניים (פגיעה)
      const punch=AC.createOscillator(),punchG=AC.createGain();
      punch.connect(punchG);punchG.connect(AC.destination);
      punch.type='sine';
      punch.frequency.setValueAtTime(200,n);
      punch.frequency.exponentialRampToValueAtTime(50,n+.18);
      punchG.gain.setValueAtTime(.5,n);
      punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
      punch.start(n);punch.stop(n+.22);
      // שכבה 3 — פרץ רעש (שברים)
      const bufSz=Math.floor(AC.sampleRate*.35);
      const nBuf=AC.createBuffer(1,bufSz,AC.sampleRate);
      const nd=nBuf.getChannelData(0);
      for(let i=0;i<bufSz;i++)nd[i]=Math.random()*2-1;
      const nSrc=AC.createBufferSource();nSrc.buffer=nBuf;
      const nFilt=AC.createBiquadFilter();
      nFilt.type='bandpass';nFilt.frequency.value=500;nFilt.Q.value=.5;
      const nGain=AC.createGain();
      nGain.gain.setValueAtTime(.55,n);
      nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
      nSrc.connect(nFilt);nFilt.connect(nGain);nGain.connect(AC.destination);
      nSrc.start(n);nSrc.stop(n+.35);
      // שכבה 4 — קראק חד (טרנזיינט מיידי)
      const crack=AC.createOscillator(),crackG=AC.createGain();
      crack.connect(crackG);crackG.connect(AC.destination);
      crack.type='sawtooth';crack.frequency.value=900;
      crackG.gain.setValueAtTime(.5,n);
      crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
      crack.start(n);crack.stop(n+.06);
    } else {
      o.type='sawtooth';
      o.frequency.setValueAtTime(220,AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(100,AC.currentTime+.3);
      g.gain.setValueAtTime(.3,AC.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.3);
      o.start();o.stop(AC.currentTime+.3);
    }
  }catch(e){}
}

function queenCanReach(fr,fc,tr,tc){
  if(fr===tr&&fc===tc)return false;
  return fr===tr||fc===tc||Math.abs(tr-fr)===Math.abs(tc-fc);
}
function s2Click(r,c){
  if(s2Busy2)return;

    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell){cell.classList.remove('wflash');void cell.offsetWidth;cell.classList.add('wflash');}
    return;
  }
  if(isMine){
    s2Busy2=true;s2Errors++;totalWrongClicks++;
    posQueen(r,c,true);playSound('laser');
    setTimeout(()=>{
      const rEl=document.getElementById('s2rook-el');

        rEl.style.transition='left .42s cubic-bezier(.4,0,.2,1),top .42s cubic-bezier(.4,0,.2,1)';

    return;
  }
  if(isTarget>=0&&!s2Found.has(isTarget)){
    s2Busy2=true;s2Found.add(isTarget);
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell)cell.classList.add('found');
    posQueen(r,c,true);playSound('collect');
    setTimeout(()=>{
      showLaser(r,c,S2_ROOK.row,S2_ROOK.col,null);playSound('laser');
      setTimeout(()=>{
        posQueen(S2_QUEEN_HOME.row,S2_QUEEN_HOME.col,true);
        setCounter(`מצאתם ${s2Found.size} / ${S2_TARGETS.length} משבצות`);
        if(s2Found.size===S2_TARGETS.length) setTimeout(()=>s2Complete(),700);
        else s2Busy2=false;
      },1700);
    },320);
  } else if(isTarget>=0&&s2Found.has(isTarget)){
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell){cell.classList.remove('wflash');void cell.offsetWidth;cell.classList.add('wflash');}
  } else {
    s2Errors++; totalWrongClicks++;
    const cell=document.getElementById(`cell_${r}_${c}`);
    if(cell){cell.classList.remove('wflash');void cell.offsetWidth;cell.classList.add('wflash');}
    playSound('bad');
  }
}
function s2Complete(){
  s2Busy2=false;
  showSceneTr(
    s2Errors===0?'🌟':'⭐',
    s2Errors===0?'מדהים!':'כל הכבוד!',
    ()=>loadS3()
  );
}
function retryS2(){
  document.getElementById('ov-rook-eat').classList.remove('show');
  loadS2();
}

// ══ תרחיש 3 ══════════════════════════════════════════════════════════
function loadS3(){
  currentScen=2;
  s3QR=S3_QUEEN_HOME.row;s3QC=S3_QUEEN_HOME.col;
  s3Alive=new Set(S3_ENEMIES.map(e=>e.id));
  s3Eaten=0;s3Errors=0;s3Busy=false;
  buildProgDots();buildCells();removeFloating('fenemy');
  document.getElementById('stage-badge').textContent='שלב 2 · תרחיש 3/3';
  setHint('אכלו את כל הכלים השחורים — בזהירות! ⚔️');
  setCounter(`נאכלו 0 / ${S3_ENEMIES.length} כלים`);
  const outer=document.getElementById('board-outer');
  S3_ENEMIES.forEach(e=>{
    const el=document.createElement('div');
    el.className='fpiece fenemy';el.id='fe_'+e.id;
    const img=makePieceSVG(e.sym,false);if(img)el.appendChild(img);
    outer.appendChild(el);
  });
  setTimeout(()=>{
    const s=sz();
    posQueen(s3QR,s3QC,false);
    S3_ENEMIES.forEach(e=>{
      const el=document.getElementById('fe_'+e.id);if(!el)return;
      el.style.left=(e.col*s)+'px';el.style.top=(e.row*s)+'px';
    });
  },80);
}
function s3CanMove(fr,fc,tr,tc){
  if(fr===tr&&fc===tc)return false;
  if(fr!==tr&&fc!==tc&&Math.abs(tr-fr)!==Math.abs(tc-fc))return false;
  const dr=Math.sign(tr-fr),dc=Math.sign(tc-fc);
  let r=fr+dr,c=fc+dc;
  while(r!==tr||c!==tc){
    if(S3_ENEMIES.some(e=>s3Alive.has(e.id)&&e.row===r&&e.col===c))return false;
    r+=dr;c+=dc;
  }
  return true;
}
function s3Attacks(e,tr,tc){
  if(!s3Alive.has(e.id))return false;
  if(e.type==='rook'){if(e.row!==tr&&e.col!==tc)return false;}
  else if(e.type==='bishop'){if(Math.abs(tr-e.row)!==Math.abs(tc-e.col))return false;}
  else return false;
  const dr=Math.sign(tr-e.row),dc=Math.sign(tc-e.col);
  let r=e.row+dr,c=e.col+dc;
  while(r!==tr||c!==tc){
    if(S3_ENEMIES.some(x=>x.id!==e.id&&s3Alive.has(x.id)&&x.row===r&&x.col===c))return false;
    r+=dr;c+=dc;
  }
  return true;
}
function s3Dangerous(tr,tc,ignoreId=null){
  return S3_ENEMIES.find(e=>e.id!==ignoreId&&s3Attacks(e,tr,tc));
}
function s3Click(r,c){
  if(s3Busy)return;
  if(r===s3QR&&c===s3QC)return;
  if(!s3CanMove(s3QR,s3QC,r,c))return;
  const enemyHere=S3_ENEMIES.find(e=>s3Alive.has(e.id)&&e.row===r&&e.col===c);
  const attacker=s3Dangerous(r,c,enemyHere?enemyHere.id:null);
  s3Busy=true;s3QR=r;s3QC=c;posQueen(r,c,true);
  setTimeout(()=>{
    if(attacker){
      s3Errors++;totalWrongClicks++;playSound('bad');
      if(attacker.type==='bishop'){
        const bishopEl=document.getElementById('fe_'+attacker.id);
        if(bishopEl){
          const s=sz();
          bishopEl.style.transition='left .45s cubic-bezier(.4,0,.2,1),top .45s cubic-bezier(.4,0,.2,1)';
          bishopEl.style.left=(c*s)+'px';bishopEl.style.top=(r*s)+'px';
        }
        setTimeout(()=>{queenExplode(r,c,()=>document.getElementById('ov-eaten').classList.add('show'));},480);
      } else {
        showLaser(attacker.row,attacker.col,r,c,()=>{
          queenExplode(r,c,()=>document.getElementById('ov-eaten').classList.add('show'));
        });
      }
    } else {
      if(enemyHere){
        s3Alive.delete(enemyHere.id);
        const el=document.getElementById('fe_'+enemyHere.id);if(el)el.remove();
        s3Eaten++;
        setCounter(`נאכלו ${s3Eaten} / ${S3_ENEMIES.length} כלים`);
        playSound('capture');showExplosion(r,c);
        if(s3Eaten===S3_ENEMIES.length) setTimeout(()=>s3Complete(),400);
        else s3Busy=false;
      } else { s3Busy=false; }
    }
  },370);
}
function s3Complete(){
  s3Busy=false;
  const perfect = totalWrongClicks <= 2;   // עד 2 טעויות בכל 3 התרחישים = 3⭐
  QueenState.save('stage2', perfect);
  document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
  document.getElementById('win-msg').textContent = perfect ? 'ביצוע מושלם! 🏆' : 'כל הכבוד! 🎉';
  document.getElementById('btn-retry-win').textContent = perfect ? 'שחקו שוב 🔄' : 'נסו שוב 🔄';
  document.getElementById('win-overlay').classList.add('show');
  confetti();confetti();
}
function retryS3(){
  document.getElementById('ov-eaten').classList.remove('show');
  loadS3();
}

function onCellClick(r,c){
  if(currentScen===0)      s1Click(r,c);
  else if(currentScen===1) s2Click(r,c);
  else if(currentScen===2) s3Click(r,c);
}
