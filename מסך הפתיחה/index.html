<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>♟ אני מפלצת שחמט!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#060e1a;font-family:'Nunito',sans-serif;direction:rtl;overscroll-behavior:none}
html{-webkit-text-size-adjust:100%}
body{background:radial-gradient(ellipse at 50% 0%,#162d4a 0%,#0c1e30 55%,#060e1a 100%);text-align:right;-webkit-tap-highlight-color:transparent}
button{-webkit-appearance:none;cursor:pointer}

#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--td) ease-in-out infinite var(--tdelay)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:var(--tmax)}}

header{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;
  padding:10px 22px;padding-top:max(10px,env(safe-area-inset-top));background:rgba(5,12,22,.65);border-bottom:1px solid rgba(244,208,63,.2);min-height:58px}
.app-title{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,3.2vw,2.6rem);
  color:#F4D03F;text-shadow:0 0 18px rgba(244,208,63,.65)}
.album-btn{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#F4D03F;
  background:transparent;border:2px solid #F4D03F;border-radius:50px;padding:7px 18px;
  min-height:44px;cursor:pointer;box-shadow:0 0 10px rgba(244,208,63,.25);transition:all .2s;touch-action:manipulation}
.album-btn:hover{box-shadow:0 0 22px rgba(244,208,63,.55);transform:scale(1.05)}

#map{position:relative;z-index:1;width:100%;height:calc(100vh - 58px - 30px);overflow:hidden}
#pathSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

.station{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;
  align-items:center;gap:5px;cursor:pointer;user-select:none;-webkit-user-select:none}
.station-circle{width:clamp(76px,8.5vw,118px);height:clamp(76px,8.5vw,118px);
  border-radius:50%;background:rgba(5,12,22,.75);border:3px solid;
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:transform .18s;overflow:visible}
.station-circle svg,.station-circle img{width:58%;height:58%;display:block}
.piece-medium svg,.piece-medium img{width:72.5%;height:72.5%}
.piece-large svg,.piece-large img{width:83.4%;height:83.4%}
.station-circle.legendary{background:radial-gradient(circle at 35% 28%,#FFF6C8,#F4D03F 55%,#9A7B1A)!important;border-color:#FFE9A0!important;box-shadow:0 0 22px rgba(244,208,63,.85),0 0 48px rgba(244,208,63,.4)!important}
.station-circle.legendary svg{width:97%!important;height:97%!important}
.station:hover .station-circle{transform:scale(1.09)}
.station-label{font-family:'Fredoka One',cursive;font-size:clamp(.65rem,1.4vw,.95rem);
  color:#ddd;text-shadow:0 1px 4px rgba(0,0,0,.9);white-space:nowrap}

.badge{position:absolute;top:-5px;right:-5px;font-size:1rem;line-height:1;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
.badge .last-tag{font-family:'Nunito',sans-serif;font-weight:700;font-size:.52rem;opacity:.6}

.st-locked .station-circle{border-color:#2a3a4a!important;opacity:.65;box-shadow:none!important}
.st-unlocked .station-circle{animation:sPulse 2.2s ease-in-out infinite}
.st-done .station-circle::before{content:'';position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0%,currentColor 30%,transparent 55%);
  animation:sRing 4s linear infinite;opacity:.55}
.station.shaking{animation:sShake .42s}

@keyframes sPulse{0%,100%{box-shadow:0 0 7px currentColor}50%{box-shadow:0 0 22px currentColor,0 0 40px currentColor}}
@keyframes sRing{to{transform:rotate(360deg)}}
@keyframes sShake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(calc(-50% - 7px),-50%)}75%{transform:translate(calc(-50% + 7px),-50%)}}
@keyframes stickerIn{from{transform:scale(.25) rotate(-18deg)}to{transform:scale(1) rotate(0deg)}}
@keyframes fwFly{to{transform:translate(var(--fx),var(--fy)) scale(.2);opacity:0}}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(20,35,55,.97);color:#fff;font-family:'Fredoka One',cursive;
  font-size:1.05rem;padding:11px 26px;border-radius:50px;
  border:1px solid rgba(255,255,255,.15);opacity:0;pointer-events:none;
  transition:opacity .3s;z-index:200}
#toast.show{opacity:1}

/* ══ ALBUM OVERLAY — true full-screen ══ */
/* ══════════════════════════════
   ALBUM
══════════════════════════════ */
#albumOv{
  display:none;position:fixed;inset:0;z-index:50;
  background:radial-gradient(ellipse at 50% 0%,#0f1e35 0%,#060e1a 65%);
  align-items:stretch;justify-content:stretch;overflow:hidden;
}
#albumOv::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 10%,rgba(244,208,63,.07) 0%,transparent 55%);
}
#albumOv.open{display:flex}

.album-card{
  width:100vw;height:100vh;position:relative;z-index:1;
  padding:clamp(10px,1.8vh,22px) clamp(14px,2.5vw,44px) clamp(8px,1.4vh,16px);
  display:flex;flex-direction:column;gap:clamp(6px,1vh,12px);overflow:hidden;
}

.album-h{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.7rem,3.2vw,2.6rem);color:#F4D03F;text-align:center;
  text-shadow:0 0 30px rgba(244,208,63,.8),0 0 60px rgba(244,208,63,.35);
  letter-spacing:.03em;flex-shrink:0;
}
.album-sub{font-size:clamp(.75rem,1.3vw,.95rem);color:#55718a;text-align:center;margin-top:-6px;flex-shrink:0}

.album-grid{
  display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(4,1fr);
  gap:clamp(8px,1.2vw,16px);flex:1;min-height:0;
}
/* each sticker spans 2 of the 6 columns -> 3 per row (rows 0,1,2) */
.album-grid > .a-slot{grid-column:span 2}
/* last two: both on row 3, centered between the columns */
.album-grid > .a-slot:nth-child(10){grid-column:2/4}  /* middle of col 0 & 1 */
.album-grid > .a-slot:nth-child(11){grid-column:4/6}  /* middle of col 1 & 2 */

/* ── Card base ── */
.a-slot{
  border-radius:clamp(14px,1.4vw,20px);border:2px solid;
  min-height:0;overflow:hidden;position:relative;
  transition:transform .25s cubic-bezier(.175,.885,.32,1.275),box-shadow .25s;
  cursor:default;
  animation:slotIn .45s ease both;
}
.a-slot:nth-child(1){animation-delay:.04s}.a-slot:nth-child(2){animation-delay:.08s}
.a-slot:nth-child(3){animation-delay:.12s}.a-slot:nth-child(4){animation-delay:.16s}
.a-slot:nth-child(5){animation-delay:.20s}.a-slot:nth-child(6){animation-delay:.24s}
.a-slot:nth-child(7){animation-delay:.28s}.a-slot:nth-child(8){animation-delay:.32s}
.a-slot:nth-child(9){animation-delay:.36s}.a-slot:nth-child(10){animation-delay:.40s}
@keyframes slotIn{from{opacity:0;transform:scale(.8) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ── Earned card ── */
.a-slot.earned{
  border-color:rgba(244,208,63,.7);
  box-shadow:0 0 18px rgba(244,208,63,.25),inset 0 0 20px rgba(244,208,63,.04);
  background:#060e1a;cursor:pointer;
}
.a-slot.earned:hover{
  transform:scale(1.06) translateY(-4px);
  box-shadow:0 10px 40px rgba(244,208,63,.55),0 0 60px rgba(244,208,63,.25);
  border-color:#F4D03F;
  z-index:2;
}
/* Gold shimmer sweep */
.a-slot.earned::after{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,200,.18) 50%,transparent 70%);
  transform:translateX(-120%);animation:shimmer 3.5s ease-in-out infinite;
}
@keyframes shimmer{0%,55%{transform:translateX(-120%)}75%{transform:translateX(120%)}100%{transform:translateX(120%)}}

/* ── Locked card ── */
.a-slot.locked{
  border-color:#152030;
  background:linear-gradient(160deg,#080f1c,#0b1928);
}
/* Lock icon */
.a-slot.locked::before{
  content:'🔒';position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.4rem,2.5vw,2.2rem);
  text-shadow:0 2px 10px rgba(0,0,0,.8);
}

/* ── Image ── */
.a-slot img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;border-radius:inherit;
}
.a-slot.earned img{object-fit:contain;background:#060e1a}
.a-slot.locked img{opacity:.13;filter:grayscale(1) blur(1.5px)}

/* ── Name label (overlay at bottom) ── */
.a-slot-name{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  font-family:'Fredoka One',cursive;
  font-size:clamp(.7rem,1.3vw,1rem);
  text-align:center;
  padding:clamp(18px,3vh,32px) 4px clamp(5px,1vh,10px);
  background:linear-gradient(transparent,rgba(3,8,18,.92));
  border-radius:0 0 clamp(12px,1.2vw,18px) clamp(12px,1.2vw,18px);
}
.a-slot.earned .a-slot-name{color:#F4D03F;text-shadow:0 0 12px rgba(244,208,63,.6)}
.a-slot.locked .a-slot-name{color:#1e3548}

/* ── New sticker ── */
.a-slot.sticker-new{
  animation:stickerReveal .7s cubic-bezier(.175,.885,.32,1.28) both,stickerGlow 1.6s ease-in-out .7s infinite alternate;
  border-color:#fff !important;z-index:3;
}
@keyframes stickerReveal{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes stickerGlow{
  from{box-shadow:0 0 20px rgba(244,208,63,.5),0 0 40px rgba(244,208,63,.2)}
  to  {box-shadow:0 0 55px rgba(244,208,63,1),0 0 90px rgba(244,208,63,.5),0 0 130px rgba(244,208,63,.2)}
}

/* ── Close button ── */
.album-close-btn{
  flex-shrink:0;display:block;margin:0 auto;
  font-family:'Fredoka One',cursive;font-size:clamp(.9rem,1.5vw,1.1rem);
  background:rgba(244,208,63,.08);border:2px solid rgba(244,208,63,.6);
  color:#F4D03F;padding:7px 48px;border-radius:50px;
  min-height:42px;cursor:pointer;transition:all .22s;touch-action:manipulation;
}
.album-close-btn:hover{background:rgba(244,208,63,.2);border-color:#F4D03F;box-shadow:0 0 22px rgba(244,208,63,.4)}

/* Mobile: 2 columns */
@media(max-width:500px){
  .album-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(6,1fr)}
  .album-grid > .a-slot{grid-column:auto}
  .album-grid > .a-slot:nth-child(10){grid-column:auto}
  .album-grid > .a-slot:nth-child(11){grid-column:1/-1;justify-self:center}
}

#winOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:60;
  align-items:center;justify-content:center;flex-direction:column;gap:16px}
#winOv.open{display:flex}
.win-t1{font-family:'Fredoka One',cursive;font-size:2.2rem;color:#F4D03F;text-align:center}
.win-t2{font-family:'Fredoka One',cursive;font-size:1.25rem;color:#fff;text-align:center;max-width:320px}
.win-img{width:130px;height:130px;object-fit:contain;animation:stickerIn .65s cubic-bezier(.175,.885,.32,1.28) both}
.win-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;
  background:linear-gradient(160deg,#F4D03F,#C9A227,#9A7B1A);color:#060E1A;border:none;
  padding:13px 34px;border-radius:14px;cursor:pointer;
  box-shadow:0 4px 18px rgba(244,208,63,.5);margin-top:6px;transition:transform .15s,box-shadow .15s;
  display:block;width:100%;touch-action:manipulation}
.win-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7)}
.fw-p{position:absolute;width:9px;height:9px;border-radius:50%;
  animation:fwFly var(--dur) ease-out var(--del) forwards}

#resetBtn{position:fixed;bottom:10px;left:12px;z-index:100;
  font-size:.7rem;color:rgba(255,255,255,.18);background:transparent;
  border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:4px 8px;
  cursor:pointer;transition:all .2s}
#resetBtn:hover{color:rgba(255,100,100,.7);border-color:rgba(255,100,100,.4)}

/* ── Splash Screen ── */
#splashOv{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:clamp(32px,6vh,64px);
  background:#000;
  transition:opacity .8s ease;
}
#splashOv.hiding{opacity:0;pointer-events:none}
#splashBg{
  position:absolute;inset:0;
  background:#060e1a;
  animation:splashZoom 18s ease-in-out infinite alternate;
}
@keyframes splashZoom{from{transform:scale(1)}to{transform:scale(1.06)}}
#splashBtn{
  position:relative;z-index:2;
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.2rem,3.5vw,1.7rem);
  color:#fff;
  background:linear-gradient(135deg,#c0392b,#8e44ad);
  border:none;border-radius:60px;
  padding:clamp(13px,2.5vh,18px) clamp(38px,7vw,62px);
  cursor:pointer;
  box-shadow:0 0 28px rgba(200,60,200,.6), 0 0 60px rgba(200,60,200,.25), 0 4px 18px rgba(0,0,0,.6);
  animation:splashPulse 1.8s ease-in-out infinite;
  letter-spacing:.04em;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
  touch-action:manipulation;
}
#splashBtn:hover{transform:scale(1.06)}
@keyframes splashPulse{
  0%,100%{box-shadow:0 0 28px rgba(200,60,200,.6),0 0 60px rgba(200,60,200,.25),0 4px 18px rgba(0,0,0,.6)}
  50%{box-shadow:0 0 44px rgba(200,60,200,.95),0 0 90px rgba(200,60,200,.45),0 4px 18px rgba(0,0,0,.6)}
}

/* ── Instruction Banner ── */
#instrBanner{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:4px 20px;
  background:linear-gradient(90deg,rgba(244,208,63,.06) 0%,rgba(244,208,63,.14) 50%,rgba(244,208,63,.06) 100%);
  border-bottom:1px solid rgba(244,208,63,.2);
}
.instr-icon{font-size:1.3rem;animation:iconBounce 1.8s ease-in-out infinite}
.instr-text{
  font-family:'Fredoka One',cursive;
  font-size:clamp(.85rem,2.2vw,1.15rem);
  color:#F4D03F;
  text-shadow:0 0 12px rgba(244,208,63,.5);
  direction:rtl;unicode-bidi:bidi-override;
  letter-spacing:.02em;
}
@keyframes bannerGlow{0%,100%{background:linear-gradient(90deg,rgba(244,208,63,.06) 0%,rgba(244,208,63,.16) 50%,rgba(244,208,63,.06) 100%)}
  50%{background:linear-gradient(90deg,rgba(244,208,63,.1) 0%,rgba(244,208,63,.24) 50%,rgba(244,208,63,.1) 100%)}}
@keyframes iconBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

@media(max-width:767px){
  html,body{overflow-y:auto}
  #map{height:auto;min-height:520px}
  #instrBanner{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:4px 20px;
  background:linear-gradient(90deg,rgba(244,208,63,.06) 0%,rgba(244,208,63,.14) 50%,rgba(244,208,63,.06) 100%);
  border-bottom:1px solid rgba(244,208,63,.2);
}
  .instr-icon{font-size:1.1rem}
}
@media(max-width:479px){
  html,body{overflow-y:auto}
  #map{height:auto;min-height:480px}
  #instrBanner{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:4px 20px;
  background:linear-gradient(90deg,rgba(244,208,63,.06) 0%,rgba(244,208,63,.14) 50%,rgba(244,208,63,.06) 100%);
  border-bottom:1px solid rgba(244,208,63,.2);
}
  .instr-icon{font-size:1rem}
  .station-label{font-size:.6rem}
}
</style>
<script>if(localStorage.getItem("chess_just_completed"))document.documentElement.classList.add("skip-splash");</script>
<style>.skip-splash #splashOv{display:none!important}</style>
</head>
<body>

<!-- ══ SPLASH SCREEN ══ -->
<div id="splashOv">
  <div id="splashBgBlur" style="position:absolute;inset:0;background:url('splash.png') center center / cover no-repeat;filter:blur(18px) brightness(0.55) saturate(1.4);transform:scale(1.08);"></div>
  <img id="splashImg" src="splash.png" style="position:absolute;top:0;left:50%;transform:translateX(-50%);height:100%;width:auto;object-fit:contain;z-index:1;">
  <button id="splashBtn">⚔️ בואו נשחק! 🎮</button>
</div>

<div id="stars"></div>

<header>
  <span class="app-title">♟ אני מפלצת שחמט!</span>
  <button class="album-btn" id="albumBtn">🏆 האלבום שלי <span id="albumCount">0</span>/11</button>
</header>

<div id="instrBanner">
  <span class="instr-icon">⚔️</span>
  <span class="instr-text">בחרו את השלב הפתוח והפכו למפלצת שחמט חזקה יותר!</span>
  <span class="instr-icon">⚔️</span>
</div>

<div id="map"></div>
<div id="toast"></div>

<div id="albumOv">
  <div class="album-card">
    <div class="album-h">🏆 האלבום שלי</div>
    <div class="album-sub">אספו את כל 11 מפלצות השחמט!</div>
    <div class="album-grid" id="albumGrid"></div>
    <button class="album-close-btn" id="albumCloseBtn">סגור ✕</button>
  </div>
</div>

<div id="winOv">
  <div class="win-t1">🎉 כל הכבוד! 🎉</div>
  <div class="win-t2" id="winSub"></div>
  <img class="win-img" id="winImg" src="" alt="" onerror="this.style.display='none'">
  <button class="win-btn" id="winContinueBtn">🗺️ חזרה למפה</button>
</div>

<button id="resetBtn">איפוס</button>

<script>
// ═══════════════════════════════════════════
//  DATA — 10 modules, spread across full map
// ═══════════════════════════════════════════
const MODULES = [
  {id:'rook',         name:'הצריח',         file:'../צריח/קבצים/rook-intro.html',                       x:10, y:84, color:'#7EC8E3', piece:'rook',         starThreshold:5},
  {id:'bishop',       name:'הרץ',           file:'../רץ חדש/קבצים/bishop-intro.html',                  x:37, y:72, color:'#C39BD3', piece:'bishop',       starThreshold:6},
  {id:'queen',        name:'המלכה',         file:'../מלכה/קבצים/queen-intro.html',                     x:65, y:83, color:'#F4D03F', piece:'queen',        starThreshold:4},
  {id:'pawn',         name:'הרגלי',         file:'../רגלי/קבצים/pawn-intro.html',                      x:95, y:63, color:'#52B788', piece:'pawn',         starThreshold:3},
  {id:'knight',       name:'הפרש',          file:'../פרש/קבצים/knight-intro.html',                     x:81, y:40, color:'#FF6B35', piece:'knight',       starThreshold:5},
  {id:'king',         name:'המלך',          file:'../מלך/קבצים/king-intro.html',                       x:53, y:59, color:'#F4D03F', piece:'king',         starThreshold:4},
  {id:'officers-game',name:'משחק הקצינים', file:'../משחק הקצינים/officers-intro.html',                x:10, y:45, color:'#9B59B6', piece:'officers-game',starThreshold:0},
  {id:'check',        name:'שח!',           file:'../שח למלך/קבצים/check-intro.html',                  x:25, y:18, color:'#E74C3C', piece:'check',        starThreshold:4},
  {id:'defense',      name:'הגנה על המלך', file:'../התגוננות משח/קבצים/check-defense-intro.html',     x:60, y:35, color:'#52B788', piece:'shield',       starThreshold:3},
  {id:'checkmate',    name:'שחמט!',         file:'../מט/קבצים/checkmate-intro.html',                   x:90, y:17, color:'#F4D03F', piece:'trophy',       starThreshold:6},
  {id:'tofeset',      name:'מאסטר מפלצת שחמט', file:'../משחקי שחמט/קבצים/tofeset-opening.html', x:50, y:10, color:'#F4D03F', piece:'certificate', starThreshold:0},
];

const STICKER = {
  rook:'rook.png', bishop:'bishop.png', queen:'queen.png', pawn:'pawn.png',
  knight:'knight.png', king:'king.png', check:'check.png',
  defense:'defence.png', checkmate:'checkmate.png',
  'officers-game':'officer.png',

function makePieceSVG(id){ return PIECE_SVG[id] || ''; }

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let completed = [];
function loadState(){ try{ completed=JSON.parse(localStorage.getItem('chess_completed')||'[]'); }catch(e){ completed=[]; } }
function saveState(){ localStorage.setItem('chess_completed',JSON.stringify(completed)); }
function moduleState(i){
  if(completed.includes(MODULES[i].id)) return 'done';
  if(i===0 || completed.includes(MODULES[i-1].id)) return 'unlocked';
  return 'locked';
}

function getModuleStars(moduleId){
  // ── officers-game: v3 (אין "אחרון" נפרד) ──
  if(moduleId==='officers-game'){
    try{
      const d=JSON.parse(localStorage.getItem('chess_officers')||'{}');
      const w=d.bestWin||0;
      return {best:w, last:w};
    }catch(e){ return {best:0,last:0}; }
  }
  // ── v2.1: {stageN:{done,perfect,lastPerfect,bestPerfect}} ──
  try{
    const raw=localStorage.getItem('chess_'+moduleId);
    if(!raw) return {best:0,last:0};
    const d=JSON.parse(raw);
    const stages=Object.values(d);
    if(!stages.length) return {best:0,last:0};
    const total=stages.length;
    const done=stages.filter(s=>s.done).length;
    if(done<total) return {best:0,last:0};
    const m=MODULES.find(x=>x.id===moduleId);
    const threshold=m?.starThreshold??total-1;
    // שיא ↔ אחרון (נפילה ל-perfect לנתון v2 ישן)
    const bestP=stages.filter(s=>(s.bestPerfect ?? s.perfect)).length;
    const lastP=stages.filter(s=>(s.lastPerfect ?? s.perfect)).length;
    const toStars=p=>p>=threshold?3:2;
    return {best:toStars(bestP), last:toStars(lastP)};
  }catch(e){ return {best:0,last:0}; }
}

// ═══════════════════════════════════════════
//  TWINKLING STARS
// ═══════════════════════════════════════════
function drawStars(){
  const wrap=document.getElementById('stars');
  wrap.innerHTML='';
  for(let i=0;i<55;i++){
    const s=document.createElement('div'); s.className='star';
    const r=(.35+Math.random()*1.15).toFixed(2);
    s.style.cssText=
      `left:${(Math.random()*100).toFixed(1)}%;`+
      `top:${(Math.random()*100).toFixed(1)}%;`+
      `width:${r*2}px;height:${r*2}px;`+
      `--tmax:${(.45+Math.random()*.55).toFixed(2)};`+
      `--td:${(2+Math.random()*3).toFixed(1)}s;`+
      `--tdelay:-${(Math.random()*4).toFixed(1)}s`;
    wrap.appendChild(s);
  }
}

// ═══════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════
let resizeTimer;
function buildMap(){
  const map=document.getElementById('map');
  const W=map.offsetWidth, H=map.offsetHeight;
  map.innerHTML='';

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id='pathSvg'; svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  map.appendChild(svg);

  [{x:.15,y:.75,c:'#7EC8E3'},{x:.5,y:.68,c:'#C39BD3'},{x:.65,y:.4,c:'#52B788'},{x:.5,y:.18,c:'#E74C3C'},{x:.82,y:.22,c:'#9B59B6'}]
  .forEach(g=>{
    const d=document.createElement('div');
    d.style.cssText=`position:absolute;left:${g.x*100}%;top:${g.y*100}%;width:200px;height:200px;
      border-radius:50%;pointer-events:none;
      background:radial-gradient(circle,${g.c}18 0%,transparent 70%);
      transform:translate(-50%,-50%)`;
    map.appendChild(d);
  });

  const pts=MODULES.map(m=>({x:W*m.x/100, y:H*m.y/100}));

  for(let i=0;i<MODULES.length-1;i++){
    const s=moduleState(i);
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',pts[i].x);   ln.setAttribute('y1',pts[i].y);
    ln.setAttribute('x2',pts[i+1].x); ln.setAttribute('y2',pts[i+1].y);
    if(s==='done' && moduleState(i+1)==='done'){
      ln.setAttribute('stroke','#F4D03F'); ln.setAttribute('stroke-width','3'); ln.setAttribute('opacity','.65');
    } else if(s==='unlocked'){
      ln.setAttribute('stroke','#aabbcc'); ln.setAttribute('stroke-width','2.5');
      ln.setAttribute('stroke-dasharray','8 5'); ln.setAttribute('opacity','.75');
    } else {
      ln.setAttribute('stroke','#4a6a8a'); ln.setAttribute('stroke-width','2.5');
      ln.setAttribute('stroke-dasharray','8 5'); ln.setAttribute('opacity','.6');
    }
    svg.appendChild(ln);
  }

  MODULES.forEach((m,i)=>{
    const st=moduleState(i);
    const el=document.createElement('div');
    el.className=`station st-${st}`;
    el.style.left=m.x+'%'; el.style.top=m.y+'%';

    const circ=document.createElement('div');
    circ.className='station-circle';
    circ.style.borderColor=st==='locked'?'#2a3a4a':m.color;
    circ.style.color=m.color;
    if(st!=='locked') circ.style.boxShadow=`0 0 14px ${m.color}55`;
    if(m.piece==='queen') circ.classList.add('piece-medium');
    else if(m.piece!=='pawn') circ.classList.add('piece-large');
    circ.innerHTML=makePieceSVG(m.piece);
    if(m.id==='tofeset' && st!=='locked') circ.classList.add('legendary');

    if(st==='done'){
      const ms=getModuleStars(m.id);                 // {best, last}
      const toStr=n=>n===3?'⭐⭐⭐':n===2?'⭐⭐':'⭐';
      const b=document.createElement('span');
      b.className='badge';
      b.innerHTML=toStr(ms.best)
        +(ms.last<ms.best?`<span class="last-tag">אחרון ${toStr(ms.last)}</span>`:'');
      if(m.piece==='check'){
        // תחנת שח: האייקון מצייר כלים בולטים מחוץ לעיגול (מלכה למעלה, צריח/רץ/פרש/רגלי באלכסונים).
        // הצד החופשי היחיד הוא הרצועה האופקית — לכן הכוכבים יושבים מימין כגלולה אטומה וקריאה, מחוץ לאייקון.
        b.style.cssText='position:absolute;top:50%;left:100%;bottom:auto;right:auto;transform:translateY(-50%);margin-left:6px;z-index:5;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:.7rem;white-space:nowrap;background:rgba(5,12,22,.92);border:1.5px solid '+m.color+';border-radius:50px;padding:3px 8px;box-shadow:0 0 8px rgba(0,0,0,.5)';
      }else{
        b.style.cssText='position:absolute;bottom:100%;top:auto;left:50%;transform:translateX(-50%);margin-bottom:4px;font-size:.7rem;white-space:nowrap;right:auto;display:flex;flex-direction:column;align-items:center;gap:1px';
      }
      circ.appendChild(b);
    } else if(st==='locked'){
      const b=document.createElement('span'); b.className='badge'; b.textContent='🔒'; circ.appendChild(b);
    }

    const lbl=document.createElement('div');
    lbl.className='station-label'; lbl.textContent=m.name;
    el.appendChild(circ); el.appendChild(lbl);
    el.addEventListener('click',()=>handleClick(i,st,m));
    map.appendChild(el);
  });
}

let isNavigating=false;
function handleClick(i,st,m){
  if(isNavigating) return;
  if(st==='locked'){ shakeStation(i); showToast('סיימו קודם את השלב הקודם! 🔒'); return; }
  isNavigating=true;
  window.location.href=m.file;
}

function shakeStation(i){
  const el=document.querySelectorAll('.station')[i]; if(!el) return;
  el.classList.add('shaking');
  el.addEventListener('animationend',()=>el.classList.remove('shaking'),{once:true});
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2600);
}

// ═══════════════════════════════════════════
//  ALBUM
// ═══════════════════════════════════════════
function updateCount(){ document.getElementById('albumCount').textContent=completed.length; }

function openAlbum(newId){
  const grid=document.getElementById('albumGrid'); grid.innerHTML='';
  MODULES.forEach(m=>{
    const earned=completed.includes(m.id);
    const slot=document.createElement('div'); slot.className='a-slot '+(earned?'earned':'locked');
    if(m.id===newId && earned) slot.classList.add('sticker-new');
    const img=document.createElement('img'); img.src=STICKER[m.id]; img.alt=m.name;
    img.onerror=()=>{img.style.display='none';};
    const nm=document.createElement('div'); nm.className='a-slot-name'; nm.textContent=earned?m.name:'';
    slot.appendChild(img); slot.appendChild(nm); grid.appendChild(slot);
  });
  document.getElementById('albumOv').classList.add('open');
  if(newId){ setTimeout(()=>{ const el=document.querySelector('.sticker-new'); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); },120); }
}

// ═══════════════════════════════════════════
//  WIN CELEBRATION
// ═══════════════════════════════════════════
function checkReturn(){
  const justDone=localStorage.getItem('chess_just_completed'); if(!justDone) return;
  localStorage.removeItem('chess_just_completed');
  const idx=MODULES.findIndex(x=>x.id===justDone);
  if(idx===-1) return;
  if(!completed.includes(justDone)){ completed.push(justDone); saveState(); }
  openAlbum(justDone);
}

function showWin(m){
  document.getElementById('winSub').textContent=`הוכתרת ע"י המורה ברוך כמפלצת שחמט של ${m.name}!!!`;
  const img=document.getElementById('winImg'); img.src=STICKER[m.id]; img.style.display='block';
  document.getElementById('winOv').classList.add('open');
  spawnFireworks();
}

function spawnFireworks(){
  const ov=document.getElementById('winOv');
  for(let i=0;i<36;i++){
    const p=document.createElement('div'); p.className='fw-p';
    const a=(i/36)*Math.PI*2, d=70+Math.random()*150;
    p.style.setProperty('--fx',Math.cos(a)*d+'px');
    p.style.setProperty('--fy',Math.sin(a)*d+'px');
    p.style.setProperty('--dur',(.65+Math.random()*.55)+'s');
    p.style.setProperty('--del',(Math.random()*.3)+'s');
    p.style.cssText+=`left:50%;top:40%;background:${FW_COLORS[i%FW_COLORS.length]}`;
    ov.appendChild(p);
    p.addEventListener('animationend',()=>p.remove(),{once:true});
  }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function initSplash(){
  if(sessionStorage.getItem('chess_splash_seen')||localStorage.getItem('chess_just_completed')){
    document.getElementById('splashOv').style.display='none';
    return;
  }
  const btn=document.getElementById('splashBtn');
  btn.addEventListener('click',()=>{
    sessionStorage.setItem('chess_splash_seen','1');
    const ov=document.getElementById('splashOv');
    ov.classList.add('hiding');
    setTimeout(()=>{ ov.style.display='none'; },820);
  });
}

function init(){
  loadState(); drawStars(); initSplash(); checkReturn(); buildMap(); updateCount();
  document.getElementById('albumBtn').addEventListener('click',openAlbum);
  document.getElementById('albumCloseBtn').addEventListener('click',()=>
    document.getElementById('albumOv').classList.remove('open'));
  document.getElementById('winContinueBtn').addEventListener('click',()=>{
    document.getElementById('winOv').classList.remove('open');
    document.querySelectorAll('.fw-p').forEach(p=>p.remove());
    buildMap(); updateCount();
  });
  let resetClicks=0,resetTimer;
  document.getElementById('resetBtn').addEventListener('click',()=>{
    resetClicks++;
    if(resetClicks===1){
      document.getElementById('resetBtn').textContent='לחץ שוב לאישור';
      resetTimer=setTimeout(()=>{resetClicks=0;document.getElementById('resetBtn').textContent='איפוס';},2500);
    } else {
      clearTimeout(resetTimer); resetClicks=0;
      document.getElementById('resetBtn').textContent='איפוס';
      localStorage.removeItem('chess_completed');
      localStorage.removeItem('chess_just_completed');
      MODULES.forEach(m=>localStorage.removeItem('chess_'+m.id));
      completed=[];
      buildMap(); updateCount();
    }
  });
  window.addEventListener('resize',()=>{
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{drawStars();buildMap();},300);
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
