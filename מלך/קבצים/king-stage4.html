<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0C1E30">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מבחן מסכם — המלך 👑</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F4D03F;--gold-dark:#C9A227;--gold-deep:#9A7B1A;
  --blue:#7EC8E3;--green:#52B788;--red:#E74C3C;--orange:#FF6B35;
  --purple:#C39BD3;
  --bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;
  --cell:min(54px,max(40px,calc((100vw - 60px) / 8)));
  --cell-light:#C9E4F5;--cell-dark:#4A7FA5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;font-family:'Nunito',sans-serif;font-weight:700;
  color:white;user-select:none;overflow-x:hidden;overscroll-behavior:none;
  display:flex;flex-direction:column;align-items:center;padding:28px 10px max(28px,env(safe-area-inset-bottom));
}
.star-dot{position:fixed;border-radius:50%;background:white;pointer-events:none;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8);}to{opacity:.85;transform:scale(1.2);}}
/* HEADER */
/* 8 תאים × --cell  +  גבול לוח (6px) + rank-labels (18px) + gap (5px) = 29px קבוע */
.header{z-index:1;text-align:center;margin-bottom:8px;position:relative;
  width:calc(var(--cell)*8 + 29px);max-width:100%;}
.title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:var(--gold);
  text-shadow:0 0 22px rgba(244,208,63,.8),0 2px 6px rgba(0,0,0,.5);}
.subtitle{font-family:'Fredoka One',cursive;font-size:1.13rem;
  color:var(--orange);margin-top:2px;text-align:center;}
/* BOARD */
.coord-wrap{display:flex;align-items:flex-start;gap:5px;direction:ltr;z-index:1;}
.rank-labels{display:flex;flex-direction:column;}
.rank-labels span{height:var(--cell);display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:var(--gold);opacity:.65;width:18px;}
.file-labels{display:flex;margin-top:3px;}
.file-labels span{width:var(--cell);text-align:center;font-size:.7rem;color:var(--gold);opacity:.65;}
.board-outer{position:relative;}
.board{
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);
}
.sq{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;transition:filter .12s;touch-action:manipulation;}
.sq.l{background:var(--cell-light);}.sq.d{background:var(--cell-dark);}
.sq:hover{filter:brightness(1.15);}
/* PIECE */
.fp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:10;}
.fp img{display:block;margin:auto;pointer-events:none;}
.fp.king-anim{animation:kingBump .3s cubic-bezier(.175,.885,.32,1.5);}
@keyframes kingBump{0%{transform:scale(.75);}65%{transform:scale(1.12);}100%{transform:scale(1);}}
.fp.eat-anim{animation:eatPop .38s ease-out forwards;}
@keyframes eatPop{0%{opacity:1;transform:scale(1);}40%{transform:scale(1.55);opacity:.75;}100%{opacity:0;transform:scale(.1) rotate(20deg);}}
/* LASER SVG */
#laser-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:30;overflow:visible;}
.l-rook  {stroke:#E74C3C;stroke-width:3.5;stroke-linecap:round;fill:none;
  stroke-dasharray:8 4;animation:lFlow .35s linear infinite;
  filter:drop-shadow(0 0 5px rgba(231,76,60,.9));}
.l-bishop{stroke:#52B788;stroke-width:3.5;stroke-linecap:round;fill:none;
  stroke-dasharray:8 4;animation:lFlow .35s linear infinite;
  filter:drop-shadow(0 0 5px rgba(82,183,136,.9));}
.l-knight{stroke:#FF6B35;stroke-width:3.5;stroke-linecap:round;fill:none;
  stroke-dasharray:8 4;animation:lFlow .35s linear infinite;
  filter:drop-shadow(0 0 5px rgba(255,107,53,.9));}
.l-pawn  {stroke:#E74C3C;stroke-width:3;stroke-linecap:round;fill:none;
  stroke-dasharray:6 3;animation:lFlow .35s linear infinite;
  filter:drop-shadow(0 0 4px rgba(231,76,60,.8));}
@keyframes lFlow{from{stroke-dashoffset:24;}to{stroke-dashoffset:0;}}
.ld-rook  {fill:#E74C3C;animation:ldPulse .5s ease-in-out infinite alternate;filter:drop-shadow(0 0 7px rgba(231,76,60,1));}
.ld-bishop{fill:#52B788;animation:ldPulse .5s ease-in-out infinite alternate;filter:drop-shadow(0 0 7px rgba(82,183,136,1));}
.ld-knight{fill:#FF6B35;animation:ldPulse .5s ease-in-out infinite alternate;filter:drop-shadow(0 0 7px rgba(255,107,53,1));}
.ld-pawn  {fill:#E74C3C;animation:ldPulse .5s ease-in-out infinite alternate;filter:drop-shadow(0 0 5px rgba(231,76,60,.8));}
@keyframes ldPulse{from{r:5;opacity:.8;}to{r:7.5;opacity:1;}}
/* X on square */
.sq-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:40;background:rgba(231,76,60,.25);
  animation:xPop .32s cubic-bezier(.175,.885,.32,1.5);}
@keyframes xPop{0%{opacity:0;transform:scale(.25) rotate(-25deg);}65%{opacity:1;transform:scale(1.15) rotate(4deg);}100%{transform:scale(1) rotate(0);}}
.sq-x .ix{font-family:'Fredoka One',cursive;font-size:calc(var(--cell)*0.7);
  color:#E74C3C;line-height:1;text-shadow:0 0 12px rgba(231,76,60,1),0 0 24px rgba(231,76,60,.7);}
/* HINT BOTTOM BUTTON */
.hint-bottom-btn{
  font-family:'Fredoka One',cursive;font-size:1rem;
  padding:9px 30px;border-radius:50px;
  border:2px solid var(--blue);
  background:rgba(126,200,227,.1);color:var(--blue);
  cursor:pointer;transition:all .22s;z-index:1;margin-top:10px;
  box-shadow:0 0 14px rgba(126,200,227,.2);
  touch-action:manipulation;
}
.hint-bottom-btn:hover{background:rgba(126,200,227,.25);box-shadow:0 0 22px rgba(126,200,227,.5);transform:scale(1.04);}
.hint-bottom-btn:active{transform:scale(.97);}
.hint-bottom-btn:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none;}
/* target square highlight when hint 1 is active */
.sq.h1-target{animation:h1Pulse .75s ease-in-out infinite alternate;}
@keyframes h1Pulse{from{filter:brightness(1);}to{filter:brightness(1.55);box-shadow:inset 0 0 0 3px var(--gold);}}
/* WIN SCREENS */
#win-screen1,#win-screen2{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .5s;flex-direction:column;gap:18px;
}
#win-screen1.show,#win-screen2.show{opacity:1;pointer-events:all;}
.win-card{
  background:linear-gradient(145deg,#1a3a0a,#0a2010);
  border:3px solid var(--gold);border-radius:22px;
  padding:32px 38px;text-align:center;max-width:340px;width:92%;
  animation:cardPop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;
}
@keyframes cardPop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.win-crown-emoji{font-size:4rem;display:block;margin-bottom:8px;}
.win-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);margin-bottom:6px;}
.win-monster-name{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#fff;margin-bottom:18px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.card-btn{font-family:'Fredoka One',cursive;font-size:1rem;
  padding:10px 22px;border-radius:50px;border:none;cursor:pointer;
  color:white;transition:transform .15s;touch-action:manipulation;}
.card-btn:hover{transform:scale(1.07);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark),var(--gold-deep));
  box-shadow:0 0 18px rgba(244,208,63,.4);}
.btn-blue{background:linear-gradient(135deg,#1a6b8a,#104f66);}
/* TRADING CARD */
.trading-card{
  background:linear-gradient(160deg,#0d1b2a,#1a2e45);
  border:3px solid var(--gold);border-radius:18px;
  padding:16px;text-align:center;width:min(420px,92vw);
  box-shadow:0 0 32px rgba(212,175,55,.35);
  animation:cardPop .5s cubic-bezier(.175,.885,.32,1.5);direction:rtl;
}
.card-header{
  font-family:'Fredoka One',cursive;font-size:1.3rem;
  color:var(--gold);margin-bottom:10px;letter-spacing:1px;
}
.card-monster-img{width:100%;border-radius:10px;display:block;
  filter:drop-shadow(0 0 14px rgba(82,183,136,.6));image-rendering:high-quality;}
.btn-album{
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  padding:13px 32px;border-radius:50px;border:none;cursor:pointer;
  color:#0a1a0a;background:linear-gradient(135deg,#f4d03f,#d4ac0d,#b8860b);
  box-shadow:0 0 22px rgba(244,208,63,.5);transition:transform .15s;
  animation:cardPop .6s .15s cubic-bezier(.175,.885,.32,1.5) both;
}
.btn-album:hover{transform:scale(1.08);}
.win-content{display:flex;flex-direction:column;align-items:center;gap:14px;width:92%;max-width:340px;}
.card-img-wrap{width:100%;border-radius:10px;overflow:hidden;}
@keyframes pill-blink{0%,100%{background:rgba(244,208,63,.12);box-shadow:0 0 4px rgba(244,208,63,.3);transform:scale(1);}50%{background:rgba(244,208,63,.55);box-shadow:0 0 18px rgba(244,208,63,1),0 0 35px rgba(244,208,63,.5);transform:scale(1.06);}}
.btn-replay-final{font-family:'Fredoka One',cursive;font-size:1rem;
  padding:11px 28px;border-radius:50px;border:none;cursor:pointer;
  color:white;background:linear-gradient(135deg,#1a8a3a,#0f5a24);
  box-shadow:0 0 16px rgba(26,138,58,.4);transition:transform .15s;}
.btn-replay-final:hover{transform:scale(1.07);}
.btn-mute{position:absolute;top:0;left:0;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;}
.btn-mute:hover{background:rgba(255,255,255,.18);}
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="header">
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
  <div class="title">👑 מבחן מסכם</div>
  <div class="subtitle">אכלו את כל הכלים השחורים! ⚔️</div>
</div>

<div class="coord-wrap">
  <div class="rank-labels" id="ranks"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
      <svg id="laser-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="file-labels" id="files"></div>
  </div>
</div>

<button class="hint-bottom-btn" id="hint1-btn" onclick="triggerHint1()">💡 רמז</button>


<!-- WIN SCREEN 1 - הכתרה -->
<div id="win-screen1">
  <div class="win-card">
    <span class="win-crown-emoji">👑</span>
    <div class="win-title">הוכתרתם ע"י המורה ברוך</div>
    <div class="win-monster-name">כמפלצת המלך!</div>
    <div id="final-score-display" style="margin:14px 0;"></div>
    <div class="btn-row">
      <button class="card-btn btn-gold" onclick="showWinScreen2()">הצג את הקלף ←</button>
    </div>
  </div>
</div>

<!-- WIN SCREEN 2 - קלף מפלצת -->
<div id="win-screen2">
  <div class="win-content">
    <div class="trading-card">
      <div class="card-header">⚔️ מפלצת המלך ⚔️</div>
      <div class="card-img-wrap">
        <img class="card-monster-img" id="monster-img" alt="מפלצת המלך"/>
      </div>
    </div>
    <div id="card-stars" style="font-family:'Fredoka One',cursive;font-size:2rem;letter-spacing:6px;text-align:center;margin:4px 0;"></div>
    <button class="btn-album" onclick="goToAlbum()">📌 הצמד לאלבום!</button>
    <button class="btn-replay-final" onclick="replayFromCard()">שחקו שוב 🔁</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   MONSTER CARD IMAGE  (base64 — מופרד מה-HTML לתחזוקה נוחה)
═══════════════════════════════════ */
var MONSTER_IMG_SRC='../../מסך הפתיחה/king.png';
document.addEventListener('DOMContentLoaded',function(){{
  var img=document.getElementById('monster-img');
  if(img)img.src=MONSTER_IMG_SRC;
}});

/* ═══════════════════════════════════
   SVG PIECES
═══════════════════════════════════ */
var B={
  '♜':'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4"><path d="M9,39h27v-3H9z" style="stroke-linecap:butt"/><path d="M12.5,32l1.5-2.5h17l1.5,2.5z" style="stroke-linecap:butt"/><path d="M12,36v-4h21v4z" style="stroke-linecap:butt"/><path d="M14,29.5v-13h17v13z" style="stroke-linecap:butt;stroke-linejoin:miter"/><path d="M14,16.5l-3-2.5h23l-3,2.5z" style="stroke-linecap:butt"/><path d="M11,14V9h4v2h5V9h5v2h5V9h4v5z" style="stroke-linecap:butt"/><path d="M12,35.5h21" style="fill:none;stroke:#fff;stroke-width:1"/><path d="M13,31.5h19" style="fill:none;stroke:#fff;stroke-width:1"/></g></svg>',
  '♝':'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" fill-rule="evenodd" stroke-linecap="round" stroke-linejoin="round"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z" fill="#000" stroke="#000" stroke-width="1.5" stroke-linecap="butt"/><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#fff" stroke-width="1.5" stroke-linejoin="miter"/></g></svg>',
  '♞':'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18" style="stroke:#fff"/><path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/><path d="M9.5,25.5A.5.5,0,1,1,8.5,25.5.5.5,0,1,1,9.5,25.5z" style="fill:#fff;stroke:#fff"/><path d="M15,15.5A.5,1.5,0,1,1,14,15.5.5,1.5,0,1,1,15,15.5z" style="fill:#fff;stroke:#fff" transform="rotate(30,14.5,15.5)"/></g></svg>',
  '♟':'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#000" stroke="none"/></svg>'
};
var WK='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6M20,8h5" style="fill:none;stroke:#000;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#fff;stroke:#000;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37" style="fill:#fff"/><path d="M11.5,30c5.5-3,15.5-3,21,0M11.5,33.5c5.5-3,15.5-3,21,0M11.5,37c5.5-3,15.5-3,21,0" style="fill:none"/></g></svg>';

/* ═══════════════════════════════════
   INITIAL STATE
═══════════════════════════════════ */
/* SZ נגזר מ-CSS --cell כדי שלא יהיו שתי הגדרות נפרדות */
function getSZ(){
  var cell=document.querySelector('#board .sq');
  if(cell){var w=cell.getBoundingClientRect().width;if(w>0)return w;}
  return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'),10)||54;
}
var SZ=getSZ();
var TOTAL=10;
var INIT=[
  {id:'kA8',sym:'♞',type:'knight',row:0,col:0},
  {id:'rD4',sym:'♜',type:'rook',  row:4,col:3},
  {id:'bE4',sym:'♝',type:'bishop',row:4,col:4},
  {id:'kF6',sym:'♞',type:'knight',row:2,col:5},
  {id:'pD7',sym:'♟',type:'pawn',  row:1,col:3},
  {id:'pE7',sym:'♟',type:'pawn',  row:1,col:4},
  {id:'pH5',sym:'♟',type:'pawn',  row:3,col:7},
  {id:'pG4',sym:'♟',type:'pawn',  row:4,col:6},
  {id:'pF3',sym:'♟',type:'pawn',  row:5,col:5},
  {id:'pE2',sym:'♟',type:'pawn',  row:6,col:4}
];
function mkPieces(){return INIT.map(function(p){return{id:p.id,sym:p.sym,type:p.type,row:p.row,col:p.col,alive:true};});}

var G={king:{row:7,col:4},pieces:mkPieces(),moves:0,eaten:0,locked:false};

/* ═══════════════════════════════════
   CHESS STATE
═══════════════════════════════════ */
var ChessState={
  addCompleted:function(id){
    try{
      var list=JSON.parse(localStorage.getItem('chess_completed')||'[]');
      if(list.indexOf(id)===-1)list.push(id);
      localStorage.setItem('chess_completed',JSON.stringify(list));
      localStorage.setItem('chess_just_completed',id);
    }catch(e){}
  },
  addCard:function(id){
    try{
      var cards=JSON.parse(localStorage.getItem('chess_cards')||'[]');
      if(cards.indexOf(id)===-1)cards.push(id);
      localStorage.setItem('chess_cards',JSON.stringify(cards));
    }catch(e){}
  }
};

var TOTAL_STAGES=4;
var STAGE_KEYS=['stage1','stage2','stage3','stage4'];
var PERFECT_THRESHOLD=4; // כל 4 השלבים מושלמים = 3 כוכבים
function getModuleData(){try{return JSON.parse(localStorage.getItem('chess_king')||'{}')||{};}catch(e){return {};}}
function getStageData(n){return getModuleData()['stage'+n]||null;}
function getModuleStars(){
  var done=0,perfect=0;
  for(var n=1;n<=TOTAL_STAGES;n++){
    var d=getStageData(n);
    if(d&&d.done)done++;
    if(d&&(d.bestPerfect||d.perfect))perfect++;   // שיא (best-of) עם נפילה אחורה לנתונים ישנים
  }
  if(done<TOTAL_STAGES)return 0;
  if(perfect>=PERFECT_THRESHOLD)return 3;
  return 2;
}
function buildStageRow(modulePrefix){
  var pills=[];
  for(var n=1;n<=TOTAL_STAGES;n++){
    var d=getStageData(n);
    var isPerfect=!!(d&&(d.bestPerfect||d.perfect));
    if(isPerfect){

/* ═══════════════════════════════════
   THREAT ENGINE
═══════════════════════════════════ */
function onB(r,c){return r>=0&&r<8&&c>=0&&c<8;}

function blocked(r,c,pieces,skipId){
  return pieces.some(function(p){
    return p.alive&&p.id!==skipId&&p.row===r&&p.col===c;
  });
}

function rookSees(p,tr,tc,pieces,skipId){
  if(p.row!==tr&&p.col!==tc)return false;
  var dr=p.row===tr?0:(tr>p.row?1:-1);
  var dc=p.col===tc?0:(tc>p.col?1:-1);
  var r=p.row+dr,c=p.col+dc;
  while(r!==tr||c!==tc){
    if(blocked(r,c,pieces,skipId))return false;
    r+=dr;c+=dc;
  }
  return true;
}

function bishopSees(p,tr,tc,pieces,skipId){
  if(Math.abs(tr-p.row)!==Math.abs(tc-p.col))return false;
  var dr=tr>p.row?1:-1,dc=tc>p.col?1:-1;
  var r=p.row+dr,c=p.col+dc;
  while(r!==tr||c!==tc){
    if(blocked(r,c,pieces,skipId))return false;
    r+=dr;c+=dc;
  }
  return true;
}

function knightSees(p,tr,tc){
  var dr=Math.abs(tr-p.row),dc=Math.abs(tc-p.col);
  return(dr===2&&dc===1)||(dr===1&&dc===2);
}

function pawnSees(p,tr,tc){
  return tr===p.row+1&&Math.abs(tc-p.col)===1;
}

function getThreats(tr,tc,pieces,skipId){
  return pieces.filter(function(p){
    if(!p.alive||p.id===skipId)return false;
    switch(p.type){
      case'rook':   return rookSees(p,tr,tc,pieces,skipId);
      case'bishop': return bishopSees(p,tr,tc,pieces,skipId);
      case'knight': return knightSees(p,tr,tc);
      case'pawn':   return pawnSees(p,tr,tc);
    }
    return false;
  });
}

function sqCtr(r,c){
  var sq=document.getElementById('sq-'+r+'-'+c),outer=document.getElementById('board-outer');
  if(sq&&outer){var sr=sq.getBoundingClientRect(),or=outer.getBoundingClientRect();
    return{x:sr.left-or.left+sr.width/2,y:sr.top-or.top+sr.height/2};}
  SZ=getSZ();return{x:c*SZ+SZ/2+3,y:r*SZ+SZ/2+3};
}

function showLasers(threats,tr,tc){
  var svg=document.getElementById('laser-svg');
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  var to=sqCtr(tr,tc);
  threats.forEach(function(p){
    var from=sqCtr(p.row,p.col);
    var cls='l-'+p.type, dlsCls='ld-'+p.type;
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',from.x);line.setAttribute('y1',from.y);
    line.setAttribute('x2',to.x);line.setAttribute('y2',to.y);
    line.setAttribute('class',cls);
    svg.appendChild(line);
    var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',from.x);dot.setAttribute('cy',from.y);dot.setAttribute('r','6');
    dot.setAttribute('class',dlsCls);
    svg.appendChild(dot);
  });
}

function onSqClick(r,c){
  if(G.locked)return;
  // must be adjacent to king
  if(Math.abs(r-G.king.row)>1||Math.abs(c-G.king.col)>1)return;
  if(r===G.king.row&&c===G.king.col)return;

  var cap=G.pieces.find(function(p){return p.alive&&p.row===r&&p.col===c;})||null;
  var skipId=cap?cap.id:null;
  var threats=getThreats(r,c,G.pieces,skipId);

  if(threats.length>0){
    showIllegal(r,c,threats);
    return;
  }

  // legal — execute
  G.moves++;

  if(cap){
    // animate capture
    G.locked=true;
    var capFp=document.getElementById('fp-'+cap.id);
    if(capFp)capFp.classList.add('eat-anim');
    playCapture();
    showExplosion(r,c);
    setTimeout(function(){
      cap.alive=false;
      G.eaten++;
      G.king={row:r,col:c};
      // auto-dismiss hint 1 when E7 eaten
      if(cap.id==='pE7')clearHint1();
      G.locked=false;
      render();
      animKing();
      if(G.eaten===TOTAL)setTimeout(showWin,420);
    },360);
  } else {
    G.king={row:r,col:c};
    render();
    animKing();
    playMove();
  }
}

  kfp.classList.remove('king-anim');
  void kfp.offsetWidth;
  kfp.classList.add('king-anim');
}

var muted=false;

var _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed')
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
function playMove(){
  if(muted)return;
  try{var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.setValueAtTime(440,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(550,ctx.currentTime+.08);
  g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
  o.start();o.stop(ctx.currentTime+.18);}catch(e){}
}
function playEat(){
  if(muted)return;
  try{var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.setValueAtTime(660,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.14);
  g.gain.setValueAtTime(.28,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.28);
  o.start();o.stop(ctx.currentTime+.28);}catch(e){}
}
function playFail(){
  if(muted)return;
  try{var ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(240,ctx.currentTime);
  o.frequency.exponentialRampToValueAtTime(110,ctx.currentTime+.32);
  g.gain.setValueAtTime(.38,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.32);
  o.start();o.stop(ctx.currentTime+.32);}catch(e){}
}
function playWin(){
  if(muted)return;
  try{var ctx=getAudioCtx();
  [523,659,784,1047].forEach(function(f,i){
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=f;
    g.gain.setValueAtTime(.22,ctx.currentTime+i*.16);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.16+.45);
    o.start(ctx.currentTime+i*.16);o.stop(ctx.currentTime+i*.16+.45);
  });}catch(e){}
}

/* ═══════════════════════════════════
   EXPLOSION
═══════════════════════════════════ */
function showExplosion(row,col){
  var boardOuter=document.querySelector('.board-outer');
  SZ=getSZ();
  var W=SZ*8,H=SZ*8;
  var ctr=sqCtr(row,col),cx=ctr.x,cy=ctr.y;
  var canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  canvas.style.cssText='position:absolute;left:0;top:0;width:'+W+'px;height:'+H+'px;z-index:30;pointer-events:none;';
  boardOuter.appendChild(canvas);
  var c=canvas.getContext('2d');
  var COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  var parts=[];
  for(var i=0;i<45;i++){
    var a=(i/45)*Math.PI*2+Math.random()*0.4;
    var spd=3.5+Math.random()*9;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1,decay:0.018+Math.random()*0.022,gravity:0.18+Math.random()*0.12});
  }
  var frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    if(frame<8){
      var t=frame/7,r=SZ*0.9*t;
      var g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,'rgba(255,255,255,'+(1-t)+')');
      g.addColorStop(0.35,'rgba(255,230,80,'+((1-t)*0.9)+')');
      g.addColorStop(0.7,'rgba(255,100,0,'+((1-t)*0.5)+')');
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=1&&frame<22){
      var t=(frame-1)/21,r=SZ*0.75*t,a=1-t;
      var g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,'rgba(255,255,200,'+a+')');
      g.addColorStop(0.2,'rgba(255,180,0,'+(a*0.95)+')');
      g.addColorStop(0.55,'rgba(210,50,0,'+(a*0.7)+')');
      g.addColorStop(0.85,'rgba(100,15,0,'+(a*0.4)+')');
      g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=3&&frame<14){
      var t=(frame-3)/11;
      c.beginPath();c.arc(cx,cy,SZ*0.5*t+SZ*0.15,0,Math.PI*2);
      c.strokeStyle='rgba(255,180,50,'+(0.6*(1-t))+')';c.lineWidth=3*(1-t);c.stroke();
    }
    if(frame>10){
      var age=frame-10;
      for(var i=0;i<4;i++){
        var sa=Math.max(0,0.18-age*0.004);if(sa<=0)break;
        c.beginPath();
        c.arc(cx+Math.sin(i*1.7+age*0.04)*age*0.5,cy-age*0.35+i*4,age*2.8+i*9,0,Math.PI*2);
        c.fillStyle='rgba(55,55,55,'+(sa/(i*0.4+1))+')';c.fill();
      }
    }
    c.save();
    parts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0)return;
      c.globalAlpha=p.alpha;
      c.beginPath();c.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color;c.fill();
    });
    c.restore();
    frame++;
    if(frame<55)requestAnimationFrame(draw);else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function playCapture(){
  if(muted)return;
  try{
    var ctx=getAudioCtx();
    var n=ctx.currentTime;
    var thud=ctx.createOscillator(),thudG=ctx.createGain();
    thud.connect(thudG);thudG.connect(ctx.destination);
    thud.type='sine';thud.frequency.setValueAtTime(90,n);
    thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n);thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n);thud.stop(n+.6);
    var punch=ctx.createOscillator(),punchG=ctx.createGain();
    punch.connect(punchG);punchG.connect(ctx.destination);
    punch.type='sine';punch.frequency.setValueAtTime(200,n);
    punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n);punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n);punch.stop(n+.22);
    var bufSz=Math.floor(ctx.sampleRate*.35);
    var nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
    var nd=nBuf.getChannelData(0);
    for(var i=0;i<bufSz;i++)nd[i]=Math.random()*2-1;
    var nSrc=ctx.createBufferSource();nSrc.buffer=nBuf;
    var nFilt=ctx.createBiquadFilter();
    nFilt.type='bandpass';nFilt.frequency.value=500;nFilt.Q.value=.5;
    var nGain=ctx.createGain();
    nGain.gain.setValueAtTime(.55,n);nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt);nFilt.connect(nGain);nGain.connect(ctx.destination);
    nSrc.start(n);nSrc.stop(n+.35);
    var crack=ctx.createOscillator(),crackG=ctx.createGain();
    crack.connect(crackG);crackG.connect(ctx.destination);
    crack.type='sawtooth';crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n);crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n);crack.stop(n+.06);
  }catch(e){}
}
