<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0C1E30">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>המלך — שולה מוקשים</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#F4D03F;--gold-dark:#C9A227;--blue:#7EC8E3;--green:#52B788;--red:#E74C3C;--purple:#C39BD3;--bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;--cell:min(52px,max(40px,calc((100vw - 60px) / 8)));--cell-light:#C9E4F5;--cell-dark:#4A7FA5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);min-height:100vh;font-family:'Nunito',sans-serif;font-weight:700;color:white;user-select:none;overflow-x:hidden;overflow-y:auto;overscroll-behavior:none;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;padding:10px 10px max(28px,env(safe-area-inset-bottom));}
@media(max-height:600px){body{padding-top:4px;}.header{margin-bottom:4px;}}
.star-dot{position:fixed;border-radius:50%;background:white;pointer-events:none;animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8);}to{opacity:.85;transform:scale(1.2);}}
.top-bar{width:100%;max-width:460px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;margin-top:4px;z-index:1;}
.stage-badge{display:inline-block;font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--blue);border:2px solid var(--blue);border-radius:50px;padding:3px 14px;background:rgba(126,200,227,.1);}
.btn-mute{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;transition:background .2s;touch-action:manipulation;flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}
.win-stars{font-size:2.2rem;letter-spacing:4px;margin:0 0 20px;animation:starsIn .5s .1s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes starsIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
.header{z-index:1;text-align:center;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;}
.title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:var(--gold);text-shadow:0 0 22px rgba(244,208,63,.8),0 2px 6px rgba(0,0,0,.5);}
.progress-row{display:flex;gap:10px;margin-bottom:10px;z-index:1;min-height:22px;}
.prog-dot{width:14px;height:14px;border-radius:50%;border:2px solid #444;background:transparent;transition:all .35s ease;}
.prog-dot.lit{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(82,183,136,.8);animation:dot-pop .4s cubic-bezier(.175,.885,.32,1.5);}
@keyframes dot-pop{from{transform:scale(.3);}to{transform:scale(1);}}
.coord-wrap{display:flex;align-items:flex-start;gap:5px;direction:ltr;z-index:1;}
.rank-labels{display:flex;flex-direction:column;}
.rank-labels span{height:var(--cell);display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);text-shadow:0 0 8px rgba(244,208,63,.5);width:18px;}
.file-labels{display:flex;margin-top:3px;}
.file-labels span{width:var(--cell);text-align:center;font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);text-shadow:0 0 8px rgba(244,208,63,.5);}
.board-outer{position:relative;}
.board{display:grid;grid-template-columns:repeat(8,var(--cell));grid-template-rows:repeat(8,var(--cell));border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);}
.sq{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;position:relative;overflow:visible;cursor:default;}
.sq.l{background:var(--cell-light);}.sq.d{background:var(--cell-dark);}
.sq.adj{cursor:pointer;}.sq.adj:hover{filter:brightness(1.2);}
.sq.king-sq{background:#5A96BA!important;box-shadow:inset 0 0 14px rgba(126,200,227,.7)!important;}
.fp{position:absolute;width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:10;}
.sml{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.7rem;z-index:12;pointer-events:none;animation:sml-in .45s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes sml-in{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.sml.idle{animation:sml-bounce .9s ease-in-out infinite alternate;}
@keyframes sml-bounce{from{transform:translateY(0) scale(1);}to{transform:translateY(-4px) scale(1.1);}}
#danger-svg{position:absolute;top:0;left:0;width:calc(var(--cell)*8);height:calc(var(--cell)*8);pointer-events:none;z-index:20;overflow:visible;}
.d-line{stroke:#E74C3C;stroke-width:3.5;stroke-dasharray:9 5;stroke-linecap:round;fill:none;opacity:0;transition:opacity .12s;}
.d-line.show{opacity:1;}
#tr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;display:none;align-items:center;justify-content:center;}
#tr-overlay.show{display:flex;}
.tr-card{background:linear-gradient(135deg,#0a1e0a,#122d12);border:3px solid var(--green);border-radius:22px;padding:32px 44px;text-align:center;max-width:340px;width:90%;animation:card-pop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;}
@keyframes card-pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.tr-icon{font-size:3.8rem;display:block;margin-bottom:10px;}
.tr-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--green);margin-bottom:8px;}
.tr-body{font-size:.95rem;color:rgba(255,255,255,.78);line-height:1.55;margin-bottom:22px;}
.card-btn{font-family:'Fredoka One',cursive;font-size:1.25rem;padding:11px 36px;border-radius:50px;border:none;cursor:pointer;color:white;background:linear-gradient(135deg,#F4D03F,#C9A227,#9A7B1A);box-shadow:0 0 20px rgba(244,208,63,.45);transition:transform .15s;touch-action:manipulation;}
.card-btn:hover{transform:scale(1.05);}
.card-btn-outline{background:transparent;border:2px solid var(--blue);color:var(--blue);box-shadow:none;font-size:1.05rem;padding:9px 28px;}
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:none;align-items:center;justify-content:center;}
#win-overlay.show{display:flex;}
.win-card{background:linear-gradient(135deg,#1a3a0a,#0a2010);border:3px solid var(--gold);border-radius:22px;padding:30px 40px;text-align:center;max-width:360px;width:90%;animation:card-pop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;}
.win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:10px;}
.pspark{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;animation:spark-fly ease-out forwards;z-index:999;}
@keyframes spark-fly{from{opacity:1;transform:translate(0,0) scale(1);}to{opacity:0;transform:translate(var(--px),var(--py)) scale(.2);}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="stage-badge">שלב 2 &#8212; שולה מוקשים</div>
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
</div>
<div class="header">
  <div class="title">מצאו משבצות בטוחות למלך</div>
</div>
<div class="progress-row" id="progRow"></div>

<div class="coord-wrap">
  <div class="rank-labels" id="ranks"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
      <svg id="danger-svg" viewBox="0 0 432 432" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arr0" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#E74C3C"/></marker>
          <marker id="arr1" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#E74C3C"/></marker>
          <marker id="arr2" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#E74C3C"/></marker>
          <marker id="arr3" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><polygon points="0 0,7 3.5,0 7" fill="#E74C3C"/></marker>
        </defs>
        <line id="dline0" class="d-line" marker-end="url(#arr0)"/>
        <line id="dline1" class="d-line" marker-end="url(#arr1)"/>
        <line id="dline2" class="d-line" marker-end="url(#arr2)"/>
        <line id="dline3" class="d-line" marker-end="url(#arr3)"/>
      </svg>
    </div>
    <div class="file-labels" id="files"></div>
  </div>
</div>

<div id="tr-overlay">
  <div class="tr-card">
    <span class="tr-icon">&#127941;</span>
    <div class="tr-title" id="tr-title">מצוין!</div>
    <div class="tr-body">מצאתם את כל המשבצות הבטוחות!</div>
    <button class="card-btn" onclick="goNext()">תרחיש נוסף &#8592;</button>
  </div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <div style="font-size:3.8rem;margin-bottom:8px">&#127942;</div>
    <div class="win-title">כל הכבוד!</div>
    <div class="win-stars" id="win-stars"></div>
    <button class="card-btn" onclick="window.location.href='king-stage3.html'">לשלב 3 &#8592;</button>
    <button class="card-btn card-btn-outline" id="win-retry-btn" style="margin-top:8px;" onclick="fullReset()">🔄 נסו שוב</button>
  </div>
</div>

/* ==================================================

================================================== */

  R: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#fff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;stroke-miterlimit:4"><path d="M9,39h27v-3H9z" style="stroke-linecap:butt"/><path d="M12.5,32l1.5-2.5h17l1.5,2.5z" style="stroke-linecap:butt"/><path d="M12,36v-4h21v4z" style="stroke-linecap:butt"/><path d="M14,29.5v-13h17v13z" style="stroke-linecap:butt;stroke-linejoin:miter"/><path d="M14,16.5l-3-2.5h23l-3,2.5z" style="stroke-linecap:butt"/><path d="M11,14V9h4v2h5V9h5v2h5V9h4v5z" style="stroke-linecap:butt"/><path d="M12,35.5h21" style="fill:none;stroke:#fff;stroke-width:1"/><path d="M13,31.5h19" style="fill:none;stroke:#fff;stroke-width:1"/></g></svg>',
  B: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" fill-rule="evenodd" stroke-linecap="round" stroke-linejoin="round"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z" fill="#000" stroke="#000" stroke-width="1.5" stroke-linecap="butt"/><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#fff" stroke-width="1.5" stroke-linejoin="miter"/></g></svg>',
  Q: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#666;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><circle cx="6" cy="12" r="2.75" style="fill:#000;stroke:none"/><circle cx="14" cy="9" r="2.75" style="fill:#000;stroke:none"/><circle cx="22.5" cy="8" r="2.75" style="fill:#000;stroke:none"/><circle cx="31" cy="9" r="2.75" style="fill:#000;stroke:none"/><circle cx="39" cy="12" r="2.75" style="fill:#000;stroke:none"/><path d="M9,26c8.5-1.5,21-1.5,27,0l2.5-12.5L31,25l-.3-14.1L22.5,24.5l-8.2-13.6L14,25,6.5,13.5z"/><path d="M9,26c0,2,1.5,2,2.5,4,1,1.5,1,1,.5,3.5-1.5,1-1.5,2.5-1.5,2.5-1,1.5,1,2.5,1,2.5,6.5,1,16.5,1,23,0,0,0,1.5-1,.5-2.5,0,0,.5-1.5-1-2.5-.5-2.5-.5-2,.5-3.5,1-2,2.5-2,2.5-4-8.5-1.5-18.5-1.5-27,0z"/><path d="M11.5,30c3.5-1,17.5-1,22,0" style="fill:none;stroke:#666;stroke-width:1"/><path d="M12,33.5c3.5-1,17.5-1,21,0" style="fill:none;stroke:#666;stroke-width:1"/></g></svg>',

};

/* ==================================================
   STATE
================================================== */
var HALF;
function getSZ(){
  var cell=document.querySelector('#board .sq');
  if(cell){
    var w=cell.getBoundingClientRect().width;
    if(w>0){HALF=w/2;return w;}
  }
  var v=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||52;
  HALF=v/2;return v;
}
var SZ=getSZ();

/* ==================================================
   KING STATE
================================================== */
var KingState={
  MODULE_KEY:'chess_king',
  STAGE_KEYS:['stage1','stage2','stage3','stage4'],
  PERFECT_THRESHOLD:4,   // N — כל 4 השלבים perfect = 3⭐ (תואם starThreshold:4 ב-index.html)
  save:function(stageKey,perfect){
    try{
      var d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      var prev=d[stageKey]||{};
      // v2.1: אחרון מתעדכן תמיד; שיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      var bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;
      d[stageKey]={done:true,perfect:perfect,lastPerfect:perfect,bestPerfect:bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  // v2.1 — תצוגה כפולה: מחזיר {best, last} (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars:function(){
    try{
      var self=this;
      var d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      var done=this.STAGE_KEYS.filter(function(k){return d[k]&&d[k].done;}).length;
      if(done<this.STAGE_KEYS.length) return {best:0,last:0};
      var bestP=this.STAGE_KEYS.filter(function(k){return d[k]&&(d[k].bestPerfect!=null?d[k].bestPerfect:d[k].perfect);}).length;
      var lastP=this.STAGE_KEYS.filter(function(k){return d[k]&&(d[k].lastPerfect!=null?d[k].lastPerfect:d[k].perfect);}).length;
      function toStars(p){return p>=self.PERFECT_THRESHOLD?3:2;}
      return {best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return {best:0,last:0};}
  }
};

================================================== */

function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
}

/* ==================================================
   STATE
================================================== */
var scenIdx    = 0;
var foundObj   = {};
var foundCount = 0;
var locked     = false;
var lineTimer  = null;
var dangerMap  = {};
var safeMap    = {};
var totalMistakes = 0;   // global — accumulates across ALL scenarios (Baruch: 0 mistakes = 3⭐)

function getCellPos(row, col){
  var sq=document.getElementById('sq-'+row+'-'+col);
  var outer=document.getElementById('board-outer');
  if(sq&&outer){
    var sr=sq.getBoundingClientRect(), or=outer.getBoundingClientRect();
    return {left:sr.left-or.left, top:sr.top-or.top};
  }
  SZ=getSZ();
  return {left:col*SZ, top:row*SZ};
}
function sqCenter(r,c){
  var pos=getCellPos(r,c); SZ=getSZ();
  return {x:pos.left+SZ/2, y:pos.top+SZ/2};
}

function makeImg(sym, isBlack, size) {
  var img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(PIECES[sym]);
  img.style.width       = size + '%';
  img.style.height      = size + '%';
  img.style.objectFit   = 'contain';
  img.style.display     = 'block';
  img.style.flexShrink  = '0';
  if (isBlack) img.style.filter = 'drop-shadow(0 0 2.5px rgba(255,255,255,.65))';
  return img;
}

/* ==================================================
   BUILD BOARD (once)
================================================== */
function buildBoard() {
  var b = document.getElementById('board');
  while (b.firstChild) b.removeChild(b.firstChild);
  for (var r = 0; r < 8; r++) {
    for (var c = 0; c < 8; c++) {
      var sq = document.createElement('div');
      sq.className = 'sq ' + ((r+c)%2===0 ? 'l' : 'd');
      sq.id = 'sq-' + r + '-' + c;
      b.appendChild(sq);
    }
  }
  b.addEventListener('click', onBoardClick);
  // Fix #13 — set danger-svg viewBox dynamically based on actual cell size
  SZ=getSZ();
  var boardPx = SZ * 8;
  var dsvg = document.getElementById('danger-svg');
  if (dsvg) {
    dsvg.setAttribute('viewBox', '0 0 ' + boardPx + ' ' + boardPx);
    dsvg.style.width  = boardPx + 'px';
    dsvg.style.height = boardPx + 'px';
  }
}

function onBoardClick(e) {
  if (locked) return;
  var sq = e.target.closest('.sq');
  if (!sq || !sq.dataset.role) return;
  var parts = sq.dataset.role.split(':');
  var role = parts[0];
  var idx  = parseInt(parts[1]);
  var r    = parseInt(parts[2]);
  var c    = parseInt(parts[3]);
  if (role === 'safe')   onSafe(idx, r, c);
  if (role === 'danger') onDanger(r, c, idx);
}

function buildCoords() {
  var ranks = ['8','7','6','5','4','3','2','1'];
  var files = ['A','B','C','D','E','F','G','H'];
  ranks.forEach(function(r) {
    var s = document.createElement('span'); s.textContent = r;
    document.getElementById('ranks').appendChild(s);
  });
  files.forEach(function(f) {
    var s = document.createElement('span'); s.textContent = f;
    document.getElementById('files').appendChild(s);
  });
}

function buildProgress(count) {
  var row = document.getElementById('progRow');
  while (row.firstChild) row.removeChild(row.firstChild);
  for (var i = 0; i < count; i++) {
    var d = document.createElement('div');
    d.className = 'prog-dot';
    d.id = 'pdot-' + i;
    row.appendChild(d);
  }
}

/* ==================================================
   LOAD SCENARIO
================================================== */
function loadScenario(idx) {
  var sc = SCENARIOS[idx];
  foundObj = {}; foundCount = 0; locked = false;

  document.querySelectorAll('.d-line').forEach(function(l) { l.classList.remove('show'); });
  if (lineTimer) { clearTimeout(lineTimer); lineTimer = null; }
  document.querySelectorAll('.sml').forEach(function(e) { e.remove(); });
  document.querySelectorAll('.king-sq').forEach(function(sq) { sq.classList.remove('king-sq'); });
  document.querySelectorAll('.sq').forEach(function(sq) {
    sq.classList.remove('adj');
    delete sq.dataset.role;
  });

  var ksq = document.getElementById('sq-' + sc.king.row + '-' + sc.king.col);
  if (ksq) ksq.classList.add('king-sq');

  dangerMap = {}; safeMap = {};
  sc.danger.forEach(function(d) { dangerMap[d.row + '-' + d.col] = d.pi; });
  sc.safe.forEach(function(s, i) { safeMap[s.row + '-' + s.col] = i; });

  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      var r = sc.king.row + dr, c = sc.king.col + dc;
      if (r < 0 || r > 7 || c < 0 || c > 7) continue;
      var sq = document.getElementById('sq-' + r + '-' + c);
      if (!sq) continue;
      sq.classList.add('adj');
      var key = r + '-' + c;
      if (safeMap[key] !== undefined) {
        sq.dataset.role = 'safe:' + safeMap[key] + ':' + r + ':' + c;
      } else if (dangerMap[key] !== undefined) {
        sq.dataset.role = 'danger:' + dangerMap[key] + ':' + r + ':' + c;
      }
    }
  }

  buildProgress(sc.safe.length);

  document.querySelectorAll('.fp').forEach(function(e) { e.remove(); });
  var outer = document.getElementById('board-outer');

  SZ=getSZ();
  var kPos=getCellPos(sc.king.row, sc.king.col);
  var kWrap = document.createElement('div');
  kWrap.className = 'fp';
  kWrap.style.left = kPos.left + 'px';
  kWrap.style.top  = kPos.top  + 'px';
  kWrap.appendChild(makeImg('K', false, 90));
  outer.appendChild(kWrap);

  sc.pieces.forEach(function(p) {
    var pPos=getCellPos(p.row, p.col);
    var wrap = document.createElement('div');
    wrap.className = 'fp';
    wrap.style.left = pPos.left + 'px';
    wrap.style.top  = pPos.top  + 'px';
    wrap.appendChild(makeImg(p.sym, true, p.sym === 'R' ? 100 : 90));
    outer.appendChild(wrap);
  });
}

/* ==================================================
   ACTIONS
================================================== */
function onSafe(idx, row, col) {
  if (foundObj[idx]) return;
  locked = true; foundObj[idx] = true; foundCount++;
  playSound('coin');
  spawnSparks(document.getElementById('sq-' + row + '-' + col));
  var sq = document.getElementById('sq-' + row + '-' + col);
  var sm = document.createElement('div');
  sm.className = 'sml';
  sm.textContent = '😊';
  sq.appendChild(sm);
  setTimeout(function() { sm.classList.add('idle'); }, 480);
  var dot = document.getElementById('pdot-' + (foundCount - 1));
  if (dot) dot.classList.add('lit');
  setTimeout(function() {
    locked = false;
    if (foundCount >= SCENARIOS[scenIdx].safe.length) setTimeout(scenarioComplete, 500);
  }, 600);
}

function onDanger(row, col, pi) {
  locked = true;
  totalMistakes++;
  playSound('fail');
  showLine(pi, row, col);
  setTimeout(function() { locked = false; }, 1000);
}

function showLine(pi, tr, tc) {
  document.querySelectorAll('.d-line').forEach(function(l) { l.classList.remove('show'); });
  if (lineTimer) clearTimeout(lineTimer);
  var p = SCENARIOS[scenIdx].pieces[pi];
  var fr = sqCenter(p.row, p.col);
  var to = sqCenter(tr, tc);
  var ln = document.getElementById('dline' + pi);
  if (!ln) return;
  ln.setAttribute('x1', fr.x); ln.setAttribute('y1', fr.y);
  ln.setAttribute('x2', to.x); ln.setAttribute('y2', to.y);
  ln.classList.add('show');
  lineTimer = setTimeout(function() {
    document.querySelectorAll('.d-line').forEach(function(l) { l.classList.remove('show'); });
  }, 1500);
}

/* ==================================================
   FLOW
================================================== */
function scenarioComplete() {
  playSound('win');
  var isLast = (scenIdx === SCENARIOS.length - 1);
  if (isLast) {
    var perfect = (totalMistakes === 0);
    KingState.save('stage2', perfect);
    document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
    document.getElementById('win-retry-btn').textContent = perfect ? '🔄 שחקו שוב' : '🔄 נסו שוב';
    document.getElementById('win-overlay').classList.add('show');
  } else {
    document.getElementById('tr-title').textContent = (totalMistakes === 0) ? 'מצוין! 🎉' : 'כל הכבוד!';
    document.getElementById('tr-overlay').classList.add('show');
  }
}

function goNext() {
  document.getElementById('tr-overlay').classList.remove('show');
  scenIdx++;
  loadScenario(scenIdx);
}

function fullReset() {
  document.getElementById('win-overlay').classList.remove('show');
  totalMistakes = 0;
  scenIdx = 0;
  loadScenario(0);
}

/* ==================================================
   SOUND
================================================== */
var _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playSound(t) {
  if (muted) return;
  try {
    var ctx = getCtx(), n = ctx.currentTime;
    var o, g;
    if (t === 'coin') {
      o = ctx.createOscillator(); g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(880, n);
      o.frequency.exponentialRampToValueAtTime(1320, n + 0.1);
      g.gain.setValueAtTime(0.25, n);
      g.gain.exponentialRampToValueAtTime(0.001, n + 0.25);
      o.start(n); o.stop(n + 0.25);
    } else if (t === 'fail') {
      o = ctx.createOscillator(); g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(240, n);
      o.frequency.exponentialRampToValueAtTime(100, n + 0.3);
      g.gain.setValueAtTime(0.28, n);
      g.gain.exponentialRampToValueAtTime(0.001, n + 0.3);
      o.start(n); o.stop(n + 0.32);
    } else if (t === 'win') {
      [523, 659, 784, 1047].forEach(function(f, i) {
        o = ctx.createOscillator(); g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f;
        g.gain.setValueAtTime(0.18, n + i * 0.13);
        g.gain.exponentialRampToValueAtTime(0.001, n + i * 0.13 + 0.38);
        o.start(n + i * 0.13); o.stop(n + i * 0.13 + 0.4);
      });
    }
  } catch(e) {}
}

/* ==================================================
   SPARKS & STARS
================================================== */
function spawnSparks(el) {
  var colors = ['#F4D03F','#52B788','#7EC8E3','#FFFFFF','#FF6B35'];
  var r = el.getBoundingClientRect();
  var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  for (var i = 0; i < 16; i++) {
    var sp = document.createElement('div');
    sp.className = 'pspark';
    var a = Math.random() * Math.PI * 2, d = 45 + Math.random() * 65;
    sp.style.left = cx + 'px'; sp.style.top = cy + 'px';
    sp.style.background = colors[i % colors.length];
    sp.style.animationDuration = (0.42 + Math.random() * 0.32) + 's';
    sp.style.setProperty('--px', Math.cos(a) * d + 'px');
    sp.style.setProperty('--py', Math.sin(a) * d + 'px');
    document.body.appendChild(sp);
    (function(s) { setTimeout(function() { s.remove(); }, 800); })(sp);
  }
}

function makeStars() {
  for (var i = 0; i < 55; i++) {
    var s = document.createElement('div'); s.className = 'star-dot';
    var sz = Math.random() * 2.2 + 0.7;
    s.style.width  = sz + 'px'; s.style.height = sz + 'px';
    s.style.top    = (Math.random() * 100) + 'vh';
    s.style.left   = (Math.random() * 100) + 'vw';
    s.style.animationDuration = (2 + Math.random() * 3) + 's';
    s.style.animationDelay    = (Math.random() * 3) + 's';
    document.body.appendChild(s);
  }
}

/* ==================================================
   INIT
================================================== */
makeStars();
buildBoard();
buildCoords();
loadScenario(0);
window.addEventListener('resize', function(){ SZ=getSZ(); loadScenario(scenIdx); });
</script>
