<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0C1E30">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>המלך הגיבור ⚔️</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F4D03F;--gold-dark:#C9A227;--gold-deep:#9A7B1A;
  --blue:#7EC8E3;--green:#52B788;--red:#E74C3C;--orange:#FF6B35;
  --purple:#C39BD3;
  --bg1:#162D4A;--bg2:#0C1E30;--bg3:#060E1A;
  --cell:min(54px,max(40px,calc((100vw - 60px) / 8)));
  --cell-light:#C9E4F5;--cell-dark:#4A7FA5;
  --indicator:36px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;font-family:'Nunito',sans-serif;font-weight:700;
  color:white;user-select:none;overflow-x:hidden;overflow-y:auto;
  overscroll-behavior:none;touch-action:manipulation;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 10px max(28px,env(safe-area-inset-bottom));
}
@media(max-height:600px){body{padding-top:4px;}.header{margin-bottom:2px;}}

/* STARS */
.star-dot{position:fixed;border-radius:50%;background:white;pointer-events:none;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8);}to{opacity:.85;transform:scale(1.2);}}

/* TOP BAR */
.top-bar{width:100%;max-width:480px;display:flex;justify-content:space-between;
  align-items:center;margin:4px 0;z-index:1;}
.stage-badge{font-family:'Fredoka One',cursive;font-size:.82rem;color:var(--orange);
  border:2px solid var(--orange);border-radius:50px;padding:3px 14px;
  background:rgba(255,107,53,.1);}

/* HEADER */
.header{z-index:1;text-align:center;margin-bottom:6px;}
.title{font-family:'Fredoka One',cursive;font-size:1.75rem;color:var(--gold);
  text-shadow:0 0 22px rgba(244,208,63,.8),0 2px 6px rgba(0,0,0,.5);}
.subtitle{font-family:'Fredoka One',cursive;font-size:1.05rem;
  color:var(--orange);margin-top:2px;min-height:1.4em;text-align:center;}

/* TURN ROW — only for AI thinking feedback */
.turn-row{z-index:1;margin-bottom:6px;font-family:'Fredoka One',cursive;
  font-size:.9rem;color:rgba(255,255,255,.85);min-height:1.4em;text-align:center;}

/* TURN INDICATOR — white king blinks on right side of board at king's row */
.side-col{
  display:flex;flex-direction:column;justify-content:flex-end;
  height:calc(var(--cell)*8 + 6px);
  padding-bottom:calc(var(--cell)/2 - 18px);
  padding-left:6px;
}
#turn-indicator{
  display:none;
  width:var(--indicator);height:var(--indicator);
  align-items:center;justify-content:center;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.85);
  animation:turnBlink 1s ease-in-out infinite alternate;
  cursor:default;
}
#turn-indicator img{
  width:82%;height:82%;object-fit:contain;pointer-events:none;
}
@keyframes turnBlink{
  from{opacity:.4;box-shadow:0 0 8px rgba(255,255,255,.3);border-color:rgba(255,255,255,.5);}
  to{opacity:1;box-shadow:0 0 18px rgba(255,255,255,.9),0 0 30px rgba(255,255,255,.4);border-color:white;}
}

/* LASER SVG overlay on board */
#check-laser{
  position:absolute;top:0;left:0;pointer-events:none;z-index:30;overflow:visible;
}
.laser-beam{
  stroke:#E74C3C;stroke-width:3.5;stroke-linecap:round;fill:none;
  stroke-dasharray:8 4;
  filter:drop-shadow(0 0 6px rgba(231,76,60,.9));
  animation:laserFlow .35s linear infinite;
}
@keyframes laserFlow{from{stroke-dashoffset:24;}to{stroke-dashoffset:0;}}
.laser-dot{
  fill:#E74C3C;
  filter:drop-shadow(0 0 8px rgba(231,76,60,1));
  animation:dotPulse .5s ease-in-out infinite alternate;
}
@keyframes dotPulse{from{r:5;opacity:.8;}to{r:7.5;opacity:1;}}

/* ILLEGAL MOVE overlay on board */
/* X mark on specific illegal square */
.sq-illegal-x{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;z-index:40;
  background:rgba(231,76,60,.22);
  animation:xAppear .35s cubic-bezier(.175,.885,.32,1.5);
}
.sq-illegal-x .ix{
  font-family:'Fredoka One',cursive;
  font-size:calc(var(--cell)*0.72);
  color:#E74C3C;line-height:1;
  text-shadow:0 0 14px rgba(231,76,60,1),0 0 28px rgba(231,76,60,.7);
}
@keyframes xAppear{
  0%{opacity:0;transform:scale(.3) rotate(-20deg);}
  65%{opacity:1;transform:scale(1.15) rotate(4deg);}
  100%{transform:scale(1) rotate(0);}
}

/* "מהלך לא חוקי" text — floats above board */
#illegal-text-float{
  position:absolute;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  color:#E74C3C;white-space:nowrap;
  text-shadow:0 0 12px rgba(231,76,60,.9);
  pointer-events:none;z-index:50;
  opacity:0;transition:opacity .15s;
  top:-2rem;
}
#illegal-text-float.show{opacity:1;}

/* BOARD */
.coord-wrap{display:flex;align-items:flex-start;gap:5px;direction:ltr;z-index:1;}
.rank-labels{display:flex;flex-direction:column;}
.rank-labels span{height:var(--cell);display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,63,.5);width:18px;}
.file-labels{display:flex;margin-top:3px;}
.file-labels span{width:var(--cell);text-align:center;
  font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,63,.5);}
.board-outer{position:relative;}
.board{
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);
}
.sq{
  width:var(--cell);height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:visible;cursor:default;transition:background .1s;
}
.sq.l{background:var(--cell-light);}.sq.d{background:var(--cell-dark);}

/* Clickable square - just pointer cursor */
.sq.can-move{cursor:pointer;}
.sq.can-move:hover{filter:brightness(1.18);}

/* Promotion flash */
@keyframes promoFlash{
  0%,100%{background:rgba(231,76,60,0);}
  50%{background:rgba(231,76,60,.7);}
}
.sq.promo-flash{animation:promoFlash .25s ease-in-out 3;}

/* Piece container */
.fp{
  position:absolute;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:10;
}
.fp.king-anim{animation:kingJump .3s cubic-bezier(.175,.885,.32,1.5);}
@keyframes kingJump{0%{transform:scale(.75);}65%{transform:scale(1.1);}100%{transform:scale(1);}}
.fp.pawn-anim{animation:pawnStep .35s cubic-bezier(.175,.885,.32,1.5);}
@keyframes pawnStep{0%{transform:translateY(-10px) scale(.8);}65%{transform:translateY(2px) scale(1.08);}100%{transform:none;}}

/* Captured flash */
@keyframes capturePop{0%{opacity:1;transform:scale(1);}50%{transform:scale(1.5);opacity:.8;}100%{opacity:0;transform:scale(.2);}}
.fp.capture-anim{animation:capturePop .4s ease-out forwards;}

/* Promotion queen pulse */
@keyframes queenReveal{0%{opacity:0;transform:scale(0) rotate(-180deg);}70%{transform:scale(1.2) rotate(5deg);}100%{opacity:1;transform:scale(1) rotate(0);}}
.fp.queen-reveal{animation:queenReveal .6s cubic-bezier(.175,.885,.32,1.5) forwards;}

/* ═══ DIFFICULTY SELECT OVERLAY ═══ */
#diff-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:400;
  display:flex;align-items:center;justify-content:center;
}
#diff-overlay.hidden{display:none;}
.diff-card{
  background:linear-gradient(145deg,#0e2240 0%,#081525 100%);
  border:3px solid var(--orange);border-radius:22px;
  padding:28px 24px;text-align:center;max-width:340px;width:92%;
  animation:cardPop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;
}
@keyframes cardPop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.diff-icon{font-size:3rem;display:block;margin-bottom:6px;}
.diff-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--orange);margin-bottom:6px;}
.diff-explain{font-size:.85rem;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:20px;
  border-top:1px solid rgba(255,107,53,.2);padding-top:10px;}
.diff-btns{display:flex;gap:12px;justify-content:center;}
.diff-btn{
  font-family:'Fredoka One',cursive;font-size:1rem;
  padding:12px 18px;border-radius:16px;border:none;cursor:pointer;color:white;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:transform .15s,box-shadow .15s;min-width:124px;
}
.diff-btn:hover{transform:translateY(-4px) scale(1.03);}
.diff-btn:active{transform:scale(.97);}
.diff-btn .icon{font-size:2.3rem;}
.diff-btn .name{font-size:1rem;}
.diff-btn .lbl{font-size:.72rem;opacity:.78;}
.diff-btn.easy{background:linear-gradient(145deg,#1a5c36,#0f3d24);
  border:2px solid var(--green);box-shadow:0 5px 20px rgba(82,183,136,.35);}
.diff-btn.hard{background:linear-gradient(145deg,#6b1a1a,#4a0f0f);
  border:2px solid var(--red);box-shadow:0 5px 20px rgba(231,76,60,.35);}

/* ═══ WIN OVERLAY ═══ */
#win-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;
  display:none;align-items:center;justify-content:center;
}
#win-overlay.show{display:flex;}
.win-card{
  background:linear-gradient(145deg,#1a3a0a,#0a2010);
  border:3px solid var(--gold);border-radius:22px;
  padding:26px 36px;text-align:center;max-width:340px;width:92%;
  animation:cardPop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;
}
.win-icon{font-size:3.6rem;display:block;margin-bottom:5px;}
.win-title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);margin-bottom:5px;}
.win-body{font-size:.88rem;color:rgba(255,255,255,.75);margin-bottom:10px;line-height:1.5;}
.win-stars{font-size:2.2rem;letter-spacing:4px;margin:0 0 18px;
  animation:starsIn .5s .1s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes starsIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}

/* ═══ LOSE OVERLAY ═══ */
#lose-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;
  display:none;align-items:center;justify-content:center;
}
#lose-overlay.show{display:flex;}
.lose-card{
  background:linear-gradient(145deg,#2a0a0a,#1a0505);
  border:3px solid var(--red);border-radius:22px;
  padding:26px 36px;text-align:center;max-width:340px;width:92%;
  animation:cardPop .45s cubic-bezier(.175,.885,.32,1.5);direction:rtl;
}
.lose-icon{font-size:3.6rem;display:block;margin-bottom:5px;}
.lose-body{font-size:.88rem;color:rgba(255,255,255,.75);margin-bottom:18px;line-height:1.5;}

/* ═══ BUTTONS ═══ */
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.card-btn{
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  padding:10px 24px;border-radius:50px;border:none;cursor:pointer;color:white;
  transition:transform .15s;touch-action:manipulation;
}
.card-btn:hover{transform:scale(1.07);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dark),var(--gold-deep));
  box-shadow:0 0 18px rgba(244,208,63,.4);}
.btn-blue{background:linear-gradient(135deg,#1a6b8a,#104f66);
  box-shadow:0 0 14px rgba(126,200,227,.28);}
.btn-red{background:linear-gradient(135deg,#8a1a1a,#661010);
  box-shadow:0 0 14px rgba(231,76,60,.3);}
.btn-mute{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}

/* SPARKS */
.pspark{position:fixed;width:7px;height:7px;border-radius:50%;
  pointer-events:none;animation:sparkFly ease-out forwards;z-index:999;}
@keyframes sparkFly{
  from{opacity:1;transform:translate(0,0) scale(1);}
  to{opacity:0;transform:translate(var(--px),var(--py)) scale(.1);}
}
</style>
</head>
<body>

<!-- DIFFICULTY SELECT -->
<div id="diff-overlay">
  <div class="diff-card">
    <span class="diff-icon">⚔️</span>
    <div class="diff-title">המלך הגיבור</div>
    <div class="diff-explain">
      המלך הלבן חייב לאכול את שני הרגלים השחורים!<br>
      הרגלים מנסים להגיע לשורה 1 ולהפוך למלכה — היזהרו!
    </div>
    <div class="diff-btns">
      <button class="diff-btn easy" onclick="startGame('easy')">
        <span class="icon">🛡️</span>
        <span class="name">מלך אמיץ</span>
      </button>
      <button class="diff-btn hard" onclick="startGame('hard')">
        <span class="icon">⚔️</span>
        <span class="name">מלך גיבור</span>
      </button>
    </div>
  </div>
</div>

<!-- MAIN GAME -->
<div class="top-bar">
  <div class="stage-badge" id="diff-badge">שלב 3 — המלך הגיבור</div>
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
</div>

<div class="header">
  <div class="title">⚔️ המלך הגיבור</div>
  <div class="subtitle" id="subtitle">אכלו את שני הרגלים לפני שיגיעו לשורה 1!</div>
</div>

<div class="turn-row" id="turn-row"></div>

<div class="coord-wrap">
  <div class="rank-labels" id="ranks"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
      <svg id="check-laser" viewBox="0 0 432 432" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="illegal-text-float">מהלך לא חוקי! ✕</div>
    </div>
    <div class="file-labels" id="files"></div>
  </div>
  <div class="side-col">
    <div id="turn-indicator"><img id="turn-king-img" src=""/></div>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-card">
    <span class="win-icon">🏆</span>
    <div class="win-title">כל הכבוד!</div>
    <div class="win-body">המורה ברוך גאה בכם!</div>
    <div class="win-stars" id="win-stars"></div>
    <div class="btn-row">
      <button class="card-btn btn-gold" onclick="goToStage4()">לשלב 4 ←</button>
      <button class="card-btn btn-blue" id="win-retry-btn" onclick="resetGame()">🔄 נסו שוב</button>
      <button class="card-btn btn-red" id="btn-challenge" onclick="startGame('hard')" style="display:none">נסו מלך גיבור ⚔️</button>
    </div>
  </div>
</div>

<!-- LOSE -->
<div id="lose-overlay">
  <div class="lose-card">
    <span class="lose-icon">😢</span>
    <div class="lose-body" id="lose-body">המורה ברוך מאמין שתצליחו בפעם הבאה!</div>
    <div class="btn-row">
      <button class="card-btn btn-red" onclick="retryGame()">נסו שוב 💪</button>
      <button class="card-btn btn-blue" onclick="pickDifficulty()">שנו קושי ♟️</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   SVG PIECES
═══════════════════════════════════════════════════ */
var WHITE_KING = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6M20,8h5" style="fill:none;stroke:#000;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#fff;stroke:#000;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37" style="fill:#fff"/><path d="M11.5,30c5.5-3,15.5-3,21,0M11.5,33.5c5.5-3,15.5-3,21,0M11.5,37c5.5-3,15.5-3,21,0" style="fill:none"/></g></svg>';
var BLACK_PAWN = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="13 7 20 30"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#000" stroke="#fff" stroke-width="1"/></svg>';
var BLACK_QUEEN = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#000;stroke:#666;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><circle cx="6" cy="12" r="2.75" style="fill:#000;stroke:none"/><circle cx="14" cy="9" r="2.75" style="fill:#000;stroke:none"/><circle cx="22.5" cy="8" r="2.75" style="fill:#000;stroke:none"/><circle cx="31" cy="9" r="2.75" style="fill:#000;stroke:none"/><circle cx="39" cy="12" r="2.75" style="fill:#000;stroke:none"/><path d="M9,26c8.5-1.5,21-1.5,27,0l2.5-12.5L31,25l-.3-14.1L22.5,24.5l-8.2-13.6L14,25,6.5,13.5z"/><path d="M9,26c0,2,1.5,2,2.5,4,1,1.5,1,1,.5,3.5-1.5,1-1.5,2.5-1.5,2.5-1,1.5,1,2.5,1,2.5,6.5,1,16.5,1,23,0,0,0,1.5-1,.5-2.5,0,0,.5-1.5-1-2.5-.5-2.5-.5-2,.5-3.5,1-2,2.5-2,2.5-4-8.5-1.5-18.5-1.5-27,0z"/><path d="M11.5,30c3.5-1,17.5-1,22,0" style="fill:none;stroke:#666;stroke-width:1"/><path d="M12,33.5c3.5-1,17.5-1,21,0" style="fill:none;stroke:#666;stroke-width:1"/></g></svg>';

/* ═══════════════════════════════════════════════════
   KING STATE
═══════════════════════════════════════════════════ */
var KingState={
  MODULE_KEY:'chess_king',
  STAGE_KEYS:['stage1','stage2','stage3','stage4'],
  PERFECT_THRESHOLD:4,   // N — כל 4 השלבים perfect = 3⭐ (תואם starThreshold:4 ב-index.html)
  save:function(stageKey,perfect){
    try{
      var d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      var prev=d[stageKey]||{};
      // v2.1: אחרון מתעדכן תמיד; שיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      var bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;
      d[stageKey]={done:true,perfect:perfect,lastPerfect:perfect,bestPerfect:bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  // v2.1 — תצוגה כפולה: מחזיר {best, last} (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars:function(){
    try{
      var self=this;
      var d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      var done=this.STAGE_KEYS.filter(function(k){return d[k]&&d[k].done;}).length;
      if(done<this.STAGE_KEYS.length) return {best:0,last:0};
      var bestP=this.STAGE_KEYS.filter(function(k){return d[k]&&(d[k].bestPerfect!=null?d[k].bestPerfect:d[k].perfect);}).length;
      var lastP=this.STAGE_KEYS.filter(function(k){return d[k]&&(d[k].lastPerfect!=null?d[k].lastPerfect:d[k].perfect);}).length;
      function toStars(p){return p>=self.PERFECT_THRESHOLD?3:2;}
      return {best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return {best:0,last:0};}
  }
};

/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */

// Pawn start row (rank 7 = row 1)
var PAWN_START_ROW = 1;
// Promotion row (rank 1 = row 7)
var PROMO_ROW = 7;

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
var G = {
  king:       {row:7, col:4},
  pawns:      [
    {row:1, col:3, alive:true, promoted:false},
    {row:1, col:4, alive:true, promoted:false}

/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function onBoard(r,c){ return r>=0&&r<8&&c>=0&&c<8; }

// Squares a black pawn attacks (diagonal forward = row+1)
function pawnAttackSquares(p){
  if(!p.alive||p.promoted) return [];
  var attacks = [];
  if(onBoard(p.row+1, p.col-1)) attacks.push({row:p.row+1, col:p.col-1});
  if(onBoard(p.row+1, p.col+1)) attacks.push({row:p.row+1, col:p.col+1});
  return attacks;
}

// All squares attacked by alive pawns
function allPawnAttacks(pawns){
  var set = new Set();
  pawns.forEach(function(p){
    pawnAttackSquares(p).forEach(function(sq){
      set.add(sq.row*8+sq.col);
    });
  });
  return set;
}

// Is pawn p protected by another alive pawn?
function isPawnProtected(p, pawns){
  return pawns.some(function(other){
    if(other===p||!other.alive) return false;
    // other attacks p's square?
    return pawnAttackSquares(other).some(function(sq){
      return sq.row===p.row&&sq.col===p.col;
    });
  });
}

// Legal king moves (cannot step into pawn attacks, cannot capture protected pawn)
function kingLegalMoves(king, pawns){
  var attacked = allPawnAttacks(pawns);
  var out = [];
  for(var dr=-1;dr<=1;dr++){
    for(var dc=-1;dc<=1;dc++){
      if(!dr&&!dc) continue;
      var nr=king.row+dr, nc=king.col+dc;
      if(!onBoard(nr,nc)) continue;
      // Cannot step on attacked square
      if(attacked.has(nr*8+nc)) continue;
      // Check if there's a pawn on this square
      var pawnHere = pawns.find(function(p){ return p.alive&&p.row===nr&&p.col===nc; });
      if(pawnHere){
        // Can only capture if pawn is NOT protected
        if(isPawnProtected(pawnHere, pawns)) continue;
      }
      out.push({row:nr, col:nc});
    }
  }
  return out;
}

// Is king in check? (on a square attacked by a pawn)
function isKingInCheck(king, pawns){
  var attacked = allPawnAttacks(pawns);
  return attacked.has(king.row*8+king.col);
}

// Legal moves for a pawn (straight forward only; no diagonal captures in this game)
function pawnLegalMoves(pawn, pawns, king){
  if(!pawn.alive) return [];
  var moves = [];
  var r=pawn.row, c=pawn.col;

  // Forward 1 — blocked by any piece
  var r1=r+1;
  if(r1<=7){
    var occ1 = pawns.some(function(p){ return p.alive&&p!==pawn&&p.row===r1&&p.col===c; }) ||
               (king.row===r1&&king.col===c);
    if(!occ1) moves.push({row:r1, col:c});
  }

  // Forward 2 — only from starting rank, both squares must be empty
  if(r===PAWN_START_ROW){
    var r2=r+2;
    var occ1b = pawns.some(function(p){ return p.alive&&p!==pawn&&p.row===r+1&&p.col===c; }) ||
                (king.row===r+1&&king.col===c);
    var occ2  = pawns.some(function(p){ return p.alive&&p!==pawn&&p.row===r2&&p.col===c; }) ||
                (king.row===r2&&king.col===c);
    if(!occ1b&&!occ2) moves.push({row:r2, col:c});
  }

  return moves;
}

/* ═══════════════════════════════════════════════════
   PAWN AI
═══════════════════════════════════════════════════ */
function pawnAI(){
  var allMoves = [];
  G.pawns.forEach(function(pawn, pIdx){
    if(!pawn.alive) return;
    pawnLegalMoves(pawn, G.pawns, G.king).forEach(function(mv){
      allMoves.push({pIdx:pIdx, move:mv});
    });
  });
  if(!allMoves.length) return null;

  // ── EASY: 50% fully random, 50% best ──
  if(G.difficulty==='easy'){
    if(Math.random()<0.50){
      return allMoves[Math.floor(Math.random()*allMoves.length)];
    }
  }

  // ── HARD: 10% random mistakes — requires real planning ──
  if(G.difficulty==='hard'&&Math.random()<0.10){
    return allMoves[Math.floor(Math.random()*allMoves.length)];
  }

  var scored = allMoves.map(function(m){
    var simPawns = G.pawns.map(function(p,i){
      if(i!==m.pIdx) return {row:p.row,col:p.col,alive:p.alive,promoted:p.promoted};
      return {row:m.move.row,col:m.move.col,alive:p.alive,promoted:p.promoted};
    });
    var score = 0;
    var moved = simPawns[m.pIdx];
    var otherIdx = 1-m.pIdx;
    var other = simPawns[otherIdx];

    // Priority 1: PROMOTION
    if(m.move.row===PROMO_ROW) return {pIdx:m.pIdx, move:m.move, score:10000};

    // Priority 2: Advance (closer to promotion = better)
    score += m.move.row * 20;

    // Priority 3: Prefer advancing pawn farther from king (splits king's attention)
    if(G.difficulty==='hard'){
      var distKingToMoved = Math.max(Math.abs(G.king.row-m.move.row), Math.abs(G.king.col-m.move.col));
      var distKingToOther = other.alive
        ? Math.max(Math.abs(G.king.row-other.row), Math.abs(G.king.col-other.col)) : 0;
      if(distKingToMoved >= distKingToOther) score += 12;
    }

    // Priority 4: Avoid getting captured (moderate penalty — not iron-clad defense)
    if(!isPawnProtected(moved, simPawns)){
      var lm = kingLegalMoves(G.king, simPawns);
      var kingCanCapture = lm.some(function(km){
        return km.row===moved.row&&km.col===moved.col;
      });
      if(kingCanCapture) score -= 80; // reduced from 200 — pawns now take risks
    }

    return {pIdx:m.pIdx, move:m.move, score:score};
  });

  scored.sort(function(a,b){ return b.score-a.score; });

  // Random tiebreak among top-scoring moves
  var best = scored[0].score;
  var top  = scored.filter(function(s){ return s.score===best; });
  return top[Math.floor(Math.random()*top.length)];
}

function sqCenter(r,c){
  var sq=document.getElementById('sq-'+r+'-'+c);
  var outer=document.getElementById('board-outer');
  if(sq&&outer){
    var sr=sq.getBoundingClientRect(),or=outer.getBoundingClientRect();
    var w=sr.width;
    return{x:sr.left-or.left+w/2, y:sr.top-or.top+w/2};
  }
  var sz=getSZ();
  return{x:c*sz+sz/2+3, y:r*sz+sz/2+3};
}

function showCheckLaser(pawns, king){
  var svg=document.getElementById('check-laser');
  var boardPx=getSZ()*8+6;
  svg.setAttribute('viewBox','0 0 '+boardPx+' '+boardPx);
  svg.setAttribute('width', boardPx);
  svg.setAttribute('height', boardPx);
  // Clear previous
  while(svg.firstChild) svg.removeChild(svg.firstChild);

  var threatening=pawns.filter(function(p){
    if(!p.alive) return false;
    return pawnAttackSquares(p).some(function(sq){
      return sq.row===king.row&&sq.col===king.col;
    });
  });
  if(!threatening.length) return;

  threatening.forEach(function(p){
    var from=sqCenter(p.row,p.col);
    var to=sqCenter(king.row,king.col);
    var line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',from.x); line.setAttribute('y1',from.y);
    line.setAttribute('x2',to.x);   line.setAttribute('y2',to.y);
    line.setAttribute('class','laser-beam');
    svg.appendChild(line);
    // Dot on threatening pawn
    var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',from.x); dot.setAttribute('cy',from.y);
    dot.setAttribute('r','6'); dot.setAttribute('class','laser-dot');
    svg.appendChild(dot);
  });
}

function clearCheckLaser(){
  var svg=document.getElementById('check-laser');
  while(svg.firstChild) svg.removeChild(svg.firstChild);
}

var illegalTimer=null;
function showIllegalMove(r, c){

    if(illegalTimer) clearTimeout(illegalTimer);

}

function makePieceImg(svgStr, sizePct, extraStyle){
  var img=document.createElement('img');
  img.src='data:image/svg+xml,'+encodeURIComponent(svgStr);
  img.style.cssText='width:'+sizePct+'%;height:'+sizePct+'%;object-fit:contain;display:block;margin:auto;pointer-events:none;';
  if(extraStyle) img.style.cssText+=extraStyle;
  return img;

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function render(){
  // Reset all squares
  for(var r=0;r<8;r++){
    for(var c=0;c<8;c++){
      var sq=document.getElementById('sq-'+r+'-'+c);
      sq.className='sq '+((r+c)%2===0?'l':'d');
      var fp=sq.querySelector('.fp');
      if(fp) sq.removeChild(fp);
    }
  }

  if(G.phase!=='play') return;

  // Show legal king moves (cursor only, no color)
  if(!G.locked){
    kingLegalMoves(G.king, G.pawns).forEach(function(m){
      document.getElementById('sq-'+m.row+'-'+m.col).classList.add('can-move');
    });
  }

  // Place white king
  var kSq=document.getElementById('sq-'+G.king.row+'-'+G.king.col);
  var kfp=document.createElement('div'); kfp.className='fp';
  kfp.appendChild(makePieceImg(WHITE_KING, 88, ''));
  kSq.appendChild(kfp);

  // Place pawns
  G.pawns.forEach(function(p){
    if(!p.alive) return;
    var pSq=document.getElementById('sq-'+p.row+'-'+p.col);
    var pfp=document.createElement('div'); pfp.className='fp';
    var svg = p.promoted ? BLACK_QUEEN : BLACK_PAWN;
    var sz  = p.promoted ? 88 : 53;
    var ext = p.promoted ? 'filter:drop-shadow(0 0 6px rgba(231,76,60,.8));' : 'filter:drop-shadow(0 0 1px rgba(255,255,255,.6));';
    pfp.appendChild(makePieceImg(svg, sz, ext));
    pSq.appendChild(pfp);
  });
}

/* ═══════════════════════════════════════════════════
   CLICK HANDLER
═══════════════════════════════════════════════════ */
function onSqClick(r,c){
  if(G.phase!=='play'||G.locked) return;

  var legal=kingLegalMoves(G.king, G.pawns);
  var target=legal.find(function(m){ return m.row===r&&m.col===c; });
  if(!target){
    // Show illegal move if clicking an attacked square (or protected pawn)
    var attacked=allPawnAttacks(G.pawns);
    var isAttacked=attacked.has(r*8+c);
    var pawnHere=G.pawns.find(function(p){ return p.alive&&p.row===r&&p.col===c; });
    var isProtected=pawnHere&&isPawnProtected(pawnHere,G.pawns);
    if(isAttacked||isProtected) showIllegalMove(r, c);
    return;
  }

  // Execute king move
  G.king={row:r,col:c};
  G.moves++;
  // Hide turn indicator after first move
  if(G.moves===1) hideTurnIndicator();
  clearCheckLaser();
  snd('move');

  // Check if king captured a pawn
  G.pawns.forEach(function(p){
    if(p.alive&&p.row===r&&p.col===c){
      p.alive=false;
      snd('capture');
      showExplosion(r,c);   // 💥 dramatic capture effect
    }
  });

  render();

  // Animate king
  var kfp=document.getElementById('sq-'+G.king.row+'-'+G.king.col).querySelector('.fp');
  if(kfp){kfp.classList.add('king-anim');setTimeout(function(){if(kfp)kfp.classList.remove('king-anim');},350);}

  // Win check — both pawns captured
  var alivePawns=G.pawns.filter(function(p){return p.alive;});
  if(alivePawns.length===0){
    setTimeout(function(){triggerWin();},300);
    return;
  }

  // Stalemate check after capture
  var nextLegal=kingLegalMoves(G.king, G.pawns);
  if(nextLegal.length===0){
    document.getElementById('turn-row').textContent='🤝 פט! אין לכם מהלך — תיקו!';
    G.locked=true;
    setTimeout(function(){
      document.getElementById('lose-body').textContent='אין מהלכים אפשריים — זה פט! נסו שוב בפעם הבאה!';
      document.getElementById('lose-overlay').classList.add('show');
    }, 800);
    return;
  }

  // Black pawn moves after delay
  G.locked=true;
  document.getElementById('turn-row').textContent='';

  setTimeout(function(){ executePawnAI(); }, 720);
}

/* ═══════════════════════════════════════════════════
   PAWN AI EXECUTION
═══════════════════════════════════════════════════ */
function executePawnAI(){
  var mv=pawnAI();

  // STALEMATE — שחור לתור אך לאף רגלי אין מהלך חוקי = פַּט (תיקו), לא ניצחון למלך!
  // קורה כשהמלך חוסם את הרגלי האחרון חזיתית. בשחמט אמיתי זה תיקו — אסור לאפשר
  // למלך "לדלג" על תור השחור ולתפוס את הרגלי בחינם.
  if(!mv){
    document.getElementById('turn-row').textContent='🤝 פַּט! לרגלי אין מהלך — תיקו!';
    G.locked=true;
    setTimeout(function(){
      document.getElementById('lose-body').textContent='הגעתם לפַּט — תיקו! חסמתם את הרגלי במקום לתפוס אותו. בפעם הבאה תפסו את הרגלים, אל תחסמו אותם!';
      document.getElementById('lose-overlay').classList.add('show');
    }, 800);
    return;
  }

  if(mv){
    var pawn=G.pawns[mv.pIdx];
    pawn.row=mv.move.row;
    pawn.col=mv.move.col;
    snd('pawnStep');
    render();

    // Animate pawn
    var pfp=document.getElementById('sq-'+pawn.row+'-'+pawn.col).querySelector('.fp');
    if(pfp){pfp.classList.add('pawn-anim');setTimeout(function(){if(pfp)pfp.classList.remove('pawn-anim');},400);}

    // Promotion check
    if(pawn.row===PROMO_ROW){
      setTimeout(function(){ triggerPromotion(mv.pIdx); }, 350);
      return;
    }
  }

  G.locked=false;

  // Check if king is now in check — show laser
  var inCheck=isKingInCheck(G.king, G.pawns);
  if(inCheck){
    showCheckLaser(G.pawns, G.king);
    snd('check');
  } else {
    clearCheckLaser();
  }

  // Stalemate check
  var legalNext=kingLegalMoves(G.king, G.pawns);
  if(legalNext.length===0){
    document.getElementById('turn-row').textContent='🤝 פט! אין לכם מהלך — תיקו!';
    G.locked=true;
    setTimeout(function(){
      document.getElementById('lose-body').textContent='אין מהלכים אפשריים — זה פט! נסו שוב בפעם הבאה!';
      document.getElementById('lose-overlay').classList.add('show');
    }, 1000);
  }
}

/* ═══════════════════════════════════════════════════
   PROMOTION
═══════════════════════════════════════════════════ */
function triggerPromotion(pIdx){
  var pawn=G.pawns[pIdx];
  pawn.promoted=true;
  snd('promotion');

  // Flash the promotion square
  var sq=document.getElementById('sq-'+pawn.row+'-'+pawn.col);
  if(sq){ sq.classList.add('promo-flash'); }

  render();

  // Animate queen reveal
  var qfp=document.getElementById('sq-'+pawn.row+'-'+pawn.col).querySelector('.fp');
  if(qfp){ qfp.classList.add('queen-reveal'); }

  spawnSparks(pawn.row, pawn.col, '#E74C3C');

  setTimeout(function(){
    document.getElementById('lose-body').textContent='המורה ברוך מאמין שתצליחו בפעם הבאה!';
    document.getElementById('lose-overlay').classList.add('show');
  }, 1200);
}

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
function triggerWin(){
  G.phase='win';
  snd('win');
  playApplause();

  var perfect=(G.difficulty==='hard');

  document.getElementById('win-retry-btn').textContent=perfect?'🔄 שחקו שוב':'🔄 נסו שוב';

  var btnChallenge=document.getElementById('btn-challenge');
  if(btnChallenge) btnChallenge.style.display=(G.difficulty==='easy'?'inline-block':'none');

    document.getElementById('win-overlay').classList.add('show');
  }, 400);
}

/* ═══════════════════════════════════════════════════
   SPARKS
═══════════════════════════════════════════════════ */
function spawnSparks(row, col, color){
  var bo=document.getElementById('board-outer').getBoundingClientRect();
  var sq=document.getElementById('sq-'+row+'-'+col);
  var cx,cy;
  if(sq){
    var sr=sq.getBoundingClientRect();
    cx=sr.left+sr.width/2; cy=sr.top+sr.height/2;
  } else {
    var sz=getSZ();
    cx=bo.left+3+col*sz+sz/2; cy=bo.top+3+row*sz+sz/2;
  }
  var colors=[color,'#F4D03F','#FFFFFF','#7EC8E3','#FF6B35'];
  for(var i=0;i<28;i++){
    var p=document.createElement('div'); p.className='pspark';
    var ang=Math.random()*Math.PI*2, d=50+Math.random()*90;
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.background=colors[i%colors.length];
    p.style.animationDuration=(0.4+Math.random()*.55)+'s';
    p.style.setProperty('--px',Math.cos(ang)*d+'px');
    p.style.setProperty('--py',Math.sin(ang)*d+'px');
    document.body.appendChild(p);
    setTimeout(function(){ if(p.parentNode) p.parentNode.removeChild(p); },1200);
  }
}

/* ═══════════════════════════════════════════════════
   GAME CONTROL
═══════════════════════════════════════════════════ */
function startGame(diff){
  G.difficulty=diff;
  G.moves=0;
  G.phase='play';
  G.locked=false;
  // Both difficulties start from E1
  G.king = {row:7, col:4};  // E1
  // Easy: D7+E7 — adjacent, protect each other (AI 80% random → genuinely beatable)
  // Hard: D7+F7 — gap of 2, flank king's column, never protect each other (verified WHITE WINS by minimax)
  G.pawns = G.difficulty==='easy'
    ? [{row:1,col:3,alive:true,promoted:false},   // D7
       {row:1,col:4,alive:true,promoted:false}]    // E7
    : [{row:1,col:3,alive:true,promoted:false},   // D7
       {row:1,col:5,alive:true,promoted:false}];  // F7
  document.getElementById('diff-badge').textContent=
    'שלב 3 — '+(diff==='easy'?'🛡️ מלך אמיץ':'⚔️ מלך גיבור');
  document.getElementById('diff-overlay').classList.add('hidden');
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('lose-overlay').classList.remove('show');
  
  document.querySelectorAll('.sq-illegal-x').forEach(function(el){el.remove();});
  var tf=document.getElementById('illegal-text-float');
  if(tf) tf.classList.remove('show');
  clearCheckLaser();
  showTurnIndicator();
  render();
}

function resetGame(){
  document.getElementById('win-overlay').classList.remove('show');
  startGame(G.difficulty);
}

function retryGame(){
  document.getElementById('lose-overlay').classList.remove('show');
  startGame(G.difficulty);
}

function pickDifficulty(){
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('lose-overlay').classList.remove('show');
  G.phase='select';
  document.getElementById('diff-overlay').classList.remove('hidden');
}

function goToStage4(){
  window.location.href='king-stage4.html';
}

/* ═══════════════════════════════════════════════════
   EXPLOSION EFFECT (chess-explosion-skill) — fires on capture
   Robust positioning via getBoundingClientRect (adapts to responsive --cell).
═══════════════════════════════════════════════════ */
function showExplosion(row, col){
  var outer=document.getElementById('board-outer');
  var cellEl=document.getElementById('sq-'+row+'-'+col);
  if(!outer||!cellEl) return;
  var oRect=outer.getBoundingClientRect();
  var cRect=cellEl.getBoundingClientRect();
  var SZ=cRect.width;
  var cx=(cRect.left-oRect.left)+SZ/2;
  var cy=(cRect.top-oRect.top)+SZ/2;
  var W=oRect.width, H=oRect.height;

  var canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  canvas.style.cssText='position:absolute;left:0;top:0;width:'+W+'px;height:'+H+'px;z-index:40;pointer-events:none;';
  outer.appendChild(canvas);
  var c=canvas.getContext('2d');

  var COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  var parts=[];
  for(var i=0;i<45;i++){
    var a=(i/45)*Math.PI*2+Math.random()*0.4;
    var spd=3.5+Math.random()*9;
    parts.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1,decay:0.018+Math.random()*0.022,gravity:0.18+Math.random()*0.12});
  }
  var frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    // Phase 1 — Flash
    if(frame<8){
      var t=frame/7, r0=SZ*0.9*t;
      var g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r0,1));
      g.addColorStop(0,'rgba(255,255,255,'+(1-t)+')');
      g.addColorStop(0.35,'rgba(255,230,80,'+((1-t)*0.9)+')');
      g.addColorStop(0.7,'rgba(255,100,0,'+((1-t)*0.5)+')');
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(r0,1),0,Math.PI*2); c.fill();
    }
    // Phase 2 — Fireball
    if(frame>=1&&frame<22){
      var t2=(frame-1)/21, r1=SZ*0.75*t2, a1=1-t2;
      var g2=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r1,1));
      g2.addColorStop(0,'rgba(255,255,200,'+a1+')');
      g2.addColorStop(0.2,'rgba(255,180,0,'+(a1*0.95)+')');
      g2.addColorStop(0.55,'rgba(210,50,0,'+(a1*0.7)+')');
      g2.addColorStop(0.85,'rgba(100,15,0,'+(a1*0.4)+')');
      g2.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g2; c.beginPath(); c.arc(cx,cy,Math.max(r1,1),0,Math.PI*2); c.fill();
    }
    // Phase 3 — Shockwave ring
    if(frame>=3&&frame<14){
      var t3=(frame-3)/11;
      c.beginPath(); c.arc(cx,cy,SZ*0.5*t3+SZ*0.15,0,Math.PI*2);
      c.strokeStyle='rgba(255,180,50,'+(0.6*(1-t3))+')'; c.lineWidth=3*(1-t3); c.stroke();
    }
    // Phase 4 — Smoke puffs
    if(frame>10){
      var age=frame-10;
      for(var s=0;s<4;s++){
        var sa=Math.max(0,0.18-age*0.004);
        if(sa<=0) break;
        c.beginPath();
        c.arc(cx+Math.sin(s*1.7+age*0.04)*age*0.5, cy-age*0.35+s*4, age*2.8+s*9, 0, Math.PI*2);
        c.fillStyle='rgba(55,55,55,'+(sa/(s*0.4+1))+')'; c.fill();
      }
    }
    // Debris particles
    c.save();
    parts.forEach(function(p){
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0) return;
      c.globalAlpha=p.alpha;
      c.beginPath(); c.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color; c.fill();
    });
    c.restore();
    frame++;
    if(frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function snd(type){
  if(muted) return;
  try{
    var ctx=getAudioCtx();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(type==='move'){
      o.frequency.value=523; o.type='sine';
      g.gain.setValueAtTime(.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.12);
      o.start(); o.stop(ctx.currentTime+.12);
    } else if(type==='capture'){
      // 4-layer explosion (chess-explosion-skill)
      var n=ctx.currentTime;
      // Layer 1: deep sub-bass thud
      var thud=ctx.createOscillator(), thudG=ctx.createGain();
      thud.connect(thudG); thudG.connect(ctx.destination);
      thud.type='sine'; thud.frequency.setValueAtTime(90,n);
      thud.frequency.exponentialRampToValueAtTime(20,n+.5);
      thudG.gain.setValueAtTime(.9,n); thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
      thud.start(n); thud.stop(n+.6);
      // Layer 2: mid punch
      var punch=ctx.createOscillator(), punchG=ctx.createGain();
      punch.connect(punchG); punchG.connect(ctx.destination);
      punch.type='sine'; punch.frequency.setValueAtTime(200,n);
      punch.frequency.exponentialRampToValueAtTime(50,n+.18);
      punchG.gain.setValueAtTime(.5,n); punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
      punch.start(n); punch.stop(n+.22);
      // Layer 3: noise burst (debris)
      var bufSz=Math.floor(ctx.sampleRate*.35);
      var nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
      var ndat=nBuf.getChannelData(0);
      for(var k=0;k<bufSz;k++) ndat[k]=Math.random()*2-1;
      var nSrc=ctx.createBufferSource(); nSrc.buffer=nBuf;
      var nFilt=ctx.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=500; nFilt.Q.value=.5;
      var nGain=ctx.createGain();
      nGain.gain.setValueAtTime(.55,n); nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
      nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
      nSrc.start(n); nSrc.stop(n+.35);
      // Layer 4: sharp transient crack
      var crack=ctx.createOscillator(), crackG=ctx.createGain();
      crack.connect(crackG); crackG.connect(ctx.destination);
      crack.type='sawtooth'; crack.frequency.value=900;
      crackG.gain.setValueAtTime(.5,n); crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
      crack.start(n); crack.stop(n+.06);
    } else if(type==='pawnStep'){
      o.frequency.value=310; o.type='sine';
      g.gain.setValueAtTime(.12,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.1);
      o.start(); o.stop(ctx.currentTime+.1);
    } else if(type==='illegal'){
      // Low thud — "blocked"
      o.type='square'; o.frequency.value=180;
      g.gain.setValueAtTime(.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.22);
      o.start(); o.stop(ctx.currentTime+.22);
    } else if(type==='check'){
      // High alert ping
      o.type='square'; o.frequency.value=880;
      g.gain.setValueAtTime(.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
      o.start(); o.stop(ctx.currentTime+.2);
    } else if(type==='promotion'){
      [440,550,660,880,1100].forEach(function(f,i){
        var oo=ctx.createOscillator(), gg=ctx.createGain();
        oo.connect(gg); gg.connect(ctx.destination);
        oo.frequency.value=f;
        gg.gain.setValueAtTime(.22,ctx.currentTime+i*.07);
        gg.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.07+.18);
        oo.start(ctx.currentTime+i*.07); oo.stop(ctx.currentTime+i*.07+.2);
      });
    } else if(type==='win'){
      [523,659,784,1047].forEach(function(f,i){
        var oo=ctx.createOscillator(), gg=ctx.createGain();
        oo.connect(gg); gg.connect(ctx.destination);
        oo.frequency.value=f;
        gg.gain.setValueAtTime(.28,ctx.currentTime+i*.13);
        gg.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.13+.22);
        oo.start(ctx.currentTime+i*.13); oo.stop(ctx.currentTime+i*.13+.25);
      });
    }
  }catch(e){}
}
function playApplause(){
  if(muted) return;
  try{
    var ctx=getAudioCtx();
    var b64=APPLAUSE_B64.split(',')[1];
    var bin=atob(b64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer.slice(0),function(buffer){
      var src=ctx.createBufferSource();
      var gain=ctx.createGain();
      src.buffer=buffer;
      gain.gain.value=0.85;
      src.connect(gain);gain.connect(ctx.destination);
      src.start();
    });
  }catch(e){}
}

function makeStars(){
  for(var i=0;i<55;i++){
    var s=document.createElement('div'); s.className='star-dot';
    var sz=Math.random()*2+.8;
    s.style.cssText=[
      'width:'+sz+'px','height:'+sz+'px',
      'top:'+Math.random()*100+'%','left:'+Math.random()*100+'%',
      'animation-duration:'+(2+Math.random()*3)+'s',
      'animation-delay:'+Math.random()*3+'s'
    ].join(';');
    document.body.appendChild(s);
  }
}

makeStars();
buildBoard();
render();
window.addEventListener('resize',function(){render();});
