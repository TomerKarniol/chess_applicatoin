<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0C1E30">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>המלך — אוספים יהלומים 💎</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#F4D03F; --gold-dark:#C9A227;
  --green:#52B788; --blue:#7EC8E3;
  --red:#E74C3C;   --orange:#FF6B35;
  --bg1:#162D4A;   --bg2:#0C1E30; --bg3:#060E1A;
  --cell:min(52px,max(40px,calc((100vw - 60px) / 8)));
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Nunito',sans-serif;font-weight:700;color:white;
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:10px 10px max(24px,env(safe-area-inset-bottom));
  user-select:none;overflow-x:hidden;overflow-y:auto;
  overscroll-behavior:none;touch-action:manipulation;
}
@media(max-height:600px){
  body{padding-top:4px;}
  .header{margin-bottom:4px;}
}

.star-dot{position:fixed;border-radius:50%;background:white;pointer-events:none;z-index:0;
  animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8);}to{opacity:.85;transform:scale(1.2);}}

/* TOP BAR */
.top-bar{
  width:100%;max-width:460px;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:4px;margin-top:4px;z-index:1;
}
.stage-badge{
  display:inline-block;font-family:'Fredoka One',cursive;font-size:.85rem;
  color:var(--green);border:2px solid var(--green);border-radius:50px;
  padding:3px 14px;background:rgba(82,183,136,.10);
}
.score-box{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);
  text-shadow:0 0 12px rgba(244,208,63,.5);}
.header{z-index:1;text-align:center;margin-bottom:8px;margin-top:4px;}
.title{font-family:'Fredoka One',cursive;font-size:1.9rem;color:var(--gold);
  text-shadow:0 0 22px rgba(244,208,63,.8),0 2px 6px rgba(0,0,0,.5);}
.subtitle{font-size:1.26rem;color:var(--blue);opacity:.9;margin-top:2px;min-height:1.3em;font-family:'Fredoka One',cursive;}

.coord-wrap{display:flex;align-items:flex-start;gap:5px;direction:ltr;z-index:1;}
.rank-labels{display:flex;flex-direction:column;}
.rank-labels span{height:var(--cell);display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,63,.5);width:18px;}
.file-labels{display:flex;margin-top:3px;}
.file-labels span{width:var(--cell);text-align:center;
  font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--gold);
  text-shadow:0 0 8px rgba(244,208,63,.5);}

.board-outer{position:relative;}
.board{
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 6px 28px rgba(0,0,0,.6),0 0 20px rgba(244,208,63,.12);
}
.sq{width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;
  cursor:default;position:relative;overflow:visible;transition:background .12s;}
.sq.light{background:var(--cell-light);}
.sq.dark{background:var(--cell-dark);}
.sq:hover{cursor:pointer;filter:brightness(1.15);}

#king-piece{
  position:absolute;z-index:10;width:var(--cell);height:var(--cell);
  display:flex;align-items:center;justify-content:center;
  transition:left .22s cubic-bezier(.25,.8,.25,1),top .22s cubic-bezier(.25,.8,.25,1);
  pointer-events:none;
}

/* Scenario 1 — simple gem */
.gem-s1{font-size:1.5rem;z-index:5;display:block;
  animation:gem-bounce .85s ease-in-out infinite alternate;}

/* Scenario 2 — numbered gem */
.gem-wrap{position:relative;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  z-index:5;animation:gem-bounce .9s ease-in-out infinite alternate;}
.gem-emoji{font-size:1.85rem;line-height:1;display:block;}
.gem-num{
  position:absolute;top:-9px;right:-9px;
  width:22px;height:22px;background:#fff;color:#000;
  border-radius:50%;font-family:'Fredoka One',cursive;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid var(--gold-dark);box-shadow:0 2px 8px rgba(0,0,0,.7);z-index:6;}
.gem-wrap.next-gem{
  animation:gem-bounce .9s ease-in-out infinite alternate,
            next-pulse 1.1s ease-in-out infinite alternate;}
@keyframes next-pulse{from{filter:brightness(1);}to{filter:brightness(1.35) drop-shadow(0 0 6px rgba(244,208,63,.9));}}
.gem-wrap.done{opacity:.3;animation:none;}

@keyframes gem-bounce{from{transform:translateY(0) scale(1);}to{transform:translateY(-4px) scale(1.1);}}

.sq.wrong-flash{animation:wrong .3s ease-in-out 2;}
@keyframes wrong{0%,100%{filter:brightness(1);}50%{filter:brightness(.5) sepia(1) hue-rotate(-30deg);}}

/* Illegal-move feedback */
@keyframes king-shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}50%{transform:translateX(5px);}75%{transform:translateX(-3px);}}
.king-shake{animation:king-shake .35s ease-in-out;}
.sq-illegal-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.7rem;font-weight:900;color:var(--red);
  z-index:7;pointer-events:none;text-shadow:0 0 8px rgba(0,0,0,.8);
  animation:illegal-x-pop .25s cubic-bezier(.175,.885,.32,1.5);}
@keyframes illegal-x-pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}

.mine{font-size:1.35rem;z-index:5;display:block;}

/* TRANSITION overlay */
#tr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:400;display:none;align-items:center;justify-content:center;}
#tr-overlay.show{display:flex;}
.tr-card{
  background:linear-gradient(135deg,#091a09,#122d12);
  border:3px solid var(--green);border-radius:22px;
  padding:32px 44px;text-align:center;max-width:320px;width:90%;
  animation:card-pop .4s cubic-bezier(.175,.885,.32,1.5);
}
.tr-icon{font-size:3.5rem;display:block;margin-bottom:10px;}
.tr-title{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--green);margin-bottom:8px;}
.tr-bonus{font-size:1rem;color:var(--green);margin-bottom:14px;min-height:1.4em;}
.tr-next{font-size:.85rem;color:rgba(255,255,255,.5);}

/* BOOM overlay */
#boom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);
  z-index:500;display:none;align-items:center;justify-content:center;}
#boom-overlay.show{display:flex;}
.boom-card{
  background:linear-gradient(135deg,#1a0808,#2d1212);
  border:3px solid var(--red);border-radius:22px;
  padding:30px 40px;text-align:center;max-width:320px;width:90%;
  animation:card-pop .4s cubic-bezier(.175,.885,.32,1.5);
}
@keyframes card-pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.boom-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--red);margin-bottom:20px;}

/* WIN overlay */
#win-overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);
  z-index:500;display:none;align-items:center;justify-content:center;}
#win-overlay.show{display:flex;}
.win-card{
  background:linear-gradient(135deg,#091a09,#122d12);
  border:3px solid var(--gold);border-radius:22px;
  padding:30px 40px;text-align:center;max-width:360px;width:90%;
  animation:card-pop .4s cubic-bezier(.175,.885,.32,1.5);
}
.win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin-bottom:14px;}
.win-stars{font-size:2.2rem;letter-spacing:4px;margin:0 0 20px;
  animation:starsIn .5s .1s cubic-bezier(.175,.885,.32,1.5) both;}
@keyframes starsIn{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}

.btn-mute{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;font-size:1.1rem;cursor:pointer;color:white;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}

.card-btn{
  font-family:'Fredoka One',cursive;font-size:1.3rem;
  padding:11px 36px;border-radius:50px;border:none;cursor:pointer;color:white;
  background:linear-gradient(135deg,#F4D03F,#C9A227,#9A7B1A);
  box-shadow:0 0 20px rgba(244,208,63,.5);
  transition:transform .15s;touch-action:manipulation;
}
.card-btn:hover{transform:scale(1.05);}
.card-btn.red-btn{
  background:linear-gradient(135deg,#E74C3C,#C0392B);
  box-shadow:0 0 20px rgba(231,76,60,.4);
}
.gem-particle{
  position:fixed;border-radius:50%;pointer-events:none;
  animation:gem-burst ease-out forwards;z-index:999;
}
@keyframes gem-burst{
  from{opacity:1;transform:translate(0,0) scale(1);}
  to{opacity:0;transform:translate(var(--gx),var(--gy)) scale(.15);}
}

/* Mine shift animation */
@keyframes mine-shift{
  0%{transform:scale(1);}
  30%{transform:scale(.65) rotate(-15deg);}
  65%{transform:scale(1.2) rotate(8deg);}
  100%{transform:scale(1) rotate(0deg);}
}
.mine-anim{animation:mine-shift .45s cubic-bezier(.175,.885,.32,1.5);}


#order-warning{
  z-index:1;margin-top:8px;text-align:center;
  font-family:'Fredoka One',cursive;font-size:1.1rem;
  color:var(--orange);
  min-height:1.6em;
  opacity:0;transition:opacity .2s;
}
#order-warning.show{opacity:1;}

</style>
</head>
<body>
<div id="stars-bg"></div>

<div class="top-bar">
  <div class="stage-badge">שלב 1 — אוספים יהלומים</div>
  <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
</div>

<div class="header">
  <div class="title">אוספים יהלומים!</div>
  <div class="subtitle" id="subtitle"></div>
</div>

<div class="coord-wrap">
  <div class="rank-labels" id="ranks"></div>
  <div>
    <div class="board-outer" id="board-outer">
      <div class="board" id="board"></div>
      <div id="king-piece"></div>
    </div>
    <div class="file-labels" id="files"></div>
  </div>
</div>
<div id="order-warning">⚠️ שימו לב לסדר איסוף היהלומים!</div>

<!-- TRANSITION overlay -->
<div id="tr-overlay">
  <div class="tr-card">
    <span class="tr-icon">🎉</span>
    <div class="tr-title">תרחיש 1 הושלם!</div>
    <div class="tr-bonus" id="tr-bonus"></div>
    <div class="tr-next">עוברים לתרחיש 2...</div>
  </div>
</div>

<!-- BOOM overlay -->
<div id="boom-overlay">
  <div class="boom-card">
    <div class="boom-title">BOOM! 💥</div>
    <button class="card-btn red-btn" onclick="retryAfterBoom()">נסו שוב 💪</button>
  </div>
</div>

<!-- WIN overlay -->
<div id="win-overlay">
  <div class="win-card">
    <span style="font-size:3.5rem;display:block;margin-bottom:6px">🏆</span>
    <div class="win-title">כל הכבוד!</div>
    <div class="win-stars" id="win-stars"></div>
    <button class="card-btn" onclick="goToStage2()">לשלב 2 ←</button>
    <button class="card-btn" id="win-retry-btn" style="font-size:1rem;padding:8px 24px;background:linear-gradient(135deg,#1a6b8a,#104f66);margin-top:8px;" onclick="fullReset()">🔄 נסו שוב</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  KING SVG (cburnett — same as king-intro__9_.html)
// ══════════════════════════════════════════════
const WHITE_KING=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6M20,8h5" style="fill:none;stroke:#000;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#fff;stroke:#000;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37" style="fill:#fff"/><path d="M11.5,30c5.5-3,15.5-3,21,0M11.5,33.5c5.5-3,15.5-3,21,0M11.5,37c5.5-3,15.5-3,21,0" style="fill:none"/></g></svg>`;

function makeKingImg(){
  const img=document.createElement('img');
  img.src='data:image/svg+xml,'+encodeURIComponent(WHITE_KING);
  img.style.cssText='width:90%;height:90%;object-fit:contain;display:block;margin:auto;';
  return img;
}

// ══════════════════════════════════════════════
//  SCENARIO DEFINITIONS
// ══════════════════════════════════════════════
const SCENARIOS={
  1:{
    subtitle:'היזהרו מהמוקשים! 💣',
    shuffleEvery:3,
    ordered:false,
    gems:[
      {r:0,c:3},  // D8
      {r:0,c:7},  // H8
      {r:3,c:6},  // G5
      {r:4,c:1},  // B4
    ],
    mines:[
      {r:0,c:4},  // E8  — guards D8
      {r:1,c:3},  // D7  — guards D8
      {r:1,c:6},  // G7  — guards H8
      {r:4,c:0},  // A4  — guards B4
      {r:4,c:5},  // F4  — guards G5
      {r:4,c:6},  // G4  — guards G5
      {r:4,c:7},  // H4  — guards G5
      {r:5,c:1},  // B3  — guards B4
      {r:5,c:2},  // C3  — guards B4
    ],
  },
  2:{
    subtitle:'אספו לפי הסדר 1→2→3→4',
    shuffleEvery:2,
    ordered:true,
    gems:[
      {r:5,c:2},  // ① C3
      {r:2,c:0},  // ② A6
      {r:1,c:5},  // ③ F7
      {r:5,c:7},  // ④ H3
    ],
    mines:[
      {r:6,c:1},  // B2  — guards C3
      {r:6,c:3},  // D2  — guards C3
      {r:5,c:1},  // B3  — guards C3
      {r:1,c:1},  // B7  — guards A6
      {r:3,c:1},  // B5  — guards A6
      {r:1,c:0},  // A7  — guards A6
      {r:0,c:4},  // E8  — guards F7
      {r:0,c:6},  // G8  — guards F7
      {r:1,c:6},  // G7  — guards F7
      {r:6,c:6},  // G2  — guards H3
      {r:4,c:6},  // G4  — guards H3
      {r:4,c:7},  // H4  — guards H3
    ],
  },
};
const ORIGINAL_SCENARIOS=JSON.parse(JSON.stringify(SCENARIOS));
const KING_HOME={r:7,c:4};  // E1
function getSZ(){
  var cell=document.querySelector('#board .sq');
  if(cell){
    var w=cell.getBoundingClientRect().width;
    if(w>0) return w;
  }
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||52;
}

// ══════════════════════════════════════════════
//  KING STATE
// ══════════════════════════════════════════════
const KingState={
  MODULE_KEY: 'chess_king',
  STAGE_KEYS: ['stage1','stage2','stage3','stage4'],
  PERFECT_THRESHOLD: 4,   // N — כל 4 השלבים perfect = 3⭐ (תואם starThreshold:4 ב-index.html)
  save(stageKey,perfect){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev=d[stageKey]||{};
      // v2.1: אחרון מתעדכן תמיד; שיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      const bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;
      d[stageKey]={done:true,perfect,lastPerfect:perfect,bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  // v2.1 — תצוגה כפולה: מחזיר {best, last} (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars(){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const done=this.STAGE_KEYS.filter(k=>d[k]?.done).length;
      if(done<this.STAGE_KEYS.length) return {best:0,last:0};
      const bestP=this.STAGE_KEYS.filter(k=>(d[k]?.bestPerfect??d[k]?.perfect)).length;
      const lastP=this.STAGE_KEYS.filter(k=>(d[k]?.lastPerfect??d[k]?.perfect)).length;
      const toStars=p=>p>=this.PERFECT_THRESHOLD?3:2;
      return {best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return {best:0,last:0};}
  }
};

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let currentScenario,king,gems,mines,moveCount,nextGem,locked;
// ── Mistake tracking (v3) — global across both scenarios, survives BOOM retry ──
let totalWrongClicks=0;   // mines + wrong-order gems + illegal moves (from the 2nd onward)
let illegalMoveCount=0;   // 1st illegal move = free teaching moment; 2nd+ counts

function loadScenario(n,resetGems=true){
  currentScenario=n;
  const sc=ORIGINAL_SCENARIOS[n];  // pristine source — reset restores original gem/mine positions
  king={...KING_HOME};
  mines=sc.mines.map(m=>({...m}));
  moveCount=0; nextGem=0; locked=false;
  if(resetGems) gems=sc.gems.map((g,i)=>({...g,order:i+1,collected:false}));
  document.getElementById('subtitle').textContent=sc.subtitle;
  const warn=document.getElementById('order-warning');
  if(warn){ warn.classList.remove('show'); }
}

// ══════════════════════════════════════════════
//  BUILD BOARD
// ══════════════════════════════════════════════
function getCellPos(r,c){
  const sq=document.getElementById(`sq${r}${c}`);
  const outer=document.getElementById('board-outer');
  if(sq&&outer){
    const sr=sq.getBoundingClientRect(),or=outer.getBoundingClientRect();
    return {left:sr.left-or.left, top:sr.top-or.top};
  }
  const sz=getSZ(); return {left:c*sz, top:r*sz};
}

function buildBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'light':'dark');
    sq.id=`sq${r}${c}`;
    sq.addEventListener('click',()=>tryMove(r,c));
    board.appendChild(sq);
  }
  const rDiv=document.getElementById('ranks');
  rDiv.innerHTML='';
  ['8','7','6','5','4','3','2','1'].forEach(n=>{
    const s=document.createElement('span');s.textContent=n;rDiv.appendChild(s);
  });
  const fDiv=document.getElementById('files');
  fDiv.innerHTML='';
  ['A','B','C','D','E','F','G','H'].forEach(f=>{
    const s=document.createElement('span');s.textContent=f;fDiv.appendChild(s);
  });
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function render(){
  for(let r=0;r<8;r++) for(let c=0;c<8;c++)
    document.getElementById(`sq${r}${c}`).innerHTML='';

  gems.forEach((g,i)=>{
    const sq=document.getElementById(`sq${g.r}${g.c}`);
    if(!sq) return;
    if(currentScenario===1){
      if(!g.collected) sq.innerHTML='<span class="gem-s1">💎</span>';
    } else {
      const wrap=document.createElement('div');
      wrap.className='gem-wrap';
      if(g.collected) return; // collected gems disappear — no ghost display
      if(i===nextGem) wrap.classList.add('next-gem');
      wrap.innerHTML=`<span class="gem-emoji">💎</span><span class="gem-num">${g.order}</span>`;
      sq.appendChild(wrap);
    }
  });

  mines.forEach(m=>{
    const sq=document.getElementById(`sq${m.r}${m.c}`);
    // Never overwrite an uncollected gem
    const onGem=gems.some(g=>!g.collected&&g.r===m.r&&g.c===m.c);
    if(sq&&!onGem) sq.innerHTML='<span class="mine">💣</span>';
  });

  const kp=document.getElementById('king-piece');
  if(!kp.hasChildNodes()) kp.appendChild(makeKingImg());
  const kPos=getCellPos(king.r,king.c);
  kp.style.left=kPos.left+'px';
  kp.style.top =kPos.top+'px';
}

// ══════════════════════════════════════════════
//  MOVE LOGIC
// ══════════════════════════════════════════════
function tryMove(r,c){
  if(locked) return;
  // Tapping the king's own square — silent no-op (not a movement error)
  if(r===king.r&&c===king.c) return;
  // Illegal move attempt (too far for a king) — feedback ALWAYS; 1st free, 2nd+ counts
  if(Math.abs(r-king.r)>1||Math.abs(c-king.c)>1){
    illegalMoveCount++;
    if(illegalMoveCount>1) totalWrongClicks++;
    showIllegalMove(r,c);
    return;
  }

  king.r=r; king.c=c;
  moveCount++;

  // Mine collision?
  if(mines.some(m=>m.r===r&&m.c===c)){
    playSound('boom');
    totalWrongClicks++;   // mine hit counts (global counter survives the retry)
    locked=true;
    render();
    setTimeout(()=>document.getElementById('boom-overlay').classList.add('show'),320);
    return;
  }

  // Gem landing?
  const gi=gems.findIndex(g=>!g.collected&&g.r===r&&g.c===c);
  if(gi>=0){
    const ordered=SCENARIOS[currentScenario].ordered;
    if(!ordered||gi===nextGem){
      gems[gi].collected=true;
      nextGem++;
      playSound('coin');
      spawnGemParticles(r,c); // #12 gem burst
    } else {
      playSound('wrong');
      totalWrongClicks++;   // reached the wrong gem (out of order) — counts
      const sq=document.getElementById(`sq${r}${c}`);
      sq.classList.add('wrong-flash');
      setTimeout(()=>sq.classList.remove('wrong-flash'),600);
      // Show order warning
      const warn=document.getElementById('order-warning');
      warn.textContent='⚠️ שימו לב לסדר איסוף היהלומים!';
      warn.classList.add('show');
      clearTimeout(warn._t);
      warn._t=setTimeout(()=>warn.classList.remove('show'),2500);
    }
  }

  // All collected?
  if(gems.every(g=>g.collected)){
    locked=true;
    render();
    if(currentScenario===1) setTimeout(showTransition,400);
    else setTimeout(showFinalWin,400);
    return;
  }

  if(moveCount%SCENARIOS[currentScenario].shuffleEvery===0) shiftGuard();
  render();
}

// ══════════════════════════════════════════════
//  GEM BURST PARTICLES (#12)
// ══════════════════════════════════════════════
function spawnGemParticles(r,c){
  const colors=['#7EC8E3','#52B788','#B0E0FF','#FFFFFF','#C39BD3','#F4D03F'];
  const bo=document.getElementById('board-outer').getBoundingClientRect();
  const kPos=getCellPos(r,c);
  const cx=bo.left+kPos.left+getSZ()/2;
  const cy=bo.top+kPos.top+getSZ()/2;
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='gem-particle';
    const sz=4+Math.random()*5;
    const ang=Math.random()*Math.PI*2;
    const dist=50+Math.random()*70;
    p.style.cssText=`
      width:${sz}px;height:${sz}px;
      left:${cx}px;top:${cy}px;
      background:${colors[i%colors.length]};
      animation-duration:${.45+Math.random()*.35}s;
    `;
    p.style.setProperty('--gx',Math.cos(ang)*dist+'px');
    p.style.setProperty('--gy',Math.sin(ang)*dist+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),900);
  }
  // Flash glow on the square
  const sq=document.getElementById(`sq${r}${c}`);
  if(sq){
    sq.style.background='rgba(126,200,227,.85)';
    sq.style.boxShadow='0 0 22px rgba(126,200,227,1)';
    setTimeout(()=>{sq.style.background='';sq.style.boxShadow='';},320);
  }
}

// ══════════════════════════════════════════════
//  MINE SHIFT ANIMATION (#9)
// ══════════════════════════════════════════════
function animateMineShift(r,c){
  const sq=document.getElementById(`sq${r}${c}`);
  if(!sq) return;
  const span=sq.querySelector('.mine');
  if(!span) return;
  span.classList.remove('mine-anim');
  void span.offsetWidth; // reflow
  span.classList.add('mine-anim');
  setTimeout(()=>span.classList.remove('mine-anim'),500);
}

// ══════════════════════════════════════════════
//  ILLEGAL MOVE FEEDBACK — king moves only one square
// ══════════════════════════════════════════════
function showIllegalMove(r,c){
  // 1. shake the king
  const kp=document.getElementById('king-piece');
  kp.classList.remove('king-shake'); void kp.offsetWidth; kp.classList.add('king-shake');
  setTimeout(()=>kp.classList.remove('king-shake'),360);
  // 2. red ✕ on the tapped square (cleared on next render or after 700ms)
  const sq=document.getElementById(`sq${r}${c}`);
  if(sq&&!sq.querySelector('.sq-illegal-x')){
    const x=document.createElement('div');
    x.className='sq-illegal-x'; x.textContent='✕';
    sq.appendChild(x);
    setTimeout(()=>x.remove(),700);
  }
  // 3. transient toast
  const warn=document.getElementById('order-warning');
  warn.textContent='♚ המלך זז משבצת אחת בלבד!';
  warn.classList.add('show');
  clearTimeout(warn._t);
  warn._t=setTimeout(()=>warn.classList.remove('show'),2000);
  playSound('wrong');
}

// ══════════════════════════════════════════════
//  SCORES
// ══════════════════════════════════════════════
function retryAfterBoom(){
  document.getElementById('boom-overlay').classList.remove('show');
  // Retry the SAME scenario the player failed on (not a random one).
  // totalWrongClicks is NOT reset here — the mine hit must keep counting.
  loadScenario(currentScenario,true);
  render();
}

// ══════════════════════════════════════════════
//  TRANSITION 1 → 2
// ══════════════════════════════════════════════
function showTransition(){
  document.getElementById('tr-bonus').textContent=(totalWrongClicks===0)?'🎯 ריצה מושלמת!':'';
  document.getElementById('tr-overlay').classList.add('show');
  playSound('coin');
  setTimeout(()=>{
    document.getElementById('tr-overlay').classList.remove('show');
    loadScenario(2,true);
    render();
  },2400);
}

// ══════════════════════════════════════════════
//  FINAL WIN
// ══════════════════════════════════════════════
function showFinalWin(){
  const perfect=(totalWrongClicks<=2);   // ≤2 mistakes across the stage = 3⭐ (v3 rule)
  KingState.save('stage1',perfect);
  document.getElementById('win-stars').textContent=perfect?'⭐⭐⭐':'⭐⭐';
  document.getElementById('win-retry-btn').textContent=perfect?'🔄 שחקו שוב':'🔄 נסו שוב';
  document.getElementById('win-overlay').classList.add('show');
  playSound('win');
}

function goToStage2(){
  window.location.href='king-stage2.html';
}

function fullReset(){
  document.getElementById('win-overlay').classList.remove('show');
  // "Play again" restarts the FULL stage from scenario 1 (sequential 1 -> 2).
  totalWrongClicks=0; illegalMoveCount=0;   // full replay resets the mistake counters
  loadScenario(1,true);
  render();
}

// ══════════════════════════════════════════════
//  BFS REACHABILITY — can king reach gem's free adj squares?
// ══════════════════════════════════════════════
function kingCanReach(target, simMines){
  // Build mine set for fast lookup
  const mineSet=new Set(simMines.map(m=>m.r*8+m.c));

  // Goals: free adjacent squares of target
  const adjToTarget=neighbours(target.r,target.c);
  const goals=new Set(
    adjToTarget
      .filter(sq=>!mineSet.has(sq.r*8+sq.c))
      .map(sq=>sq.r*8+sq.c)
  );
  if(goals.size===0) return false; // no free adj sq at all

  // BFS from king's current position
  const visited=new Set();
  const queue=[king.r*8+king.c];
  visited.add(king.r*8+king.c);

  while(queue.length){
    const key=queue.shift();
    if(goals.has(key)) return true;
    const r=Math.floor(key/8), c=key%8;
    for(let dr=-1;dr<=1;dr++){
      for(let dc=-1;dc<=1;dc++){
        if(!dr&&!dc) continue;
        const nr=r+dr, nc=c+dc;
        if(nr<0||nr>=8||nc<0||nc>=8) continue;
        const nk=nr*8+nc;
        if(visited.has(nk)) continue;
        if(mineSet.has(nk)) continue; // mines block movement
        visited.add(nk);
        queue.push(nk);
      }
    }
  }
  return false;
}

// ══════════════════════════════════════════════
//  MINE GUARD-SHIFT — strategic blocking
//  FIX 1: ordered scenarios → target nextGem only (not nearest gem)
//  FIX 2: BFS reachability check (not just free-count)
// ══════════════════════════════════════════════
function chebyshev(r1,c1,r2,c2){return Math.max(Math.abs(r1-r2),Math.abs(c1-c2));}

function neighbours(r,c){
  const res=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<8&&nc>=0&&nc<8) res.push({r:nr,c:nc});
  }
  return res;
}

function shiftGuard(){
  const sc=SCENARIOS[currentScenario];

  // FIX 1: For ordered scenarios, only guard the CURRENT required gem.
  // Using nearest-gem targeting caused premature blocking of future gems.
  let target;
  if(sc.ordered){
    // nextGem index = next uncollected gem in sequence
    if(nextGem>=gems.length) return;
    target=gems[nextGem];
    if(!target||target.collected) return;
  } else {
    const active=gems.filter(g=>!g.collected);
    if(!active.length) return;
    active.sort((a,b)=>chebyshev(king.r,king.c,a.r,a.c)-chebyshev(king.r,king.c,b.r,b.c));
    target=active[0];
  }

  // FIX 3 (revised): the guard keeps shifting at ANY distance — challenge preserved —
  // but it must NEVER move onto a square ADJACENT to the king (enforced in the
  // destinations filter below). That guarantees the king's immediate step toward the
  // gem is never blocked, so its distance to the gem strictly decreases → no
  // oscillation, no dead-end. (kingCanReach BFS remains a second safety net.)

  const adjToGem=neighbours(target.r,target.c);
  const guards=mines.filter(m=>adjToGem.some(sq=>sq.r===m.r&&sq.c===m.c));
  if(!guards.length) return;

  // Sort guards: move the one furthest from king
  guards.sort((a,b)=>chebyshev(king.r,king.c,b.r,b.c)-chebyshev(king.r,king.c,a.r,a.c));

  // Destinations: free adjacent squares of gem, not king's square, not another gem
  const destinations=adjToGem
    .filter(sq=>{
      if(sq.r===king.r&&sq.c===king.c) return false;
      if(chebyshev(king.r,king.c,sq.r,sq.c)<=1) return false;  // FIX 3: never block the king's immediate step
      if(mines.some(m=>m.r===sq.r&&m.c===sq.c)) return false;
      if(gems.some(g=>!g.collected&&g.r===sq.r&&g.c===sq.c)) return false;
      return true;
    })
    .sort((a,b)=>chebyshev(king.r,king.c,a.r,a.c)-chebyshev(king.r,king.c,b.r,b.c));

  if(!destinations.length) return;

  for(const chosen of guards){
    for(const dest of destinations){
      if(dest.r===chosen.r&&dest.c===chosen.c) continue;

      // FIX 2: Simulate the full mine config after this move
      // and verify king can still physically reach the gem via BFS
      const simMines=mines.map(m=>
        m===chosen ? {r:dest.r,c:dest.c} : {r:m.r,c:m.c}
      );

      if(kingCanReach(target, simMines)){
        chosen.r=dest.r;
        chosen.c=dest.c;
        setTimeout(()=>animateMineShift(dest.r,dest.c),60);
        return;
      }
    }
  }
  // No safe move found — skip this turn
}

// ══════════════════════════════════════════════
//  AUDIO — singleton + mute
// ══════════════════════════════════════════════
let _audioCtx=null;
let muted=false;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed')
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return _audioCtx;
}
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
}
function playSound(type){
  if(muted) return;
  try{
    const ctx=getAudioCtx();
    if(type==='coin'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1320,ctx.currentTime+.1);
      g.gain.setValueAtTime(.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
      o.start();o.stop(ctx.currentTime+.25);
    } else if(type==='boom'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sawtooth';o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(300,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(55,ctx.currentTime+.5);
      g.gain.setValueAtTime(.5,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);
      o.start();o.stop(ctx.currentTime+.5);
    } else if(type==='wrong'){
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='square';o.connect(g);g.connect(ctx.destination);
      o.frequency.setValueAtTime(200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(150,ctx.currentTime+.2);
      g.gain.setValueAtTime(.2,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.2);
      o.start();o.stop(ctx.currentTime+.2);
    } else if(type==='win'){
      [523,659,784,1047].forEach((freq,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;
        g.gain.setValueAtTime(.28,ctx.currentTime+i*.13);
        g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.13+.22);
        o.start(ctx.currentTime+i*.13);o.stop(ctx.currentTime+i*.13+.22);
      });
    }
  }catch(e){}
}

// ══════════════════════════════════════════════
//  STARS + INIT
// ══════════════════════════════════════════════
function makeStars(){
  const bg=document.getElementById('stars-bg');
  for(let i=0;i<55;i++){
    const s=document.createElement('div');s.className='star-dot';
    const sz=Math.random()*2+.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;
      animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
}

buildBoard();
makeStars();
loadScenario(1,true);
render();
