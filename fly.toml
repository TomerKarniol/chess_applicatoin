# fly.toml — אני מפלצת שחמט!  (deploy config for Fly.io)
#
# NOTE: `app` must be GLOBALLY UNIQUE across Fly.io. If `fly launch`/`fly deploy`
# says the name is taken, change it here (and it becomes <app>.fly.dev).

app = "chess-karniol"
primary_region = "otp"   # Bucharest — closest Fly region to Israel (alt: fra = Frankfurt)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/chess.db"   # lives on the mounted volume below
  STATIC_ROOT = ".."           # server runs from /app/server; ".." = repo root (lessons)

# Persistent disk for the SQLite database. Create it once with:
#   fly volumes create chess_data --size 1 --region otp
[[mounts]]
  source = "chess_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true            # required: the session cookie is Secure in prod
  auto_stop_machines = false    # keep it always-on; SQLite is bound to this one machine
  auto_start_machines = true
  min_machines_running = 1      # exactly one machine owns the volume — do NOT scale >1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
