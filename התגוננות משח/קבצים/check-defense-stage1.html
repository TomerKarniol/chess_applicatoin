<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מגינים על המלך – שלב 1: בריחה ♔</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
:root {
  --cell:58px;
  --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --blue:#7EC8E3;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
@media(max-height:600px){:root{--cell:36px;}}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; overflow-x:hidden; user-select:none;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  padding:16px 12px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
/* רשת ביטחון: מסך נמוך -> גלילה + יישור לראש כדי ששום אלמנט (כולל תוויות A-H) לא ייחתך */
@media(max-height:700px){ body{ overflow-y:auto; justify-content:flex-start; } }
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:10px; width:100%;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

/* HUD */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  width:var(--board-size);
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(82,183,136,.15); border:1.5px solid rgba(82,183,136,.35);
  border-radius:50px; padding:3px 14px; color:var(--green);
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.6rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); text-align:center;
}

/* PROGRESS */
.progress-row { display:flex; gap:8px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(82,183,136,.3);
  transition:all .4s;
}
.prog-dot.done   { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(82,183,136,.4); border-color:var(--green); animation:dot-pulse .8s ease-in-out infinite alternate; }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

/* INSTRUCTION */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.26rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  min-height:40px; display:flex; align-items:center; justify-content:center;
  width:var(--board-size);
  animation:instr-pulse 2.4s ease-in-out infinite alternate;
}
@keyframes instr-pulse {
  from { opacity:1; transform:scale(1); }
  to   { opacity:.65; transform:scale(1.01); }
}
.instruction.phase2 { color:#F4D03F; border-color:rgba(244,208,63,.3); background:rgba(244,208,63,.08); }

/* BOARD */
.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold); width:15px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold);
}
.board-outer {
  position:relative; width:var(--board-size); height:var(--board-size);
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
}
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:var(--cell-light); }
.cd { background:var(--cell-dark); }
.cell.escape-hint { background:rgba(82,183,136,.55) !important; cursor:pointer; }
.cell.escape-hint::after {
  content:''; position:absolute; inset:4px; border-radius:50%;
  background:rgba(82,183,136,.4); border:2px solid rgba(82,183,136,.8);
  animation:hint-pulse .8s ease-in-out infinite alternate;
}
@keyframes hint-pulse { from{opacity:.5;transform:scale(.9)} to{opacity:1;transform:scale(1.05)} }
.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }

/* X error on wrong piece */
.piece-err-x {
  position:absolute; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.75); line-height:1;
  color:#E74C3C;
  filter:drop-shadow(0 0 8px rgba(231,76,60,.9));
  animation:x-pop .15s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none;
}
@keyframes x-pop {
  from { transform:scale(0) rotate(-30deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg);   opacity:1; }
}

/* PIECES */
.piece {
  position:absolute; z-index:10;
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  transition:top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.piece.glow-threat {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:threat-pulse .5s ease-in-out infinite alternate;
  cursor:pointer;
}
@keyframes threat-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
.piece.king-danger {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
}

/* LASER */
.laser-svg { position:absolute; inset:0; width:100%; height:100%; z-index:20; pointer-events:none; overflow:visible; }

/* KING DANGER OVERLAY */
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.7);
  animation:king-danger-pulse .4s ease-in-out infinite alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to{opacity:1;background:rgba(231,76,60,.85)}
}

/* TRANSITION OVERLAY */
#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.88); opacity:0; pointer-events:none;
  transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon  { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--blue); }

/* WIN OVERLAY */
#win-overlay {
  position:fixed; inset:0; z-index:450;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.92); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-overlay.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:50px 70px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.5rem; color:var(--gold); margin-bottom:10px; }
.win-stars { font-size:2.2rem; margin:8px 0 4px; }
.win-msg   { font-family:'Fredoka One',cursive; font-size:1.15rem; color:var(--blue); margin-bottom:24px; }
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s, box-shadow .15s;
  display:block; width:100%; margin-bottom:10px;
  touch-action:manipulation;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s, border-color .2s; display:block; width:100%;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }

/* BURST */
.burst {
  position:fixed; border-radius:50%; pointer-events:none; z-index:600;
  animation:burst-anim .6s ease-out forwards;
}
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1;} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0;} }

/* MUTE BUTTON */
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1/3</div>
    <div class="game-title" style="display:flex;align-items:center;justify-content:center;gap:8px;">
      שלב 1 - בריחה
      <img id="title-king-icon" style="width:1.8rem;height:1.8rem;object-fit:contain;"/>
    </div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="instruction" id="instruction">לחצו על הכלי שמאיים שח על המלך!</div>

  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
        <svg class="laser-svg" id="laser-svg"></svg>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>
</div>

<!-- TRANSITION -->
<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon">👏</span>
    <div class="tr-title" id="tr-title">כל הכבוד!</div>
    <div class="tr-sub"   id="tr-sub">עוברים לתרחיש הבא...</div>
  </div>
</div>

<!-- WIN -->
<div id="win-overlay">
  <div class="win-card">
    <span style="font-size:4rem;display:block;margin-bottom:10px">👏</span>
    <div class="win-title">שלב הושלם!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-msg"   id="win-msg">ביצוע מושלם! 🎉</div>
    <button class="btn-next" onclick="location.href='check-defense-stage2.html'">שלב הבא ←</button>
    <button class="btn-retry" id="btn-replay" onclick="fullReset()">שחקו שוב 🔄</button>
  </div>
</div>

<script>
// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

function getCell(){
  const w = window.innerWidth;
  const wPx = w<=360?40 : w<=390?44 : w<=430?48 : w<=480?53 : 58;
  // גם לפי גובה: header+סטטוס+רמז+תוויות+ריווחים ≈ 195px — כך תוויות A-H לא נחתכות במסך כיתה נמוך
  const hPx = Math.floor((window.innerHeight - 195) / 8);
  const px = Math.max(36, Math.min(wPx, hPx));
  document.documentElement.style.setProperty('--cell', px+'px');
  document.documentElement.style.setProperty('--board-size', (px*8)+'px');
  return px;
}
let CELL = 64;
const FILES_ARR = ['A','B','C','D','E','F','G','H'];

// ── Scenarios ──
const SCENARIOS = [
  {
    title: 'תרחיש 1',
    pieces: [
      { id:'threat', sym:'♜', white:false, file:'A', rank:6, type:'rook'   },
      { id:'king',   sym:'♔', white:true,  file:'F', rank:6, type:'king'   },
      { id:'kn1',    sym:'♞', white:false, file:'F', rank:3, type:'knight' },
      { id:'b1',     sym:'♝', white:false, file:'A', rank:3, type:'bishop' },
      { id:'b2',     sym:'♝', white:false, file:'B', rank:1, type:'bishop' },
    ],
    threatId: 'threat',
    kingId: 'king',
    escapeSqs: [{file:'F',rank:7},{file:'G',rank:7}],
  },
  {
    title: 'תרחיש 2',
    pieces: [
      { id:'threat', sym:'♗', white:true,  file:'H', rank:3, type:'bishop' },
      { id:'king',   sym:'♚', white:false, file:'C', rank:8, type:'king'   },
      { id:'r1',     sym:'♖', white:true,  file:'H', rank:7, type:'rook'   },
      { id:'b1',     sym:'♗', white:true,  file:'A', rank:5, type:'bishop' },
      { id:'p1',     sym:'♟', white:false, file:'A', rank:7, type:'pawn'   },
      { id:'p2',     sym:'♟', white:false, file:'B', rank:7, type:'pawn'   },
    ],
    threatId: 'threat',
    kingId: 'king',
    escapeSqs: [{file:'B',rank:8}],
  },
  {
    title: 'תרחיש 3',
    pieces: [
      { id:'threat', sym:'♘', white:true,  file:'D', rank:6, type:'knight' },
      { id:'king',   sym:'♚', white:false, file:'F', rank:7, type:'king'   },
      { id:'q1',     sym:'♕', white:true,  file:'A', rank:8, type:'queen'  },
      { id:'k2',     sym:'♔', white:true,  file:'F', rank:5, type:'king'   },
      { id:'b1',     sym:'♗', white:true,  file:'A', rank:1, type:'bishop' },
    ],
    threatId: 'threat',
    kingId: 'king',
    escapeSqs: [{file:'E',rank:7}],
  },
];

// deep copy — מונע מוטציה בין טעינות תרחיש
const ORIGINAL_SCENARIOS = JSON.parse(JSON.stringify(SCENARIOS));


// ════════════════════════════════════════
//  STAGE STATE — שלב ביניים (saveStage בלבד)
//  addCompleted/addCard ודגל "just-completed" שייכים לשלב המסכם של המודול — לא כאן.
// ════════════════════════════════════════
const ChessState = {
  // v2.1 — שומר אחרון + שיא (ראה chess-state-skill)
  saveStage(moduleId, stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem('chess_' + moduleId) || '{}');
      const prev = d[stageKey] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = {
        done: true,
        perfect: perfect,         // כותרת תואמת-לאחור = הריצה האחרונה
        lastPerfect: perfect,     // אחרון מפורש
        bestPerfect: bestPerfect  // שיא — לעולם לא יורד
      };
      localStorage.setItem('chess_' + moduleId, JSON.stringify(d));
    } catch(e) {}
  }
};

let scenIdx = 0;
let totalWrongClicks = 0;  // גלובלי — לא מאופס בין תרחישים
let phase   = 1;
let busy    = false;

// ── Audio ──
let audioCtx = null;
let isMuted = localStorage.getItem('chess_muted') === 'true';

function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function toggleMute(){
  isMuted = !isMuted;
  localStorage.setItem('chess_muted', isMuted);
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
}
document.addEventListener('click',()=>getAudio(),{once:true});

function playSuccess(){ if(isMuted) return;
  try{
    const ctx=getAudio(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type='sine';
    o.frequency.setValueAtTime(520,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.25);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start(); o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playError(){ if(isMuted) return;
  try{
    const ctx=getAudio(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ctx.currentTime+.3);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start(); o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playLaser(){ if(isMuted) return;
  try{
    const ctx=getAudio(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type='sawtooth';
    o.frequency.setValueAtTime(440,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+.35);
    g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
    o.start(); o.stop(ctx.currentTime+.35);
  }catch(e){}
}

// ── SVG piece dictionaries ──

function makePieceSVG(sym, isWhite) {
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if (!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  const isPawn = sym === '♟' || sym === '♙';
  const sz = isPawn ? (isWhite ? 40 : 48) : 90;
  img.style.cssText = `width:${sz}%;height:${sz}%;object-fit:contain;display:block;margin:auto;`;
  if (!isWhite) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  if (sym === '♙') img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
  return img;
}

// ── Board helpers ──
document.getElementById('title-king-icon').src =
  'data:image/svg+xml,' + encodeURIComponent(WHITE_SVG['♔']);
function rowCol(file,rank){ return { r:8-parseInt(rank), c:FILES_ARR.indexOf(file) }; }
function cellId(file,rank){ const {r,c}=rowCol(file,rank); return `cell_${r}_${c}`; }
function cellCenter(file,rank){ const {r,c}=rowCol(file,rank); return {x:c*CELL+CELL/2, y:r*CELL+CELL/2}; }

function buildBoard(){
  const board = document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.id=`cell_${r}_${c}`;
    board.appendChild(cell);
  }
  // set laser SVG viewBox dynamically to match current CELL size
  const bs = CELL*8;
  document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
  // rank labels
  const ranks=document.getElementById('ranks');
  ranks.innerHTML='';
  for(let r=8;r>=1;r--){ const d=document.createElement('div'); d.textContent=r; ranks.appendChild(d); }
  // file labels
  const files=document.getElementById('files');
  files.innerHTML='';
  FILES_ARR.forEach(f=>{ const d=document.createElement('div'); d.textContent=f; files.appendChild(d); });
}

function placePieces(sc){
  document.querySelectorAll('.piece').forEach(p=>p.remove());
  const outer = document.getElementById('board-outer');
  sc.pieces.forEach(p=>{
    const {r,c}=rowCol(p.file,p.rank);
    const el=document.createElement('div');
    el.className='piece';
    el.id='piece_'+p.id;
    el.style.top = r*CELL+'px';
    el.style.left= c*CELL+'px';
    el.dataset.pieceId = p.id;
    const img = makePieceSVG(p.sym, p.white);
    if(img) el.appendChild(img);
    el.addEventListener('click', onPieceClick);
    outer.appendChild(el);
  });
}

function buildProgress(){
  const row=document.getElementById('progress-row');
  row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<scenIdx?' done':i===scenIdx?' active':'');
    row.appendChild(d);
  });
}

// ── Laser SVG ──
function drawLaser(x1,y1,x2,y2){
  const svg=document.getElementById('laser-svg');
  svg.innerHTML='';
  // glow
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1); glow.setAttribute('y1',y1);
  glow.setAttribute('x2',x2); glow.setAttribute('y2',y2);
  glow.setAttribute('stroke','#FF4444');
  glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-opacity','0.35');
  glow.setAttribute('stroke-linecap','round');
  svg.appendChild(glow);
  // core
  const core=document.createElementNS('http://www.w3.org/2000/svg','line');
  core.setAttribute('x1',x1); core.setAttribute('y1',y1);
  core.setAttribute('x2',x2); core.setAttribute('y2',y2);
  core.setAttribute('stroke','#FF6666');
  core.setAttribute('stroke-width','3');
  core.setAttribute('stroke-opacity','0.95');
  core.setAttribute('stroke-linecap','round');
  svg.appendChild(core);
}
function clearLaser(){ document.getElementById('laser-svg').innerHTML=''; }

// ── Gray "reach" preview — teaches WHY a wrong piece does NOT threaten the king ──
function drawPieceReach(p, sc){
  const svg=document.getElementById('laser-svg');
  svg.innerHTML='';
  const pf=FILES_ARR.indexOf(p.file), pr=p.rank;
  const occ=(f,r)=>sc.pieces.some(o=>o!==p && FILES_ARR.indexOf(o.file)===f && o.rank===r);
  const onb=(f,r)=>f>=0&&f<8&&r>=1&&r<=8;
  const start=cellCenter(p.file,p.rank);
  const line=(x2,y2)=>{
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',start.x); l.setAttribute('y1',start.y);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','#9AA7B4'); l.setAttribute('stroke-width','5');
    l.setAttribute('stroke-opacity','0.55'); l.setAttribute('stroke-linecap','round');
    l.setAttribute('stroke-dasharray','4 7');   // attribute, not CSS class — cross-browser
    svg.appendChild(l);
  };
  const dot=(f,r)=>{
    const c=cellCenter(FILES_ARR[f],r);
    const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('cx',c.x); ci.setAttribute('cy',c.y);
    ci.setAttribute('r',Math.max(6,CELL*0.16));
    ci.setAttribute('fill','none'); ci.setAttribute('stroke','#9AA7B4');
    ci.setAttribute('stroke-width','3'); ci.setAttribute('stroke-opacity','0.6');
    ci.setAttribute('stroke-dasharray','3 4');
    svg.appendChild(ci);
  };
  const ray=([df,dr])=>{
    let f=pf+df,r=pr+dr,last=null;
    while(onb(f,r)){ last={f,r}; if(occ(f,r)) break; f+=df; r+=dr; }
    if(last){ const c=cellCenter(FILES_ARR[last.f],last.r); line(c.x,c.y); }
  };
  const ROOK=[[1,0],[-1,0],[0,1],[0,-1]], BISH=[[1,1],[1,-1],[-1,1],[-1,-1]];
  switch(p.type){
    case 'rook':   ROOK.forEach(ray); break;
    case 'bishop': BISH.forEach(ray); break;
    case 'queen':  ROOK.concat(BISH).forEach(ray); break;
    case 'knight': [[1,2],[2,1],[2,-1],[1,-2],[-1,-2],[-2,-1],[-2,1],[-1,2]]
                     .forEach(([df,dr])=>{const f=pf+df,r=pr+dr; if(onb(f,r)) dot(f,r);}); break;
    case 'king':   for(let df=-1;df<=1;df++)for(let dr=-1;dr<=1;dr++){ if(df||dr){const f=pf+df,r=pr+dr; if(onb(f,r)) dot(f,r);} } break;
    case 'pawn':   { const dir=p.white?1:-1; [[1,dir],[-1,dir]].forEach(([df,dr])=>{const f=pf+df,r=pr+dr; if(onb(f,r)) dot(f,r);}); break; }
  }
}

// ── King danger overlay ──
function addKingDanger(file,rank){
  removeKingDanger();
  const {r,c}=rowCol(file,rank);
  const cell=document.getElementById(`cell_${r}_${c}`);
  const ov=document.createElement('div'); ov.className='king-danger-overlay'; ov.id='king-danger-ov';
  cell.appendChild(ov);
  const kEl=document.getElementById('piece_'+SCENARIOS[scenIdx].kingId);
  if(kEl) kEl.classList.add('king-danger');
}
function removeKingDanger(){
  const ov=document.getElementById('king-danger-ov');
  if(ov) ov.remove();
  document.querySelectorAll('.king-danger').forEach(e=>e.classList.remove('king-danger'));
}

// ── Escape hints ──
function showEscapeHints(){
  const sc=SCENARIOS[scenIdx];
  sc.escapeSqs.forEach(sq=>{
    const cell=document.getElementById(cellId(sq.file,sq.rank));
    if(cell) cell.classList.add('escape-hint');
  });
}
function clearEscapeHints(){
  document.querySelectorAll('.escape-hint').forEach(c=>c.classList.remove('escape-hint'));
}

// ── Load scenario ──
function loadScenario(idx){
  scenIdx=idx; phase=1; busy=false;
  // איפוס תרחיש מה-original — מונע מוטציה
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));
  clearLaser(); removeKingDanger(); clearEscapeHints();

  document.getElementById('stage-badge').textContent=`תרחיש ${idx+1}/${SCENARIOS.length}`;
  buildProgress();
  placePieces(SCENARIOS[idx]);

  // highlight threat piece glow
  const tEl=document.getElementById('piece_'+SCENARIOS[idx].threatId);
  if(tEl) tEl.classList.remove('glow-threat');

  const kingPiece=SCENARIOS[idx].pieces.find(p=>p.id===SCENARIOS[idx].kingId);
  if(kingPiece) addKingDanger(kingPiece.file,kingPiece.rank);
  SCENARIOS[idx]._foundEscapes = [];
  setInstruction('לחצו על הכלי שמאיים שח על המלך!', false);
}

function setInstruction(txt, phase2){
  const el=document.getElementById('instruction');
  el.textContent=txt;
  el.className='instruction'+(phase2?' phase2':'');
}

// ── Click on piece ──
function onPieceClick(e){
  if(busy) return;
  e.stopPropagation();
  const sc=SCENARIOS[scenIdx];
  const id=e.currentTarget.dataset.pieceId;

  if(phase===1){
    if(id===sc.threatId){
      // correct!
      clearTimeout(window._wrongPieceT);   // cancel any pending wrong-feedback reset
      clearLaser();                        // wipe any gray reach preview
      playSuccess();
      busy=true;
      const tEl=document.getElementById('piece_'+sc.threatId);
      tEl.classList.add('glow-threat');

      // draw laser from threat to king
      const kp=sc.pieces.find(p=>p.id===sc.kingId);
      const tp=sc.pieces.find(p=>p.id===sc.threatId);
      const tc=cellCenter(tp.file,tp.rank);
      const kc=cellCenter(kp.file,kp.rank);
      setTimeout(()=>{
        drawLaser(tc.x,tc.y,kc.x,kc.y);
        playLaser();
        addKingDanger(kp.file,kp.rank);
        phase=2;
        busy=false;
        setInstruction('עכשיו לחצו על המשבצת שהמלך יכול לברוח אליה!', true);
        // bind cell clicks for escape
        bindCellClicks();
      },400);
    } else {
      // wrong piece — TEACH: show this piece's reach so the child sees it misses the king
      playError();
      totalWrongClicks++;
      // clear any lingering markers from a previous rapid wrong click
      document.querySelectorAll('.piece-err-x').forEach(x=>x.remove());
      document.querySelectorAll('.err-flash').forEach(c=>c.classList.remove('err-flash'));
      const el=e.currentTarget;
      el.classList.add('err-flash');
      const xMark=document.createElement('div');
      xMark.className='piece-err-x';
      xMark.textContent='✕';
      el.appendChild(xMark);
      // gray reach preview (parallels phase-2 laser feedback)
      const wp=sc.pieces.find(p=>p.id===id);
      if(wp) drawPieceReach(wp, sc);
      setInstruction('הכלי הזה לא מאיים על המלך 👀', false);
      clearTimeout(window._wrongPieceT);
      window._wrongPieceT=setTimeout(()=>{
        el.classList.remove('err-flash'); xMark.remove();
        clearLaser();
        if(phase===1) setInstruction('לחצו על הכלי שמאיים שח על המלך!', false);
      },1400);
    }
  }
}

// ── Cell clicks (phase 2) ──
function bindCellClicks(){
  document.getElementById('board').addEventListener('click', onCellClick);
}
function unbindCellClicks(){
  const b=document.getElementById('board');
  b.removeEventListener('click', onCellClick);
}


function findAttacker(file, rank, sc){
  const FILES='ABCDEFGH';
  const kingPiece=sc.pieces.find(p=>p.id===sc.kingId);
  const tc=FILES.indexOf(file), tr=8-parseInt(rank);
  for(const p of sc.pieces){
    if(p.id===sc.kingId) continue;
    if(p.white===kingPiece.white) continue; // ידידותי
    const pc=FILES.indexOf(p.file), pr=8-p.rank;
    const dc=Math.abs(tc-pc), dr=Math.abs(tr-pr);
    let attacks=false;
    switch(p.type){
      case 'rook':   attacks=(tc===pc||tr===pr); break;
      case 'bishop': attacks=(dc===dr); break;
      case 'queen':  attacks=(tc===pc||tr===pr||dc===dr); break;
      case 'knight': attacks=(Math.min(dc,dr)===1&&Math.max(dc,dr)===2); break;
      case 'king':   attacks=(dc<=1&&dr<=1&&dc+dr>0); break;
      case 'pawn':   const dir=p.white?-1:1; attacks=(dc===1&&dr===1&&(tr-pr)===dir); break;
    }
    if(attacks) return p;
  }
  return null;
}

function onCellClick(e){
  if(busy||phase!==2) return;
  const cell=e.target.closest('.cell');
  if(!cell) return;

  const sc=SCENARIOS[scenIdx];
  // parse cell id
  const parts=cell.id.split('_'); // cell_r_c
  const r=parseInt(parts[1]), c=parseInt(parts[2]);
  const file=FILES_ARR[c];
  const rank=(8-r).toString();

  const isEscape=sc.escapeSqs.some(sq=>sq.file===file&&sq.rank===parseInt(rank));

  if(isEscape){
    if(!sc._foundEscapes) sc._foundEscapes=[];
    // אם כבר נמצאה משבצת זו — התעלם
    if(sc._foundEscapes.some(s=>s.file===file&&s.rank===parseInt(rank))){
      return;
    }
    busy=true;
    playSuccess();

    // הזז מלך למשבצת הבריחה
    const kp=sc.pieces.find(p=>p.id===sc.kingId);
    const kEl=document.getElementById('piece_'+sc.kingId);
    const {r:er,c:ec}=rowCol(file,rank);
    kEl.style.top  = er*CELL+'px';
    kEl.style.left = ec*CELL+'px';
    kEl.classList.remove('king-danger');

    sc._foundEscapes.push({file, rank:parseInt(rank)});
    const allFound = sc._foundEscapes.length >= sc.escapeSqs.length;

    // לייזר נעלם מיד עם בריחת המלך
    setTimeout(()=>{ clearLaser(); removeKingDanger(); }, 300);

    if(!allFound){
      // עוד משבצות לגלות — מלך חוזר אחרי 2 שניות
      setTimeout(()=>{
        clearEscapeHints(); unbindCellClicks();
        // מלך חוזר למיקום המקורי
        const {r:or,c:oc}=rowCol(kp.file,kp.rank);
        kEl.style.top=or*CELL+'px'; kEl.style.left=oc*CELL+'px';
        // לייזר שח חוזר
        const tp=sc.pieces.find(p=>p.id===sc.threatId);
        const tc=cellCenter(tp.file,tp.rank);
        const kc=cellCenter(kp.file,kp.rank);
        drawLaser(tc.x,tc.y,kc.x,kc.y);
        playLaser(); addKingDanger(kp.file,kp.rank);
        setInstruction('מצאו משבצת בריחה נוספת! 🔍', true);
        bindCellClicks();
        busy=false;
      }, 2000);
    } else {
      // כל משבצות הבריחה נמצאו
      setTimeout(()=>{
        clearLaser(); removeKingDanger(); clearEscapeHints(); unbindCellClicks();
        nextScenario();
      }, 600);
    }

  } else {
    // wrong square — הצג לייזר מהכלי שתוקף את המשבצת
    playError();
    totalWrongClicks++;
    cell.classList.add('err-flash');
    setTimeout(()=>cell.classList.remove('err-flash'),400);
    const attacker=findAttacker(file,rank,sc);
    if(attacker){
      clearLaser();
      const ac=cellCenter(attacker.file,attacker.rank);
      const wc=cellCenter(file,rank);
      drawLaser(ac.x,ac.y,wc.x,wc.y);
      playLaser();
      setTimeout(()=>{
        clearLaser();
        // שחזור לייזר השח המקורי
        const tp=sc.pieces.find(p=>p.id===sc.threatId);
        const kp=sc.pieces.find(p=>p.id===sc.kingId);
        drawLaser(cellCenter(tp.file,tp.rank).x,cellCenter(tp.file,tp.rank).y,
                  cellCenter(kp.file,kp.rank).x,cellCenter(kp.file,kp.rank).y);
      },1500);
    }
  }
}


function nextScenario(){
  if(scenIdx+1 < SCENARIOS.length){
    // transition card
    const ov=document.getElementById('transition-overlay');
    document.getElementById('tr-title').textContent='כל הכבוד! 👏';
    document.getElementById('tr-sub').textContent='עוברים לתרחיש הבא...';
    ov.classList.add('show');
    setTimeout(()=>{
      ov.classList.remove('show');
      loadScenario(scenIdx+1);
    },2000);
  } else {
    // stage complete
    const perfect = totalWrongClicks <= 2;
    ChessState.saveStage('defense', 'stage1', perfect);
    document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
    document.getElementById('win-msg').textContent   = perfect ? 'ביצוע מושלם! 🎉' : 'כל הכבוד! 💪';
    document.getElementById('btn-replay').textContent = perfect ? 'שחקו שוב 🔄' : 'נסו שוב 🔄';
    setTimeout(()=>document.getElementById('win-overlay').classList.add('show'),600);
  }
}

// ── Burst effect ──
function burst(x,y){
  for(let i=0;i<18;i++){
    const b=document.createElement('div'); b.className='burst';
    const a=(i/18)*Math.PI*2, d=40+Math.random()*60;
    b.style.cssText=`left:${x}px;top:${y}px;width:8px;height:8px;--bx:${Math.cos(a)*d}px;--by:${Math.sin(a)*d}px;animation-duration:${.4+Math.random()*.3}s;background:${['#F4D03F','#52B788','#7EC8E3','#FF6B35'][i%4]};`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),700);
  }
}

// ── Init ──
CELL = getCell();
buildBoard();
loadScenario(0);
setTimeout(()=>document.getElementById('game-wrap').classList.add('visible'),100);

let _rzT, _rzCell = CELL;
window.addEventListener('resize', ()=>{
  clearTimeout(_rzT);
  _rzT = setTimeout(()=>{
    const nc = getCell();              // מסנכרן --cell/--board-size תמיד
    if(nc === _rzCell) return;         // לא נחצה breakpoint → שמור את כל מצב התרחיש
    _rzCell = nc; CELL = nc;
    const bs = CELL*8;
    document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
    buildBoard();
    loadScenario(scenIdx);
  }, 150);
});

function fullReset(){
  totalWrongClicks=0; scenIdx=0;
  document.getElementById('win-overlay').classList.remove('show');
  loadScenario(0);
}
