<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מגינים על המלך – שלב 2: חסימה ♗</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
:root {
  --cell:58px;
  --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --blue:#7EC8E3;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
@media(max-height:600px){:root{--cell:36px;}}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; overflow-x:hidden; user-select:none;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  padding:16px 12px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:10px; width:100%;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

/* HUD */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  width:var(--board-size);
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(126,200,227,.15); border:1.5px solid rgba(126,200,227,.35);
  border-radius:50px; padding:3px 14px; color:var(--blue);
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.6rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); text-align:center;
}

/* PROGRESS */
.progress-row { display:flex; gap:8px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(126,200,227,.3);
  transition:all .4s;
}
.prog-dot.done   { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(126,200,227,.4); border-color:var(--blue); animation:dot-pulse .8s ease-in-out infinite alternate; }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

/* INSTRUCTION */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.26rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  min-height:66px; display:flex; align-items:center; justify-content:center;
  width:var(--board-size);
  direction:rtl; unicode-bidi:bidi-override;
  animation:instr-pulse 2.4s ease-in-out infinite;
}
@keyframes instr-pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
.instruction.phase2 { color:#F4D03F; border-color:rgba(244,208,63,.3); background:rgba(244,208,63,.08); }
.instruction.phase3 { color:#52B788; border-color:rgba(82,183,136,.3); background:rgba(82,183,136,.08); }

/* BOARD */
.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold); width:15px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold);
}
.board-outer {
  position:relative; width:var(--board-size); height:var(--board-size);
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
}
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:var(--cell-light); }
.cd { background:var(--cell-dark); }

/* MINE squares */
.cell.mine-sq::after {
  content:'💣';
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.5);
  animation:mine-float .8s ease-in-out infinite alternate;
  pointer-events:none; z-index:6;
}
@keyframes mine-float { from{transform:scale(.9)} to{transform:scale(1.1)} }

.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }


/* PIECES */
.piece {
  position:absolute; z-index:10;
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  transition:top .4s cubic-bezier(.4,0,.2,1), left .4s cubic-bezier(.4,0,.2,1);
  cursor:pointer;
}
.piece.glow-threat {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:threat-pulse .5s ease-in-out infinite alternate;
}
@keyframes threat-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
.piece.glow-blocker {
  filter:drop-shadow(0 0 18px rgba(126,200,227,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:blocker-pulse .5s ease-in-out infinite alternate;
}
@keyframes blocker-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
/* value badge — מופיע על כלי חוסם רק אחרי טעות חלשה (לחיזוק חלש מול חזק) */
.piece-value {
  position:absolute; top:-6px; right:-6px; z-index:60;
  min-width:20px; height:20px; padding:0 3px;
  display:flex; align-items:center; justify-content:center;
  background:var(--gold); color:#060E1A; border:2px solid #060E1A; border-radius:50%;
  font-family:'Fredoka One',cursive; font-size:.8rem; line-height:1;
  box-shadow:0 1px 5px rgba(0,0,0,.5);
  animation:val-pop .22s cubic-bezier(.175,.885,.32,1.5) both; pointer-events:none;
}
@keyframes val-pop { from{transform:scale(0)} to{transform:scale(1)} }
.piece.king-danger {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
}

/* X error */
.piece-err-x {
  position:absolute; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.75); line-height:1; color:#E74C3C;
  filter:drop-shadow(0 0 8px rgba(231,76,60,.9));
  animation:x-pop .15s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none;
}
@keyframes x-pop { from{transform:scale(0) rotate(-30deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

/* LASER */
.laser-svg { position:absolute; inset:0; width:100%; height:100%; z-index:20; pointer-events:none; overflow:visible; }

/* KING DANGER */
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.7);
  animation:king-danger-pulse .4s ease-in-out infinite alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to  {opacity:1; background:rgba(231,76,60,.85)}
}

/* TRANSITION */
#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.88); opacity:0; pointer-events:none; transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon  { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--blue); }

/* WIN */
#win-overlay {
  position:fixed; inset:0; z-index:450;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.92); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-overlay.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:50px 70px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.5rem; color:var(--gold); margin-bottom:10px; }
.win-stars { font-size:2.2rem; margin:8px 0 4px; }
.win-msg   { font-family:'Fredoka One',cursive; font-size:1.15rem; color:var(--blue); margin-bottom:24px; }
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s, box-shadow .15s;
  display:block; width:100%; margin-bottom:10px;
  touch-action:manipulation;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s, border-color .2s; display:block; width:100%;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }

/* BURST */
.burst {
  position:fixed; border-radius:50%; pointer-events:none; z-index:600;
  animation:burst-anim .6s ease-out forwards;
}
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0} }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1/4</div>
    <div class="game-title">שלב 2 - חסימה</div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="instruction" id="instruction">לחצו על הכלי שמאיים שח על המלך!</div>

  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
        <svg class="laser-svg" id="laser-svg"></svg>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>
</div>


<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon">👏</span>
    <div class="tr-title" id="tr-title">כל הכבוד!</div>
    <div class="tr-sub"   id="tr-sub">עוברים לתרחיש הבא...</div>
  </div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <span style="font-size:4rem;display:block;margin-bottom:10px">👏</span>
    <div class="win-title">שלב הושלם!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-msg"   id="win-msg">ביצוע מושלם! 🎉</div>
    <button class="btn-next" onclick="location.href='check-defense-stage3.html'">שלב הבא ←</button>
    <button class="btn-retry" id="btn-replay" onclick="fullReset()">שחקו שוב 🔄</button>
  </div>
</div>

<script>
// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

function getCell(){
  const w = window.innerWidth;
  const px = w<=360?40 : w<=390?44 : w<=430?48 : w<=480?53 : 58;
  document.documentElement.style.setProperty('--cell', px+'px');
  document.documentElement.style.setProperty('--board-size', (px*8)+'px');
  return px;
}
let CELL = 64;
const FILES_ARR = ['A','B','C','D','E','F','G','H'];

// ══════════════════════════════
//  SCENARIOS
//  phase 1: click threat piece
//  phase 2: click blocker piece
//  phase 3: click destination square
// ══════════════════════════════
const SCENARIOS = [
  {
    // תרחיש 1: מלכה לבנה E1 → מלך שחור E8 | פרש G6 חוסם ב-E7 (מוגן ע"י המלך). E5 חלש: הפרש לא מוגן.
    pieces: [
      { id:'threat',  sym:'♕', white:true,  file:'E', rank:1, type:'queen'  },
      { id:'king',    sym:'♚', white:false, file:'E', rank:8, type:'king'   },
      { id:'blocker', sym:'♞', white:false, file:'G', rank:6, type:'knight' },
      { id:'k2',      sym:'♔', white:true,  file:'H', rank:3, type:'king'   },
    ],
    threatId:  'threat',
    kingId:    'king',
    blockerId: 'blocker',
    blockDest: { file:'E', rank:7 },
    weakBlocks: [
      // בחירת-משבצת (לא ערך) → בלי תג מספרי. E5: הפרש לא מוגן, המלכה אוכלת ושוב שח.
      { blockerId:'blocker', dest:{file:'E',rank:5}, captureDemo:true, msg:'בחרו בחסימה טובה יותר!', keepPhase:true },
    ],
    mineSqs:   [{file:'D',rank:8},{file:'D',rank:7},{file:'F',rank:8},{file:'F',rank:7}],
  },
  {
    // תרחיש 2: רץ לבן H1 → מלך שחור A8 | צריח שחור D2 חוסם ב-D5
    // הפרש (3) הוא החסימה הנכונה. הצריח (5) חלש: אחרי שהרץ אוכל ב-D5,
    // הצריח יקר מדי — מפסידים 5 תמורת 3.  (הצריח ב-D2 כדי לא לתת שח למלך הלבן ב-F1)
    pieces: [
      { id:'threat',  sym:'♗', white:true,  file:'H', rank:1, type:'bishop' },
      { id:'king',    sym:'♚', white:false, file:'A', rank:8, type:'king'   },
      { id:'blocker', sym:'♜', white:false, file:'D', rank:2, type:'rook'   },
      { id:'p1',      sym:'♟', white:false, file:'C', rank:4, type:'pawn'   },
      { id:'p2',      sym:'♟', white:false, file:'A', rank:7, type:'pawn'   },
      { id:'bw1',     sym:'♗', white:true,  file:'F', rank:4, type:'bishop' },
      { id:'k2',      sym:'♔', white:true,  file:'F', rank:1, type:'king'   },
      { id:'kn1',     sym:'♞', white:false, file:'E', rank:7, type:'knight' },
    ],
    threatId:   'threat',
    kingId:     'king',
    blockerId:  'blocker',
    blockerIds: ['blocker','kn1'],  // צריח D2 או פרש E7 — שניהם חוסמים ב-D5
    blockDest:  { file:'D', rank:5 },
    weakBlocks: [
      { blockerId:'blocker', showValue:true, msg:'חסימה חלשה! הצריח יקר מדי — נסו כלי חלש יותר 💡' },
    ],
    mineSqs:    [],
  },
  {
    // צריח לבן F8 → מלך שחור B8 | הרץ H4 חוסם ב-D8 (הצריח חלש: חילוף שקול מיותר — חבל עליו)
    pieces: [
      { id:'threat',  sym:'♖', white:true,  file:'F', rank:8, type:'rook'   },
      { id:'king',    sym:'♚', white:false, file:'B', rank:8, type:'king'   },
      { id:'blocker', sym:'♜', white:false, file:'D', rank:1, type:'rook'   },
      { id:'k2',      sym:'♔', white:true,  file:'B', rank:2, type:'king'   },
      { id:'p1',      sym:'♟', white:false, file:'A', rank:7, type:'pawn'   },
      { id:'p2',      sym:'♟', white:false, file:'B', rank:7, type:'pawn'   },
      { id:'p3',      sym:'♟', white:false, file:'C', rank:7, type:'pawn'   },
      { id:'b1',      sym:'♝', white:false, file:'H', rank:4, type:'bishop' },
    ],
    threatId:   'threat',
    kingId:     'king',
    blockerId:  'blocker',
    blockerIds: ['blocker','b1'],   // רץ H4 (נכון) או צריח D1 (חלש) — שניהם מגיעים ל-D8
    blockDest:  { file:'D', rank:8 },
    weakBlocks: [
      { blockerId:'blocker', showValue:true, msg:'חסימה חלשה! חבל על הצריח — חסמו בכלי החלש יותר 💡' },
    ],
    mineSqs:    [],
  },
  {
    // רץ שחור H8 → מלך לבן C3 | רגלי לבן D2 זז D4
    pieces: [
      { id:'threat',  sym:'♝', white:false, file:'H', rank:8, type:'bishop' },
      { id:'king',    sym:'♔', white:true,  file:'C', rank:3, type:'king'   },
      { id:'blocker', sym:'♙', white:true,  file:'D', rank:2, type:'pawn'   },
      { id:'q1',      sym:'♛', white:false, file:'B', rank:8, type:'queen'  },
      { id:'r1',      sym:'♜', white:false, file:'H', rank:4, type:'rook'   },
      { id:'b1',      sym:'♝', white:false, file:'A', rank:6, type:'bishop' },
      { id:'kn1',     sym:'♞', white:false, file:'E', rank:1, type:'knight' },
      { id:'k2',      sym:'♚', white:false, file:'F', rank:5, type:'king'   },
    ],
    threatId:  'threat',
    kingId:    'king',
    blockerId: 'blocker',
    blockDest: { file:'D', rank:4 },
    mineSqs:   [],
  },
];

// deep copy — מונע מוטציה בין טעינות תרחיש
const ORIGINAL_SCENARIOS = JSON.parse(JSON.stringify(SCENARIOS));

// ════════════════════════════════════════
//  STAGE STATE — שלב ביניים (saveStage בלבד)
//  addCompleted/addCard ודגל "just-completed" שייכים לשלב המסכם של המודול — לא כאן.
// ════════════════════════════════════════
const ChessState = {
  // v2.1 — שומר אחרון + שיא (ראה chess-state-skill)
  saveStage(moduleId, stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem('chess_' + moduleId) || '{}');
      const prev = d[stageKey] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = {
        done: true,
        perfect: perfect,         // כותרת תואמת-לאחור = הריצה האחרונה
        lastPerfect: perfect,     // אחרון מפורש
        bestPerfect: bestPerfect  // שיא — לעולם לא יורד
      };
      localStorage.setItem('chess_' + moduleId, JSON.stringify(d));
    } catch(e) {}
  }
};

let scenIdx = 0;
let selectedBlockerId = null;
let showValueOnSuccess = false;   // true רק אחרי חסימה חלשה מסוג "ערך" (2/3) — מתנה תג ערך
const PIECE_VALUE = { pawn:1, knight:3, bishop:3, rook:5, queen:9 };
function showPieceValue(pieceId){
  const el=document.getElementById('piece_'+pieceId); if(!el) return;
  const p=SCENARIOS[scenIdx].pieces.find(x=>x.id===pieceId);
  const v=PIECE_VALUE[p && p.type]; if(!v) return;
  if(el.querySelector('.piece-value')) return;
  const b=document.createElement('div'); b.className='piece-value'; b.textContent=v;
  // מיקום מותאם-לקצה כדי שהתג לא ייחתך ע"י overflow של הלוח
  const row=Math.round(parseInt(el.style.top||'0')/CELL);
  const col=Math.round(parseInt(el.style.left||'0')/CELL);
  if(row<=0){ b.style.top='auto'; b.style.bottom='-6px'; }   // שורה עליונה → תג מתחת
  if(col>=7){ b.style.right='auto'; b.style.left='-6px'; }    // קצה ימין → תג משמאל
  el.appendChild(b);
}

let audioCtx = null;
let isMuted = ['true','1'].includes(localStorage.getItem('chess_muted'));
{ const _mb = document.getElementById('muteBtn'); if(_mb) _mb.textContent = isMuted ? '🔇' : '🔊'; }
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
function toggleMute(){
  isMuted = !isMuted;
  localStorage.setItem('chess_muted', isMuted);
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
}
document.addEventListener('click',()=>getAudio(),{once:true});

function playSuccess(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sine';
    o.frequency.setValueAtTime(520,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.25);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playError(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ctx.currentTime+.3);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playLaser(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(440,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+.35);
    g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
    o.start();o.stop(ctx.currentTime+.35);
  }catch(e){}
}

// ── Capture explosion (chess-explosion-skill) ──
function playCapture(){ if(isMuted) return;
  try{
    const ctx=getAudio(), n=ctx.currentTime;
    const thud=ctx.createOscillator(),tg=ctx.createGain(); thud.connect(tg);tg.connect(ctx.destination);
    thud.type='sine'; thud.frequency.setValueAtTime(90,n); thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    tg.gain.setValueAtTime(.9,n); tg.gain.exponentialRampToValueAtTime(.001,n+.55); thud.start(n); thud.stop(n+.6);
    const p=ctx.createOscillator(),pg=ctx.createGain(); p.connect(pg);pg.connect(ctx.destination);
    p.type='sine'; p.frequency.setValueAtTime(200,n); p.frequency.exponentialRampToValueAtTime(50,n+.18);
    pg.gain.setValueAtTime(.5,n); pg.gain.exponentialRampToValueAtTime(.001,n+.2); p.start(n); p.stop(n+.22);
    const bs=Math.floor(ctx.sampleRate*.35), nb=ctx.createBuffer(1,bs,ctx.sampleRate), nd=nb.getChannelData(0);
    for(let i=0;i<bs;i++) nd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource(); ns.buffer=nb;
    const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=500; nf.Q.value=.5;
    const ng=ctx.createGain(); ng.gain.setValueAtTime(.55,n); ng.gain.exponentialRampToValueAtTime(.001,n+.32);
    ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination); ns.start(n); ns.stop(n+.35);
    const cr=ctx.createOscillator(),cg=ctx.createGain(); cr.connect(cg);cg.connect(ctx.destination);
    cr.type='sawtooth'; cr.frequency.value=900; cg.gain.setValueAtTime(.5,n); cg.gain.exponentialRampToValueAtTime(.001,n+.05);
    cr.start(n); cr.stop(n+.06);
  }catch(e){}
}
function showExplosion(row,col){
  const boardOuter=document.querySelector('.board-outer');
  const W=CELL*8,H=CELL*8;
  const cx=col*CELL+CELL/2, cy=row*CELL+CELL/2;   // aligned with cellCenter() & pieces
  const canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  canvas.style.cssText=`position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const c=canvas.getContext('2d');
  const COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts=Array.from({length:45},(_,i)=>{ const a=(i/45)*Math.PI*2+Math.random()*0.4, spd=3.5+Math.random()*9;
    return {x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),r:1.5+Math.random()*5,
            color:COLORS[Math.floor(Math.random()*COLORS.length)],alpha:1,decay:.018+Math.random()*.022,gravity:.18+Math.random()*.12}; });
  let frame=0;
  (function draw(){
    c.clearRect(0,0,W,H);
    if(frame<8){ const t=frame/7,r=CELL*0.9*t,g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);g.addColorStop(.35,`rgba(255,230,80,${(1-t)*.9})`);
      g.addColorStop(.7,`rgba(255,100,0,${(1-t)*.5})`);g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill(); }
    if(frame>=1&&frame<22){ const t=(frame-1)/21,r=CELL*0.75*t,a=1-t,g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);g.addColorStop(.2,`rgba(255,180,0,${a*.95})`);
      g.addColorStop(.55,`rgba(210,50,0,${a*.7})`);g.addColorStop(.85,`rgba(100,15,0,${a*.4})`);g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill(); }
    if(frame>=3&&frame<14){ const t=(frame-3)/11; c.beginPath();c.arc(cx,cy,CELL*0.5*t+CELL*0.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${.6*(1-t)})`;c.lineWidth=3*(1-t);c.stroke(); }
    if(frame>10){ const age=frame-10; for(let i=0;i<4;i++){ const sa=Math.max(0,.18-age*.004); if(sa<=0)break;
      c.beginPath();c.arc(cx+Math.sin(i*1.7+age*.04)*age*.5,cy-age*.35+i*4,age*2.8+i*9,0,Math.PI*2);
      c.fillStyle=`rgba(55,55,55,${sa/(i*.4+1)})`;c.fill(); } }
    c.save();
    parts.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.95;p.alpha=Math.max(0,p.alpha-p.decay); if(p.alpha<=0)return;
      c.globalAlpha=p.alpha;c.beginPath();c.arc(p.x,p.y,Math.max(.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);c.fillStyle=p.color;c.fill(); });
    c.restore();
    frame++; if(frame<55) requestAnimationFrame(draw); else canvas.remove();
  })();
}
// ── Capture demonstration for a "capturable" weak block (the attacker eats the undefended blocker) ──
function runCaptureDemo(sc, wb){
  busy=true;
  const kEl=document.getElementById('piece_'+selectedBlockerId);
  const qEl=document.getElementById('piece_'+sc.threatId);
  const dst=wb.dest||sc.blockDest;
  const {r:wr,c:wc}=rowCol(dst.file,dst.rank);
  const orig=sc.pieces.find(p=>p.id===selectedBlockerId);
  const tp=sc.pieces.find(p=>p.id===sc.threatId);
  const kp=sc.pieces.find(p=>p.id===sc.kingId);
  // 1. blocker slides to the weak square
  kEl.style.top=wr*CELL+'px'; kEl.style.left=wc*CELL+'px';
  // 2. laser vanishes — looks like the block worked
  setTimeout(()=>{ clearLaser(); removeKingDanger(); },500);
  // 3. attacker slides in to capture
  setTimeout(()=>{ qEl.style.top=wr*CELL+'px'; qEl.style.left=wc*CELL+'px'; },900);
  // 4. arrival → explosion + sound, blocker disappears
  setTimeout(()=>{ playCapture(); showExplosion(wr,wc); kEl.style.opacity='0'; },1300);
  // 5. renewed check — laser from attacker's NEW square back to the king
  setTimeout(()=>{
    drawLaser(cellCenter(dst.file,dst.rank).x,cellCenter(dst.file,dst.rank).y,
              cellCenter(kp.file,kp.rank).x,cellCenter(kp.file,kp.rank).y);
    playLaser(); addKingDanger(kp.file,kp.rank);
    setInstruction(wb.msg,'phase2');
  },1560);
  // 6. reset for another try
  setTimeout(()=>{
    clearLaser(); removeKingDanger();
    const {r:qr,c:qc}=rowCol(tp.file,tp.rank);
    qEl.style.top=qr*CELL+'px'; qEl.style.left=qc*CELL+'px';
    const {r:or,c:oc}=rowCol(orig.file,orig.rank);
    kEl.style.opacity='1'; kEl.style.top=or*CELL+'px'; kEl.style.left=oc*CELL+'px';
    setTimeout(()=>{
      drawLaser(cellCenter(tp.file,tp.rank).x,cellCenter(tp.file,tp.rank).y,
                cellCenter(kp.file,kp.rank).x,cellCenter(kp.file,kp.rank).y);
      addKingDanger(kp.file,kp.rank);
    },220);
    setInstruction('הזיזו את הכלי למשבצת שתחסום את השח!','phase2');
    if(!wb.keepPhase){ selectedBlockerId=null; phase=2; document.getElementById('board').removeEventListener('click', onCellClick); }
    busy=false;
  },3300);
}

  '♘': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:#fff;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18" style="fill:#fff;stroke:#000"/><path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/><path d="M9.5,25.5A.5.5,0,1,1,8.5,25.5.5.5,0,1,1,9.5,25.5z" style="fill:#000;stroke:#000"/><path d="M15,15.5A.5,1.5,0,1,1,14,15.5.5,1.5,0,1,1,15,15.5z" style="fill:#000;stroke:#000" transform="rotate(30,14.5,15.5)"/></g></svg>`,
  '♙': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="13 7 20 30"><path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z" fill="#fff" stroke="none"/></svg>`,

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  const isPawn = sym==='♟'||sym==='♙';
  const sz = isPawn ? (isWhite?44:48) : 90;
  img.style.cssText=`width:${sz}%;height:${sz}%;object-fit:contain;display:block;margin:auto;`;
  if(!isWhite) img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  if(sym==='♙') img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
  return img;
}

// ── Board helpers ──
function rowCol(file,rank){ return {r:8-parseInt(rank), c:FILES_ARR.indexOf(file)}; }
function cellId(file,rank){ const {r,c}=rowCol(file,rank); return `cell_${r}_${c}`; }
function cellCenter(file,rank){ const {r,c}=rowCol(file,rank); return {x:c*CELL+CELL/2, y:r*CELL+CELL/2}; }

function buildBoard(){
  const board=document.getElementById('board'); board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.id=`cell_${r}_${c}`;
    board.appendChild(cell);
  }
  const ranks=document.getElementById('ranks'); ranks.innerHTML='';
  for(let r=8;r>=1;r--){const d=document.createElement('div');d.textContent=r;ranks.appendChild(d);}
  const files=document.getElementById('files'); files.innerHTML='';
  FILES_ARR.forEach(f=>{const d=document.createElement('div');d.textContent=f;files.appendChild(d);});
  const bs=CELL*8; document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
}

function placePieces(sc){
  document.querySelectorAll('.piece').forEach(p=>p.remove());
  const outer=document.getElementById('board-outer');
  sc.pieces.forEach(p=>{
    const {r,c}=rowCol(p.file,p.rank);
    const el=document.createElement('div');
    el.className='piece';
    el.id='piece_'+p.id;
    el.style.top=r*CELL+'px';
    el.style.left=c*CELL+'px';
    el.dataset.pieceId=p.id;
    const img=makePieceSVG(p.sym, p.white);
    if(img) el.appendChild(img);
    el.addEventListener('click', onPieceClick);
    outer.appendChild(el);
  });
}

function buildProgress(){
  const row=document.getElementById('progress-row'); row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<scenIdx?' done':i===scenIdx?' active':'');
    row.appendChild(d);
  });
}

// ── Laser ──
function drawLaser(x1,y1,x2,y2){
  const svg=document.getElementById('laser-svg'); svg.innerHTML='';
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
  glow.setAttribute('stroke','#FF4444');glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-opacity','0.35');glow.setAttribute('stroke-linecap','round');
  svg.appendChild(glow);
  const core=document.createElementNS('http://www.w3.org/2000/svg','line');
  core.setAttribute('x1',x1);core.setAttribute('y1',y1);core.setAttribute('x2',x2);core.setAttribute('y2',y2);
  core.setAttribute('stroke','#FF6666');core.setAttribute('stroke-width','3');
  core.setAttribute('stroke-opacity','0.95');core.setAttribute('stroke-linecap','round');
  svg.appendChild(core);
}
function clearLaser(){ document.getElementById('laser-svg').innerHTML=''; }

// ── King danger ──
function addKingDanger(file,rank){
  removeKingDanger();
  const {r,c}=rowCol(file,rank);
  const cell=document.getElementById(`cell_${r}_${c}`);
  const ov=document.createElement('div'); ov.className='king-danger-overlay'; ov.id='king-danger-ov';
  cell.appendChild(ov);
  const kEl=document.getElementById('piece_'+SCENARIOS[scenIdx].kingId);
  if(kEl) kEl.classList.add('king-danger');
}
function removeKingDanger(){
  const ov=document.getElementById('king-danger-ov'); if(ov) ov.remove();
  document.querySelectorAll('.king-danger').forEach(e=>e.classList.remove('king-danger'));
}

// ── Instruction ──
function setInstruction(txt, cls){
  const el=document.getElementById('instruction');
  el.textContent=txt;
  el.className='instruction'+(cls?' '+cls:'');
}

// ── Load scenario ──
function loadScenario(idx){
  scenIdx=idx; phase=1; busy=false; selectedBlockerId=null; showValueOnSuccess=false;
  // איפוס תרחיש מה-original — מונע מוטציה
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));
  clearLaser(); removeKingDanger(); clearPieceValues();
  document.querySelectorAll('.mine-sq').forEach(c=>c.classList.remove('mine-sq'));
  document.getElementById('board').removeEventListener('click', onCellClick);

  document.getElementById('stage-badge').textContent=`תרחיש ${idx+1}/${SCENARIOS.length}`;
  buildProgress();
  placePieces(SCENARIOS[idx]);
  // show mines
  SCENARIOS[idx].mineSqs.forEach(sq=>{
    const cell=document.getElementById(cellId(sq.file,sq.rank));
    if(cell) cell.classList.add('mine-sq');
  });
  const kingPiece = SCENARIOS[idx].pieces.find(p=>p.id===SCENARIOS[idx].kingId);
  const kingColor = kingPiece && kingPiece.white ? 'הלבן' : 'השחור';
  if(kingPiece) addKingDanger(kingPiece.file,kingPiece.rank);
  setInstruction(`לחצו על הכלי שמאיים שח על המלך ${kingColor}!`, '');
}

// ── Phase 1: click threat ──
function onPieceClick(e){
  if(busy) return;
  e.stopPropagation();
  const sc=SCENARIOS[scenIdx];
  const id=e.currentTarget.dataset.pieceId;

  if(phase===1){
    if(id===sc.threatId){
      playSuccess(); busy=true;
      const tEl=document.getElementById('piece_'+sc.threatId);
      tEl.classList.add('glow-threat');
      const tp=sc.pieces.find(p=>p.id===sc.threatId);
      const kp=sc.pieces.find(p=>p.id===sc.kingId);
      setTimeout(()=>{
        drawLaser(cellCenter(tp.file,tp.rank).x, cellCenter(tp.file,tp.rank).y,
                  cellCenter(kp.file,kp.rank).x, cellCenter(kp.file,kp.rank).y);
        playLaser();
        addKingDanger(kp.file,kp.rank);
        phase=2; busy=false;
        setInstruction('מצאו את פעולת החסימה!', 'phase2');
      },400);
    } else {
      showPieceError(e.currentTarget);
    }

  } else if(phase===2){
    const validBlockers = sc.blockerIds || [sc.blockerId];
    if(validBlockers.includes(id)){
      selectedBlockerId = id;
      busy=false;
      phase=3;
      setInstruction('הזיזו את הכלי למשבצת שתחסום את השח!', 'phase2');
      document.getElementById('board').addEventListener('click', onCellClick);
    } else {
      showPieceError(e.currentTarget);
    }

  } else if(phase===3){
    // שינוי בחירה — שחקן יכול ללחוץ כלי אחר בphase 3
    const validBlockers = sc.blockerIds || [sc.blockerId];
    if(validBlockers.includes(id)){
      selectedBlockerId = id;
    }
  }
}

function showPieceError(el){
  playError();
  el.classList.add('err-flash');
  const x=document.createElement('div'); x.className='piece-err-x'; x.textContent='✕';
  el.appendChild(x);
  setTimeout(()=>{ el.classList.remove('err-flash'); x.remove(); },600);
}

// ── Phase 3: click destination square ──
function onCellClick(e){
  if(busy||phase!==3) return;
  const cell=e.target.closest('.cell'); if(!cell) return;
  const parts=cell.id.split('_');
  const r=parseInt(parts[1]), c=parseInt(parts[2]);
  const file=FILES_ARR[c];
  const rank=(8-r).toString();
  const sc=SCENARIOS[scenIdx];
  const dest=sc.blockDest;

  // בדיקת חסימה חלשה — לפני בדיקת blockDest!
  const weakMatch = (sc.weakBlocks||[]).find(wb =>
    wb.blockerId === selectedBlockerId &&
    (!wb.dest || (wb.dest.file === file && wb.dest.rank === parseInt(rank)))
  );

  if(weakMatch){
      if(weakMatch.captureDemo){ runCaptureDemo(sc, weakMatch); return; }
      // ── חסימה חלשה רגילה: זז → 1.5s → חוזר + לייזר + הודעה ──
      busy=true;
      const bEl=document.getElementById('piece_'+selectedBlockerId);
      const moveDest = weakMatch.dest || dest;
      const {r:wr,c:wc}=rowCol(moveDest.file,moveDest.rank);
      bEl.style.top =wr*CELL+'px';
      bEl.style.left=wc*CELL+'px';
      clearLaser(); removeKingDanger();
      if(weakMatch.showValue){           // רק לקחי-ערך (2/3) — לא לבחירת-משבצת (1)
        showValueOnSuccess = true;
        showPieceValue(selectedBlockerId);  // "5" על הכלי החזק שנבחר בטעות
      }

      setTimeout(()=>{
        clearPieceValues();
        // החזר כלי למקום המקורי
        const origPiece=sc.pieces.find(p=>p.id===selectedBlockerId);
        const {r:or,c:oc}=rowCol(origPiece.file,origPiece.rank);
        bEl.style.top =or*CELL+'px';
        bEl.style.left=oc*CELL+'px';

        // שחזר לייזר + שח
        const tp=sc.pieces.find(p=>p.id===sc.threatId);
        const kp=sc.pieces.find(p=>p.id===sc.kingId);
        drawLaser(cellCenter(tp.file,tp.rank).x, cellCenter(tp.file,tp.rank).y,
                  cellCenter(kp.file,kp.rank).x, cellCenter(kp.file,kp.rank).y);
        addKingDanger(kp.file,kp.rank);

        // הודעה + reset phase לפי סוג החסימה
        setInstruction(weakMatch.msg, 'phase2');
        if(!weakMatch.keepPhase){
          selectedBlockerId=null;
          phase=2;
          document.getElementById('board').removeEventListener('click', onCellClick);
        }
        busy=false;
      }, 1500);

  } else if(file===dest.file && parseInt(rank)===dest.rank){
      busy=true; playSuccess();
      document.getElementById('board').removeEventListener('click', onCellClick);
      const bEl=document.getElementById('piece_'+(selectedBlockerId||sc.blockerId));
      bEl.classList.add('glow-blocker');
      const {r:dr,c:dc}=rowCol(dest.file,dest.rank);
      bEl.style.top =dr*CELL+'px';
      bEl.style.left=dc*CELL+'px';
      if(showValueOnSuccess) showPieceValue(selectedBlockerId||sc.blockerId);  // "3" — החלש והנכון, בניגוד ל-5
      setTimeout(()=>{
        bEl.classList.remove('glow-blocker');
        clearLaser(); removeKingDanger();
        busy=false;
        setTimeout(()=>nextScenario(), 900);
      },600);

  } else {
    playError();
    totalWrongClicks++;
    cell.classList.add('err-flash');
    setTimeout(()=>cell.classList.remove('err-flash'),400);
  }
}




function nextScenario(){
  if(scenIdx+1 < SCENARIOS.length){
    const ov=document.getElementById('transition-overlay');
    document.getElementById('tr-title').textContent='כל הכבוד! 👏';
    document.getElementById('tr-sub').textContent='עוברים לתרחיש הבא...';
    ov.classList.add('show');
    setTimeout(()=>{ov.classList.remove('show'); loadScenario(scenIdx+1);},1200);
  } else {
    const perfect = totalWrongClicks <= 2;
    ChessState.saveStage('defense', 'stage2', perfect);
    document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
    document.getElementById('win-msg').textContent   = perfect ? 'ביצוע מושלם! 🎉' : 'כל הכבוד! 💪';
    document.getElementById('btn-replay').textContent = perfect ? 'שחקו שוב 🔄' : 'נסו שוב 🔄';
    setTimeout(()=>document.getElementById('win-overlay').classList.add('show'),600);
  }
}

// ── Init ──
CELL = getCell();
buildBoard();
loadScenario(0);
setTimeout(()=>document.getElementById('game-wrap').classList.add('visible'),100);

let _rzT, _rzCell = CELL;
window.addEventListener('resize', ()=>{
  clearTimeout(_rzT);
  _rzT = setTimeout(()=>{
    const nc = getCell();              // מסנכרן --cell/--board-size תמיד
    if(nc === _rzCell) return;         // לא נחצה breakpoint → שמור את כל מצב התרחיש
    _rzCell = nc; CELL = nc;
    const bs = CELL*8;
    document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
    buildBoard();
    loadScenario(scenIdx);
  }, 150);
});

function fullReset(){
  totalWrongClicks=0; scenIdx=0;
  document.getElementById('win-overlay').classList.remove('show');
  loadScenario(0);
}
</script>
