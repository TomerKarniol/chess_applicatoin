<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מגינים על המלך – שלב 3: אכילה ♞</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
:root {
  --cell:58px;
  --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --blue:#7EC8E3;
  --purple:#C39BD3;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
@media(max-height:600px){:root{--cell:36px;}}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; overflow-x:hidden; user-select:none;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  padding:16px 12px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
/* רשת ביטחון: מסך נמוך -> גלילה + יישור לראש כדי ששום אלמנט (כולל תוויות A-H) לא ייחתך */
@media(max-height:700px){ body{ overflow-y:auto; justify-content:flex-start; } }
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:10px; width:100%;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

/* HUD */
.hdr {
  display:flex; align-items:center; justify-content:space-between;
  width:var(--board-size);
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(195,155,211,.15); border:1.5px solid rgba(195,155,211,.35);
  border-radius:50px; padding:3px 14px; color:var(--purple);
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.6rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); text-align:center;
}

/* PROGRESS */
.progress-row { display:flex; gap:8px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(195,155,211,.3);
  transition:all .4s;
}
.prog-dot.done   { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(195,155,211,.4); border-color:var(--purple); animation:dot-pulse .8s ease-in-out infinite alternate; }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

/* INSTRUCTION */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.26rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  min-height:40px; display:flex; align-items:center; justify-content:center;
  width:var(--board-size);
  direction:rtl; unicode-bidi:bidi-override;
  animation:instr-pulse 2.4s ease-in-out infinite;
}
@keyframes instr-pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
.instruction.phase2 { color:#C39BD3; border-color:rgba(195,155,211,.3); background:rgba(195,155,211,.08); }

/* BOARD */
.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold); width:15px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold);
}
.board-outer {
  position:relative; width:var(--board-size); height:var(--board-size);
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
}
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:var(--cell-light); }
.cd { background:var(--cell-dark); }
.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }

/* PIECES */
.piece {
  position:absolute; z-index:10; font-size:calc(var(--cell)*.82);
  line-height:1; display:flex; align-items:center; justify-content:center;
  width:var(--cell); height:var(--cell);
  transition:top .75s cubic-bezier(.4,0,.2,1), left .75s cubic-bezier(.4,0,.2,1);
  cursor:pointer; filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));
}
.piece.glow-threat {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:threat-pulse .5s ease-in-out infinite alternate;
}
@keyframes threat-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
.piece.king-danger {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
}
.piece.eaten {
  transition: opacity .3s, transform .3s;
  opacity:0; transform:scale(0) rotate(180deg) !important;
  pointer-events:none;
}

/* X error */
.piece-err-x {
  position:absolute; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.75); color:#E74C3C;
  filter:drop-shadow(0 0 8px rgba(231,76,60,.9));
  animation:x-pop .15s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none;
}
@keyframes x-pop { from{transform:scale(0) rotate(-30deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

/* LASER */
.laser-svg { position:absolute; inset:0; width:100%; height:100%; z-index:20; pointer-events:none; overflow:visible; }

/* KING DANGER */
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.7);
  animation:king-danger-pulse .4s ease-in-out infinite alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to  {opacity:1;background:rgba(231,76,60,.85)}
}



/* TRANSITION */
#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.88); opacity:0; pointer-events:none; transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon  { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--blue); }

/* WIN */
#win-overlay {
  position:fixed; inset:0; z-index:450;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.92); opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-overlay.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:50px 70px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.5rem; color:var(--gold); margin-bottom:10px; }
.win-stars { font-size:2.2rem; margin:8px 0 4px; }
.win-msg   { font-family:'Fredoka One',cursive; font-size:1.15rem; color:var(--blue); margin-bottom:24px; }
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s, box-shadow .15s;
  display:block; width:100%; margin-bottom:10px;
  touch-action:manipulation;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s, border-color .2s; display:block; width:100%;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }

/* BURST */
.burst {
  position:fixed; border-radius:50%; pointer-events:none; z-index:600;
  animation:burst-anim .6s ease-out forwards;
}
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0} }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1/3</div>
    <div class="game-title" style="display:flex;align-items:center;justify-content:center;gap:8px;">
      אכילה
      <svg width="28" height="28" viewBox="0 0 28 28" style="flex-shrink:0;filter:drop-shadow(0 0 6px rgba(244,208,63,.8));">
        <path d="M14,14 L26,7 A13,13 0 1,0 26,21 Z" fill="#F4D03F"/>
        <circle cx="14" cy="6" r="2" fill="#1a1a1a"/>
      </svg>
    </div>
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row" id="progress-row"></div>
  <div class="instruction" id="instruction">לחצו על הכלי שמאיים שח על המלך!</div>
  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
        <svg class="laser-svg" id="laser-svg"></svg>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>
</div>


<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon">👏</span>
    <div class="tr-title" id="tr-title">כל הכבוד!</div>
    <div class="tr-sub"   id="tr-sub">עוברים לתרחיש הבא...</div>
  </div>
</div>

<div id="win-overlay">
  <div class="win-card">
    <span style="font-size:4rem;display:block;margin-bottom:10px">👏</span>
    <div class="win-title">שלב הושלם!</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div class="win-msg"   id="win-msg">ביצוע מושלם! 🎉</div>
    <button class="btn-next" onclick="location.href='check-defense-stage4.html'">שלב הבא ←</button>
    <button class="btn-retry" id="btn-replay" onclick="fullReset()">שחקו שוב 🔄</button>
  </div>
</div>

<script>
// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

function getCell(){
  const w = window.innerWidth;
  const wPx = w<=360?40 : w<=390?44 : w<=430?48 : w<=480?53 : 58;
  // גם לפי גובה: header+סטטוס+רמז+תוויות+ריווחים ≈ 195px — כך תוויות A-H לא נחתכות במסך כיתה נמוך
  const hPx = Math.floor((window.innerHeight - 195) / 8);
  const px = Math.max(36, Math.min(wPx, hPx));
  document.documentElement.style.setProperty('--cell', px+'px');
  document.documentElement.style.setProperty('--board-size', (px*8)+'px');
  return px;
}
let CELL = 64;
const FILES_ARR = ['A','B','C','D','E','F','G','H'];

// ══════════════════════════════
//  SCENARIOS
//  phase 1: click threat piece
//  phase 2: click eater piece (the one that eats the threat)
//  → eater moves to threat square, threat disappears, laser gone
// ══════════════════════════════
const SCENARIOS = [
  {
    // תרחיש 1: צריח לבן F8 → מלך שחור B8 | רץ שחור A3 אוכל F8
    pieces: [
      { id:'threat',  sym:'♖', white:true,  file:'F', rank:8, type:'rook'   },
      { id:'king',    sym:'♚', white:false, file:'B', rank:8, type:'king'   },
      { id:'eater',   sym:'♝', white:false, file:'A', rank:3, type:'bishop' },
      { id:'k2',      sym:'♔', white:true,  file:'D', rank:2, type:'king'   },
      { id:'p1',      sym:'♟', white:false, file:'A', rank:7, type:'pawn'   },
      { id:'p2',      sym:'♟', white:false, file:'B', rank:7, type:'pawn'   },
      { id:'p3',      sym:'♟', white:false, file:'C', rank:7, type:'pawn'   },
    ],
    threatId: 'threat',
    kingId:   'king',
    eaterId:  'eater',
  },
  {
    // תרחיש 2: מלכה לבנה B7 → מלך שחור A8 | צריח שחור H7 אוכל B7
    pieces: [
      { id:'threat',  sym:'♕', white:true,  file:'B', rank:7, type:'queen'  },
      { id:'king',    sym:'♚', white:false, file:'A', rank:8, type:'king'   },
      { id:'eater',   sym:'♜', white:false, file:'H', rank:7, type:'rook'   },
      { id:'k2',      sym:'♔', white:true,  file:'B', rank:6, type:'king'   },
    ],
    threatId: 'threat',
    kingId:   'king',
    eaterId:  'eater',
  },
  {
    // תרחיש 3: פרש שחור C4 → מלך לבן B2 | פרש לבן D2 אוכל C4
    // החלטת עיצוב מקובלת: האכילה מסירה את השח המיידי (זה הלקח). פרש A5 יכול לאכול-חזרה
    // ולתת שח שוב — מקובל; האפליקציה לא מדמה לכידה-חוזרת. (ראה chess-defense-validate-skill)
    pieces: [
      { id:'threat',  sym:'♞', white:false, file:'C', rank:4, type:'knight' },
      { id:'king',    sym:'♔', white:true,  file:'B', rank:2, type:'king'   },
      { id:'eater',   sym:'♘', white:true,  file:'D', rank:2, type:'knight' },
      { id:'kn2',     sym:'♞', white:false, file:'A', rank:5, type:'knight' },
      { id:'p1',      sym:'♙', white:true,  file:'A', rank:2, type:'pawn'   },
      { id:'p2',      sym:'♙', white:true,  file:'C', rank:3, type:'pawn'   },
      { id:'b1',      sym:'♝', white:false, file:'H', rank:7, type:'bishop' },
      { id:'r1',      sym:'♜', white:false, file:'H', rank:1, type:'rook'   },
    ],
    threatId: 'threat',
    kingId:   'king',
    eaterId:  'eater',
  },
];

// deep copy — מונע מוטציה בין טעינות תרחיש
const ORIGINAL_SCENARIOS = JSON.parse(JSON.stringify(SCENARIOS));

// ════════════════════════════════════════
//  STAGE STATE — שלב ביניים (saveStage בלבד)
//  addCompleted/addCard ודגל "just-completed" שייכים לשלב המסכם של המודול — לא כאן.
// ════════════════════════════════════════
const ChessState = {
  // v2.1 — שומר אחרון + שיא (ראה chess-state-skill)
  saveStage(moduleId, stageKey, perfect) {
    try {
      const d = JSON.parse(localStorage.getItem('chess_' + moduleId) || '{}');
      const prev = d[stageKey] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[stageKey] = {
        done: true,
        perfect: perfect,         // כותרת תואמת-לאחור = הריצה האחרונה
        lastPerfect: perfect,     // אחרון מפורש
        bestPerfect: bestPerfect  // שיא — לעולם לא יורד
      };
      localStorage.setItem('chess_' + moduleId, JSON.stringify(d));
    } catch(e) {}
  }
};
let scenIdx = 0;
let totalWrongClicks = 0;
let phase   = 1;
let busy    = false;

// ── Audio ──
let audioCtx = null;
let isMuted = localStorage.getItem('chess_muted') === 'true';
function toggleMute(){
  isMuted = !isMuted;
  localStorage.setItem('chess_muted', isMuted);
  document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
}
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click',()=>getAudio(),{once:true});

function playSuccess(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sine';
    o.frequency.setValueAtTime(520,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.25);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playError(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ctx.currentTime+.3);
    g.gain.setValueAtTime(.18,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function playLaser(){ if(isMuted) return;
  try{
    const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(440,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+.35);
    g.gain.setValueAtTime(.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
    o.start();o.stop(ctx.currentTime+.35);
  }catch(e){}
}

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  const isPawn = sym==='♟'||sym==='♙';
  const sz = isPawn ? 53 : 90;
  img.style.cssText=`width:${sz}%;height:${sz}%;object-fit:contain;display:block;margin:auto;`;
  if(!isWhite) img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  if(sym==='♙') img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
  return img;
}

// ── Board helpers ──
function rowCol(file,rank){ return {r:8-parseInt(rank), c:FILES_ARR.indexOf(file)}; }
function cellCenter(file,rank){ const {r,c}=rowCol(file,rank); return {x:c*CELL+CELL/2, y:r*CELL+CELL/2}; }

function buildBoard(){
  const board=document.getElementById('board'); board.innerHTML='';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.id=`cell_${r}_${c}`;
    board.appendChild(cell);
  }
  const ranks=document.getElementById('ranks'); ranks.innerHTML='';
  for(let r=8;r>=1;r--){const d=document.createElement('div');d.textContent=r;ranks.appendChild(d);}
  const files=document.getElementById('files'); files.innerHTML='';
  FILES_ARR.forEach(f=>{const d=document.createElement('div');d.textContent=f;files.appendChild(d);});
  const bs=CELL*8; document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
}

function placePieces(sc){
  document.querySelectorAll('.piece').forEach(p=>p.remove());
  const outer=document.getElementById('board-outer');
  sc.pieces.forEach(p=>{
    const {r,c}=rowCol(p.file,p.rank);
    const el=document.createElement('div');
    el.className='piece';
    el.id='piece_'+p.id;
    el.style.top=r*CELL+'px';
    el.style.left=c*CELL+'px';
    el.dataset.pieceId=p.id;
    const img=makePieceSVG(p.sym, p.white);
    if(img) el.appendChild(img);
    el.addEventListener('click', onPieceClick);
    outer.appendChild(el);
  });
}

function buildProgress(){
  const row=document.getElementById('progress-row'); row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<scenIdx?' done':i===scenIdx?' active':'');
    row.appendChild(d);
  });
}

// ── Laser ──
function drawLaser(x1,y1,x2,y2){
  const svg=document.getElementById('laser-svg'); svg.innerHTML='';
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
  glow.setAttribute('stroke','#FF4444');glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-opacity','0.35');glow.setAttribute('stroke-linecap','round');
  svg.appendChild(glow);
  const core=document.createElementNS('http://www.w3.org/2000/svg','line');
  core.setAttribute('x1',x1);core.setAttribute('y1',y1);core.setAttribute('x2',x2);core.setAttribute('y2',y2);
  core.setAttribute('stroke','#FF6666');core.setAttribute('stroke-width','3');
  core.setAttribute('stroke-opacity','0.95');core.setAttribute('stroke-linecap','round');
  svg.appendChild(core);
}
function clearLaser(){ document.getElementById('laser-svg').innerHTML=''; }

// ── King danger ──
function addKingDanger(file,rank){
  removeKingDanger();
  const {r,c}=rowCol(file,rank);
  const cell=document.getElementById(`cell_${r}_${c}`);
  const ov=document.createElement('div'); ov.className='king-danger-overlay'; ov.id='king-danger-ov';
  cell.appendChild(ov);
  const kEl=document.getElementById('piece_'+SCENARIOS[scenIdx].kingId);
  if(kEl) kEl.classList.add('king-danger');
}
function removeKingDanger(){
  const ov=document.getElementById('king-danger-ov'); if(ov) ov.remove();
  document.querySelectorAll('.king-danger').forEach(e=>e.classList.remove('king-danger'));
}

function setInstruction(txt,cls){
  const el=document.getElementById('instruction');
  el.textContent=txt;
  el.className='instruction'+(cls?' '+cls:'');
}

// ── Load scenario ──
function loadScenario(idx){
  scenIdx=idx; phase=1; busy=false;
  // איפוס תרחיש מה-original — מונע מוטציה
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));
  clearLaser(); removeKingDanger();
  document.getElementById('stage-badge').textContent=`תרחיש ${idx+1}/${SCENARIOS.length}`;
  buildProgress();
  placePieces(SCENARIOS[idx]);
  const kingPiece = SCENARIOS[idx].pieces.find(p=>p.id===SCENARIOS[idx].kingId);
  if(kingPiece) addKingDanger(kingPiece.file, kingPiece.rank);
  const kingColor = kingPiece && kingPiece.white ? 'הלבן' : 'השחור';
  setInstruction(`לחצו על הכלי שמאיים שח על המלך ${kingColor}!`,'');
}

// ── Piece click handler ──
function onPieceClick(e){
  if(busy) return;
  e.stopPropagation();
  const sc=SCENARIOS[scenIdx];
  const id=e.currentTarget.dataset.pieceId;

  if(phase===1){
    if(id===sc.threatId){
      playSuccess(); busy=true;
      const tEl=document.getElementById('piece_'+sc.threatId);
      tEl.classList.add('glow-threat');
      const tp=sc.pieces.find(p=>p.id===sc.threatId);
      const kp=sc.pieces.find(p=>p.id===sc.kingId);
      setTimeout(()=>{
        drawLaser(cellCenter(tp.file,tp.rank).x, cellCenter(tp.file,tp.rank).y,
                  cellCenter(kp.file,kp.rank).x, cellCenter(kp.file,kp.rank).y);
        playLaser();
        addKingDanger(kp.file,kp.rank);
          const eEl2=document.getElementById('piece_'+sc.eaterId);
        if(eEl2) eEl2.style.zIndex='50';
        phase=2; busy=false;
        setInstruction('לחצו על הכלי שיאכל את הכלי המאיים בשח!','phase2');
      },400);
    } else {
      showPieceError(e.currentTarget);
    }

  } else if(phase===2){
    if(id===sc.eaterId){
      busy=true;

      const tEl=document.getElementById('piece_'+sc.threatId);
      const eEl=document.getElementById('piece_'+sc.eaterId);
      const tp=sc.pieces.find(p=>p.id===sc.threatId);

      // eater moves to threat square
      const {r,c}=rowCol(tp.file,tp.rank);
      eEl.style.top =r*CELL+'px';
      eEl.style.left=c*CELL+'px';

      // explosion + sound fire exactly when eater arrives (750ms transition)
      setTimeout(()=>{
        const {r:er, c:ec} = rowCol(tp.file, tp.rank);
        playCapture();
        showExplosion(er, ec);
        if(tEl) tEl.classList.add('eaten');
        clearLaser();
        removeKingDanger();
        setTimeout(()=>{
          if(tEl) tEl.remove();
          eEl.classList.remove('glow-threat');
          busy=false;
          setTimeout(()=>nextScenario(), 600);
        },400);
      },780);

    } else {
      showPieceError(e.currentTarget);
    }
  }
}

function showPieceError(el){
  playError();
  totalWrongClicks++;
  el.classList.add('err-flash');
  const x=document.createElement('div'); x.className='piece-err-x'; x.textContent='✕';
  x.style.pointerEvents='none';
  el.appendChild(x);
  setTimeout(()=>{ el.classList.remove('err-flash'); x.remove(); },600);
}




function nextScenario(){
  if(scenIdx+1 < SCENARIOS.length){
    const ov=document.getElementById('transition-overlay');
    document.getElementById('tr-title').textContent='כל הכבוד! 👏';
    document.getElementById('tr-sub').textContent='עוברים לתרחיש הבא...';
    ov.classList.add('show');
    setTimeout(()=>{ ov.classList.remove('show'); loadScenario(scenIdx+1); },1200);
  } else {
    const perfect = totalWrongClicks <= 2;
    ChessState.saveStage('defense', 'stage3', perfect);
    document.getElementById('win-stars').textContent = perfect ? '⭐⭐⭐' : '⭐⭐';
    document.getElementById('win-msg').textContent   = perfect ? 'ביצוע מושלם! 🎉' : 'כל הכבוד! 💪';
    document.getElementById('btn-replay').textContent = perfect ? 'שחקו שוב 🔄' : 'נסו שוב 🔄';
    setTimeout(()=>document.getElementById('win-overlay').classList.add('show'),600);
  }
}

function fullReset(){
  totalWrongClicks=0; scenIdx=0;
  document.getElementById('win-overlay').classList.remove('show');
  loadScenario(0);
}


// ══════════════════════════════════════════
//  EXPLOSION EFFECT — chess-explosion-skill
// ══════════════════════════════════════════
function showExplosion(row, col) {
  const SZ = CELL;
  const boardOuter = document.querySelector('.board-outer');
  const W = SZ*8, H = SZ*8;
  const cx = col*SZ + SZ/2 + 3;
  const cy = row*SZ + SZ/2 + 3;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const COLORS = ['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts = Array.from({length:45}, (_,i) => {
    const a = (i/45)*Math.PI*2 + Math.random()*.4;
    const spd = 3.5 + Math.random()*9;
    return {
      x:cx, y:cy,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,
      color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1, decay:0.018+Math.random()*.022, gravity:0.18+Math.random()*.12,
    };
  });

  let frame = 0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Flash
    if(frame<8){
      const t=frame/7, r=SZ*.9*t;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);
      g.addColorStop(.35,`rgba(255,230,80,${(1-t)*.9})`);
      g.addColorStop(.7,`rgba(255,100,0,${(1-t)*.5})`);
      g.addColorStop(1,'rgba(200,30,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,Math.max(r,1),0,Math.PI*2); ctx.fill();
    }
    // Fireball
    if(frame>=1&&frame<22){
      const t=(frame-1)/21, r=SZ*.75*t, a=1-t;
      const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);
      g.addColorStop(.2,`rgba(255,180,0,${a*.95})`);
      g.addColorStop(.55,`rgba(210,50,0,${a*.7})`);
      g.addColorStop(.85,`rgba(100,15,0,${a*.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,Math.max(r,1),0,Math.PI*2); ctx.fill();
    }
    // Shockwave
    if(frame>=3&&frame<14){
      const t=(frame-3)/11;
      ctx.beginPath(); ctx.arc(cx,cy,SZ*.5*t+SZ*.15,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,180,50,${.6*(1-t)})`; ctx.lineWidth=3*(1-t); ctx.stroke();
    }
    // Smoke
    if(frame>10){
      const age=frame-10;
      for(let i=0;i<4;i++){
        const sa=Math.max(0,.18-age*.004); if(sa<=0) break;
        ctx.beginPath();
        ctx.arc(cx+Math.sin(i*1.7+age*.04)*age*.5, cy-age*.35+i*4, age*2.8+i*9, 0, Math.PI*2);
        ctx.fillStyle=`rgba(55,55,55,${sa/(i*.4+1)})`; ctx.fill();
      }
    }
    // Debris
    ctx.save();
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=.95;
      p.alpha=Math.max(0,p.alpha-p.decay); if(p.alpha<=0) return;
      ctx.globalAlpha=p.alpha; ctx.beginPath();
      ctx.arc(p.x,p.y,Math.max(.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
    });
    ctx.restore();
    frame++;
    if(frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function playCapture(){ if(isMuted) return;
  try{
    const ctx=getAudio(), n=ctx.currentTime;
    // Layer 1: sub-bass thud
    const thud=ctx.createOscillator(), thudG=ctx.createGain();
    thud.connect(thudG); thudG.connect(ctx.destination); thud.type='sine';
    thud.frequency.setValueAtTime(90,n); thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n); thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n); thud.stop(n+.6);
    // Layer 2: mid punch
    const punch=ctx.createOscillator(), punchG=ctx.createGain();
    punch.connect(punchG); punchG.connect(ctx.destination); punch.type='sine';
    punch.frequency.setValueAtTime(200,n); punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n); punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n); punch.stop(n+.22);
    // Layer 3: noise burst
    const bufSz=Math.floor(ctx.sampleRate*.35);
    const nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource(); nSrc.buffer=nBuf;
    const nFilt=ctx.createBiquadFilter();
    nFilt.type='bandpass'; nFilt.frequency.value=500; nFilt.Q.value=.5;
    const nGain=ctx.createGain();
    nGain.gain.setValueAtTime(.55,n); nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
    nSrc.start(n); nSrc.stop(n+.35);
    // Layer 4: sharp crack
    const crack=ctx.createOscillator(), crackG=ctx.createGain();
    crack.connect(crackG); crackG.connect(ctx.destination);
    crack.type='sawtooth'; crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n); crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n); crack.stop(n+.06);
  }catch(e){}
}

    _rzCell = nc; CELL = nc;
    const bs = CELL*8;
    document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
    buildBoard();
    loadScenario(scenIdx);
  }, 150);
});
