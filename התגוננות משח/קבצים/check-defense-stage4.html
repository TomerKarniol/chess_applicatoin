<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>מגינים על המלך – מבחן מסכם ♔</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { -webkit-text-size-adjust:100%; }
:root {
  --cell:58px;
  --board-size:calc(var(--cell)*8);
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --gold:#F4D03F; --gold-dark:#C9A227;
  --red:#E74C3C; --green:#52B788; --blue:#7EC8E3;
  --purple:#C39BD3; --orange:#FF6B35;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
@media(max-height:600px){:root{--cell:36px;}}
body {
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,#162D4A 0%,#0C1E30 55%,#060E1A 100%);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  overflow:hidden; overflow-x:hidden; user-select:none;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  padding:16px 12px;
  padding-bottom:max(16px,env(safe-area-inset-bottom));
}
.star-dot { position:fixed; border-radius:50%; background:white;
  animation:twinkle ease-in-out infinite alternate; pointer-events:none; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

.game-wrap {
  position:relative; z-index:1; display:flex; flex-direction:column;
  align-items:center; gap:10px; width:100%;
  opacity:0; transition:opacity .5s ease;
}
.game-wrap.visible { opacity:1; }

.hdr {
  display:flex; align-items:center; justify-content:space-between;
  width:var(--board-size);
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:.85rem;
  background:rgba(244,208,63,.15); border:1.5px solid rgba(244,208,63,.35);
  border-radius:50px; padding:3px 14px; color:var(--gold);
}
.game-title {
  font-family:'Fredoka One',cursive; font-size:1.6rem; color:#E0F7FF;
  text-shadow:0 0 20px rgba(126,200,227,.6); text-align:center;
}
.btn-mute {
  font-size:1.3rem; background:rgba(255,255,255,.07);
  border:1.5px solid rgba(126,200,227,.3); border-radius:50%;
  width:38px; height:38px; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; transition:background .15s;
}
.btn-mute:hover { background:rgba(255,255,255,.15); }

.progress-row { display:flex; gap:8px; align-items:center; }
.prog-dot {
  width:14px; height:14px; border-radius:50%;
  background:rgba(255,255,255,.15); border:2px solid rgba(244,208,63,.3);
  transition:all .4s;
}
.prog-dot.done   { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(244,208,63,.7); }
.prog-dot.active { background:rgba(244,208,63,.4); border-color:var(--gold); animation:dot-pulse .8s ease-in-out infinite alternate; }
@keyframes dot-pulse { from{transform:scale(1)} to{transform:scale(1.3)} }

.instruction {
  font-family:'Fredoka One',cursive; font-size:1.26rem; color:#B0D8F0;
  background:rgba(126,200,227,.1); border:1.5px solid rgba(126,200,227,.2);
  border-radius:50px; padding:7px 22px; text-align:center;
  min-height:40px; display:flex; align-items:center; justify-content:center;
  width:var(--board-size);
  direction:rtl; unicode-bidi:bidi-override;
  animation:instr-pulse 2.4s ease-in-out infinite;
}
@keyframes instr-pulse { 0%,100%{opacity:1} 50%{opacity:.65} }
.instruction.phase2-flee  { color:#52B788;  border-color:rgba(82,183,136,.3);  background:rgba(82,183,136,.08); }
.instruction.phase2-block { color:#7EC8E3;  border-color:rgba(126,200,227,.3); background:rgba(126,200,227,.08); }
.instruction.phase2-eat   { color:#C39BD3;  border-color:rgba(195,155,211,.3); background:rgba(195,155,211,.08); }
.instruction.phase3-block { color:#F4D03F;  border-color:rgba(244,208,63,.3);  background:rgba(244,208,63,.08); }

.coord-wrap { display:flex; align-items:flex-start; gap:5px; direction:ltr; }
.rank-labels {
  display:flex; flex-direction:column; height:var(--board-size);
  justify-content:space-around; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold); width:15px; text-align:center;
}
.file-labels {
  display:flex; justify-content:space-around; width:var(--board-size);
  margin-top:4px; font-family:'Fredoka One',cursive; font-size:.72rem;
  opacity:.8; color:var(--gold);
}
.board-outer {
  position:relative; width:var(--board-size); height:var(--board-size);
  border:3px solid #C9A227; border-radius:6px; overflow:hidden;
  box-shadow:0 0 0 2px rgba(244,208,63,.15),0 16px 50px rgba(0,0,0,.7);
}
.board { display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell)); }
.cell {
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; position:relative; transition:background .15s;
  touch-action:manipulation;
}
.cl { background:var(--cell-light); }
.cd { background:var(--cell-dark); }
.cell.flee-hl {
  background:rgba(82,183,136,.55) !important;
  animation:flee-blink .7s ease-in-out infinite alternate;
}
@keyframes flee-blink {
  from{background:rgba(82,183,136,.3)}
  to  {background:rgba(82,183,136,.75)}
}

.cell.mine-sq::after {
  content:'💣'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.5);
  animation:mine-float .8s ease-in-out infinite alternate;
  pointer-events:none; z-index:6;
}
@keyframes mine-float { from{transform:scale(.9)} to{transform:scale(1.1)} }
.cell.err-flash { animation:err-flash .4s ease-in-out; }
@keyframes err-flash { 0%,100%{background:inherit} 50%{background:rgba(231,76,60,.6)!important} }

.piece {
  position:absolute; z-index:10; font-size:calc(var(--cell)*.82);
  line-height:1; display:flex; align-items:center; justify-content:center;
  width:var(--cell); height:var(--cell);
  transition:top .4s cubic-bezier(.4,0,.2,1), left .4s cubic-bezier(.4,0,.2,1);
  cursor:pointer; filter:drop-shadow(0 3px 6px rgba(0,0,0,.5));
}
.piece.piece-big { font-size:calc(var(--cell)*.984); }
.piece.glow-threat {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:threat-pulse .5s ease-in-out infinite alternate;
}
@keyframes threat-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
.piece.glow-actor {
  filter:drop-shadow(0 0 18px rgba(244,208,63,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
  animation:actor-pulse .5s ease-in-out infinite alternate;
}
@keyframes actor-pulse { from{transform:scale(1)} to{transform:scale(1.12)} }
.piece.king-danger {
  filter:drop-shadow(0 0 18px rgba(231,76,60,1)) drop-shadow(0 3px 6px rgba(0,0,0,.5)) !important;
}
.piece-err-x {
  position:absolute; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*.75); color:#E74C3C;
  filter:drop-shadow(0 0 8px rgba(231,76,60,.9));
  animation:x-pop .15s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none;
}
@keyframes x-pop { from{transform:scale(0) rotate(-30deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

.laser-svg { position:absolute; inset:0; width:100%; height:100%; z-index:20; pointer-events:none; overflow:visible; }
.king-danger-overlay {
  position:absolute; inset:0; border-radius:4px;
  background:rgba(231,76,60,.7);
  animation:king-danger-pulse .4s ease-in-out infinite alternate;
  pointer-events:none; z-index:5;
}
@keyframes king-danger-pulse {
  from{opacity:.4;background:rgba(231,76,60,.5)}
  to  {opacity:1;background:rgba(231,76,60,.85)}
}

#transition-overlay {
  position:fixed; inset:0; z-index:400;
  display:flex; align-items:center; justify-content:center;
  background:rgba(6,14,26,.88); opacity:0; pointer-events:none; transition:opacity .3s;
}
#transition-overlay.show { opacity:1; pointer-events:all; }
.tr-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.4); border-radius:20px;
  padding:40px 60px; text-align:center;
  box-shadow:0 0 60px rgba(244,208,63,.2);
  animation:card-in .5s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes card-in { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
.tr-icon  { font-size:3.5rem; display:block; margin-bottom:10px; }
.tr-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:6px; }
.tr-sub   { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--blue); }

/* WIN SCREENS */
#win-screen1, #win-screen2 {
  position:fixed; inset:0; z-index:450;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:#060E1A; opacity:0; pointer-events:none; transition:opacity .4s;
}
#win-screen1.show, #win-screen2.show { opacity:1; pointer-events:all; }
.win-card {
  background:linear-gradient(135deg,#162D4A,#0C1E30);
  border:2px solid rgba(244,208,63,.5); border-radius:20px;
  padding:30px 50px 40px; text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.3),0 0 120px rgba(82,183,136,.2);
  animation:card-in .6s cubic-bezier(.175,.885,.32,1.5) both;
  max-width:480px;
}
.win-title { font-family:'Fredoka One',cursive; font-size:2.2rem; color:#F4D03F; margin-bottom:6px; }
/* פיל "לשיפור" (🔄) מהבהב — גרסת זוהר קנונית (זהה לצריח) */
@keyframes pill-blink{0%,100%{background:rgba(244,208,63,.12);box-shadow:0 0 4px rgba(244,208,63,.3);transform:scale(1);}50%{background:rgba(244,208,63,.55);box-shadow:0 0 18px rgba(244,208,63,1),0 0 35px rgba(244,208,63,.5);transform:scale(1.06);}}
.win-crown {
  font-family:'Fredoka One',cursive; font-size:1.8rem; color:#52B788;
  text-shadow:0 0 20px rgba(82,183,136,.8),0 0 40px rgba(82,183,136,.4);
  margin-bottom:8px;
}
.win-monster-tease { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#7EC8E3; margin-top:8px; margin-bottom:4px; }
@keyframes monsterDrop {
  from{opacity:0;transform:scale(.3) rotate(-10deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
/* TRADING CARD */
.trading-card {
  width:360px;
  background:linear-gradient(160deg,#0a1a2e 0%,#0a2d1a 50%,#0a1a0a 100%);
  border:4px solid #52B788;
  border-radius:20px;
  box-shadow:0 0 40px rgba(82,183,136,.8),0 0 80px rgba(244,208,63,.3),inset 0 0 30px rgba(82,183,136,.1);
  overflow:hidden;
  animation:cardReveal .8s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes cardReveal {
  from{opacity:0;transform:scale(.5) rotateY(90deg);}
  to{opacity:1;transform:scale(1) rotateY(0deg);}
}
.card-header {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  color:#F4D03F; text-align:center;
  padding:10px 16px 6px;
  background:linear-gradient(90deg,transparent,rgba(82,183,136,.2),transparent);
  border-bottom:1px solid rgba(82,183,136,.4);
  text-shadow:0 0 12px rgba(244,208,63,.9);
}
.card-img-wrap {
  padding:16px; background:rgba(0,0,0,.3);
  display:flex; align-items:center; justify-content:center;
}
.card-monster-emoji {
  font-size:8rem; line-height:1;
  filter:drop-shadow(0 0 20px rgba(82,183,136,.9)) drop-shadow(0 0 40px rgba(244,208,63,.5));
  animation:monsterPulse 2s ease-in-out infinite;
}
@keyframes monsterPulse {
  0%,100%{filter:drop-shadow(0 0 20px rgba(82,183,136,.8)) drop-shadow(0 0 40px rgba(244,208,63,.4));}
  50%    {filter:drop-shadow(0 0 40px rgba(82,183,136,1)) drop-shadow(0 0 70px rgba(244,208,63,.7));}
}
.btn-album {
  margin-top:16px;
  background:linear-gradient(145deg,#52B788,#2E8B57);
  box-shadow:0 5px 0 #1a5c38,0 0 20px rgba(82,183,136,.5);
}
.btn-main {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  background:linear-gradient(145deg,#F7DC6F,var(--gold-dark)); color:#1B3A2A;
  border:none; border-radius:50px; padding:14px 44px; cursor:pointer;
  box-shadow:0 5px 0 #9A7B1A; transition:all .15s;
}
.btn-main:hover  { transform:translateY(-2px); }
.btn-main:active { transform:translateY(3px); }

.burst { position:fixed; border-radius:50%; pointer-events:none; z-index:600; animation:burst-anim .6s ease-out forwards; }
@keyframes burst-anim { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0} }
</style>
</head>
<body>
<div id="stars-bg" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></div>

<div class="game-wrap" id="game-wrap">
  <div class="hdr">
    <div class="stage-badge" id="stage-badge">תרחיש 1/8</div>
    <div class="game-title" style="display:flex;align-items:center;justify-content:center;gap:8px;">
      מבחן מסכם - הגנו על המלך המותקף
    </div>
    <button class="btn-mute" id="btn-mute" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row" id="progress-row"></div>
  <div class="instruction" id="instruction">לחצו על הכלי שמאיים שח על המלך!</div>
  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board" id="board"></div>
        <svg class="laser-svg" id="laser-svg" viewBox="0 0 544 544"></svg>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>

</div>

<div id="transition-overlay">
  <div class="tr-card">
    <span class="tr-icon">👏</span>
    <div class="tr-title" id="tr-title">כל הכבוד!</div>
    <div class="tr-sub" id="tr-sub">עוברים לתרחיש הבא...</div>
  </div>
</div>

<!-- WIN SCREEN 1 — הכתרה -->
<div id="win-screen1">
  <div class="win-card">
    <div style="font-size:4rem;margin-bottom:12px;animation:monsterDrop .8s cubic-bezier(.175,.885,.32,1.5) both;">👑</div>
    <div class="win-title">הוכתרתם ע"י המורה ברוך</div>
    <div class="win-crown">כמפלצת ההגנה!</div>
    <div id="final-score-display" style="margin:14px 0;"></div>
    <div class="win-monster-tease">זכיתם בקלף מפלצת ההגנה! 🃏</div>
    <button class="btn-main" onclick="showWinScreen2()" style="margin-top:20px;">הצג את הקלף ←</button>
  </div>
</div>

<!-- WIN SCREEN 2 — קלף המפלצת -->
<div id="win-screen2">
  <div class="trading-card">
    <div class="card-header">⚔️ מפלצת ההגנה ⚔️</div>
    <div class="card-img-wrap">
      <img src="../../מסך הפתיחה/defence.png" class="card-monster-img" style="width:100%;border-radius:10px;filter:drop-shadow(0 0 16px rgba(82,183,136,.7));image-rendering:high-quality;"/>
    </div>
  </div>
  <!-- ⚠️ כוכבי מודול + שורת השלבים — מחוץ לקלף! ממולא ב-showFinalScore() -->
  <div id="card-stars" style="text-align:center;font-family:'Fredoka One',cursive;margin-top:8px;"></div>
  <button class="btn-main btn-album" onclick="goToAlbum()">📌 הצמידו לאלבום</button>
  <button class="btn-main" onclick="replayStage()" style="margin-top:10px;background:linear-gradient(145deg,#7EC8E3,#4A7FA5);box-shadow:0 5px 0 #2a5f85,0 0 20px rgba(126,200,227,.4);">שחקו שוב 🔄</button>
</div>

<script>
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

const FILES_ARR=['A','B','C','D','E','F','G','H'];
function getCell(){
  const w = window.innerWidth;
  const px = w<=360?40 : w<=390?44 : w<=430?48 : w<=480?53 : 58;
  document.documentElement.style.setProperty('--cell', px+'px');
  document.documentElement.style.setProperty('--board-size', (px*8)+'px');
  return px;
}
let CELL = 64;

// defenseType: 'flee' | 'block' | 'eat'
// flee:  validSqs = array of escape squares
// block: actorId + validSqs (dest squares, multiple actors possible)
// eat:   actorId (eater piece id)
const SCENARIOS = [
  {
    // תרחיש 1 — חסימה: צריח שחור H6→מלך לבן H1, רץ G4→H3(עדיף)/H5
    subtitle:'חסימה', defenseType:'block',
    pieces:[
      {id:'threat', sym:'♜', white:false, file:'H', rank:6, type:'rook'},
      {id:'king',   sym:'♔', white:true,  file:'H', rank:1, type:'king'},
      {id:'actor',  sym:'♗', white:true,  file:'G', rank:4, type:'bishop'},
      {id:'b1',     sym:'♝', white:false, file:'F', rank:2, type:'bishop'},
      {id:'p1',     sym:'♙', white:true,  file:'G', rank:2, type:'pawn'},
    ],
    threatId:'threat', kingId:'king',
    actorId:'actor',
    validSqs:[{file:'H',rank:3},{file:'H',rank:5}],
    trapSq:{file:'H',rank:5},
    mineSqs:[],
  },
  {
    // תרחיש 2 — בריחה(נכון)/חסימה(פחות טוב): רץ שחור B5→מלך לבן E2
    // חסימה: פרש D2→C4 → רץ B5 אוכל → לייזר חוזר → חזרה למקום
    // בריחה: מלך E2→E3 ✅ (הבריחה משתמשת ב-fleeSqs; אין validSqs כאן)
    subtitle:'בריחה_או_חסימה', defenseType:'flee_or_block',
    pieces:[
      {id:'threat', sym:'♝', white:false, file:'B', rank:5, type:'bishop'},
      {id:'king',   sym:'♔', white:true,  file:'E', rank:2, type:'king'},
      {id:'actor',  sym:'♘', white:true,  file:'D', rank:2, type:'knight'},
      {id:'p1',     sym:'♙', white:true,  file:'F', rank:3, type:'pawn'},
      {id:'p2',     sym:'♙', white:true,  file:'G', rank:2, type:'pawn'},
      {id:'r1',     sym:'♜', white:false, file:'F', rank:1, type:'rook'},
    ],
    threatId:'threat', kingId:'king',
    actorId:'actor',
    blockTrapSq:{file:'C',rank:4},  // משבצת חסימה פחות טובה
    fleeSqs:[{file:'E',rank:3}],    // בריחה נכונה
    mineSqs:[],
  },
  {
    // תרחיש 3 — חסימה: רץ לבן C6→מלך שחור A8, צריח שחור E7→B7
    subtitle:'חסימה', defenseType:'block',
    pieces:[
      {id:'threat', sym:'♗', white:true,  file:'C', rank:6, type:'bishop'},
      {id:'king',   sym:'♚', white:false, file:'A', rank:8, type:'king'},
      {id:'actor',  sym:'♜', white:false, file:'E', rank:7, type:'rook'},
      {id:'b1',     sym:'♝', white:false, file:'B', rank:8, type:'bishop'},
      {id:'p1',     sym:'♟', white:false, file:'A', rank:7, type:'pawn'},
      {id:'p2',     sym:'♟', white:false, file:'F', rank:7, type:'pawn'},
      {id:'p3',     sym:'♟', white:false, file:'G', rank:7, type:'pawn'},
      {id:'p4',     sym:'♟', white:false, file:'H', rank:7, type:'pawn'},
      {id:'kn1',    sym:'♞', white:false, file:'F', rank:6, type:'knight'},
      {id:'r1',     sym:'♖', white:true,  file:'D', rank:1, type:'rook'},
      {id:'k2',     sym:'♔', white:true,  file:'G', rank:1, type:'king'},
      {id:'p5',     sym:'♙', white:true,  file:'A', rank:2, type:'pawn'},

// ── DefenseState v2 ──
const DefenseState = {
  MODULE_KEY: 'chess_defense',
  STAGE_KEY: 'stage4',
  PERFECT_THRESHOLD: 4,  // כל 4 השלבים מושלמים = 3 כוכבים (עקבי עם queen/rook)
  save(perfect) {
    try {
      const d = JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev = d[this.STAGE_KEY] || {};
      const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;
      d[this.STAGE_KEY] = {
        done: true,
        perfect: perfect,         // תואם-לאחור = הריצה האחרונה
        lastPerfect: perfect,
        bestPerfect: bestPerfect  // שיא — לעולם לא יורד
      };
      localStorage.setItem(this.MODULE_KEY, JSON.stringify(d));
    } catch(e){}
  },
  // v2.1 — מחזיר {best, last} בכוכבים (3/2/0), בהתאמה ל-index.html
  getModuleStars() {
    try {
      const d    = JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const keys = ['stage1','stage2','stage3','stage4'];
      const done = keys.filter(k=>d[k]?.done).length;
      if (done < keys.length) return { best:0, last:0 };
      const bestP = keys.filter(k=>(d[k]?.bestPerfect ?? d[k]?.perfect)).length;
      const lastP = keys.filter(k=>(d[k]?.lastPerfect  ?? d[k]?.perfect)).length;
      return { best: bestP>=this.PERFECT_THRESHOLD?3:2, last: lastP>=this.PERFECT_THRESHOLD?3:2 };
    } catch(e){ return { best:0, last:0 }; }
  }
};
// כוכבים כטקסט + תג "אחרון" עמום כשהריצה האחרונה נמוכה מהשיא
function starsLabel(n){ return n>=3?'⭐⭐⭐':n>=2?'⭐⭐':'○'; }
function moduleStarsHTML(){
  const s = DefenseState.getModuleStars();
  let html = starsLabel(s.best);
  if (s.last < s.best) html += `<span style="opacity:.5;font-size:.7em;margin-inline-start:6px;">אחרון ${starsLabel(s.last)}</span>`;
  return html;
}

let audioCtx=null;
function toggleMute(){ muted=!muted; document.getElementById('btn-mute').textContent=muted?'🔇':'🔊'; }
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}
document.addEventListener('click',()=>getAudio(),{once:true});

function playSuccess(){
  if(muted)return;
  try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sine';
    o.frequency.setValueAtTime(520,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+.25);
    g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);}catch(e){}
}
function playError(){
  if(muted)return;
  try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(220,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(110,ctx.currentTime+.3);
    g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);}catch(e){}
}
function playLaser(){
  if(muted)return;
  try{const ctx=getAudio(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.type='sawtooth';
    o.frequency.setValueAtTime(440,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+.35);
    g.gain.setValueAtTime(.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.35);
    o.start();o.stop(ctx.currentTime+.35);}catch(e){}
}
function playExplosion(){
  if(muted)return;
  try{
    const ctx=getAudio();
    const n=ctx.currentTime;
    // Layer 1: sub-bass thud
    const thud=ctx.createOscillator(),thudG=ctx.createGain();
    thud.connect(thudG);thudG.connect(ctx.destination);
    thud.type='sine';
    thud.frequency.setValueAtTime(90,n);
    thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n);
    thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n);thud.stop(n+.6);
    // Layer 2: mid punch
    const punch=ctx.createOscillator(),punchG=ctx.createGain();
    punch.connect(punchG);punchG.connect(ctx.destination);
    punch.type='sine';
    punch.frequency.setValueAtTime(200,n);
    punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n);
    punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n);punch.stop(n+.22);
    // Layer 3: noise burst
    const bufSz=Math.floor(ctx.sampleRate*.35);
    const nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource();nSrc.buffer=nBuf;
    const nFilt=ctx.createBiquadFilter();
    nFilt.type='bandpass';nFilt.frequency.value=500;nFilt.Q.value=.5;
    const nGain=ctx.createGain();
    nGain.gain.setValueAtTime(.55,n);
    nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt);nFilt.connect(nGain);nGain.connect(ctx.destination);
    nSrc.start(n);nSrc.stop(n+.35);
    // Layer 4: sharp crack
    const crack=ctx.createOscillator(),crackG=ctx.createGain();
    crack.connect(crackG);crackG.connect(ctx.destination);
    crack.type='sawtooth';crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n);
    crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n);crack.stop(n+.06);
  }catch(e){}
}

// ── Visual explosion (canvas-based, 4-phase ~917ms) ──
function showExplosion(row,col){
  const SZ=CELL;
  const W=SZ*8,H=SZ*8;
  const cx=col*SZ+SZ/2+3;
  const cy=row*SZ+SZ/2+3;
  const boardOuter=document.querySelector('.board-outer');
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  canvas.style.cssText=`position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const c=canvas.getContext('2d');
  const COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts=Array.from({length:45},(_,i)=>{
    const a=(i/45)*Math.PI*2+Math.random()*.4,spd=3.5+Math.random()*9;
    return{x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1,decay:0.018+Math.random()*.022,gravity:0.18+Math.random()*.12};
  });
  let frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    if(frame<8){
      const t=frame/7,r=SZ*.9*t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);
      g.addColorStop(.35,`rgba(255,230,80,${(1-t)*.9})`);
      g.addColorStop(.7,`rgba(255,100,0,${(1-t)*.5})`);
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=1&&frame<22){
      const t=(frame-1)/21,r=SZ*.75*t,a=1-t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);
      g.addColorStop(.2,`rgba(255,180,0,${a*.95})`);
      g.addColorStop(.55,`rgba(210,50,0,${a*.7})`);
      g.addColorStop(.85,`rgba(100,15,0,${a*.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();
    }
    if(frame>=3&&frame<14){
      const t=(frame-3)/11;
      c.beginPath();c.arc(cx,cy,SZ*.5*t+SZ*.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${.6*(1-t)})`;c.lineWidth=3*(1-t);c.stroke();
    }
    if(frame>10){
      const age=frame-10;
      for(let i=0;i<4;i++){
        const sa=Math.max(0,.18-age*.004);if(sa<=0)break;
        c.beginPath();
        c.arc(cx+Math.sin(i*1.7+age*.04)*age*.5,cy-age*.35+i*4,age*2.8+i*9,0,Math.PI*2);
        c.fillStyle=`rgba(55,55,55,${sa/(i*.4+1)})`;c.fill();
      }
    }
    c.save();
    parts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0)return;
      c.globalAlpha=p.alpha;
      c.beginPath();c.arc(p.x,p.y,Math.max(.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color;c.fill();
    });
    c.restore();
    frame++;
    if(frame<55)requestAnimationFrame(draw);else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function makePieceSVG(sym, isWhite){
  const dict = isWhite ? WHITE_SVG : BLACK_SVG;
  if(!dict[sym]) return null;
  const img = document.createElement('img');
  img.src = 'data:image/svg+xml,' + encodeURIComponent(dict[sym]);
  const isPawn = sym==='♟'||sym==='♙';
  const sz = isPawn ? (isWhite?48:53) : 90;
  img.style.cssText=`width:${sz}%;height:${sz}%;object-fit:contain;display:block;margin:auto;`;
  if(!isWhite) img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
  if(sym==='♙') img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
  return img;
}

// ── Title icon ──


// ── Helpers ──
function rowCol(file,rank){return{r:8-parseInt(rank),c:FILES_ARR.indexOf(file)};}
function cellCenter(file,rank){const{r,c}=rowCol(file,rank);return{x:c*CELL+CELL/2,y:r*CELL+CELL/2};}
function cellId(file,rank){const{r,c}=rowCol(file,rank);return`cell_${r}_${c}`;}

function buildBoard(){
  CELL = getCell();
  // עדכון viewBox דינמי
  const bs = CELL*8;
  document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
  const board=document.getElementById('board');board.innerHTML='';
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.id=`cell_${r}_${c}`;board.appendChild(cell);}
  const ranks=document.getElementById('ranks');ranks.innerHTML='';
  for(let r=8;r>=1;r--){const d=document.createElement('div');d.textContent=r;ranks.appendChild(d);}
  const files=document.getElementById('files');files.innerHTML='';
  FILES_ARR.forEach(f=>{const d=document.createElement('div');d.textContent=f;files.appendChild(d);});
}

function placePieces(sc){
  document.querySelectorAll('.piece').forEach(p=>p.remove());
  const outer=document.getElementById('board-outer');
  sc.pieces.forEach(p=>{
    const{r,c}=rowCol(p.file,p.rank);
    const el=document.createElement('div');
    el.className='piece';
    el.id='piece_'+p.id;
    el.style.top=r*CELL+'px';el.style.left=c*CELL+'px';
    el.dataset.pieceId=p.id;
    const img=makePieceSVG(p.sym, p.white);
    if(img) el.appendChild(img);
    el.addEventListener('click',onPieceClick);
    outer.appendChild(el);
  });
}

function buildProgress(){
  const row=document.getElementById('progress-row');row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot'+(i<scenIdx?' done':i===scenIdx?' active':'');
    row.appendChild(d);});
}

function drawLaser(x1,y1,x2,y2){
  const svg=document.getElementById('laser-svg');svg.innerHTML='';
  const glow=document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1);glow.setAttribute('y1',y1);glow.setAttribute('x2',x2);glow.setAttribute('y2',y2);
  glow.setAttribute('stroke','#FF4444');glow.setAttribute('stroke-width','10');
  glow.setAttribute('stroke-opacity','0.35');glow.setAttribute('stroke-linecap','round');
  svg.appendChild(glow);
  const core=document.createElementNS('http://www.w3.org/2000/svg','line');
  core.setAttribute('x1',x1);core.setAttribute('y1',y1);core.setAttribute('x2',x2);core.setAttribute('y2',y2);
  core.setAttribute('stroke','#FF6666');core.setAttribute('stroke-width','3');
  core.setAttribute('stroke-opacity','0.95');core.setAttribute('stroke-linecap','round');
  svg.appendChild(core);
}
function clearLaser(){document.getElementById('laser-svg').innerHTML='';}

function addKingDanger(file,rank){
  removeKingDanger();
  const{r,c}=rowCol(file,rank);
  const cell=document.getElementById(`cell_${r}_${c}`);
  const ov=document.createElement('div');ov.className='king-danger-overlay';ov.id='king-danger-ov';
  cell.appendChild(ov);
  const kEl=document.getElementById('piece_'+SCENARIOS[scenIdx].kingId);
  if(kEl)kEl.classList.add('king-danger');
}
function removeKingDanger(){
  const ov=document.getElementById('king-danger-ov');if(ov)ov.remove();
  document.querySelectorAll('.king-danger').forEach(e=>e.classList.remove('king-danger'));
}

function setInstruction(txt,cls){
  const el=document.getElementById('instruction');
  el.textContent=txt;el.className='instruction'+(cls?' '+cls:'');
}

function clearHighlights(){
  document.querySelectorAll('.flee-hl').forEach(c=>c.classList.remove('flee-hl'));
}

function loadScenario(idx){
  scenIdx=idx;phase=1;busy=false;
  // שחזור פוזיציות מקוריות (מניעת מוטציה)
  SCENARIOS[idx].pieces = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx].pieces));
  SCENARIOS[idx]._chosenActor = undefined;
  clearLaser();removeKingDanger();clearHighlights();
  document.querySelectorAll('.mine-sq').forEach(c=>c.classList.remove('mine-sq'));
  document.getElementById('board').removeEventListener('click',onCellClick);
  document.querySelectorAll('.glow-actor,.glow-threat,.king-danger').forEach(e=>e.classList.remove('glow-actor','glow-threat','king-danger'));
  document.getElementById('stage-badge').textContent=`תרחיש ${idx+1}/${SCENARIOS.length}`;
  buildProgress();
  placePieces(SCENARIOS[idx]);
  // mines
  SCENARIOS[idx].mineSqs.forEach(sq=>{
    const cell=document.getElementById(cellId(sq.file,sq.rank));
    if(cell)cell.classList.add('mine-sq');
  });
  const kingPiece=SCENARIOS[idx].pieces.find(p=>p.id===SCENARIOS[idx].kingId);
  const kingColor=kingPiece&&kingPiece.white?'הלבן':'השחור';
  setInstruction('לחצו על הכלי שמאיים על המלך','');
  if(kingPiece) addKingDanger(kingPiece.file,kingPiece.rank);
  // תרחיש 5: קשור listener מיד כדי לתפוס לחיצה על G8 בכל פאזה
  if(idx===4) document.getElementById('board').addEventListener('click',onCellClick);
}

// ── Click handlers ──
function onPieceClick(e){
  if(busy)return;
  e.stopPropagation();
  const sc=SCENARIOS[scenIdx];
  const id=e.currentTarget.dataset.pieceId;

  if(phase===1){
    if(id===sc.threatId){
      playSuccess();busy=true;
      const tEl=document.getElementById('piece_'+sc.threatId);
      tEl.classList.add('glow-threat');
      const tp=sc.pieces.find(p=>p.id===sc.threatId);
      const kp=sc.pieces.find(p=>p.id===sc.kingId);
      setTimeout(()=>{
        drawLaser(cellCenter(tp.file,tp.rank).x,cellCenter(tp.file,tp.rank).y,
                  cellCenter(kp.file,kp.rank).x,cellCenter(kp.file,kp.rank).y);
        playLaser();
        addKingDanger(kp.file,kp.rank);
        if(sc.defenseType==='flee'){
          // דלג על לחיצת מלך — הצג ריבועי בריחה ישירות
          phase=3; busy=false;
          const kEl2=document.getElementById('piece_'+sc.kingId);
          if(kEl2) kEl2.classList.add('glow-actor');
          document.getElementById('board').addEventListener('click',onCellClick);
          setInstruction('בחרו את ההגנה הטובה ביותר!','');
        } else {
          phase=2; busy=false;
          setInstruction('בחרו את ההגנה הטובה ביותר!','');
          if(sc.defenseType==='eat'){
            const eEl=document.getElementById('piece_'+sc.actorId);
            if(eEl)eEl.style.zIndex='50';
          }
        }
      },400);
    } else {
      showPieceError(e.currentTarget);
    }

  } else if(phase===2){
    const sc=SCENARIOS[scenIdx];

    if(sc.defenseType==='flee_or_block'){
      // לחיצה על המלך — בריחה
      if(id===sc.kingId){
        playSuccess();
        const kEl=document.getElementById('piece_'+sc.kingId);
        kEl.classList.add('glow-actor');
        phase=3;
        setInstruction('','phase2-flee');
        document.getElementById('board').addEventListener('click',onCellClick);
      // לחיצה על הפרש — חסימה
      } else if(id===sc.actorId){
        playSuccess(); busy=false;
        const aEl=document.getElementById('piece_'+sc.actorId);
        aEl.classList.add('glow-actor');
        aEl.style.zIndex='50';
        phase=2.5;
        setInstruction('בחרו את ההגנה הטובה ביותר!','');
        document.getElementById('board').addEventListener('click',onCellClick);
      } else {
        showPieceError(e.currentTarget);
      }

    } else if(sc.defenseType==='block'){
      // מלך לוחץ על עצמו כניסיון בריחה — רק אם יש kingTrapSq
      if(id===sc.kingId && (sc.kingTrapSqs || sc.kingTrapSq)){
        const kEl=document.getElementById('piece_'+sc.kingId);
        kEl.classList.add('glow-actor');
        phase=2.8;
        document.getElementById('board').addEventListener('click',onCellClick);
        return;
      }
      const isActor=id===sc.actorId || id===sc.actorId2;
      if(isActor){
        playSuccess();busy=false;
        const aEl=document.getElementById('piece_'+id);
        aEl.classList.add('glow-actor');
        // store which actor was chosen
        SCENARIOS[scenIdx]._chosenActor=id;
        phase=3;
        setInstruction('בחרו את ההגנה הטובה ביותר!','');
        document.getElementById('board').addEventListener('click',onCellClick);
      } else {
        showPieceError(e.currentTarget);
      }

    } else if(sc.defenseType==='eat'){
      const eEl=document.getElementById('piece_'+sc.actorId);
      if(id===sc.actorId && !sc._eatReady){
        // שלב א — בחירת הצריח
        sc._eatReady=true;
        eEl.classList.add('glow-actor');
        eEl.style.zIndex='50';
      } else if(id===sc.threatId && sc._eatReady){
        // שלב ב — לחיצה על הרץ → צריח זז לאכול
        busy=true;
        sc._eatReady=false;
        eEl.classList.remove('glow-actor');
        const tEl=document.getElementById('piece_'+sc.threatId);
        const tp=sc.pieces.find(p=>p.id===sc.threatId);
        const{r,c}=rowCol(tp.file,tp.rank);
        eEl.style.transition='top 0.86s cubic-bezier(.4,0,.2,1), left 0.86s cubic-bezier(.4,0,.2,1)';
        eEl.style.top=r*CELL+'px'; eEl.style.left=c*CELL+'px';
        setTimeout(()=>{
          playExplosion();
          showExplosion(r, c);
          if(tEl)tEl.style.cssText+=';opacity:0;transform:scale(0) rotate(180deg);transition:opacity .3s,transform .3s;';
          clearLaser(); removeKingDanger();
          eEl.style.transition='';
          setTimeout(()=>{
            if(tEl)tEl.remove();
            setTimeout(()=>nextScenario(),1200);
          },400);
        },910);
      } else {
        showPieceError(e.currentTarget);
      }
    }
  }
}

function onCellClick(e){
  if(busy)return;
  const cell=e.target.closest('.cell');if(!cell)return;
  const parts=cell.id.split('_');
  const r=parseInt(parts[1]),c=parseInt(parts[2]);
  const file=FILES_ARR[c],rank=(8-r).toString();
  const sc=SCENARIOS[scenIdx];

  // phase 2.8 — ניסיון בריחת מלך לריבוע מסוכן (block scenario)
  if(phase===2.8){
    const traps = sc.kingTrapSqs || (sc.kingTrapSq ? [sc.kingTrapSq] : []);
    const kt = traps.find(t=>t.file===file && parseInt(rank)===t.rank);
    const kEl=document.getElementById('piece_'+sc.kingId);
    if(kt){
      busy=true;
      clearHighlights();
      document.getElementById('board').removeEventListener('click',onCellClick);
      // מלך זז ל-G7
      const{r:kr,c:kc}=rowCol(kt.file,kt.rank);
      kEl.style.top=kr*CELL+'px'; kEl.style.left=kc*CELL+'px';
      setTimeout(()=>{
        // הצג לייזר מהכלי התוקף את ריבוע הבריחה
        const attackerId=kt.attackerId||sc.threatId;
        const attackerPiece=sc.pieces.find(p=>p.id===attackerId);
        drawLaser(cellCenter(attackerPiece.file,attackerPiece.rank).x, cellCenter(attackerPiece.file,attackerPiece.rank).y,
                  cellCenter(kt.file,kt.rank).x, cellCenter(kt.file,kt.rank).y);
        playLaser(); addKingDanger(kt.file,kt.rank);
        setInstruction('המלך לא בטוח שם — כלי לבן שולט על המשבצת! 🚫','');
        setTimeout(()=>{
          clearLaser(); removeKingDanger();
          // מלך חוזר ל-H8
          const origKing=ORIGINAL_SCENARIOS[scenIdx].pieces.find(p=>p.id===sc.kingId);
          const{r:or,c:oc}=rowCol(origKing.file,origKing.rank);
          kEl.style.top=or*CELL+'px'; kEl.style.left=oc*CELL+'px';
          kEl.classList.remove('glow-actor');
          // שח חוזר
          const tp=sc.pieces.find(p=>p.id===sc.threatId);
          const kp=sc.pieces.find(p=>p.id===sc.kingId);
          drawLaser(cellCenter(tp.file,tp.rank).x, cellCenter(tp.file,tp.rank).y,
                    cellCenter(kp.file,kp.rank).x, cellCenter(kp.file,kp.rank).y);
          addKingDanger(kp.file,kp.rank);
          phase=2; busy=false;
          setInstruction('בחרו את ההגנה הטובה ביותר!','');
        },2000);
      },600);
    } else {
      // לחיצה על ריבוע אחר — ביטול, חזרה לfase 2
      kEl.classList.remove('glow-actor');
      document.getElementById('board').removeEventListener('click',onCellClick);
      phase=2;
    }
    return;
  }

  if(phase===2.5 && sc.defenseType==='flee_or_block'){
    const trap=sc.blockTrapSq;
    const isTrap=file===trap.file && parseInt(rank)===trap.rank;
    if(isTrap){
      busy=true;
      clearHighlights();
      document.getElementById('board').removeEventListener('click',onCellClick);
      const aEl=document.getElementById('piece_'+sc.actorId);
      aEl.classList.remove('glow-actor');
      // פרש זז ל-C4
      const{r:ar,c:ac}=rowCol(trap.file,trap.rank);
      aEl.style.top=ar*CELL+'px'; aEl.style.left=ac*CELL+'px';

      setTimeout(()=>{
        clearLaser(); removeKingDanger();
        // רץ B5 אוכל את הפרש ב-C4
        setTimeout(()=>{
          playLaser();
          const threatEl=document.getElementById('piece_threat');
          aEl.style.opacity='0'; aEl.style.transform='scale(0)'; aEl.style.transition='opacity .3s,transform .3s';
          const{r:tr,c:tc}=rowCol(trap.file,trap.rank);
          threatEl.style.top=tr*CELL+'px'; threatEl.style.left=tc*CELL+'px';
          setTimeout(()=>{
            const kp=sc.pieces.find(p=>p.id===sc.kingId);
            drawLaser(cellCenter(trap.file,trap.rank).x,cellCenter(trap.file,trap.rank).y,
                      cellCenter(kp.file,kp.rank).x,cellCenter(kp.file,kp.rank).y);
            playLaser();
            addKingDanger(kp.file,kp.rank);
            setInstruction('נסו פתרון מדויק יותר 🤔','');
            setTimeout(()=>{
              clearLaser(); removeKingDanger();
              const origActor2=ORIGINAL_SCENARIOS[scenIdx].pieces.find(p=>p.id===sc.actorId);
              const origThreat2=ORIGINAL_SCENARIOS[scenIdx].pieces.find(p=>p.id===sc.threatId);
              const{r:br,c:bc}=rowCol(origActor2.file,origActor2.rank);
              aEl.style.opacity='1'; aEl.style.transform=''; aEl.style.transition='';
              aEl.style.top=br*CELL+'px'; aEl.style.left=bc*CELL+'px';
              const{r:rr,c:rc}=rowCol(origThreat2.file,origThreat2.rank);
              threatEl.style.top=rr*CELL+'px'; threatEl.style.left=rc*CELL+'px';
              const kp2=sc.pieces.find(p=>p.id===sc.kingId);
              drawLaser(cellCenter(origThreat2.file,origThreat2.rank).x,cellCenter(origThreat2.file,origThreat2.rank).y,
                        cellCenter(kp2.file,kp2.rank).x,cellCenter(kp2.file,kp2.rank).y);
              addKingDanger(kp2.file,kp2.rank);
              phase=2; busy=false;
              setInstruction('בחרו את ההגנה הטובה ביותר!','');
              document.getElementById('board').addEventListener('click',onCellClick);
            },2000);
          },600);
        },800);
      },700);
    } else {
      playError(); cell.classList.add('err-flash');
      setTimeout(()=>cell.classList.remove('err-flash'),400);
    }

  } else if(phase===3 && (sc.defenseType==='flee'||sc.defenseType==='flee_or_block')){
    const fleeSqs = sc.fleeSqs || sc.validSqs;
    const isValid=fleeSqs.some(sq=>sq.file===file&&sq.rank===parseInt(rank));
    if(isValid){
      busy=true;playSuccess();
      clearHighlights();
      document.getElementById('board').removeEventListener('click',onCellClick);
      const kEl=document.getElementById('piece_'+sc.kingId);
      const{r:kr,c:kc}=rowCol(file,rank);
      kEl.style.top=kr*CELL+'px';kEl.style.left=kc*CELL+'px';
      kEl.classList.remove('king-danger','glow-actor');
      setTimeout(()=>{
        clearLaser();removeKingDanger();
        setTimeout(()=>nextScenario(),1200);
      },600);
    } else {
      playError();totalWrongClicks++;cell.classList.add('err-flash');
      setTimeout(()=>cell.classList.remove('err-flash'),400);
    }

  } else if(phase===3 && sc.defenseType==='block'){
    // בדיקת ריבוע אסור (מלך לא יכול לברוח לשם)
    const illegalSq = sc.illegalSqs && sc.illegalSqs.find(sq=>sq.file===file&&sq.rank===parseInt(rank));
    if(illegalSq){
      busy=true;
      const attackerPiece=sc.pieces.find(p=>p.id===illegalSq.attackerId);
      const targetCenter=cellCenter(illegalSq.file,illegalSq.rank);
      drawLaser(cellCenter(attackerPiece.file,attackerPiece.rank).x, cellCenter(attackerPiece.file,attackerPiece.rank).y,
                targetCenter.x, targetCenter.y);
      playLaser();
      setInstruction('המלך לא יכול לברוח לשם — הרץ שולט על המשבצת! 🚫','');
      setTimeout(()=>{
        clearLaser();
        setInstruction('בחרו את ההגנה הטובה ביותר!','');
        busy=false;
      },2000);
      return;
    }
    const isValid=sc.validSqs.some(sq=>sq.file===file&&sq.rank===parseInt(rank));
    if(isValid){
      busy=true;
      clearHighlights();
      document.getElementById('board').removeEventListener('click',onCellClick);
      const actorId=sc._chosenActor||sc.actorId;
      const aEl=document.getElementById('piece_'+actorId);
      const{r:ar,c:ac}=rowCol(file,rank);
      aEl.style.top=ar*CELL+'px';aEl.style.left=ac*CELL+'px';
      aEl.classList.remove('glow-actor');

      // פח — כלי האיום אוכל את החוסם (מבוסס דאטה)
      if(sc.trapSq && file===sc.trapSq.file && parseInt(rank)===sc.trapSq.rank){
        const origSc=ORIGINAL_SCENARIOS[scenIdx];
        const origActor=origSc.pieces.find(p=>p.id===actorId);
        const origThreat=origSc.pieces.find(p=>p.id===sc.threatId);
        setTimeout(()=>{
          clearLaser(); removeKingDanger();
          setTimeout(()=>{
            playLaser();
            const threatEl=document.getElementById('piece_threat');
            aEl.style.opacity='0'; aEl.style.transform='scale(0)'; aEl.style.transition='opacity .3s,transform .3s';
            const{r:tr,c:tc}=rowCol(sc.trapSq.file,sc.trapSq.rank);
            threatEl.style.top=tr*CELL+'px'; threatEl.style.left=tc*CELL+'px';
            setTimeout(()=>{
              const kp=sc.pieces.find(p=>p.id===sc.kingId);
              drawLaser(cellCenter(sc.trapSq.file,sc.trapSq.rank).x, cellCenter(sc.trapSq.file,sc.trapSq.rank).y,
                        cellCenter(kp.file,kp.rank).x, cellCenter(kp.file,kp.rank).y);
              playLaser(); addKingDanger(kp.file,kp.rank);
              setInstruction('נסו פתרון מדויק יותר 🤔','');
              setTimeout(()=>{
                clearLaser(); removeKingDanger();
                const{r:br,c:bc}=rowCol(origActor.file,origActor.rank);
                aEl.style.opacity='1'; aEl.style.transform=''; aEl.style.transition='';
                aEl.style.top=br*CELL+'px'; aEl.style.left=bc*CELL+'px';
                const{r:rr,c:rc}=rowCol(origThreat.file,origThreat.rank);
                threatEl.style.top=rr*CELL+'px'; threatEl.style.left=rc*CELL+'px';
                const kp2=sc.pieces.find(p=>p.id===sc.kingId);
                drawLaser(cellCenter(origThreat.file,origThreat.rank).x, cellCenter(origThreat.file,origThreat.rank).y,
                          cellCenter(kp2.file,kp2.rank).x, cellCenter(kp2.file,kp2.rank).y);
                addKingDanger(kp2.file,kp2.rank);
                phase=2; busy=false;
                aEl.classList.add('glow-actor');
                SCENARIOS[scenIdx]._chosenActor=actorId;
                setInstruction('בחרו את ההגנה הטובה ביותר!','');
                document.getElementById('board').addEventListener('click',onCellClick);

              },2000);
            },600);
          },800);
        },700);

      } else {
        // תשובה נכונה רגילה
        playSuccess();
        setTimeout(()=>{
          clearLaser(); removeKingDanger();
          setTimeout(()=>nextScenario(),1200);
        },600);
      }
    } else {
      playError();totalWrongClicks++;cell.classList.add('err-flash');
      setTimeout(()=>cell.classList.remove('err-flash'),400);
    }
  }
}

function showPieceError(el){
  playError();totalWrongClicks++;
  el.classList.add('err-flash');
  const x=document.createElement('div');x.className='piece-err-x';x.textContent='✕';
  x.style.pointerEvents='none';el.appendChild(x);
  setTimeout(()=>{el.classList.remove('err-flash');x.remove();},600);
}



const STAGE_KEYS = ['stage1','stage2','stage3','stage4'];

function getStageData(key){
  try{
    const d=JSON.parse(localStorage.getItem('chess_defense')||'{}');
    return d[key]||null;
  }catch(e){return null;}
}

// פילים היברידיים (שם שלב + אייקון) — מחוץ לקלף, ממולא ב-showFinalScore()
// ⭐ ירוק = שיא הושג (bestPerfect, לא יורד) | 🔄 מהבהב+לינק = הושלם-לא-שיא | ○ = לא הושלם
function buildStageRow(){
  const STAGE_META = [
    { key:'stage1', label:'בריחה',     icon:'🏃', href:'check-defense-stage1.html' },
    { key:'stage2', label:'חסימה',     icon:'🛡️', href:'check-defense-stage2.html' },
    { key:'stage3', label:'אכילה',     icon:'⚔️', href:'check-defense-stage3.html' },
    { key:'stage4', label:'מבחן מסכם', icon:'🏆', href:'check-defense-stage4.html' },
  ];
  const pills=[];
  STAGE_META.forEach(({key,label,icon,href},i)=>{
    const n=i+1;
    const d=getStageData(key);
    const isPerfect = !!(d && (d.bestPerfect ?? d.perfect));   // שיא — תואם getModuleStars + red-team
    if(isPerfect){
      pills.push(`<span style="display:inline-flex;align-items:center;gap:4px;font-family:'Fredoka One',cursive;font-size:.78rem;padding:5px 12px;border-radius:50px;border:1.5px solid rgba(82,183,136,.4);color:rgba(82,183,136,.85);margin:3px;">${icon} שלב ${n} · ${label} ⭐</span>`);
    } else {
      const mark = (d && d.done) ? '🔄' : '○';
      pills.push(`<button onclick="window.location.href='${href}'" style="display:inline-flex;align-items:center;gap:4px;font-family:'Fredoka One',cursive;font-size:.78rem;padding:6px 14px;border-radius:50px;border:2px solid var(--gold);background:rgba(244,208,63,.12);color:var(--gold);cursor:pointer;margin:3px;min-height:36px;touch-action:manipulation;animation:pill-blink 1.2s ease-in-out infinite;" title="שחקו שלב ${n} — ${label}">${icon} שלב ${n} · ${label} ${mark}</button>`);
    }
  });
  return pills.join('');
}

// מסך 1: final-score-display (תצוגה כפולה best/last) ; מסך 2: card-stars (כוכבים + שורת פילים, מחוץ לקלף)
function showFinalScore(){
  const starsHTML = moduleStarsHTML();   // best + תג "אחרון" כש-last<best (v2.1)
  const el=document.getElementById('final-score-display');
  if(el) el.innerHTML=`<div style="font-family:'Fredoka One',cursive;font-size:2.4rem;letter-spacing:6px;">${starsHTML}</div>`;
  const cs=document.getElementById('card-stars');
  if(cs) cs.innerHTML=`<div style="font-size:2rem;letter-spacing:6px;">${starsHTML}</div>`
    +`<div style="display:flex;flex-wrap:wrap;justify-content:center;margin-top:8px;">${buildStageRow()}</div>`;
}

function nextScenario(){
  if(scenIdx+1<SCENARIOS.length){
    const ov=document.getElementById('transition-overlay');
    document.getElementById('tr-title').textContent='כל הכבוד! 👏';
    document.getElementById('tr-sub').textContent='עוברים לתרחיש הבא...';
    ov.classList.add('show');
    setTimeout(()=>{ov.classList.remove('show');loadScenario(scenIdx+1);},2000);
  } else {
    // מבחן מסכם הושלם — שמירה + הצגת win-screen
    const perfect = totalWrongClicks <= 2;
    DefenseState.save(perfect);
    showFinalScore();   // ממלא final-score-display (מסך 1) + card-stars (מסך 2)
    // הסתרת הלוח + הצגת ההכתרה באותו tick — מונע בזק של מסך ריק בין השניים
    const gw = document.getElementById('game-wrap');
    if(gw) gw.style.visibility='hidden';
    document.getElementById('win-screen1').classList.add('show');
  }
}


function replayStage(){
  window.location.reload();
}
function showWinScreen2(){
  document.getElementById('win-screen1').classList.remove('show');
  document.getElementById('win-screen2').classList.add('show');
  spawnBursts();
}

function goToAlbum(){
  try{
    ChessState.addCompleted('defense');
    ChessState.addCard('defense');
  }catch(e){}
  window.location.href='../../מסך הפתיחה/index.html';
}

function spawnBursts(){
  const colors=['#52B788','#F4D03F','#7EC8E3','#FF6B35','#FFFFFF'];
  for(let i=0;i<30;i++){
    const b=document.createElement('div'); b.className='burst';
    const a=(i/30)*Math.PI*2, d=80+Math.random()*120;
    b.style.cssText=`left:50vw;top:50vh;width:8px;height:8px;--bx:${Math.cos(a)*d}px;--by:${Math.sin(a)*d}px;animation-duration:${.5+Math.random()*.4}s;background:${colors[i%colors.length]};`;
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),900);
  }
}

CELL = getCell();
buildBoard();
loadScenario(0);
setTimeout(()=>document.getElementById('game-wrap').classList.add('visible'),100);

let _rzT, _rzCell = CELL;
window.addEventListener('resize', ()=>{
  clearTimeout(_rzT);
  _rzT = setTimeout(()=>{
    const nc = getCell();              // מסנכרן --cell/--board-size תמיד
    if(nc === _rzCell) return;         // לא נחצה breakpoint → שמור את כל מצב התרחיש
    _rzCell = nc; CELL = nc;
    const bs = CELL*8;
    document.getElementById('laser-svg').setAttribute('viewBox',`0 0 ${bs} ${bs}`);
    buildBoard();
    loadScenario(scenIdx);
  }, 150);
});
