<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>מגינים על המלך!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: radial-gradient(ellipse at 50% 0%, #162D4A 0%, #0C1E30 55%, #060E1A 100%);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: max(16px, env(safe-area-inset-top)) 12px max(28px, env(safe-area-inset-bottom));
  user-select: none;
  overflow-x: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* ── STARS ── */
.star-dot {
  position: fixed; border-radius: 50%; background: white;
  animation: twinkle ease-in-out infinite alternate; pointer-events: none;
}
@keyframes twinkle {
  from { opacity:.1; transform:scale(.8); }
  to   { opacity:.85; transform:scale(1.2); }
}

/* ── TITLE ── */
.main-title {
  font-family: 'Fredoka One', cursive;
  font-size: 2.4rem; color: #F4D03F;
  text-shadow: 0 0 28px rgba(244,208,63,.9), 0 0 60px rgba(244,208,63,.4), 0 2px 8px rgba(0,0,0,.6);
  text-align: center; margin-bottom: 6px;
  animation: sp-in .7s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes sp-in {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:none; }
}

/* ── METHOD LABELS ── */
.methods-row {
  display: flex;
  gap: 18px;
  margin-bottom: 10px;
  justify-content: center;
  animation: sp-in .7s .1s cubic-bezier(.175,.885,.32,1.5) both;
}
.method-label {
  font-family: 'Fredoka One', cursive;
  font-size: 1.7rem;
  font-weight: 900;
  display: flex; align-items: center; gap: 5px;
  opacity: 0.35;
  transition: opacity .4s, text-shadow .4s, transform .4s;
  letter-spacing: .5px;
}
.method-label .check-mark {
  font-size: 1.1rem;
  opacity: 0;
  transition: opacity .4s;
}
.method-label.active {
  opacity: 1;
  transform: scale(1.1);
}
.method-label.done .check-mark {
  opacity: 1;
}
.method-label.m-flee   { color: #52B788; }
.method-label.m-block  { color: #7EC8E3; }
.method-label.m-eat    { color: #C39BD3; }
.method-label.active.m-flee  { text-shadow: 0 0 16px rgba(82,183,136,.9); }
.method-label.active.m-block { text-shadow: 0 0 16px rgba(126,200,227,.9); }
.method-label.active.m-eat   { text-shadow: 0 0 16px rgba(195,155,211,.9); }

/* ── BOARD ── */
:root { --cell: 46px; }   /* JS overrides this via applyC() */
@media (max-width: 430px) { :root { --cell: 42px; } }
@media (max-width: 380px) { :root { --cell: 38px; } }
.board-section { position: relative; margin-bottom: 14px; }

.board-wrap {
  position: relative;
  border: 3px solid #C9A227; border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 6px 28px rgba(0,0,0,.6), 0 0 20px rgba(244,208,63,.15);
  direction: ltr;
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(8, var(--cell));
  grid-template-rows:    repeat(8, var(--cell));
}
.sq {
  width:var(--cell); height:var(--cell);
  position:relative; display:flex;
  align-items:center; justify-content:center;
  transition: background .3s;
}
.sq.l { background:#C9E4F5; }
.sq.d { background:#4A7FA5; }
.sq.danger  { background:#E74C3C !important; }
.sq.safe-hl { background:rgba(82,183,136,.55) !important; }
.sq.block-hl{ background:rgba(126,200,227,.45) !important; }

.pc {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  z-index: 2;
  transition: opacity .5s, transform .5s cubic-bezier(.175,.885,.32,1.5);
}
.pc.eaten { opacity:0; transform:scale(0) rotate(180deg); }

/* Laser beam overlay */
.board-svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; overflow:visible; z-index:10;
}

/* ── STAGE PILLS ── */
.stages-wrap {
  display:flex; gap:8px;
  margin: 6px 0 16px;
  flex-wrap:wrap; justify-content:center;
}
.stage-pill {
  font-family:'Fredoka One',cursive;
  font-size:.99rem; padding:5.5px 14px;
  border-radius:50px; border:2px solid;
  letter-spacing:.3px; white-space:nowrap;
}
.stage-pill.s1{color:#52B788;border-color:#52B788;background:rgba(82,183,136,.12);}
.stage-pill.s2{color:#7EC8E3;border-color:#7EC8E3;background:rgba(126,200,227,.12);}
.stage-pill.s3{color:#F4D03F;border-color:#F4D03F;background:rgba(244,208,63,.10);}
.stage-pill.s4{color:#FF6B35;border-color:#FF6B35;background:rgba(255,107,53,.10);}
.pill-piece{width:1.3rem;height:1.3rem;vertical-align:middle;object-fit:contain;display:inline-block;margin-right:1px;}

/* ── BUTTON ── */
.btn-start {
  font-family:'Fredoka One',cursive;
  font-size:1.5rem; padding:14px 50px;
  border-radius:50px; border:none; cursor:pointer;
  color:white; letter-spacing:1px;
  background:linear-gradient(135deg,#F4D03F 0%,#C9A227 50%,#9A7B1A 100%);
  box-shadow:0 0 28px rgba(244,208,63,.55),0 6px 20px rgba(0,0,0,.4);
  transition:transform .15s ease,box-shadow .15s ease;
  position:relative; overflow:hidden;
  touch-action: manipulation;
  animation:btnPop .6s .4s cubic-bezier(.175,.885,.32,1.5) both, btnPulse 2s ease-in-out 1.5s infinite;
}
.btn-start::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 60%);
  border-radius:inherit;
}
.btn-start:hover{transform:scale(1.06);}
.btn-start:active{transform:scale(.97);}
@keyframes btnPop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 28px rgba(244,208,63,.55),0 6px 20px rgba(0,0,0,.4);}
  50%    {box-shadow:0 0 55px rgba(244,208,63,.9),0 6px 28px rgba(0,0,0,.4);}
}

/* Sparks */
.pspark{
  position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;
  animation:psparkFly ease-out forwards;z-index:999;
}
@keyframes psparkFly{
  from{opacity:1;transform:translate(0,0) scale(1);}
  to{opacity:0;transform:translate(var(--px),var(--py)) scale(.2);}
}

/* ── HDR — identical pattern to rook/queen stages ── */
.hdr {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  width:calc(var(--cell)*8 + 6px);
  margin-bottom:8px; z-index:1;
}
.score-right { display:flex; align-items:center; gap:8px; justify-self:end; }
.btn-mute { background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0; }
.btn-mute:hover { background:rgba(255,255,255,.18); }
</style>
</head>
<body>

<div class="hdr">
  <div></div>
  <div></div>
  <div class="score-right">
    <button class="btn-mute" id="btn-mute" onclick="toggleMute()">🔊</button>
  </div>
</div>

<div class="main-title" style="display:flex;align-items:center;justify-content:center;gap:10px;">
  <img id="title-king" style="width:2.6rem;height:2.6rem;object-fit:contain;filter:drop-shadow(0 0 10px rgba(244,208,63,.8));" />
  מגינים על המלך!
</div>

<!-- METHOD LABELS -->
<div class="methods-row">
  <div class="method-label m-flee" id="lbl-flee">
    <span class="check-mark">✓</span> בריחה
  </div>
  <div class="method-label m-block" id="lbl-block">
    <span class="check-mark">✓</span> חסימה
  </div>
  <div class="method-label m-eat" id="lbl-eat">
    <span class="check-mark">✓</span> אכילה
  </div>
</div>

<!-- BOARD -->
<div class="board-section">
  <div class="board-wrap">
    <div class="board-grid" id="board"></div>
    <svg class="board-svg" id="board-svg"
         viewBox="0 0 368 368"
         xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>



<!-- STAGE PILLS -->
<div class="stages-wrap">
  <div class="stage-pill s1">שלב 1 — בריחה <img class="pill-piece" data-sym="♚" data-white="false"/></div>
  <div class="stage-pill s2">שלב 2 — חסימה <img class="pill-piece" data-sym="♗" data-white="true"/></div>
  <div class="stage-pill s3">שלב 3 — אכילה <img class="pill-piece" data-sym="♞" data-white="false"/></div>
  <div class="stage-pill s4">שלב 4 — מבחן מסכם <img class="pill-piece" data-sym="♔" data-white="true"/></div>
</div>

<!-- BUTTON -->
<button class="btn-start" onclick="onStart(event)">בואו נשחק! 🎮</button>

<script>
// ── Responsive cell size ──
function getC() {
  const fromH = Math.floor((window.innerHeight - 220) / 8);
  const fromW = Math.floor((window.innerWidth  -  32) / 8);
  return Math.max(Math.min(fromH, fromW, 64), 40);
}
let C = getC();
function applyC() {
  document.documentElement.style.setProperty('--cell', C + 'px');
  const svgEl = document.getElementById('board-svg');
  if (svgEl) svgEl.setAttribute('viewBox', '0 0 ' + (C*8) + ' ' + (C*8));
}
const FILES = ['A','B','C','D','E','F','G','H'];

// ── Mute ──
let muted = false;
(function(){
  try { muted = localStorage.getItem('chess_muted') === '1'; } catch(e){}
  const btn = document.getElementById('btn-mute');
  if(btn) btn.textContent = muted ? '🔇' : '🔊';
})();
function toggleMute(){
  muted = !muted;
  try { localStorage.setItem('chess_muted', muted ? '1' : '0'); } catch(e){}
  const btn = document.getElementById('btn-mute');
  if(btn) btn.textContent = muted ? '🔇' : '🔊';
}

// ── Stars ──
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
  document.body.appendChild(s);
}

// ── Build board ──
function buildBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    const sq=document.createElement('div');
    sq.className='sq '+((r+c)%2===0?'l':'d');
    sq.id=`sq_${r}_${c}`;
    boardEl.appendChild(sq);
  }
}

function pos(file, rank){
  return { r: 8 - parseInt(rank), c: FILES.indexOf(file) };
}

function sqId(file, rank){
  const {r,c} = pos(file, rank);
  return `sq_${r}_${c}`;
}

function sqCenter(file, rank){
  const {r,c} = pos(file, rank);
  return { x: c*C + C/2, y: r*C + C/2 };
}

// ── SVG piece dictionaries ──

};
const WHITE_SVG = {

function drawLaser(x1,y1,x2,y2, color, opacity){
  // shorten end slightly
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const ex=x2-(dx/len)*(C*0.4), ey=y2-(dy/len)*(C*0.4);
  // glow line (thick, faint)
  const glow = document.createElementNS('http://www.w3.org/2000/svg','line');
  glow.setAttribute('x1',x1); glow.setAttribute('y1',y1);
  glow.setAttribute('x2',ex); glow.setAttribute('y2',ey);
  glow.setAttribute('stroke',color);
  glow.setAttribute('stroke-width','8');
  glow.setAttribute('stroke-opacity', (opacity*0.35).toString());
  glow.setAttribute('stroke-linecap','round');
  svg.appendChild(glow);
  // core line
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',ex); line.setAttribute('y2',ey);

  line.setAttribute('stroke-width','2.5');
  line.setAttribute('stroke-opacity', opacity.toString());
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
}

// ── Audio Context (lazy, requires user gesture) ──
let _audioCtx = null;
function getAudioCtx(){
  if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
// Enable on first user interaction
document.addEventListener('click', ()=>getAudioCtx(), {once:true});
document.addEventListener('touchstart', ()=>getAudioCtx(), {once:true});

// ── Explosion Sound (4-layer capture audio) ──
function playExplosionSound(){
  try {
    const ctx = getAudioCtx();
    if(!ctx) return;
    const n = ctx.currentTime;
    // Layer 1: sub-bass thud
    const thud = ctx.createOscillator(), thudG = ctx.createGain();
    thud.connect(thudG); thudG.connect(ctx.destination);
    thud.type = 'sine';
    thud.frequency.setValueAtTime(90, n);
    thud.frequency.exponentialRampToValueAtTime(20, n+.5);
    thudG.gain.setValueAtTime(.28, n);
    thudG.gain.exponentialRampToValueAtTime(.001, n+.55);
    thud.start(n); thud.stop(n+.6);
    // Layer 2: mid punch
    const punch = ctx.createOscillator(), punchG = ctx.createGain();
    punch.connect(punchG); punchG.connect(ctx.destination);
    punch.type = 'sine';
    punch.frequency.setValueAtTime(200, n);
    punch.frequency.exponentialRampToValueAtTime(50, n+.18);
    punchG.gain.setValueAtTime(.25, n);
    punchG.gain.exponentialRampToValueAtTime(.001, n+.2);
    punch.start(n); punch.stop(n+.22);
    // Layer 3: noise burst
    const bufSz = Math.floor(ctx.sampleRate*.35);
    const nBuf  = ctx.createBuffer(1, bufSz, ctx.sampleRate);
    const nd    = nBuf.getChannelData(0);
    for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;
    const nSrc  = ctx.createBufferSource(); nSrc.buffer = nBuf;
    const nFilt = ctx.createBiquadFilter();
    nFilt.type='bandpass'; nFilt.frequency.value=500; nFilt.Q.value=.5;
    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(.3, n);
    nGain.gain.exponentialRampToValueAtTime(.001, n+.32);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx.destination);
    nSrc.start(n); nSrc.stop(n+.35);
    // Layer 4: sharp crack
    const crack = ctx.createOscillator(), crackG = ctx.createGain();
    crack.connect(crackG); crackG.connect(ctx.destination);
    crack.type='sawtooth'; crack.frequency.value=900;
    crackG.gain.setValueAtTime(.22, n);
    crackG.gain.exponentialRampToValueAtTime(.001, n+.05);
    crack.start(n); crack.stop(n+.06);
  } catch(e){}
}

// ── Explosion Visual (canvas-based, 4-phase ~917ms) ──
function showExplosion(row, col){
  const SZ  = C;  // 46px — matches --cell
  const BW  = SZ * 8;
  const cx  = col * SZ + SZ/2 + 3;
  const cy  = row * SZ + SZ/2 + 3;
  const boardWrap = document.querySelector('.board-wrap');
  const canvas = document.createElement('canvas');
  canvas.width  = BW;
  canvas.height = BW;
  canvas.style.cssText = `position:absolute;left:0;top:0;width:${BW}px;height:${BW}px;z-index:30;pointer-events:none;`;
  boardWrap.appendChild(canvas);
  const c = canvas.getContext('2d');
  const COLORS = ['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts = Array.from({length:45},(_,i)=>{
    const a=(i/45)*Math.PI*2+Math.random()*.4, spd=3.5+Math.random()*9;
    return { x:cx, y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5, color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1, decay:0.018+Math.random()*.022, gravity:0.18+Math.random()*.12 };
  });
  let frame=0;
  function draw(){
    c.clearRect(0,0,BW,BW);
    // Phase 1 — Flash
    if(frame<8){
      const t=frame/7, r=SZ*.9*t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);
      g.addColorStop(.35,`rgba(255,230,80,${(1-t)*.9})`);
      g.addColorStop(.7,`rgba(255,100,0,${(1-t)*.5})`);
      g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(r,1),0,Math.PI*2); c.fill();
    }
    // Phase 2 — Fireball
    if(frame>=1&&frame<22){
      const t=(frame-1)/21, r=SZ*.75*t, a=1-t;
      const g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);
      g.addColorStop(.2,`rgba(255,180,0,${a*.95})`);
      g.addColorStop(.55,`rgba(210,50,0,${a*.7})`);
      g.addColorStop(.85,`rgba(100,15,0,${a*.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g; c.beginPath(); c.arc(cx,cy,Math.max(r,1),0,Math.PI*2); c.fill();
    }
    // Phase 3 — Shockwave ring
    if(frame>=3&&frame<14){
      const t=(frame-3)/11;
      c.beginPath(); c.arc(cx,cy,SZ*.5*t+SZ*.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${.6*(1-t)})`; c.lineWidth=3*(1-t); c.stroke();
    }
    // Phase 4 — Smoke puffs
    if(frame>10){
      const age=frame-10;
      for(let i=0;i<4;i++){
        const sa=Math.max(0,.18-age*.004); if(sa<=0) break;
        c.beginPath();
        c.arc(cx+Math.sin(i*1.7+age*.04)*age*.5, cy-age*.35+i*4, age*2.8+i*9, 0, Math.PI*2);
        c.fillStyle=`rgba(55,55,55,${sa/(i*.4+1)})`; c.fill();
      }
    }
    // Debris particles
    c.save();
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0) return;
      c.globalAlpha=p.alpha;
      c.beginPath(); c.arc(p.x,p.y,Math.max(.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color; c.fill();
    });
    c.restore();
    frame++;
    if(frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

// ── Reset all pieces to original positions ──
function resetAll(){
  hideLaser();
  [lblFlee,lblBlock,lblEat].forEach(l=>l.classList.remove('active','done'));
  setSqClass('F','8','safe-hl',false);
  setSqClass('F','7','block-hl',false);

  const knightEl = document.getElementById('pc-knight');
  if(knightEl){ knightEl.classList.remove('eaten'); }
  const nSq = document.getElementById(sqId('D','5'));
  if(knightEl && nSq){ nSq.appendChild(knightEl); }

  // restore rook to C7 (now empty)
  const rookEl = document.getElementById('pc-rook');
  if(rookEl){ rookEl.classList.remove('eaten'); }
  const rSq = document.getElementById(sqId('C','7'));
  if(rookEl && rSq){ rSq.appendChild(rookEl); }

  // restore king to G7
  const kingEl = document.getElementById('pc-king');
  if(kingEl){ kingEl.classList.remove('eaten'); }
  const kSq = document.getElementById(sqId('G','7'));
  if(kingEl && kSq){ kSq.appendChild(kingEl); }

  // restore bishop to H5
  const bishopEl = document.getElementById('pc-bishop');
  if(bishopEl){ bishopEl.classList.remove('eaten'); }
  const bSq = document.getElementById(sqId('H','5'));
  if(bishopEl && bSq){ bSq.appendChild(bishopEl); }
}

// ══════════════════════════════════════
//  ANIMATION PHASES
//  Each phase: setup → laser 2s → action → laser gone 2s
// ══════════════════════════════════════

let cycleTimer = null;
let cycleVers = 0;  // increments on resize to invalidate stale callbacks

function phase1_flee(v, onDone){
  if(cycleVers !== v) return;
  showLaser();
  lblFlee.classList.add('active');

  setTimeout(()=>{
    if(cycleVers !== v) return;
    hideLaser();
    setSqClass('F','8','safe-hl',true);
    const kingEl = document.getElementById('pc-king');
    const fSq = document.getElementById(sqId('F','8'));
    if(kingEl && fSq){ fSq.appendChild(kingEl); }
    lblFlee.classList.add('done');

    setTimeout(()=>{
      if(cycleVers !== v) return;
      setSqClass('F','8','safe-hl',false);
      clearSVG();
      const kSq = document.getElementById(sqId('G','7'));
      if(kingEl && kSq) kSq.appendChild(kingEl);
      lblFlee.classList.remove('active');
      onDone();
    }, 2200);
  }, 2200);
}

function phase2_block(v, onDone){
  if(cycleVers !== v) return;
  showLaser();
  lblBlock.classList.add('active');

  setTimeout(()=>{
    if(cycleVers !== v) return;
    hideLaser();
    setSqClass('F','7','block-hl',true);
    const bishopEl = document.getElementById('pc-bishop');
    const eSq = document.getElementById(sqId('F','7'));
    if(bishopEl && eSq) eSq.appendChild(bishopEl);
    lblBlock.classList.add('done');

    setTimeout(()=>{
      if(cycleVers !== v) return;
      setSqClass('F','7','block-hl',false);
      clearSVG();
      const bSq = document.getElementById(sqId('H','5'));
      if(bishopEl && bSq) bSq.appendChild(bishopEl);
      lblBlock.classList.remove('active');
      onDone();
    }, 2200);
  }, 2200);
}

function phase3_eat(v, onDone){
  if(cycleVers !== v) return;
  showLaser();
  lblEat.classList.add('active');

  setTimeout(()=>{
    if(cycleVers !== v) return;
    hideLaser();
    const knightEl = document.getElementById('pc-knight');
    const rookEl   = document.getElementById('pc-rook');
    // ── Explosion: fires simultaneously with capture ──
    // C7 → row = 8-7 = 1, col = FILES.indexOf('C') = 2
    if(!muted){ playExplosionSound(); }
    showExplosion(1, 2);
    if(rookEl) rookEl.classList.add('eaten');
    const cSq = document.getElementById(sqId('C','7'));
    if(knightEl && cSq) cSq.appendChild(knightEl);
    lblEat.classList.add('done');

    setTimeout(()=>{
      if(cycleVers !== v) return;
      clearSVG();
      resetAll();
      setTimeout(()=>{ if(cycleVers===v) onDone(); }, 600);
    }, 2200);
  }, 2200);
}

function runCycle(){
  const v = cycleVers;
  phase1_flee(v, ()=>{
    setTimeout(()=>{
      if(cycleVers !== v) return;
      phase2_block(v, ()=>{
        setTimeout(()=>{
          if(cycleVers !== v) return;
          phase3_eat(v, ()=>{
            // Loop
            setTimeout(runCycle, 800);
          });
        }, 400);
      });
    }, 400);
  });
}

// ── Init: apply cell size + build board ──
applyC();
buildBoard();
Object.keys(pieces).forEach(placePiece);

// ── Resize: recompute, rebuild, restart cycle ──
window.addEventListener('resize', () => {
  const newC = getC();
  if (Math.abs(newC - C) < 2) return;  // ignore tiny fluctuations
  C = newC;
  applyC();
  cycleVers++;         // invalidate all running phase callbacks
  clearSVG();
  [lblFlee, lblBlock, lblEat].forEach(l => l.classList.remove('active','done'));
  buildBoard();
  Object.keys(pieces).forEach(placePiece);
  setTimeout(runCycle, 400);
}, { passive: true });

// Start after brief delay
setTimeout(runCycle, 800);

// ── Sparks on button ──
function spawnSparks(e){
  for(let i=0;i<22;i++){
    const sp=document.createElement('div'); sp.className='pspark';
    const a=(i/22)*Math.PI*2, d=40+Math.random()*70;
    sp.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px;animation-duration:${.35+Math.random()*.35}s;background:${['#F4D03F','#52B788','#7EC8E3','#C39BD3'][Math.floor(Math.random()*4)]};`;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),700);
  }
}

function onStart(e){
  spawnSparks(e);
  setTimeout(()=>{ window.location.href='check-defense-stage1.html'; }, 350);
}
</script>
