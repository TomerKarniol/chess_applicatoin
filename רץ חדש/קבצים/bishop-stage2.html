<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#162D4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>הרץ — שלב 2 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
:root{
  --gold:#F4D03F; --gold-dark:#C9A227; --green:#52B788;
  --blue:#7EC8E3; --bg1:#162D4A; --bg2:#0C1E30; --bg3:#060E1A;
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
  --cell:58px;
}
@media(max-width:480px){:root{--cell:53px;}}
@media(max-width:430px){:root{--cell:48px;}}
@media(max-width:390px){:root{--cell:44px;}}
@media(max-width:360px){:root{--cell:40px;}}
@media(max-height:600px){:root{--cell:36px;}}

body{
  font-family:'Nunito',sans-serif;
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:10px 12px max(28px,env(safe-area-inset-bottom));
  user-select:none;overflow-x:hidden;overflow-y:auto;overscroll-behavior:none;
}

/* STARS */
.star-dot{position:fixed;border-radius:50%;background:white;
  animation:twinkle ease-in-out infinite alternate;pointer-events:none;z-index:0;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8)}to{opacity:.85;transform:scale(1.2)}}

/* BOARD SIZE */
:root{ --board-size:calc(var(--cell)*8); }

/* HEADER — board-aligned, 3 עמודות */
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;row-gap:6px;
  width:var(--board-size);margin-bottom:8px;z-index:1;}
.stage-badge{font-family:'Fredoka One',cursive;font-size:.85rem;
  background:rgba(244,208,63,.12);border:1.5px solid rgba(244,208,63,.35);
  border-radius:50px;padding:3px 14px;color:var(--gold);letter-spacing:.5px;}
.game-title-hdr{font-family:'Fredoka One',cursive;font-size:1.3rem;
  color:#FFF8DC;text-shadow:0 0 20px rgba(244,208,63,.7);white-space:nowrap;}
.score-right{display:flex;align-items:center;gap:8px;}

/* MUTE BUTTON */
.btn-mute{
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:36px;height:36px;font-size:1.1rem;
  cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;
  transition:background .2s;touch-action:manipulation;flex-shrink:0;}
.btn-mute:hover{background:rgba(255,255,255,.18);}

/* COORD WRAP — unified standard */
.coord-wrap{display:flex;align-items:flex-start;gap:5px;direction:ltr;}
.rank-labels{display:flex;flex-direction:column;height:var(--board-size);
  justify-content:space-around;font-family:'Fredoka One',cursive;font-size:.72rem;
  color:var(--gold);opacity:.8;width:15px;text-align:center;}
.file-labels{display:flex;justify-content:space-around;width:var(--board-size);
  margin-top:4px;font-family:'Fredoka One',cursive;font-size:.72rem;
  color:var(--gold);opacity:.8;}

/* PATH TRACKER */
.path-tracker{display:flex;gap:12px;margin-bottom:8px;z-index:1;}
.path-badge{
  font-family:'Fredoka One',cursive;font-size:1rem;padding:7px 20px;
  border-radius:50px;border:2px solid var(--gold);
  color:var(--gold);background:rgba(244,208,63,.08);
  transition:all .35s ease;
}
.path-badge.found{
  border-color:var(--green);color:var(--green);
  background:rgba(82,183,136,.15);
  text-shadow:0 0 10px rgba(82,183,136,.8);
  animation:badgePop .45s cubic-bezier(.175,.885,.32,1.5);
}
@keyframes badgePop{0%{transform:scale(.6);}65%{transform:scale(1.18);}100%{transform:scale(1);}}

/* INSTRUCTION */
.instruction{
  font-size:.9rem;color:#B0C4DE;font-weight:700;
  text-align:center;margin-bottom:8px;z-index:1;
  min-height:22px;transition:color .25s;
}
.instruction.step2{color:var(--blue);text-shadow:0 0 12px rgba(126,200,227,.5);}
.instruction.path-done{color:#A8F0C8;text-shadow:0 0 12px rgba(82,183,136,.5);}

/* ═══════════ BOARD ═══════════ */
.board-section{display:flex;justify-content:center;z-index:1;margin-bottom:6px;}
.board-outer{
  position:relative;display:inline-block;direction:ltr;
  border:3px solid var(--gold-dark);border-radius:6px;overflow:hidden;
  box-shadow:0 0 40px rgba(244,208,63,.5),0 0 80px rgba(244,208,63,.18),0 8px 32px rgba(0,0,0,.7);
}
.board-grid{
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr;
}
.cell{width:var(--cell);height:var(--cell);
  position:relative;cursor:pointer;touch-action:manipulation;
  display:flex;align-items:center;justify-content:center;}
.cell.cl{background:var(--cell-light);}
.cell.cd{background:var(--cell-dark);}
.cell.err-flash{animation:errFlash .4s ease!important;}
@keyframes errFlash{0%,100%{background:inherit;}35%,65%{background:rgba(231,76,60,.65)!important;}}

/* PATH SVG OVERLAY */
.path-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;z-index:6;overflow:visible;
}

/* BISHOP — size via CSS var, position handled by JS */
.bishop-piece{
  position:absolute;
  top:calc(var(--cell) * 7);    /* C1 default — JS overrides per scenario */
  left:calc(var(--cell) * 2);
  width:var(--cell);
  height:var(--cell);
  visibility:hidden;            /* hidden until JS positions it correctly */
  z-index:10;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;pointer-events:all;
  filter:drop-shadow(0 0 10px rgba(255,255,255,.6)) drop-shadow(0 2px 6px rgba(0,0,0,.9));
  transition:top .38s cubic-bezier(.4,0,.2,1),left .38s cubic-bezier(.4,0,.2,1);
}
/* Image fills ~85% of cell — proportional on all screen sizes */
.bishop-piece img{
  width:85%;height:85%;
  object-fit:contain;display:block;pointer-events:none;
}
.bishop-piece.capture{animation:capFlash .42s ease!important;}
@keyframes capFlash{
  0%,100%{filter:drop-shadow(0 0 10px rgba(255,255,255,.6)) drop-shadow(0 2px 6px rgba(0,0,0,.9));}
  45%{filter:drop-shadow(0 0 40px rgba(244,208,63,1)) drop-shadow(0 0 75px rgba(244,208,63,.7));}
}

/* COIN */
.coin-wrap{position:absolute;inset:0;z-index:5;
  display:flex;align-items:center;justify-content:center;pointer-events:none;}
.coin{width:66%;height:66%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#FFF8C0,#F4D03F 50%,#9A7B1A);
  box-shadow:0 0 14px rgba(244,208,63,.9),0 2px 6px rgba(0,0,0,.5),inset 0 2px 4px rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  color:#9A7B1A;font-weight:900;
  animation:coinSpin 1.5s linear infinite;}
@keyframes coinSpin{0%,100%{transform:scaleX(1);}22%{transform:scaleX(.06);}44%,56%{transform:scaleX(1);}78%{transform:scaleX(.06);}}
.coin::after{content:'✦';}
.coin.flash{animation:coinFlash .65s ease !important;}
@keyframes coinFlash{
  0%{transform:scale(1);}25%{transform:scale(1.7);filter:brightness(2.2);}
  60%{transform:scale(1.3);filter:brightness(1.4);}100%{transform:scale(1);filter:brightness(1);}
}
.coin.pop{animation:coinPop .45s ease forwards !important;}
@keyframes coinPop{
  0%{transform:scale(1);opacity:1;}
  45%{transform:scale(1.9);opacity:.9;}
  100%{transform:scale(0);opacity:0;}
}

/* PARTICLES */
.particle{position:fixed;border-radius:50%;pointer-events:none;
  animation:pFly ease-out forwards;z-index:999;}
@keyframes pFly{from{opacity:1;transform:translate(0,0) scale(1);}
  to{opacity:0;transform:translate(var(--px),var(--py)) scale(.15);}}

/* WIN OVERLAY */
@keyframes scIn{from{transform:scale(.6) translateY(28px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.win-overlay{position:fixed;inset:0;background:rgba(6,14,26,.93);
  display:flex;align-items:center;justify-content:center;
  z-index:600;opacity:0;pointer-events:none;transition:opacity .4s;}
.win-overlay.show{opacity:1;pointer-events:all;}
.win-card{background:linear-gradient(150deg,#1e3d5c,#0f2336);
  border:2.5px solid var(--gold);border-radius:22px;
  padding:28px 38px;text-align:center;
  box-shadow:0 0 80px rgba(244,208,63,.55);
  animation:scIn .45s cubic-bezier(.175,.885,.32,1.5) both;}
.win-trophy{font-size:3.8rem;animation:trophy 1.1s ease-in-out infinite alternate;}
@keyframes trophy{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);margin:8px 0 5px;}
.win-stars{font-size:2.2rem;letter-spacing:4px;margin-bottom:6px;}

.btn-next{background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  color:#060E1A;border:none;border-radius:14px;
  padding:12px 32px;font-family:'Fredoka One',cursive;font-size:1.2rem;
  cursor:pointer;box-shadow:0 4px 18px rgba(244,208,63,.5);touch-action:manipulation;
  transition:transform .15s,box-shadow .15s;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7);}
.btn-retry{
  background:transparent;color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.2);border-radius:14px;
  padding:9px 26px;font-family:'Fredoka One',cursive;font-size:1rem;
  cursor:pointer;touch-action:manipulation;
  transition:color .2s,border-color .2s;margin-top:8px;}
.btn-retry:hover{color:white;border-color:rgba(255,255,255,.5);}

/* HINT AREA */
.hint-area{height:34px;display:flex;align-items:center;justify-content:center;margin-top:4px;z-index:1;}
.hint-toast{background:rgba(6,14,26,.92);border-radius:12px;padding:6px 18px;
  font-size:.88rem;font-weight:700;text-align:center;
  opacity:0;pointer-events:none;transition:opacity .28s ease;
  max-width:95vw;white-space:nowrap;}
.hint-toast.show{opacity:1;}
.hint-toast.ok{color:#A8F0C8;border:1.5px solid rgba(82,183,136,.6);}
.hint-toast.err{color:#FFB3A7;border:1.5px solid rgba(231,76,60,.6);}
</style>
</head>
<body>

<div class="hdr">
  <div class="stage-badge" id="stage-badge">שלב 2 · תרחיש 1/6</div>
  <div class="game-title-hdr">ריקוד 2 המהלכים 🎯</div>
  <div class="score-right">
<div style="display:flex;gap:6px;align-items:center;"><div id="pd0" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div><div id="pd1" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div><div id="pd2" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div><div id="pd3" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div><div id="pd4" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div><div id="pd5" style="width:13px;height:13px;border-radius:50%;background:rgba(244,208,63,.2);border:2px solid rgba(244,208,63,.4);transition:background .3s;"></div></div>
    <button class="btn-mute" id="btn-mute" onclick="toggleMute()">🔊</button>
  </div>
</div>

<div class="path-tracker">
  <div class="path-badge" id="pb0">נתיב 1 🔍</div>
  <div class="path-badge" id="pb1">נתיב 2 🔍</div>
</div>

<div class="instruction" id="instruction">מצאו 2 דרכים שונות למטבע ב-2 מהלכים!</div>

<div class="board-section">
  <div class="coord-wrap">
    <div class="rank-labels" id="ranks"></div>
    <div>
      <div class="board-outer" id="board-outer">
        <div class="board-grid" id="board"></div>
        <svg class="path-svg" id="path-svg"></svg>
        <div class="bishop-piece" id="bishop-piece">
          <img id="bishop-img" src="" alt="רץ"/>
        </div>
      </div>
      <div class="file-labels" id="files"></div>
    </div>
  </div>
</div>





<!-- HINT AREA -->
<div class="hint-area">
  <div class="hint-toast" id="hint-toast"></div>
</div>

<!-- WIN -->
<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <div class="win-title">שלב 2 הושלם! 🎉</div>
    <div class="win-stars" id="win-stars">⭐⭐⭐</div>
    <div id="win-msg" style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--blue);margin-bottom:12px;">ביצוע מושלם! 🏆</div>
    <button class="btn-next" onclick="goNext()">לשלב 3 ←</button>
    <br>
    <button class="btn-retry" id="btn-retry" onclick="retryStage()">🔄 נסו שוב</button>
  </div>
</div>

<script>
// ══════ BISHOP SVG (white) ══════
const BISHOP_SVG=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g fill="none" fill-rule="evenodd" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="#fff" stroke-linecap="butt"><path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z"/></g><path d="M17.5 26h10M15 30h15m-7.5-14.5v5M20 18h5" stroke="#000" stroke-linejoin="miter"/></g></svg>`;
document.getElementById('bishop-img').src='data:image/svg+xml,'+encodeURIComponent(BISHOP_SVG);

// ══════ SCENARIOS ══════
// כל תרחיש: רץ מתחיל + מטבע. השחקן מוצא 2 נתיבים שונים ב-2 מהלכים כ״א
const SCENARIOS=[
  { start:{row:7,col:2}, coin:{row:2,col:3} },  // C1→D6
  { start:{row:7,col:4}, coin:{row:0,col:3} },  // E1→D8
  { start:{row:3,col:2}, coin:{row:3,col:6} },  // C5→G5
  { start:{row:7,col:5}, coin:{row:1,col:1} },  // F1→B7
  { start:{row:7,col:3}, coin:{row:3,col:5} },  // D1→F5
  { start:{row:0,col:1}, coin:{row:5,col:4} },  // B8→E3
];
const TOTAL=SCENARIOS.length; // 6 תרחישים
const ORIGINAL_SCENARIOS=JSON.parse(JSON.stringify(SCENARIOS));

// ══════ STATE ══════
let scenIdx=0, startPos={}, bPos={}, coinPos={};
let pathState=0;       // 0=waiting for intermediate  1=waiting for coin
let intermedPos=null;  // intermediate square while in state 1
let foundPaths=[];     // intermediates of found paths
let busy=false, wrongClicks=0, totalWrongClicks=0;
let muted=false;
function markDot(i){const el=document.getElementById("pd"+i);if(el){el.style.background="var(--gold)";el.style.borderColor="var(--gold)";el.style.transform="scale(1.2)";el.style.boxShadow="0 0 8px rgba(244,208,63,.7)";}}
function markDotActive(i){const el=document.getElementById("pd"+i);if(el){el.style.background="rgba(244,208,63,.45)";el.style.borderColor="rgba(244,208,63,.85)";el.style.boxShadow="0 0 7px rgba(244,208,63,.55)";el.style.transform="";}}

function toggleMute(){muted=!muted;document.getElementById('btn-mute').textContent=muted?'🔇':'🔊';}

// ══════ AUDIO ══════
let audioCtx=null;
const ga=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;};
document.addEventListener('click',()=>ga(),{once:true});
function tone(f1,f2,d,type='sine',v=.17){try{const c=ga(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.setValueAtTime(f1,c.currentTime);if(f2)o.frequency.exponentialRampToValueAtTime(f2,c.currentTime+d);g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
const sndErr =()=>{if(!muted)tone(260,130,.35,'sawtooth',.13);};
const sndMove=()=>{if(!muted)tone(660,880,.15,'sine',.10);};
const sndPath=()=>{if(!muted)[0,220].forEach((d,i)=>setTimeout(()=>tone([880,1320][i],[1100,1760][i],.32),d));};
const sndScene=()=>{if(!muted)[0,200,400].forEach((d,i)=>setTimeout(()=>tone([880,1100,1320][i],[1100,1320,1760][i],.4),d));};
const sndWin =()=>{if(!muted)[0,180,360,540].forEach((d,i)=>setTimeout(()=>tone([660,880,1100,1320][i],[1100,1320,1760,2000][i],.38),d));};

// ══════ STARS ══════
for(let i=0;i<55;i++){const s=document.createElement('div');s.className='star-dot';const sz=Math.random()*2.2+.7;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*3}s;`;document.body.appendChild(s);}

// ══════ UTILS ══════
const getCell=(r,c)=>document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
function getCellPx(){const c=document.querySelector('.cell');if(c){const cw=c.getBoundingClientRect().width;if(cw>0)return cw;}const w=window.innerWidth,h=window.innerHeight;if(h<=600)return Math.min(36,Math.floor((w-24)/8));if(w<=360)return 40;if(w<=390)return 44;if(w<=430)return 48;if(w<=480)return 53;return 58;}
// Sync CSS variable
/* B11 fix (rook pattern): CSS media-query holds at first paint; JS syncs only on resize */
window.addEventListener('resize',()=>{
  document.documentElement.style.setProperty('--cell',getCellPx()+'px');
  if(bPos.row!=null)placeBishop(bPos.row,bPos.col,false);
});

// ══════ BISHOP MOVE VALIDATION ══════
// Returns true if bishop can legally move from `from` to `to`,
// treating `blocker` (if given) as a blocking piece on intermediate squares.
function isValidBishopMove(from,to,blocker){
  const dr=to.row-from.row, dc=to.col-from.col;
  if(Math.abs(dr)!==Math.abs(dc)||dr===0)return false;
  if(to.row<0||to.row>7||to.col<0||to.col>7)return false;
  const sr=dr>0?1:-1, sc=dc>0?1:-1;
  let r=from.row+sr, c=from.col+sc;
  while(r!==to.row||c!==to.col){
    if(blocker&&r===blocker.row&&c===blocker.col)return false;
    r+=sr; c+=sc;
  }
  return true;
}

// ══════ BUILD COORDS — unified standard ══════
function buildCoords(){
  const rl=document.getElementById('ranks'),fl=document.getElementById('files');
  rl.innerHTML='';fl.innerHTML='';
  for(let r=0;r<8;r++){const d=document.createElement('div');d.textContent=8-r;rl.appendChild(d);}
  'ABCDEFGH'.split('').forEach(f=>{const d=document.createElement('div');d.textContent=f;fl.appendChild(d);});
}

// ══════ BUILD BOARD ══════
function buildBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  const px=getCellPx();
  for(let r=0;r<8;r++)for(let c=0;c<8;c++){
    const cell=document.createElement('div');
    cell.className='cell '+((r+c)%2===0?'cl':'cd');
    cell.dataset.r=r; cell.dataset.c=c;
    cell.addEventListener('click',()=>onCellClick(r,c));
    b.appendChild(cell);
  }
  // SVG viewBox matches board pixel size
  document.getElementById('path-svg').setAttribute('viewBox',`0 0 ${8*px} ${8*px}`);
}

// ══════ PLACE BISHOP ══════
function placeBishop(r,c,animate){
  const bp=document.getElementById('bishop-piece');
  const px=getCellPx();
  if(!animate){
    bp.style.transition='none';
    bp.style.top=r*px+'px'; bp.style.left=c*px+'px';
    // גלה רץ רק אחרי שמיקומו נקבע — מונע פלאש
    bp.style.visibility='visible';
    setTimeout(()=>{bp.style.transition='top .38s cubic-bezier(.4,0,.2,1),left .38s cubic-bezier(.4,0,.2,1)';},50);
  } else {
    bp.style.top=r*px+'px'; bp.style.left=c*px+'px';
    bp.style.visibility='visible';
  }
}

// ══════ PLACE COIN ══════
function placeCoin(){
  document.querySelectorAll('.coin-wrap').forEach(e=>e.remove());
  const cell=getCell(coinPos.row,coinPos.col);if(!cell)return;
  const wrap=document.createElement('div');wrap.className='coin-wrap';wrap.id='coin-wrap';
  const el=document.createElement('div');el.className='coin';el.id='coin-el';
  wrap.appendChild(el);cell.appendChild(wrap);
}

// ══════ DRAW PATH LINES ══════
// Draws animated lines: startPos → midPos → endPos in given color,
// then fades them out after ~1.3 seconds total.
// השובל נשאר על הלוח: נתיב 1 דוהה ל"רפאים" (עוגן זיכרון לחיפוש נתיב 2);
// כשנמצא הנתיב המשלים — שני השובלים נדלקים בעוצמה מלאה לרגע החגיגה.
// loadScenario() מנקה את path-svg בכל תרחיש חדש, כך שאין הצטברות.
const GHOST_OP=0.4;
function drawFoundPath(from,mid,to,color,pathNum,isFinal){
  const svg=document.getElementById('path-svg');
  const px=getCellPx();
  const cx=pos=>pos.col*px+px/2, cy=pos=>pos.row*px+px/2;

  function makeLine(x1,y1,x2,y2,delay,dur){
    const len=Math.hypot(x2-x1,y2-y1);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke',color);
    line.setAttribute('stroke-width','5');
    line.setAttribute('stroke-linecap','round');
    line.classList.add('trail');
    line.dataset.path=pathNum;
    line.style.cssText=`stroke-dasharray:${len};stroke-dashoffset:${len};opacity:1;filter:drop-shadow(0 0 7px ${color});`;
    svg.appendChild(line);
    setTimeout(()=>{
      line.style.transition=`stroke-dashoffset ${dur}ms ease-in-out`;
      line.style.strokeDashoffset='0';
    },delay+30);
    // אחרי שהקו צויר במלואו:
    setTimeout(()=>{
      if(isFinal){
        // הנתיב המשלים — מאירים את שני השובלים בעוצמה מלאה (ניגוד דו-צבעי)
        svg.querySelectorAll('.trail').forEach(l=>{
          l.style.transition='opacity 400ms ease-out, filter 400ms ease-out';
          l.style.opacity='1';
          l.style.filter=`drop-shadow(0 0 9px ${l.getAttribute('stroke')})`;
        });
      }else{
        // נתיב 1 — דוהה לעוגן-רפאים ונשאר על הלוח
        line.style.transition='opacity 450ms ease-out, filter 450ms ease-out';
        line.style.opacity=GHOST_OP;
        line.style.filter=`drop-shadow(0 0 4px ${color})`;
      }
    },delay+dur+350);
    return line;
  }

  const SEG=300;
  makeLine(cx(from),cy(from),cx(mid),cy(mid), 0,   SEG);
  makeLine(cx(mid), cy(mid), cx(to), cy(to),  SEG, SEG);
}

/* ── BishopState — v2.1 (אחרון לתצוגה, שיא לצבירה) ── */
const BishopState={
  MODULE_KEY:'chess_bishop',
  STAGE_KEYS:['stage1','stage2','stage3','stage4','stage5','stage6'],
  PERFECT_THRESHOLD:5,   // 5/6 perfect = 3⭐  (⚠️ תלוי במספר השלבים בפועל)
  save(stageKey,perfect){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev=d[stageKey]||{};
      // v2.1: אחרון מתעדכן תמיד; שיא נצבר ב-OR (כולל מיגרציה מ-perfect ישן)
      const bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;
      d[stageKey]={done:true,perfect,lastPerfect:perfect,bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  // v2.1 — תצוגה כפולה: מחזיר { best, last } (כל אחד 0/2/3). תמיד last ≤ best.
  getModuleStars(){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const done=this.STAGE_KEYS.filter(k=>d[k]?.done).length;
      if(done<this.STAGE_KEYS.length)return{best:0,last:0}; // לא הושלם — אין כוכב
      const bestP=this.STAGE_KEYS.filter(k=>(d[k]?.bestPerfect??d[k]?.perfect)).length;
      const lastP=this.STAGE_KEYS.filter(k=>(d[k]?.lastPerfect??d[k]?.perfect)).length;
      const toStars=p=>p>=this.PERFECT_THRESHOLD?3:2; // אחרי השלמה: מינימום 2⭐
      return{best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return{best:0,last:0};}
  }
};

// ══════ TOAST ══════
let toastTmr=null;
function showToast(txt,ok=false){
  const t=document.getElementById('hint-toast');
  if(!t)return;
  t.textContent=txt;
  t.className='hint-toast '+(ok?'ok':'err')+' show';
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>t.classList.remove('show'),2400);
}

// ══════ UPDATE INSTRUCTION ══════
function updateInstruction(){
  const el=document.getElementById('instruction');
  if(pathState===1){
    el.textContent='';
    el.className='instruction';
  } else if(foundPaths.length===0){
    el.textContent='מצאו 2 דרכים שונות למטבע ב-2 מהלכים! 🎯';
    el.className='instruction';
  } else {
    el.textContent='נהדר! עכשיו מצאו דרך שונה! 🔍';
    el.className='instruction path-done';
  }
}

// ══════ UPDATE PATH BADGES ══════
function updatePathBadges(){
  for(let i=0;i<2;i++){
    const pb=document.getElementById('pb'+i);
    if(i<foundPaths.length){
      pb.textContent=`נתיב ${i+1} ✅`;
      pb.className='path-badge found';
    } else {
      pb.textContent=`נתיב ${i+1} 🔍`;
      pb.className='path-badge';
    }
  }
}

// ══════ CELL CLICK HANDLER ══════
function onCellClick(r,c){
  if(busy)return;

  /* ─── STATE 0: choose intermediate square ─── */
  if(pathState===0){
    // Clicking bishop itself — ignore
    if(r===bPos.row&&c===bPos.col)return;

    // Trying to go directly to coin (1-move path)
    if(r===coinPos.row&&c===coinPos.col){
      if(isValidBishopMove(bPos,{row:r,col:c},null)){
        errFlash(r,c);
        showToast('מגיע במהלך אחד! צריכים בדיוק 2 מהלכים 🤔');
        sndErr(); return;
      }
    }

    // Validate move 1 — coin acts as blocker for passing through
    if(!isValidBishopMove(bPos,{row:r,col:c},coinPos)){
      errFlash(r,c);
      showToast('הרץ לא יכול ללכת לשם! ♗');
      sndErr(); wrongClicks++; totalWrongClicks++; return;
    }

    // ✓ Valid first move
    intermedPos={row:r,col:c};
    bPos={row:r,col:c};
    placeBishop(r,c,true);
    pathState=1;
    sndMove();
    updateInstruction();
  }

  /* ─── STATE 1: choose coin (second move) ─── */
  else {
    // Clicking bishop itself
    if(r===bPos.row&&c===bPos.col)return;

    // Validate move 2 (no blocker — going TO coin is target)
    if(!isValidBishopMove(bPos,{row:r,col:c},null)){
      errFlash(r,c);
      showToast('הרץ לא יכול ללכת לשם! ♗');
      sndErr(); wrongClicks++; totalWrongClicks++; return;
    }

    // Valid diagonal but missed the coin
    if(r!==coinPos.row||c!==coinPos.col){
      showToast('לא הגעתם למטבע! מתחילים נתיב חדש 🔄');
      sndErr(); wrongClicks++; totalWrongClicks++;
      setTimeout(()=>{ pathState=0; intermedPos=null; bPos={...startPos}; placeBishop(startPos.row,startPos.col,true); updateInstruction(); },420);
      return;
    }

    // ✓ REACHED THE COIN!
    registerFoundPath();
  }
}

// ══════ REGISTER FOUND PATH ══════
function registerFoundPath(){
  busy=true;

  // Animate bishop to coin
  bPos={...coinPos};
  placeBishop(coinPos.row,coinPos.col,true);

  setTimeout(()=>{
    // Duplicate check
    if(foundPaths.some(p=>p.row===intermedPos.row&&p.col===intermedPos.col)){
      showToast('כבר מצאתם את הנתיב הזה! נסו דרך אחרת 🔄');
      sndErr();
      setTimeout(()=>{pathState=0;intermedPos=null;bPos={...startPos};placeBishop(startPos.row,startPos.col,true);updateInstruction();busy=false;},700);
      return;
    }

    // ── New path found! ──
    const pathNum=foundPaths.length+1;
    foundPaths.push({...intermedPos});
    updatePathBadges();

    // Coin pops and disappears
    const coinEl=document.getElementById('coin-el');
    if(coinEl) coinEl.classList.add('pop');
    setTimeout(()=>{ document.querySelectorAll('.coin-wrap').forEach(e=>e.remove()); }, 440);

    // Capture flash on bishop
    const bp=document.getElementById('bishop-piece');
    bp.classList.add('capture');
    setTimeout(()=>bp.classList.remove('capture'),420);

    // Draw trail (different colour per path)
    const trailColor=pathNum===1?'#F4D03F':'#7EC8E3';
    drawFoundPath(startPos,intermedPos,coinPos,trailColor,pathNum,foundPaths.length>=2);

    spawnParticles(coinPos.row,coinPos.col);
    sndPath();

    if(foundPaths.length>=2){
      // Both paths found → scenario complete
      sndScene(); fireworks();
      showToast('שני הנתיבים נמצאו! 🎉🎉',true);
      setTimeout(()=>scenarioComplete(),1500);
    } else {
      // Path 1 done → reset bishop + bring coin back for path 2
      showToast(`נתיב ${pathNum} נמצא! 🎉 עכשיו מצאו דרך שונה!`,true);
      setTimeout(()=>{
        pathState=0; intermedPos=null;
        bPos={...startPos};
        placeBishop(startPos.row,startPos.col,true);
        placeCoin();          // מטבע חוזר לנתיב 2
        updateInstruction();
        busy=false;
      },1700);
    }
  },400);
}

// ══════ SCENARIO COMPLETE ══════
function scenarioComplete(){
  const nextIdx=scenIdx+1;
  const isLast=nextIdx>=TOTAL;
  markDot(scenIdx);
  fireworks();
  setTimeout(()=>{
    if(isLast){ showWin(); }
    else { loadScenario(nextIdx); busy=false; }
  },800);
}

// ══════ LOAD SCENARIO ══════
function loadScenario(idx){
  scenIdx=idx;
  const sc=SCENARIOS[idx];
  startPos={...sc.start}; coinPos={...sc.coin};
  bPos={...startPos};
  pathState=0; intermedPos=null;
  foundPaths=[]; wrongClicks=0;

  document.getElementById('stage-badge').textContent=`שלב 2 · תרחיש ${idx+1}/${TOTAL}`;
  markDotActive(idx);
  updatePathBadges();
  updateInstruction();
  buildBoard();buildCoords();
  placeCoin();
  placeBishop(startPos.row,startPos.col,false);
  document.getElementById('path-svg').innerHTML='';
}

// ══════ WIN ══════
function showWin(){
  const perfect=totalWrongClicks<=2;
  BishopState.save('stage2',perfect);
  document.getElementById('win-stars').textContent=perfect?'⭐⭐⭐':'⭐⭐';
  document.getElementById('win-msg').textContent=perfect?'ביצוע מושלם! 🏆':'כל הכבוד! 🎉';
  document.getElementById('btn-retry').textContent=perfect?'🔄 שחקו שוב':'🔄 נסו שוב';
  document.getElementById('win-overlay').classList.add('show');
  sndWin();
}
function goNext(){window.location.href='bishop-stage3.html';}
function retryStage(){
  document.getElementById('win-overlay').classList.remove('show');
  totalWrongClicks=0;
  SCENARIOS.splice(0,SCENARIOS.length,...JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS)));
  Array.from({length:TOTAL},(_,i)=>i).forEach(i=>{const el=document.getElementById("pd"+i);if(el){el.style.background="rgba(244,208,63,.2)";el.style.borderColor="rgba(244,208,63,.4)";el.style.transform="";el.style.boxShadow="";}}); 
  loadScenario(0);busy=false;
}

// ══════ HELPERS ══════
function errFlash(r,c){const cell=getCell(r,c);if(cell){cell.classList.remove('err-flash');void cell.offsetWidth;cell.classList.add('err-flash');}}

function spawnParticles(r,c){
  const cell=getCell(r,c);if(!cell)return;
  const rect=cell.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const cols=['#F4D03F','#FFE566','#C9A227','#FFF0A0','#FF6B35','#7EC8E3'];
  for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';const sz=5+Math.random()*6;const a=Math.random()*Math.PI*2,d=50+Math.random()*70;p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${cols[i%cols.length]};animation-duration:${.45+Math.random()*.4}s;`;p.style.setProperty('--px',Math.cos(a)*d+'px');p.style.setProperty('--py',Math.sin(a)*d+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),950);}
}
function fireworks(){
  const cols=['#F4D03F','#7EC8E3','#52B788','#FF6B35','#C39BD3'];
  for(let i=0;i<30;i++)setTimeout(()=>{const p=document.createElement('div');p.className='particle';const sz=6+Math.random()*7;const x=10+Math.random()*80,y=10+Math.random()*80;const a=Math.random()*Math.PI*2,d=70+Math.random()*110;p.style.cssText=`width:${sz}px;height:${sz}px;left:${x}vw;top:${y}vh;background:${cols[Math.floor(Math.random()*5)]};animation-duration:${.7+Math.random()*.6}s;`;p.style.setProperty('--px',Math.cos(a)*d+'px');p.style.setProperty('--py',Math.sin(a)*d+'px');document.body.appendChild(p);setTimeout(()=>p.remove(),1400);},i*60);
}

// ══════ INIT ══════
loadScenario(0);
</script>
