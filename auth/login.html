<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060E1A">
<title>♟ אני מפלצת שחמט! — כניסה לממלכה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#060e1a;font-family:'Nunito',sans-serif;direction:rtl;overscroll-behavior:none}
html{-webkit-text-size-adjust:100%}
body{
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 0%,#162d4a 0%,#0c1e30 55%,#060e1a 100%);
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
button{-webkit-appearance:none;cursor:pointer;font-family:inherit}

/* ── Twinkling stars (same vibe as roadmap) ── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--td) ease-in-out infinite var(--tdelay)}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:var(--tmax)}}

/* ── Chessboard floor in the background ── */
#boardFloor{
  position:fixed;left:50%;bottom:-25vh;transform:translateX(-50%) perspective(900px) rotateX(72deg);
  width:170vw;height:120vh;
  background-image:
    linear-gradient(rgba(244,208,63,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(244,208,63,.12) 1px, transparent 1px),
    repeating-conic-gradient(#0b1b30 0% 25%, #11243c 0% 50%);
  background-size: 12vw 12vw, 12vw 12vw, 24vw 24vw;
  opacity:.55;
  z-index:0;
  pointer-events:none;
  mask-image: linear-gradient(to top, #000 0%, transparent 78%);
  -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 78%);
}

/* ── Floating chess pieces decorations ── */
.float-piece{
  position:fixed;z-index:1;pointer-events:none;
  filter: drop-shadow(0 6px 18px rgba(0,0,0,.55));
  animation: floaty 7s ease-in-out infinite;
}
.float-piece svg{width:100%;height:100%;display:block}
.fp-knight{top:14%;right:8%;width:clamp(58px,8vw,108px);animation-delay:-1.2s}
.fp-rook  {bottom:18%;right:5%;width:clamp(54px,7.5vw,98px);animation-delay:-3.6s}
.fp-bishop{top:18%;left:9%;width:clamp(52px,7.2vw,96px);animation-delay:-2.4s}
.fp-pawn  {bottom:14%;left:7%;width:clamp(40px,5.6vw,72px);animation-delay:-4.8s}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}

/* ── Crown above the card ── */
.crown{
  position:absolute;top:-46px;left:50%;transform:translateX(-50%);z-index:3;
  font-size:60px;line-height:1;
  filter: drop-shadow(0 0 12px rgba(244,208,63,.6));
  animation: crownBob 4s ease-in-out infinite;
}
@keyframes crownBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* ── The card ── */
.card{
  position:relative;z-index:2;
  width:min(94vw, 440px);
  background:linear-gradient(160deg, rgba(16,30,52,.96) 0%, rgba(6,14,26,.96) 100%);
  border:2px solid rgba(244,208,63,.5);
  border-radius:28px;
  padding:46px 32px 30px;
  box-shadow:
    0 0 0 1px rgba(244,208,63,.15) inset,
    0 28px 60px rgba(0,0,0,.55),
    0 0 60px rgba(244,208,63,.18);
  text-align:center;
  animation: cardIn .8s cubic-bezier(.16,.84,.32,1.18) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.title{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.6rem,4vw,2.1rem);
  color:#F4D03F;
  text-shadow:0 0 16px rgba(244,208,63,.65), 0 0 36px rgba(244,208,63,.25);
  letter-spacing:.02em;
  margin-bottom:4px;
}
.subtitle{
  font-family:'Fredoka One',cursive;
  font-size:clamp(.95rem,2.4vw,1.15rem);
  color:#aac1de;
  margin-bottom:26px;
}

/* ── Form fields ── */
.field{
  display:flex;align-items:center;gap:10px;
  background:rgba(5,12,22,.85);
  border:2px solid rgba(244,208,63,.35);
  border-radius:14px;
  padding:11px 14px;
  transition:border-color .2s, box-shadow .2s, transform .15s;
  margin-bottom:14px;
}
.field:focus-within{
  border-color:#F4D03F;
  box-shadow:0 0 0 4px rgba(244,208,63,.18), 0 0 22px rgba(244,208,63,.25);
  transform:translateY(-1px);
}
.field-ico{font-size:1.35rem;line-height:1;color:#F4D03F}
.field input{
  flex:1;background:transparent;border:0;outline:0;
  color:#f4f7fb;font-family:inherit;font-size:1.05rem;font-weight:700;
  direction:rtl;
}
.field input::placeholder{color:rgba(220,230,242,.45);font-weight:700}

/* ── Login button ── */
.login-btn{
  width:100%;
  font-family:'Fredoka One',cursive;
  font-size:1.25rem;
  background:linear-gradient(160deg,#F4D03F,#C9A227 60%,#9A7B1A);
  color:#060E1A;
  border:none;border-radius:18px;
  padding:14px 16px;
  cursor:pointer;
  box-shadow:0 8px 22px rgba(244,208,63,.45), 0 0 30px rgba(244,208,63,.2) inset;
  transition:transform .15s, box-shadow .15s, filter .15s;
  margin-top:6px;
  touch-action:manipulation;
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(244,208,63,.6)}
.login-btn:active{transform:translateY(0)}
.login-btn[disabled]{filter:grayscale(.3) brightness(.85);cursor:not-allowed}

/* ── Error pill ── */
.error-pill{
  margin-top:14px;
  background:rgba(231,76,60,.13);
  border:1.5px solid rgba(231,76,60,.55);
  color:#ffb6ad;
  border-radius:12px;
  padding:10px 14px;
  font-weight:800;
  font-size:.95rem;
  min-height:1px;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity .25s, transform .25s;
}
.error-pill.show{opacity:1;transform:translateY(0)}

/* ── Forgot password link ── */
.forgot-link{
  display:block;margin-top:12px;color:#aac1de;font-size:.92rem;
  text-decoration:none;font-weight:700;
  border:1.5px dashed rgba(170,193,222,.3);
  border-radius:50px;padding:6px 14px;
  transition:color .15s,border-color .15s,background .15s;
}
.forgot-link:hover{
  color:#F4D03F;border-color:rgba(244,208,63,.55);
  background:rgba(244,208,63,.06);
}

/* ── Hint row ── */
.hint{
  margin-top:16px;color:#6f8aab;font-size:.78rem;letter-spacing:.02em;
}
.hint b{color:#9bb6d4}

/* ── Mobile tweaks ── */
@media(max-width:420px){
  .card{padding:42px 22px 24px;border-radius:24px}
  .crown{top:-42px;font-size:52px}
}
</style>
</head>
<body>

<div id="stars"></div>
<div id="boardFloor"></div>

<!-- Decorative floating chess pieces (cburnett SVGs, same as the roadmap) -->
<div class="float-piece fp-knight" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
    <g style="fill:#F4D03F;stroke:#1a1a1a;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round">
      <path d="M22,10c10.5,1,16.5,8,16,29H15c0-9,10-12.5,8-18"/>
      <path d="M24,18c.38,2.91-5.55,7.37-8,9-3,2-3.18,4.34-5,4-.96-.96,1.41-3.04,0-3-1,0,.19,1.23-1,2-1,0-4,.003-4-5,0-2,6-12,6-12s1.89-1.9,2-3.5c-.73-1-2.5-1-2.5-1.5,1-1,3,3,3,3s1.28-2,3-3c1,0,1,3,1,3"/>
      <circle cx="9.5" cy="25.5" r="0.6" fill="#1a1a1a" stroke="#1a1a1a"/>
      <ellipse cx="14.5" cy="15.5" rx="0.5" ry="1.5" fill="#1a1a1a" stroke="#1a1a1a" transform="rotate(30,14.5,15.5)"/>
    </g>
  </svg>
</div>
<div class="float-piece fp-rook" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
    <g style="fill:#7EC8E3;stroke:#1a1a1a;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round">
      <path d="M9,39h27v-3H9z"/><path d="M12.5,32l1.5-2.5h17l1.5,2.5z"/>
      <path d="M12,36v-4h21v4z"/><path d="M14,29.5v-13h17v13z"/>
      <path d="M14,16.5l-3-2.5h23l-3,2.5z"/>
      <path d="M11,14V9h4v2h5V9h5v2h5V9h4v5z"/>
    </g>
  </svg>
</div>
<div class="float-piece fp-bishop" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45">
    <g fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <g fill="#C39BD3">
        <path d="M9 36c3.39-.97 10.11.43 13.5-2 3.39 2.43 10.11 1.03 13.5 2 0 0 1.65.54 3 2-.68.97-1.65.99-3 .5-3.39-.97-10.11.46-13.5-1-3.39 1.46-10.11.03-13.5 1-1.354.49-2.323.47-3-.5 1.354-1.94 3-2 3-2zm6-4c2.5 2.5 12.5 2.5 15 0 .5-1.5 0-2 0-2 0-2.5-2.5-4-2.5-4 5.5-1.5 6-11.5-5-15.5-11 4-10.5 14-5 15.5 0 0-2.5 1.5-2.5 4 0 0-.5.5 0 2zM25 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 1 1 5 0z"/>
      </g>
    </g>
  </svg>
</div>
<div class="float-piece fp-pawn" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="13 7 20 30">
    <path d="M22.5 9c-2.21 0-4 1.79-4 4 0 .89.29 1.71.78 2.38C17.33 16.5 16 18.59 16 21c0 2.03.94 3.84 2.41 5.03-3 1.06-7.41 5.55-7.41 13.47h23c0-7.92-4.41-12.41-7.41-13.47 1.47-1.19 2.41-3 2.41-5.03 0-2.41-1.33-4.5-3.28-5.62.49-.67.78-1.49.78-2.38 0-2.21-1.79-4-4-4z"
      fill="#52B788" stroke="#1a1a1a" stroke-width="1.4"/>
  </svg>
</div>

<form class="card" id="loginForm" autocomplete="on" novalidate>
  <div class="crown" aria-hidden="true">👑</div>
  <h1 class="title">♟ ברוכים הבאים לממלכה</h1>
  <div class="subtitle">היכנסו כדי להמשיך במסע השחמט שלכם</div>

  <label class="field" for="username">
    <span class="field-ico">👤</span>
    <input id="username" name="username" type="text" placeholder="שם משתמש" required minlength="1" maxlength="64" autocomplete="username" dir="rtl" autofocus>
  </label>
  <label class="field" for="password">
    <span class="field-ico">🔒</span>
    <input id="password" name="password" type="password" placeholder="סיסמה" required minlength="1" maxlength="256" autocomplete="current-password" dir="rtl">
  </label>

  <button class="login-btn" id="loginBtn" type="submit">⚔️ כניסה לממלכה</button>

  <a href="/auth/forgot.html" class="forgot-link" id="forgotLink">🔑 שכחתי סיסמה</a>

  <div class="error-pill" id="errorPill" role="alert" aria-live="polite"></div>

  <div class="hint">משתמשי דמו: <b>tomer</b> / <b>tomer</b> · <b>baruch</b> / <b>baruch</b></div>
</form>

<script src="/auth/js/api.js"></script>
<script>
(function(){
  'use strict';

  // ── Decorative stars ──
  (function drawStars(){
    var wrap = document.getElementById('stars');
    for (var i = 0; i < 70; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      var r = (0.35 + Math.random() * 1.15).toFixed(2);
      s.style.cssText =
        'left:' + (Math.random()*100).toFixed(1) + '%;' +
        'top:'  + (Math.random()*100).toFixed(1) + '%;' +
        'width:'+ (r*2) + 'px;height:' + (r*2) + 'px;' +
        '--tmax:' + (0.45 + Math.random()*0.55).toFixed(2) + ';' +
        '--td:'   + (2 + Math.random()*3).toFixed(1) + 's;' +
        '--tdelay:-' + (Math.random()*4).toFixed(1) + 's';
      wrap.appendChild(s);
    }
  }());

  function nextDestination(meBody){
    var u = meBody && meBody.user;
    if (meBody && meBody.mustChangePassword) return '/auth/setup.html';
    if (u && u.isAdmin) return '/admin/';
    return '/' + encodeURIComponent('מסך הפתיחה') + '/index.html';
  }

  // ── Already logged in? Skip the login screen. ──
  (async function autoSkip(){
    try {
      var r = await window.ChessApi.get('/auth/me');
      window.location.replace(nextDestination(r && r.data));
    } catch (e) { /* not logged in — show the form */ }
  }());

  var form    = document.getElementById('loginForm');
  var userEl  = document.getElementById('username');
  var passEl  = document.getElementById('password');
  var btn     = document.getElementById('loginBtn');
  var errEl   = document.getElementById('errorPill');

  function showError(msg){
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
  function clearError(){
    errEl.classList.remove('show');
    errEl.textContent = '';
  }

  form.addEventListener('submit', async function(ev){
    ev.preventDefault();
    clearError();
    var username = (userEl.value || '').trim();
    var password = passEl.value || '';
    if (!username || !password) {
      showError('יש למלא שם משתמש וסיסמה');
      return;
    }
    btn.disabled = true;
    btn.textContent = 'נכנס לממלכה…';
    try {
      var loginRes = await window.ChessApi.post('/auth/login', { username: username, password: password });
      // Clear any leftover progress stamp before navigating — the bridge in the
      // roadmap will re-stamp with the logged-in user.
      try { localStorage.removeItem('chess_owner_id'); } catch (_e) {}
      window.location.replace(nextDestination(loginRes && loginRes.data));
    } catch (err) {
      btn.disabled = false;
      btn.textContent = '⚔️ כניסה לממלכה';
      if (err && err.status === 429) {
        showError('יותר מדי ניסיונות. נסו שוב בעוד כמה דקות.');
      } else if (err && err.code === 'invalid_credentials') {
        showError('שם משתמש או סיסמה שגויים. נסו שוב.');
        passEl.value = '';
        passEl.focus();
      } else if (err && err.code === 'validation_failed') {
        showError('הקלט אינו תקין.');
      } else {
        showError('אירעה שגיאה. נסו שוב.');
      }
    }
  });
}());
</script>
</body>
</html>
