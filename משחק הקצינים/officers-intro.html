<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>משחק הקצינים ♟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#F4D03F; --gold-dark:#C9A227;
  --blue:#7EC8E3; --green:#52B788;
  --bg1:#162D4A; --bg2:#0C1E30; --bg3:#060E1A;
  --cell-light:#C9E4F5; --cell-dark:#4A7FA5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at 50% 0%,var(--bg1) 0%,var(--bg2) 55%,var(--bg3) 100%);
  min-height:100vh; font-family:'Nunito',sans-serif; font-weight:700;
  color:#fff; user-select:none; overflow-x:hidden; overflow-y:auto;
  display:flex; flex-direction:column; align-items:center;
  padding:calc(24px + env(safe-area-inset-top)) 12px calc(32px + env(safe-area-inset-bottom));
  overscroll-behavior:none; -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}
.star-dot{position:fixed;border-radius:50%;background:#fff;pointer-events:none;animation:twinkle ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1;transform:scale(.8)}to{opacity:.85;transform:scale(1.2)}}

/* ── Intro Screen ── */
#introScreen{
  display:flex;flex-direction:column;align-items:center;
  gap:20px;padding:0 16px;width:100%;max-width:520px;
  animation:fadeUp .55s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

.main-title{
  font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--gold);text-align:center;
  text-shadow:0 0 28px rgba(244,208,63,.9),0 0 60px rgba(244,208,63,.4),0 2px 8px rgba(0,0,0,.6);
  animation:sp-in .7s cubic-bezier(.175,.885,.32,1.5) both;
}
.sub-title{
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  color:var(--blue);text-align:center;line-height:1.65;
  animation:sp-in .7s .1s cubic-bezier(.175,.885,.32,1.5) both;
}
@keyframes sp-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ── Preview Board ── */
:root{--pcell:min(54px, calc((100vw - 64px) / 8));}
.preview-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;}
#demoCaption{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);
  background:rgba(6,14,26,.92);border:2px solid var(--gold);color:var(--gold);
  font-family:'Fredoka One',cursive;font-size:1.05rem;line-height:1.4;text-align:center;
  padding:12px 20px;border-radius:14px;white-space:nowrap;
  box-shadow:0 6px 30px rgba(0,0,0,.7),0 0 30px rgba(244,208,63,.35);
  z-index:60;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;
}
#demoCaption.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.preview-outer{
  border:3px solid var(--gold-dark);border-radius:5px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.55),0 0 14px rgba(244,208,63,.15);
}
.preview-grid{
  display:grid;
  grid-template-columns:repeat(8,var(--pcell));
  grid-template-rows:repeat(8,var(--pcell));
  direction:ltr;
}
.psq{width:var(--pcell);height:var(--pcell);display:flex;align-items:center;justify-content:center;}
.psq.l{background:var(--cell-light);}
.psq.d{background:var(--cell-dark);}
.psq img{width:88%;height:88%;object-fit:contain;display:block;pointer-events:none;}

/* ── Play Button ── */
.play-btn{
  font-family:'Fredoka One',cursive;font-size:1.5rem;
  padding:16px 48px;border-radius:50px;border:none;
  cursor:pointer;color:#060E1A;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  box-shadow:0 4px 22px rgba(244,208,63,.6),0 0 50px rgba(244,208,63,.2);
  transition:transform .15s,box-shadow .15s;touch-action:manipulation;
  animation:playPulse 2.4s ease-in-out infinite;
}
@keyframes playPulse{
  0%,100%{box-shadow:0 4px 22px rgba(244,208,63,.6),0 0 50px rgba(244,208,63,.2);}
  50%{box-shadow:0 4px 30px rgba(244,208,63,.85),0 0 70px rgba(244,208,63,.5);}
}
.play-btn:hover{transform:scale(1.06);}
.play-btn:active{transform:scale(.97);}
.play-btn:disabled{opacity:.4;cursor:default;animation:none;box-shadow:none;transform:none;}

/* ── Demo (secondary) ── */
.cta-row{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px;}
.demo-btn{
  font-family:'Fredoka One',cursive;font-size:1rem;
  padding:10px 30px;border-radius:50px;
  background:transparent;border:2px solid var(--blue);color:var(--blue);
  cursor:pointer;transition:transform .15s,background .15s,opacity .2s;
  touch-action:manipulation;
}
.demo-btn:hover{transform:scale(1.05);background:rgba(126,200,227,.12);}
.demo-btn:active{transform:scale(.97);}
.demo-btn:disabled{opacity:.45;cursor:default;transform:none;background:transparent;}

/* ── Rules Card ── */
.rules-card{
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:14px;padding:14px 20px;max-width:360px;
  font-size:.9rem;line-height:1.7;color:#ccc;text-align:right;width:100%;
}

/* ── Responsive ── */
@media(max-width:767px){
  .main-title{font-size:2rem;}
  .sub-title{font-size:.95rem;}
}
@media(max-width:479px){
  .main-title{font-size:1.9rem;}
  .sub-title{font-size:.9rem;}
  .play-btn{font-size:1.3rem;padding:14px 38px;}
  .rules-card{font-size:.8rem;padding:12px 14px;}
}
@media(max-height:650px){
  body{padding-top:10px;}
  #introScreen{gap:12px;}
  .main-title{font-size:1.8rem;}
}
</style>
</head>
<body>

<div id="introScreen">
  <div class="main-title">♟ משחק הקצינים ♟</div>
  <div class="sub-title">שני צבאות — קצינים בלבד, ללא רגלים<br>אכלו את כל כלי האויב לפני שהוא אוכל אתכם!</div>

  <!-- Mini preview board -->
  <div class="preview-wrap">
    <div id="demoCaption"></div>
    <div class="preview-outer">
      <div class="preview-grid" id="previewGrid"></div>
    </div>
  </div>

  <!-- Rules card -->
  <div class="rules-card" style="direction:rtl">
    📜 <strong style="color:#fff">כללים:</strong><br>
    • כל כלי נע בדיוק כמו בשחמט — אבל ללא רגלים<br>
    • אין שח, אין מט — גם המלך ניתן לאכילה!<br>
    • הצד שיאכל את כל כלי היריב — מנצח!<br>
    • אתם משחקים עם הכלים הלבנים ⬜
  </div>

  <!-- Single play button -->
  <div class="cta-row">
    <button class="play-btn" id="playBtn" onclick="onStart()">בואו נשחק! 🎮</button>
    <button class="demo-btn" id="demoBtn" onclick="runDemo()">👀 ראו הדגמה</button>
  </div>
</div>

'♔':`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 45"><g style="fill:none;stroke:#000;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M22.5,11.63V6M20,8h5" style="fill:none;stroke:#000;stroke-linejoin:miter"/><path d="M22.5,25c0,0,4.5-7.5,3-10.5,0,0-1-2.5-3-2.5s-3,2.5-3,2.5c-1.5,3,3,10.5,3,10.5" style="fill:#fff;stroke:#000;stroke-linecap:butt;stroke-linejoin:miter"/><path d="M11.5,37c5.5,3.5,15.5,3.5,21,0V30c0,0,9-4.5,6-10.5-4-6.5-13.5-3.5-16,4v3.5v-3.5c-2.5-7.5-12-10.5-16-4-3,6,5,10.5,5,10.5V37" style="fill:#fff"/><path d="M11.5,30c5.5-3,15.5-3,21,0M11.5,33.5c5.5-3,15.5-3,21,0M11.5,37c5.5-3,15.5-3,21,0" style="fill:none"/></g></svg>`,

const SYM={black:{K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞'},white:{K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘'}};

function makePieceImg(type,color){
  const sym=SYM[color][type];
  const dict=color==='white'?WHITE_SVG:BLACK_SVG;
  const img=document.createElement('img');
  img.src='data:image/svg+xml,'+encodeURIComponent(dict[sym]);
  img.style.cssText=`width:88%;height:88%;object-fit:contain;display:block;margin:auto;pointer-events:none;`;
  if(color==='black') img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,.9))';
  if(color==='white') img.style.filter='drop-shadow(0 0 1.5px rgba(0,0,0,.6))';
  return img;
}

// ════════════════════════════════════════
//  PREVIEW BOARD
// ════════════════════════════════════════
function buildPreviewBoard(){
  const grid=document.getElementById('previewGrid');
  if(!grid) return;
  grid.innerHTML='';
  const types=['R','N','B','Q','K','B','N','R'];
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq=document.createElement('div');
      sq.className='psq '+((r+c)%2===0?'l':'d');
      if(r===0){
        const img=makePieceImg(types[c],'black');
        sq.appendChild(img);
      } else if(r===7){
        const img=makePieceImg(types[c],'white');
        sq.appendChild(img);
      }
      grid.appendChild(sq);
    }
  }
}
buildPreviewBoard();

// ════════════════════════════════════════
//  AUDIO — capture sound (chess-explosion-skill, ported verbatim from the game)
// ════════════════════════════════════════
let _ctx=null, muted=false;
function getCtx(){if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playClick(){if(muted)return;try{const ctx=getCtx(),now=ctx.currentTime,o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=900;g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.07);o.start(now);o.stop(now+.09);}catch(e){}}
function playCapture(){
  if(muted)return;
  try{
    const ctx=getCtx(),n=ctx.currentTime;
    // Layer 1: sub-bass thud
    const thud=ctx.createOscillator(),thudG=ctx.createGain();
    thud.connect(thudG);thudG.connect(ctx.destination);
    thud.type='sine';thud.frequency.setValueAtTime(90,n);thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n);thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n);thud.stop(n+.6);
    // Layer 2: mid punch
    const punch=ctx.createOscillator(),punchG=ctx.createGain();
    punch.connect(punchG);punchG.connect(ctx.destination);
    punch.type='sine';punch.frequency.setValueAtTime(200,n);punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n);punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n);punch.stop(n+.22);
    // Layer 3: noise burst
    const bufSz=Math.floor(ctx.sampleRate*.35),nBuf=ctx.createBuffer(1,bufSz,ctx.sampleRate);
    const nd=nBuf.getChannelData(0);for(let i=0;i<bufSz;i++)nd[i]=Math.random()*2-1;
    const nSrc=ctx.createBufferSource();nSrc.buffer=nBuf;
    const nFilt=ctx.createBiquadFilter();nFilt.type='bandpass';nFilt.frequency.value=500;nFilt.Q.value=.5;
    const nGain=ctx.createGain();nGain.gain.setValueAtTime(.55,n);nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt);nFilt.connect(nGain);nGain.connect(ctx.destination);nSrc.start(n);nSrc.stop(n+.35);
    // Layer 4: sharp crack
    const crack=ctx.createOscillator(),crackG=ctx.createGain();
    crack.connect(crackG);crackG.connect(ctx.destination);
    crack.type='sawtooth';crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n);crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n);crack.stop(n+.06);
  }catch(e){}
}

// ════════════════════════════════════════
//  DEMO ANIMATION (reuses the game's explosion for visual continuity)
//  Scripted, fully-legal 6-move sequence on the open (pawnless) board.
// ════════════════════════════════════════
const DEMO_MOVES=[
  {fr:7,fc:7,tr:0,tc:7},  // 1. לבן: צריח h1 אוכל צריח h8 (טור פתוח)
  {fr:0,fc:3,tr:7,tc:3},  // 2. שחור: מלכה d8 אוכלת מלכה d1 (טור פתוח)
  {fr:7,fc:4,tr:7,tc:3},  // 3. לבן: מלך e1 אוכל מלכה d1  → המלך עובר ל-d1
  {fr:0,fc:2,tr:4,tc:6},  // 4. שחור: רץ c8 → g4 (מאיים על המלך ב-d1, ללא אכילה)
  {fr:7,fc:0,tr:0,tc:0},  // 5. לבן: צריח a1 אוכל צריח a8 (טור פתוח)
  {fr:4,fc:6,tr:7,tc:3, caption:'המלך נאכל — אבל המשחק ממשיך! ♟'} // 6. שחור: רץ g4 אוכל מלך d1
];
let demoRunning=false;
const wait=ms=>new Promise(r=>setTimeout(r,ms));

function showExplosionDemo(row,col){
  const grid=document.getElementById('previewGrid');
  const gr=grid.getBoundingClientRect();
  const SZ=gr.width/8, W=gr.width, H=gr.height;
  const cx=col*SZ+SZ/2, cy=row*SZ+SZ/2;
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  canvas.style.cssText=`position:fixed;left:${gr.left}px;top:${gr.top}px;width:${W}px;height:${H}px;z-index:210;pointer-events:none;`;
  document.body.appendChild(canvas);
  const c=canvas.getContext('2d');
  const COLORS=['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts=Array.from({length:45},(_,i)=>{
    const a=(i/45)*Math.PI*2+Math.random()*.4,spd=3.5+Math.random()*9;
    return{x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-(1.5+Math.random()),
      r:1.5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:1,decay:.018+Math.random()*.022,gravity:.18+Math.random()*.12};
  });
  let frame=0;
  function draw(){
    c.clearRect(0,0,W,H);
    if(frame<8){const t=frame/7,r=SZ*.9*t,g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`);g.addColorStop(.35,`rgba(255,230,80,${(1-t)*.9})`);
      g.addColorStop(.7,`rgba(255,100,0,${(1-t)*.5})`);g.addColorStop(1,'rgba(200,30,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();}
    if(frame>=1&&frame<22){const t=(frame-1)/21,r=SZ*.75*t,a=1-t,g=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`);g.addColorStop(.2,`rgba(255,180,0,${a*.95})`);
      g.addColorStop(.55,`rgba(210,50,0,${a*.7})`);g.addColorStop(.85,`rgba(100,15,0,${a*.4})`);g.addColorStop(1,'rgba(40,5,0,0)');
      c.fillStyle=g;c.beginPath();c.arc(cx,cy,Math.max(r,1),0,Math.PI*2);c.fill();}
    if(frame>=3&&frame<14){const t=(frame-3)/11;c.beginPath();c.arc(cx,cy,SZ*.5*t+SZ*.15,0,Math.PI*2);
      c.strokeStyle=`rgba(255,180,50,${.6*(1-t)})`;c.lineWidth=3*(1-t);c.stroke();}
    if(frame>10){const age=frame-10;for(let i=0;i<4;i++){const sa=Math.max(0,.18-age*.004);if(sa<=0)break;
      c.beginPath();c.arc(cx+Math.sin(i*1.7+age*.04)*age*.5,cy-age*.35+i*4,age*2.8+i*9,0,Math.PI*2);
      c.fillStyle=`rgba(55,55,55,${sa/(i*.4+1)})`;c.fill();}}
    c.save();parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.95;
      p.alpha=Math.max(0,p.alpha-p.decay);if(p.alpha<=0)return;
      c.globalAlpha=p.alpha;c.beginPath();c.arc(p.x,p.y,Math.max(.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      c.fillStyle=p.color;c.fill();});c.restore();
    frame++;if(frame<55)requestAnimationFrame(draw);else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function animateMoveDemo(mv,silent){
  return new Promise(res=>{
    const grid=document.getElementById('previewGrid');
    const srcCell=grid.children[mv.fr*8+mv.fc];
    const dstCell=grid.children[mv.tr*8+mv.tc];
    const pieceImg=srcCell?srcCell.querySelector('img'):null;
    if(!pieceImg){res();return;}
    const ir=pieceImg.getBoundingClientRect();
    const dr=dstCell.getBoundingClientRect();
    const tx=dr.left+(dr.width-ir.width)/2, ty=dr.top+(dr.height-ir.height)/2;
    const captured=dstCell.querySelector('img');
    const clone=pieceImg.cloneNode(true);
    clone.style.cssText=`position:fixed;left:${ir.left}px;top:${ir.top}px;width:${ir.width}px;height:${ir.height}px;`+
      `margin:0;z-index:200;pointer-events:none;`+
      `transition:left 430ms cubic-bezier(.25,0,.2,1),top 430ms cubic-bezier(.25,0,.2,1);`+
      `filter:drop-shadow(0 4px 10px rgba(244,208,63,.7));`;
    document.body.appendChild(clone);
    pieceImg.style.opacity='0';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{clone.style.left=tx+'px';clone.style.top=ty+'px';}));
    setTimeout(()=>{
      if(captured){ if(!silent) playCapture(); showExplosionDemo(mv.tr,mv.tc); captured.remove(); }
      dstCell.appendChild(pieceImg);
      pieceImg.style.opacity='';
      clone.remove();
      res();
    },450);
  });
}

async function runDemo(opts){
  opts=opts||{};
  const silent=!!opts.auto;              // first auto-run is silent (browser blocks audio before a gesture)
  if(demoRunning) return;
  demoRunning=true;
  if(!silent){ try{getCtx();}catch(e){} } // manual replay → unlock + play sound
  const demoBtn=document.getElementById('demoBtn');
  const playBtn=document.getElementById('playBtn');
  const cap=document.getElementById('demoCaption');
  demoBtn.disabled=true;
  if(playBtn) playBtn.disabled=true;     // CTA inactive while the demo plays
  for(const mv of DEMO_MOVES){
    await animateMoveDemo(mv,silent);
    if(mv.caption){ cap.textContent=mv.caption; cap.classList.add('show'); }
    await wait(1500);                    // 1.5s pause after every move
  }
  await wait(300);
  cap.classList.remove('show');
  await wait(300);
  buildPreviewBoard();                   // reset to the starting position
  demoBtn.disabled=false;
  if(playBtn) playBtn.disabled=false;    // CTA active again
  demoRunning=false;
}

// Auto-play the demo once on load so the player never misses it.
// CTA starts locked (set here, before paint) and unlocks when the demo ends.
(function(){
  const playBtn=document.getElementById('playBtn');
  if(playBtn) playBtn.disabled=true;
  setTimeout(()=>runDemo({auto:true}),700); // small delay lets the screen settle in
})();

// ════════════════════════════════════════
//  START — click feedback then navigate (consistent with other intros)
// ════════════════════════════════════════
function onStart(e){
  playClick();
  spawnSparks(e);
  setTimeout(()=>{ window.location.href='officers-game.html'; },350);
}
function spawnSparks(e){
  const btn=document.querySelector('.play-btn');
  if(!btn) return;
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors=['#F4D03F','#7EC8E3','#52B788','#FF6B35','#FFFFFF'];
  for(let i=0;i<18;i++){
    const s=document.createElement('div');
    const a=(i/18)*Math.PI*2, d=40+Math.random()*40;
    s.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;width:8px;height:8px;border-radius:50%;`+
      `background:${colors[i%colors.length]};z-index:300;pointer-events:none;`+
      `transition:transform .45s cubic-bezier(.25,.6,.3,1),opacity .45s;`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      s.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(.3)`;
      s.style.opacity='0';
    }));
    setTimeout(()=>s.remove(),500);
  }
}

}
