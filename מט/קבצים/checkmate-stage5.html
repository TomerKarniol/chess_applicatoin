<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שחמט — מט ב-2 מהלכים</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #F4D03F;
  --gold-dark:  #C9A227;
  --gold-deep:  #9A7B1A;
  --blue:       #7EC8E3;
  --red:        #E74C3C;
  --green:      #52B788;
  --orange:     #FF6B35;
  --bg1:        #162D4A;
  --bg2:        #0C1E30;
  --bg3:        #060E1A;
  --cell: 64px; /* fallback — overridden by computeCell() */
  --cell-light: #C9E4F5;
  --cell-dark:  #4A7FA5;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: radial-gradient(ellipse at 50% 0%, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  min-height:100vh; font-family:'Nunito',sans-serif; font-weight:700;
  color:white; user-select:none; overflow-x:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
  display:flex; flex-direction:column; align-items:center;
  padding:16px 12px calc(28px + env(safe-area-inset-bottom));
  overflow-y:auto;
}
.star-dot { position:fixed; border-radius:50%; background:white; pointer-events:none;
  animation:twinkle ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* ── Header ── */
.hdr {
  width:100%; max-width:580px; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:10px; position:relative; z-index:1;
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:1rem; color:var(--green);
  border:2px solid var(--green); border-radius:50px; padding:4px 14px;
  background:rgba(82,183,136,.12);
}
.score-right { display:flex; align-items:center; gap:8px; }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
.win-stars {
  font-size:1.9rem; letter-spacing:4px;
  text-shadow:0 0 14px rgba(244,208,63,.8);
  margin:6px 0 12px;
}

/* ── Step indicator ── */
.step-indicator {
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px; position:relative; z-index:1;
}
.step-pill {
  font-family:'Fredoka One',cursive; font-size:0.95rem;
  padding:5px 18px; border-radius:50px; border:2px solid #444;
  color:#888; transition:all .3s ease;
}
.step-pill.active {
  border-color:var(--gold); color:var(--gold);
  box-shadow:0 0 10px rgba(244,208,63,.4);
}
.step-pill.done {
  border-color:#555; color:#555;
  background:transparent;
}
.step-arrow { color:#555; font-size:1.1rem; padding:0 2px; }

.no-hints-msg {
  font-family:'Fredoka One',cursive; font-size:1rem;
  color:var(--green); text-align:center;
  margin-top:6px; opacity:0; transition:opacity .3s ease; pointer-events:none;
  direction:rtl; unicode-bidi:bidi-override;
}
.no-hints-msg.show { opacity:1; }

/* ── Progress ── */
.progress-row {
  display:flex; gap:8px; margin-bottom:10px; position:relative; z-index:1;
}
.prog-dot {
  width:12px; height:12px; border-radius:50%; border:2px solid #555;
  transition:all .3s ease;
}
.prog-dot.done    { background:var(--green); border-color:var(--green); }
.prog-dot.current { background:var(--gold);  border-color:var(--gold); box-shadow:0 0 8px var(--gold); }
.prog-dot.pending { background:transparent; border-color:#444; }

/* ── Instruction ── */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.25rem; color:white;
  text-align:center; margin-bottom:12px; min-height:1.6rem;
  position:relative; z-index:1; direction:rtl;
  animation:sp-in .4s ease both;
}
@keyframes sp-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── Board ── */

.board-outer {
  position:relative;
  box-sizing:content-box;
  width:calc(var(--cell)*8); height:calc(var(--cell)*8);
  border:3px solid var(--gold-dark);
  border-radius:5px;
  box-shadow:0 6px 28px rgba(0,0,0,.6), 0 0 22px rgba(244,208,63,.25);
  overflow:visible;
}

.board-outer.flipped { transform: rotate(180deg); }
.board-grid {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr; overflow:hidden; border-radius:2px;
}
.sq { width:var(--cell); height:var(--cell); cursor:pointer; position:relative; touch-action:manipulation; }
.sq.l { background:var(--cell-light); }
.sq.d { background:var(--cell-dark); }
.sq:hover { filter:brightness(1.12); }
.sq.wrong-flash { animation:wrongFlash .22s ease 2; }
@keyframes wrongFlash { 0%,100%{background-color:inherit} 50%{background:rgba(231,76,60,.65)!important} }

/* ── Floating pieces ── */
.piece {
  position:absolute;
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*0.78);
  line-height:1; z-index:5; cursor:default;
  transition:left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1);
  pointer-events:all;
}
.piece.clickable { cursor:pointer; }
.piece.selected {
  animation:selectedPulse 1s ease-in-out infinite;
}
.piece.selected::after {
  content:'';
  position:absolute;
  inset:4px;
  border-radius:50%;
  background:rgba(244,208,63,0.25);
  box-shadow:0 0 12px 4px rgba(244,208,63,0.6);
  animation:selectedBg 1s ease-in-out infinite;
  pointer-events:none; z-index:-1;
}
@keyframes selectedPulse {
  0%,100%{ transform:scale(1); }
  50%    { transform:scale(1.08); }
}
@keyframes selectedBg {
  0%,100%{ opacity:.6; box-shadow:0 0 10px 3px rgba(244,208,63,.5); }
  50%    { opacity:1;  box-shadow:0 0 20px 8px rgba(244,208,63,.9); }
}
.piece.arrive { animation:pieceArrive .6s ease forwards; }
@keyframes pieceArrive {
  0%  { filter:drop-shadow(0 0 4px rgba(0,0,0,.5)); }
  40% { filter:drop-shadow(0 0 18px var(--gold)) drop-shadow(0 0 30px rgba(244,208,63,.7)); }
  100%{ filter:drop-shadow(0 0 4px rgba(0,0,0,.5)); }
}
.piece.shake { animation:shake .35s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* ── Laser SVG ── */
.laser-svg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10; overflow:visible;
}
.laser-line {
  stroke:var(--red); stroke-width:4; stroke-linecap:round; fill:none; opacity:0;
  filter:drop-shadow(0 0 6px rgba(231,76,60,1)) drop-shadow(0 0 14px rgba(231,76,60,.6));
}

.control-line {
  stroke:var(--orange); stroke-width:3; stroke-linecap:round; fill:none; opacity:0;
  marker-end:url(#controlHead);
  filter:drop-shadow(0 0 5px rgba(255,107,53,.9)) drop-shadow(0 0 12px rgba(255,107,53,.5));
  transition:opacity .4s ease;
}
.control-line.show { opacity:1; }
.arrow-line {
  stroke: var(--gold); stroke-width:3.5; stroke-linecap:round;
  fill:none; opacity:0; marker-end:url(#arrowHead);
  filter:drop-shadow(0 0 6px rgba(244,208,63,.9)) drop-shadow(0 0 14px rgba(244,208,63,.5));
  transition:opacity .3s ease;
}
.arrow-line.show { opacity:1; }

/* ── Piece hint glow ── */
@keyframes hintGlow {
  0%,100%{ filter:drop-shadow(0 0 4px rgba(244,208,63,.4)); }
  50%    { filter:drop-shadow(0 0 20px rgba(244,208,63,1)) drop-shadow(0 0 35px rgba(244,208,63,.7)); transform:scale(1.12); }
}
.piece.hint-piece { animation:hintGlow 0.7s ease-in-out infinite; }

/* ── Star hint on target square ── */
.sq.hint-sq::after {
  content:'⭐'; position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*0.52);
  animation:starPop .4s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events:none; z-index:15;
}
@keyframes starPop {
  from{transform:scale(0) rotate(-30deg);opacity:0}
  to  {transform:scale(1) rotate(0deg);opacity:1}
}

/* ── Hint button ── */
.hint-btn {
  font-family:'Fredoka One',cursive; font-size:1.05rem;
  background:rgba(126,200,227,.15); border:2px solid var(--blue);
  color:var(--blue); border-radius:50px; padding:8px 24px; cursor:pointer;
  transition:background .2s; margin-top:14px; position:relative; z-index:1;
  touch-action:manipulation;
  min-height:44px; box-sizing:border-box;
  display:inline-flex; align-items:center; justify-content:center;
}
.hint-btn:hover { background:rgba(126,200,227,.28); }

/* ── Continue button (in-flow — מעבר בשליטת השחקן) ── */
.continue-btn {
  display:none; margin-top:14px; position:relative; z-index:1;
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:10px 40px; border-radius:50px; border:none; cursor:pointer;
  color:#08210f; background:linear-gradient(135deg,#8aff8a,#52B788,#2e9e6b);
  box-shadow:0 0 22px rgba(82,183,136,.55), 0 6px 18px rgba(0,0,0,.4);
  transition:transform .15s, box-shadow .2s; touch-action:manipulation;
  animation:continuePop .4s cubic-bezier(.175,.885,.32,1.5) both;
  min-height:44px; box-sizing:border-box;
}
.continue-btn.show { display:inline-flex; align-items:center; justify-content:center; }
.continue-btn:hover { transform:scale(1.06); }
.continue-btn:active { transform:scale(.97); }
@keyframes continuePop { from{opacity:0;transform:translateY(10px) scale(.85)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ── Flag ── */
.flag-wrap {
  position:absolute; z-index:20; pointer-events:none; font-size:1.8rem;
  opacity:0; transform:scale(0) rotate(-25deg);
  transition:opacity .3s ease, transform .45s cubic-bezier(.175,.885,.32,1.5);
}
.flag-wrap.show { opacity:1; transform:scale(1) rotate(0deg); }
.flag-wrap.flipped-flag.show { opacity:1; transform:scale(1) rotate(0deg) scaleX(-1); }

/* ── Overlays ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.82);
  z-index:500; display:none; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }
.card {
  background:linear-gradient(135deg,#1A3A5C 0%,#0D2035 100%);
  border:2px solid var(--gold); border-radius:20px;
  padding:32px 40px; text-align:center;
  box-shadow:0 0 40px rgba(244,208,63,.3), 0 10px 40px rgba(0,0,0,.6);
  animation:cardIn .4s cubic-bezier(.175,.885,.32,1.5) both;
  max-width:360px;
}
@keyframes cardIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.card.red { border-color:var(--red); box-shadow:0 0 40px rgba(231,76,60,.3), 0 10px 40px rgba(0,0,0,.6); }
.card-icon { font-size:4rem; margin-bottom:12px; display:block; }
.card-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--gold); margin-bottom:8px; }
.card.red .card-title { color:var(--red); }
.card-sub { font-family:'Nunito',sans-serif; font-size:1.05rem; color:#fff; line-height:1.5; margin-bottom:20px; }
.card-btn {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  padding:11px 36px; border-radius:50px; border:none; cursor:pointer; color:white;
  background:linear-gradient(135deg,#F4D03F,#C9A227,#9A7B1A);
  box-shadow:0 0 20px rgba(244,208,63,.5); transition:transform .15s;
  touch-action:manipulation;
}
.card-btn:hover { transform:scale(1.05); }
.card-btn.red-btn {
  background:linear-gradient(135deg,#E74C3C,#C0392B);
  box-shadow:0 0 20px rgba(231,76,60,.4);
}

/* ── Turn indicator ── */
.turn-indicator {
  display:flex; align-items:center; gap:10px;
  margin-bottom:10px; position:relative; z-index:1;
}
.turn-circle {
  width:28px; height:28px; border-radius:50%;
  border:3px solid #888;
  transition:all .3s ease;
  box-shadow:0 0 8px rgba(0,0,0,.3);
}
.turn-circle.white {
  background:#fff;
  border-color:var(--gold);
  animation:turnBlinkWhite 1s ease-in-out infinite;
}
.turn-circle.black {
  background:#222;
  border-color:#aaa;
  animation:turnBlinkBlack 1s ease-in-out infinite;
}
@keyframes turnBlinkWhite {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(244,208,63,.8); transform:scale(1); }
  50%    { opacity:.25; box-shadow:none; transform:scale(.85); }
}
@keyframes turnBlinkBlack {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(200,200,200,.6); transform:scale(1); }
  50%    { opacity:.25; box-shadow:none; transform:scale(.85); }
}
/* ── Sparks ── */
.pspark {
  position:fixed; width:7px; height:7px; border-radius:50%;
  pointer-events:none; animation:psparkFly ease-out forwards; z-index:999;
}
@keyframes psparkFly {
  from{opacity:1;transform:translate(0,0) scale(1)}
  to  {opacity:0;transform:translate(var(--px),var(--py)) scale(.2)}
}

/* ── overlay buttons (קנוני, chess-ui-consistency-skill) ── */
.overlay-btns { margin-top:8px; }
.btn-next{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 34px;border-radius:14px;border:none;cursor:pointer;color:#060E1A;background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);box-shadow:0 4px 18px rgba(244,208,63,.5);transition:transform .15s,box-shadow .15s;width:100%;margin-bottom:10px;touch-action:manipulation;min-height:44px;box-sizing:border-box;display:flex;align-items:center;justify-content:center}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7)}
.btn-retry{background:transparent;color:rgba(255,255,255,.6);border:1.5px solid rgba(255,255,255,.22);border-radius:14px;padding:9px 26px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;touch-action:manipulation;transition:color .2s,border-color .2s;width:100%;min-height:44px;box-sizing:border-box;display:flex;align-items:center;justify-content:center}
.btn-retry:hover{color:white;border-color:rgba(255,255,255,.5)}




@media (max-height: 700px) {
  body { padding-top:10px; }
  .instruction { margin-bottom:8px; }
}

.board-coord-wrap {
  display:flex; flex-direction:row;
  align-items:flex-start; direction:ltr;
  max-width: min(100vw, calc(80px * 8 + 60px));
}
.coord-ranks {
  display:flex; flex-direction:column;
  width:18px; height:calc(var(--cell)*8);
  flex-shrink:0; padding-right:3px;
}
.coord-ranks span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  height:var(--cell);
  display:flex; align-items:center; justify-content:center;
}
.board-col { display:flex; flex-direction:column; }
.coord-files {
  display:flex; direction:ltr;
  width:calc(var(--cell)*8); margin-top:4px;
}
.coord-files span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  width:var(--cell); text-align:center;
}

</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="stage-badge">שלב 5 — מט ב-2 ♟</div>
  <div class="score-right">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק/הפעל צלילים">🔊</button>
  </div>
</div>

<!-- Step indicator -->
<div class="step-indicator">
  <div class="step-pill active" id="pill1">מהלך 1</div>
  <div class="step-arrow">←</div>
  <div class="step-pill" id="pill2">מהלך 2</div>
</div>

<!-- Progress dots -->
<div class="progress-row" id="progressRow"></div>

<!-- Instruction -->
<div class="instruction" id="instruction">טוען...</div>

<!-- Board -->
<!-- Board + קואורדינטות -->
<!-- Board + קואורדינטות -->
<div class="board-coord-wrap">
  <div class="coord-ranks" id="coordRanks">
    <span>8</span><span>7</span><span>6</span><span>5</span>
    <span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
  <div class="board-col">
    <div class="board-outer" id="boardOuter">
      <div class="board-grid" id="boardGrid"></div>
      <svg class="laser-svg" id="laserSvg">
        <defs>
          <marker id="arrowHead" markerWidth="6" markerHeight="6"
                  refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#F4D03F"/>
          </marker>
          <marker id="controlHead" markerWidth="6" markerHeight="6"
                  refX="5" refY="3" orient="auto">
            <path d="M0,0 L0,6 L6,3 z" fill="#FF6B35"/>
          </marker>
        </defs>
        <line class="laser-line"   id="laserLine"/>
        <line class="arrow-line"   id="arrowLine"/>
        <line class="control-line" id="controlLine"/>
      </svg>
    </div>
    <div class="coord-files" id="coordFiles">
      <span>A</span><span>B</span><span>C</span><span>D</span>
      <span>E</span><span>F</span><span>G</span><span>H</span>
    </div>
  </div>
</div>

<!-- Turn indicator -->
<div class="turn-indicator" id="turnIndicator">
  <div class="turn-circle" id="turnCircle"></div>
</div>

<!-- Hint button -->
<button class="hint-btn" id="hintBtn" onclick="showHint()">💡 רמז</button>

<!-- Continue button (in-flow — מעבר בשליטת השחקן) -->
<button class="continue-btn" id="continueBtn" onclick="onContinue()">המשיכו ⬅️</button>
<div class="no-hints-msg" id="noHintsMsg">אין רמזים נוספים 😊</div>

<!-- Wrong move overlay -->
<div class="overlay" id="wrongOverlay">
  <div class="card red">
    <span class="card-icon" id="wrongIcon">🤔</span>
    <button class="card-btn red-btn" onclick="closeWrongAndReset()">נסו שוב 💪</button>
  </div>
</div>



<script>
// ════════════════════════════════════════════
//  CELL SIZE
// ════════════════════════════════════════════
let C = 64;
function computeCell() {
  const newC = Math.max(Math.min(Math.floor((window.innerWidth - 56) / 8), 64), 40);
  if (newC !== C) { C = newC; document.documentElement.style.setProperty('--cell', C + 'px'); }
}

// ════════════════════════════════════════════
//  MUTE
// ════════════════════════════════════════════
let muted = false;
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}

// ════════════════════════════════════════════
//  STARS — before buildGrid for validator
// ════════════════════════════════════════════
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;`;
  document.body.appendChild(s);
}

// ── Black SVGs ──

      'צריח D5 → D8 — שולט על כל שורה 8. מט!',
    ],
  },
];

// מדרג קושי: id:10 (13 כלים, רגיל) ו-id:1 (11 כלים, הפוך) הם הדלילים והנקיים ביותר.
// ממקמים אותם בראש — id:10 ראשון (אוריינטציה רגילה = פתיחה רכה למט-ב-2). מיון יציב — השאר בסדר המקורי.
const EASY_IDS = [10, 1];
SCENARIOS.sort((a, b) => {
  const ra = EASY_IDS.includes(a.id) ? EASY_IDS.indexOf(a.id) : 99;
  const rb = EASY_IDS.includes(b.id) ? EASY_IDS.indexOf(b.id) : 99;
  return ra - rb;
});

const ORIGINAL_SCENARIOS = JSON.parse(JSON.stringify(SCENARIOS));

// מדרג קושי: 2 הקלים (אינדקס 0–1, id 10 ו-1) נעולים ראשונים; מערבבים את 8 המתקדמים (17–31 כלים).
const LOCKED_EASY = 2;
// [E] ערבוב חלקי (redteam V1+V5) — מאינדקס LOCKED_EASY ואילך, שני המערכים באותה תמורה
function shuffleScenarios() {
  for (let i = SCENARIOS.length - 1; i > LOCKED_EASY; i--) {
    const j = LOCKED_EASY + Math.floor(Math.random() * (i - LOCKED_EASY + 1));
    [SCENARIOS[i], SCENARIOS[j]] = [SCENARIOS[j], SCENARIOS[i]];
    [ORIGINAL_SCENARIOS[i], ORIGINAL_SCENARIOS[j]] = [ORIGINAL_SCENARIOS[j], ORIGINAL_SCENARIOS[i]];
  }
}

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let scenIdx     = 0;
let pieces      = {};
let selected    = null;
let locked      = false;
let hintLevel   = 0;
let mistakes    = 0;
let hintsUsed   = 0;
let currentStep = 1;   // 1 or 2
let audioCtx    = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// ════════════════════════════════════════════
//  BOARD BUILD
// ════════════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r + c) % 2 === 0 ? 'l' : 'd');
      sq.id = `sq-${r}-${c}`;
      sq.addEventListener('click', () => onSqClick(r, c));
      grid.appendChild(sq);
    }
  }
}

// ════════════════════════════════════════════
//  PIECES
// ════════════════════════════════════════════
function renderPieceInner(p, sc) {
  const inner = document.createElement('span');
  const scale = p.scale || 1;

  if (!p.white && BLACK_SVG[p.sym]) {
    const img = document.createElement('img');
    img.src = 'data:image/svg+xml,' + encodeURIComponent(BLACK_SVG[p.sym]);
    const baseSz = p.sym === '♟' ? 48 : (p.sym === '♞' || p.sym === '♜') ? 95 : 90;
    img.style.cssText = `width:${Math.round(baseSz*scale)}%;height:${Math.round(baseSz*scale)}%;object-fit:contain;display:block;margin:auto;`;
    img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
    if (sc && sc.flipped) img.style.transform = 'rotate(180deg)';
    inner.appendChild(img);

  } else if (p.white && WHITE_SVG[p.sym]) {
    const img = document.createElement('img');
    img.src = 'data:image/svg+xml,' + encodeURIComponent(WHITE_SVG[p.sym]);
    const baseSzW = p.sym === '♙' ? 40 : 90;
    img.style.cssText = `width:${Math.round(baseSzW*scale)}%;height:${Math.round(baseSzW*scale)}%;object-fit:contain;display:block;margin:auto;`;
    if (p.sym === '♙') img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
    if (sc && sc.flipped) img.style.transform = 'rotate(180deg)';
    inner.appendChild(img);

  } else {
    inner.textContent = p.sym;
    inner.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;';
    if (sc && sc.flipped) { inner.style.display='inline-block'; inner.style.transform='rotate(180deg)'; }
  }
  return inner;
}

function placePieces(sc) {
  document.querySelectorAll('.piece').forEach(e => e.remove());
  document.querySelectorAll('.flag-wrap').forEach(e => e.remove());
  pieces = {};

  sc.pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.id = 'piece-' + p.id;
    el.style.left = p.col * C + 'px';
    el.style.top  = p.row * C + 'px';
    el.appendChild(renderPieceInner(p, sc));
    el.addEventListener('click', (e) => { e.stopPropagation(); onPieceClick(p.id); });
    document.getElementById('boardOuter').appendChild(el);
    pieces[p.id] = { ...p, el };
  });

  // Only step1 piece is clickable on load
  setActiveMoveable(sc.step1.moveId);
}

function setActiveMoveable(id) {
  // Remove clickable from all pieces
  Object.values(pieces).forEach(p => {
    p.el.classList.remove('clickable');
    p.el.style.cursor = 'default';
    p.moveable = false;
  });
  // Activate only the given piece
  if (pieces[id]) {
    pieces[id].moveable = true;
    pieces[id].el.classList.add('clickable');
    pieces[id].el.style.cursor = 'pointer';
  }
}

// ════════════════════════════════════════════
//  LOAD SCENARIO
// ════════════════════════════════════════════
function loadScenario(idx) {
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));   // [E] שחזור מהעותק הקפוא
  const sc = SCENARIOS[idx];
  locked      = false;
  selected    = null;
  hintLevel   = 0;
  currentStep = 1;
  document.getElementById('continueBtn').classList.remove('show');

  document.getElementById('instruction').textContent = sc.instruction;
  document.getElementById('instruction').style.animation = 'none';
  void document.getElementById('instruction').offsetWidth;
  document.getElementById('instruction').style.animation = '';
  document.getElementById('hintBtn').textContent = '💡 רמז';
  document.getElementById('hintBtn').style.display = 'block';

  // Flip board + update coordinate labels
  document.getElementById('boardOuter').classList.toggle('flipped', !!sc.flipped);
  updateCoordLabels(!!sc.flipped);

  // Reset step pills
  document.getElementById('pill1').className = 'step-pill active';
  document.getElementById('pill2').className = 'step-pill';

  placePieces(sc);
  resetLaser();
  updateProgress(idx);
  clearHintVisuals();
  updateTurnIndicator(sc);
}


function updateCoordLabels(flipped) {
  const rankEl = document.getElementById('coordRanks');
  const fileEl = document.getElementById('coordFiles');
  const ranks  = flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
  const files  = flipped ? ['H','G','F','E','D','C','B','A'] : ['A','B','C','D','E','F','G','H'];
  rankEl.innerHTML = ranks.map(r => `<span>${r}</span>`).join('');
  fileEl.innerHTML = files.map(f => `<span>${f}</span>`).join('');
}

function updateTurnIndicator(sc) {
  const moverPiece = sc.pieces.find(p => p.id === sc.step1.moveId);
  const isWhite = moverPiece && moverPiece.white;
  const circle = document.getElementById('turnCircle');
  circle.className = 'turn-circle ' + (isWhite ? 'white' : 'black');
}

function updateProgress(idx) {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  SCENARIOS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot ' + (i < idx ? 'done' : i === idx ? 'current' : 'pending');
    row.appendChild(d);
  });
}

// ════════════════════════════════════════════
//  CLICK HANDLING
// ════════════════════════════════════════════
function onPieceClick(id) {
  if (locked) return;
  const sc = SCENARIOS[scenIdx];
  const p  = pieces[id];

  if (p.moveable) {
    if (selected) pieces[selected].el.classList.remove('selected');
    selected = id;
    p.el.classList.remove('clickable');
    p.el.classList.add('selected');
  } else if (selected) {
    onSqClick(p.row, p.col);
  }
}

function onSqClick(r, c) {
  if (locked || !selected) return;
  const sc = SCENARIOS[scenIdx];

  if (currentStep === 1) {
    const t = sc.step1.target;
    if (r === t.row && c === t.col) {
      handleStep1Success(sc, r, c);
    } else {
      handleWrongStep1(sc);
    }
  } else {
    const t = sc.step2.target;
    if (r === t.row && c === t.col) {
      handleStep2Success(sc, r, c);
    } else {
      handleWrongStep2(sc);
    }
  }
}

// ════════════════════════════════════════════
//  WRONG MOVES
// ════════════════════════════════════════════
function handleWrongStep1(sc) {
  mistakes++;
  pieces[selected].el.classList.add('shake');
  setTimeout(() => pieces[selected].el.classList.remove('shake'), 400);
  playFail();
  document.getElementById('wrongIcon').textContent  = '🤔';
  setTimeout(() => document.getElementById('wrongOverlay').classList.add('show'), 1500);
}

function handleWrongStep2(sc) {
  mistakes++;
  pieces[selected].el.classList.add('shake');
  setTimeout(() => pieces[selected].el.classList.remove('shake'), 400);
  playFail();
  document.getElementById('wrongIcon').textContent  = '🤔';
  setTimeout(() => document.getElementById('wrongOverlay').classList.add('show'), 1500);
}

function closeWrongAndReset() {
  document.getElementById('wrongOverlay').classList.remove('show');
  loadScenario(scenIdx);
}

// ════════════════════════════════════════════
//  STEP 1 SUCCESS
// ════════════════════════════════════════════
function handleStep1Success(sc, r, c) {
  locked = true;
  const mover  = pieces[sc.step1.moveId];
  const target = sc.step1.target;

  mover.el.classList.remove('selected','clickable','hint-piece');

  // Remove captured piece silently before animation starts
  let step1CapRow = null, step1CapCol = null;
  if (sc.step1.captureId && pieces[sc.step1.captureId]) {
    const cap = pieces[sc.step1.captureId];
    step1CapRow = cap.row; step1CapCol = cap.col;
    cap.el.remove();
    delete pieces[sc.step1.captureId];
  }

  // Animate piece to target
  mover.el.style.left = target.col * C + 'px';
  mover.el.style.top  = target.row * C + 'px';
  mover.col = target.col;
  mover.row = target.row;

  setTimeout(() => {
    mover.el.classList.add('arrive');
    // Explosion fires exactly when piece arrives at target
    if (step1CapRow !== null) {
      showExplosion(step1CapRow, step1CapCol, true);
      playCapture();
    } else {
      playSuccess();
    }

    if (sc.step1.givesCheck) {
      // Show check laser after 380ms
      setTimeout(() => {
        const checker = pieces[sc.step1.checkerId];
        const checked = pieces[sc.step1.checkedId];
        fireLaser(
          checker.col * C + C/2, checker.row * C + C/2,
          checked.col  * C + C/2, checked.row  * C + C/2
        );

        // After 1500ms — animate enemy response
        setTimeout(() => {
          resetLaser();
          animateEnemyResponse(sc);
        }, 1500);
      }, 380);
    } else {
      // No check — enemy responds immediately
      setTimeout(() => animateEnemyResponse(sc), 380);
    }
  }, 380);
}

// ════════════════════════════════════════════
//  ENEMY RESPONSE
// ════════════════════════════════════════════
function animateEnemyResponse(sc) {
  const er = sc.enemyResponse;
  const p  = pieces[er.moveId];
  if (!p) { activateStep2(sc); return; }

  // Remove piece captured by enemy response (if any)
  if (er.captureId && pieces[er.captureId]) {
    pieces[er.captureId].el.remove();
    delete pieces[er.captureId];
  }

  p.el.style.left = er.toCol * C + 'px';
  p.el.style.top  = er.toRow * C + 'px';
  p.col = er.toCol;
  p.row = er.toRow;

  setTimeout(() => {
    activateStep2(sc);
  }, 450);
}

// ════════════════════════════════════════════
//  ACTIVATE STEP 2
// ════════════════════════════════════════════
function activateStep2(sc) {
  currentStep = 2;
  locked = false;
  selected = null;

  // Update step pills
  document.getElementById('pill1').className = 'step-pill done';
  document.getElementById('pill2').className = 'step-pill active';

  // Activate step2 piece — cursor only, no glow (player should figure it out)
  setActiveMoveable(sc.step2.moveId);

  // Update instruction
  document.getElementById('instruction').textContent = 'עכשיו — מט! 🏁';
}

// ════════════════════════════════════════════
//  STEP 2 SUCCESS — CHECKMATE
// ════════════════════════════════════════════
function handleStep2Success(sc, r, c) {
  locked = true;
  const mover = pieces[sc.step2.moveId];
  const mated = pieces[sc.step2.matedId];

  mover.el.classList.remove('selected','clickable','hint-piece');

  // Remove captured piece silently before animation
  let step2CapRow = null, step2CapCol = null;
  if (sc.step2.captureId && pieces[sc.step2.captureId]) {
    const cap = pieces[sc.step2.captureId];
    step2CapRow = cap.row; step2CapCol = cap.col;
    cap.el.remove();
    delete pieces[sc.step2.captureId];
  }

  // Animate
  mover.el.style.left = sc.step2.target.col * C + 'px';
  mover.el.style.top  = sc.step2.target.row * C + 'px';
  mover.col = sc.step2.target.col;
  mover.row = sc.step2.target.row;

  setTimeout(() => {
    mover.el.classList.add('arrive');
    // Full explosion fires exactly when piece arrives
    if (step2CapRow !== null) {
      showExplosion(step2CapRow, step2CapCol, false);
      playCapture();
    } else {
      playSuccess();
    }
    spawnConfetti();

    setTimeout(() => {
      // Permanent checkmate laser
      fireLaser(
        mover.col * C + C/2, mover.row * C + C/2,
        mated.col  * C + C/2, mated.row  * C + C/2
      );
      showFlag(mated.col, mated.row);

      // Knight highlight — show control arrow if defined
      if (sc.knightHighlight) {
        setTimeout(() => fireControlLine(sc), 300);
      }

      // אחרי step2 — auto-advance 2.5 שניות
      setTimeout(() => showContinueBtn(), 800);
    }, 400);
  }, 380);
}

function showContinueBtn() {
  if (scenIdx === SCENARIOS.length - 1) {
    setTimeout(()=>{
      playWin();
      const perfect = (mistakes <= 1) && (hintsUsed === 0);   // 0–1 טעויות = 3⭐ | 2+ טעויות או רמז = 2⭐
      const stars = perfect ? '⭐⭐⭐' : '⭐⭐';
      document.getElementById('winStars').textContent = stars;
      document.getElementById('btnRetry').textContent =
        perfect ? 'שחקו שוב 🎮' : 'נסו שוב 🔄';
      CheckmateState.save('stage5', perfect);
      document.getElementById('winOverlay').classList.add('show');
    }, 600);
  } else {
    // מעבר בשליטת השחקן — כפתור "המשיכו" במקום מעבר אוטומטי
    document.getElementById('hintBtn').style.display = 'none';
    const btn = document.getElementById('continueBtn');
    btn.style.animation = 'none';
    btn.getBoundingClientRect();
    btn.style.animation = '';
    btn.classList.add('show');
  }
}

function onContinue() {
  document.getElementById('continueBtn').classList.remove('show');
  scenIdx++;
  loadScenario(scenIdx);
}

// ════════════════════════════════════════════
//  STATE — v2.1 (מאומת מול bishop הקנוני). תבנית זהה לכל שלבי מודול המט.
//  perfect = עד טעות אחת וללא רמזים. 2+ טעויות או כל רמז → 2⭐.
// ════════════════════════════════════════════
const CheckmateState = {
  MODULE_KEY:'chess_checkmate',
  // STAGE_KEYS + PERFECT_THRESHOLD אינרטיים בשלב ביניים (getModuleStars נקרא רק בשלב
  //    האחרון וב-index.html) — אך נכונים כתבנית. החלטת ברוך: 3⭐ = 6/6 שלבים מושלמים.
  //    ⚠️ חובה ליישם זהה בשלב האחרון, ולעדכן ב-index.html: starThreshold 5→6.
  STAGE_KEYS:['stage1','stage2','stage3','stage4','stage5','stage6'],
  PERFECT_THRESHOLD:6,
  save(stageKey,perfect){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev=d[stageKey]||{};
      const bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;  // שיא — OR, לא יורד (גם מיגרציה מ-v2)
      d[stageKey]={done:true,perfect,lastPerfect:perfect,bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  getModuleStars(){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const done=this.STAGE_KEYS.filter(k=>d[k]?.done).length;
      if(done<this.STAGE_KEYS.length)return{best:0,last:0};
      const bestP=this.STAGE_KEYS.filter(k=>(d[k]?.bestPerfect??d[k]?.perfect)).length;
      const lastP=this.STAGE_KEYS.filter(k=>(d[k]?.lastPerfect??d[k]?.perfect)).length;
      const toStars=p=>p>=this.PERFECT_THRESHOLD?3:2;
      return{best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return{best:0,last:0};}
  }
};

// ════════════════════════════════════════════
//  LASER
// ════════════════════════════════════════════
function fireLaser(x1,y1,x2,y2) {
  const line = document.getElementById('laserLine');
  const len  = Math.hypot(x2-x1, y2-y1);
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('stroke-dasharray',len);
  line.setAttribute('stroke-dashoffset',len);
  line.style.opacity = '1';
  line.style.transition = 'stroke-dashoffset .3s ease';
  setTimeout(() => line.setAttribute('stroke-dashoffset','0'), 20);
}

function fireControlLine(sc) {
  const kh = sc.knightHighlight;
  const knight = pieces[kh.fromId];
  if (!knight) return;
  const line = document.getElementById('controlLine');
  line.setAttribute('x1', knight.col * C + C/2);
  line.setAttribute('y1', knight.row * C + C/2);
  line.setAttribute('x2', kh.toCol * C + C/2);
  line.setAttribute('y2', kh.toRow * C + C/2);
  line.classList.add('show');
}

function resetLaser() {
  const line = document.getElementById('laserLine');
  line.style.transition = 'none';
  line.style.opacity = '0';
  line.setAttribute('stroke-dashoffset','9999');
  const arrow = document.getElementById('arrowLine');
  arrow.classList.remove('show');
  arrow.style.opacity = '0';
  document.getElementById('controlLine').classList.remove('show');
}

// ════════════════════════════════════════════
//  FLAG
// ════════════════════════════════════════════
function showFlag(col, row) {
  const flipped = SCENARIOS[scenIdx].flipped;
  const flag = document.createElement('div');
  flag.className = 'flag-wrap';

  // Custom SVG flag — counter-rotated on flipped boards
  const rotate = flipped ? 'transform="rotate(180,14,18)"' : '';
  flag.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <g ${rotate}>
      <rect x="12" y="2" width="2.5" height="33" rx="1" fill="#888"/>
      <polygon points="14.5,3 26,10 14.5,17" fill="white" stroke="#aaa" stroke-width="0.8"/>
    </g>
  </svg>`;

  flag.style.left = flipped ? (col*C - C*0.08)+'px' : (col*C + C*0.58)+'px';
  flag.style.top  = flipped ? (row*C + C*0.78)+'px' : (row*C - C*0.28)+'px';
  document.getElementById('boardOuter').appendChild(flag);
  flag.getBoundingClientRect();
  flag.classList.add('show');
}

// ════════════════════════════════════════════
//  OVERLAYS
// ════════════════════════════════════════════

function advanceScenario() {
    scenIdx++;
  if (scenIdx < SCENARIOS.length) loadScenario(scenIdx);
}

function fullReset() {
  // ריענון מלא — לוח נקי ב-100% (כלל ברזל chess-state). התקדמות נשמרה בעליית מסך הניצחון;
  // הערבוב משוחזר אוטומטית ע"י shuffleScenarios() ב-init.
  location.reload();
}

// ════════════════════════════════════════════
//  HINTS
// ════════════════════════════════════════════
function clearHintVisuals() {
  hintLevel = 0;
  const btn = document.getElementById('hintBtn');
  if (btn) { btn.textContent = '💡 רמז'; btn.disabled = false; btn.style.opacity = ''; }
  document.querySelectorAll('.hint-piece').forEach(e => e.classList.remove('hint-piece'));
  document.querySelectorAll('.hint-sq').forEach(e => e.classList.remove('hint-sq'));
  const arrow = document.getElementById('arrowLine');
  arrow.classList.remove('show');
  arrow.style.opacity = '0';
  document.getElementById('noHintsMsg').classList.remove('show');
}

function showHint() {
  const sc  = SCENARIOS[scenIdx];
  const btn = document.getElementById('hintBtn');
  const activeId = currentStep === 1 ? sc.step1.moveId : sc.step2.moveId;
  const targetSq = currentStep === 1 ? sc.step1.target : sc.step2.target;

  hintsUsed++;

  if (hintLevel === 0) {
    clearHintVisuals();
    pieces[activeId]?.el?.classList.add('hint-piece');
    hintLevel = 1;
    btn.textContent = '💡 רמז נוסף';

  } else if (hintLevel === 1) {
    const sq = document.getElementById(`sq-${targetSq.row}-${targetSq.col}`);
    if (sq) {
      sq.classList.add('hint-sq');
      setTimeout(() => sq.classList.remove('hint-sq'), 1500);
    }
    const mover = pieces[activeId];
    const arrow = document.getElementById('arrowLine');
    if (mover) {
      arrow.setAttribute('x1', mover.col * C + C/2);
      arrow.setAttribute('y1', mover.row * C + C/2);
      arrow.setAttribute('x2', targetSq.col * C + C/2);
      arrow.setAttribute('y2', targetSq.row * C + C/2);
      arrow.classList.add('show');
    }
    hintLevel = 2;
    btn.textContent = 'אין יותר רמזים 😊';
    btn.disabled = true;
    btn.style.opacity = '0.45';
  }
}

function showExplosion(row, col, small) {
  const SZ = C;
  const boardOuter = document.getElementById('boardOuter');
  const W = SZ * 8, H = SZ * 8;
  const cx = col * SZ + SZ/2;
  const cy = row * SZ + SZ/2;
  const count = small ? 20 : 45;
  const speedMult = small ? 0.6 : 1;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const ctx2 = canvas.getContext('2d');

  const COLORS = ['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts = Array.from({length:count}, (_, i) => {
    const a = (i/count)*Math.PI*2 + Math.random()*0.4;
    const spd = (3.5 + Math.random()*9) * speedMult;
    return { x:cx, y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-(1.5+Math.random()),
             r:1.5+Math.random()*5, color:COLORS[Math.floor(Math.random()*COLORS.length)],
             alpha:1, decay:0.018+Math.random()*0.022, gravity:0.18+Math.random()*0.12 };
  });

  let frame = 0;
  function draw() {
    ctx2.clearRect(0, 0, W, H);
    if (frame < 8) {
      const t=frame/7, r=SZ*0.9*t;
      const g=ctx2.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`); g.addColorStop(0.35,`rgba(255,230,80,${(1-t)*0.9})`);
      g.addColorStop(0.7,`rgba(255,100,0,${(1-t)*0.5})`); g.addColorStop(1,'rgba(200,30,0,0)');
      ctx2.fillStyle=g; ctx2.beginPath(); ctx2.arc(cx,cy,Math.max(r,1),0,Math.PI*2); ctx2.fill();
    }
    if (frame>=1 && frame<22) {
      const t=(frame-1)/21, r=SZ*0.75*t, a=1-t;
      const g=ctx2.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,200,${a})`); g.addColorStop(0.2,`rgba(255,180,0,${a*0.95})`);
      g.addColorStop(0.55,`rgba(210,50,0,${a*0.7})`); g.addColorStop(0.85,`rgba(100,15,0,${a*0.4})`);
      g.addColorStop(1,'rgba(40,5,0,0)');
      ctx2.fillStyle=g; ctx2.beginPath(); ctx2.arc(cx,cy,Math.max(r,1),0,Math.PI*2); ctx2.fill();
    }
    if (frame>=3 && frame<14) {
      const t=(frame-3)/11;
      ctx2.beginPath(); ctx2.arc(cx,cy,SZ*0.5*t+SZ*0.15,0,Math.PI*2);
      ctx2.strokeStyle=`rgba(255,180,50,${0.6*(1-t)})`; ctx2.lineWidth=3*(1-t); ctx2.stroke();
    }
    ctx2.save();
    parts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.95;
      p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0) return;
      ctx2.globalAlpha=p.alpha; ctx2.beginPath();
      ctx2.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      ctx2.fillStyle=p.color; ctx2.fill();
    });
    ctx2.restore();
    frame++;
    if (frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function playCapture() {
  if (muted) return;
  try {
    const ctx2 = getCtx();
    const n = ctx2.currentTime;
    const thud=ctx2.createOscillator(), thudG=ctx2.createGain();
    thud.connect(thudG); thudG.connect(ctx2.destination);
    thud.type='sine'; thud.frequency.setValueAtTime(90,n); thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n); thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n); thud.stop(n+.6);
    const punch=ctx2.createOscillator(), punchG=ctx2.createGain();
    punch.connect(punchG); punchG.connect(ctx2.destination);
    punch.type='sine'; punch.frequency.setValueAtTime(200,n); punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n); punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n); punch.stop(n+.22);
    const bufSz=Math.floor(ctx2.sampleRate*.35), nBuf=ctx2.createBuffer(1,bufSz,ctx2.sampleRate);
    const nd=nBuf.getChannelData(0); for(let i=0;i<bufSz;i++) nd[i]=Math.random()*2-1;
    const nSrc=ctx2.createBufferSource(); nSrc.buffer=nBuf;
    const nFilt=ctx2.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=500; nFilt.Q.value=.5;
    const nGain=ctx2.createGain();
    nGain.gain.setValueAtTime(.55,n); nGain.gain.exponentialRampToValueAtTime(.001,n+.32);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(ctx2.destination);
    nSrc.start(n); nSrc.stop(n+.35);
    const crack=ctx2.createOscillator(), crackG=ctx2.createGain();
    crack.connect(crackG); crackG.connect(ctx2.destination);
    crack.type='sawtooth'; crack.frequency.value=900;
    crackG.gain.setValueAtTime(.5,n); crackG.gain.exponentialRampToValueAtTime(.001,n+.05);
    crack.start(n); crack.stop(n+.06);
  } catch(e) {}
}

function spawnConfetti() {
  const colors = ['#F4D03F','#7EC8E3','#52B788','#FF6B35','#E74C3C','#fff'];
  const rect = document.getElementById('boardOuter').getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  for (let i = 0; i < 22; i++) {
    const sp = document.createElement('div');
    sp.className = 'pspark';
    const a = Math.random()*Math.PI*2, d = 80+Math.random()*120;
    sp.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};animation-duration:${.6+Math.random()*.5}s;`;
    sp.style.setProperty('--px', Math.cos(a)*d+'px');
    sp.style.setProperty('--py', Math.sin(a)*d+'px');
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1100);
  }
}
