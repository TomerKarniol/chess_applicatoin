<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שחמט — מט שורה אחורית</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #F4D03F;
  --gold-dark:  #C9A227;
  --gold-deep:  #9A7B1A;
  --blue:       #7EC8E3;
  --red:        #E74C3C;
  --green:      #52B788;
  --orange:     #FF6B35;
  --bg1:        #162D4A;
  --bg2:        #0C1E30;
  --bg3:        #060E1A;
  --cell: 64px; /* fallback — overridden immediately by computeCell() in JS */
  --cell-light: #C9E4F5;
  --cell-dark:  #4A7FA5;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: radial-gradient(ellipse at 50% 0%, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  min-height:100vh; font-family:'Nunito',sans-serif; font-weight:700;
  color:white; user-select:none; overflow-x:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
  display:flex; flex-direction:column; align-items:center;
  padding:16px 12px calc(28px + env(safe-area-inset-bottom));
  overflow-y:auto;
}
.star-dot { position:fixed; border-radius:50%; background:white; pointer-events:none;
  animation:twinkle ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* ── Header ── */
.hdr {
  width:100%; max-width:580px; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:14px; position:relative; z-index:1;
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:1rem; color:var(--blue);
  border:2px solid var(--blue); border-radius:50px; padding:4px 14px;
  background:rgba(126,200,227,.12);
}
.score-right { display:flex; align-items:center; gap:8px; }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
.win-stars {
  font-size:1.9rem; letter-spacing:4px;
  text-shadow:0 0 14px rgba(244,208,63,.8);
  margin:6px 0 12px;
}

/* ── Progress ── */
.progress-row {
  display:flex; gap:8px; margin-bottom:14px; position:relative; z-index:1;
}
.prog-dot {
  width:12px; height:12px; border-radius:50%; border:2px solid #555;
  transition:all .3s ease;
}
.prog-dot.done    { background:var(--green); border-color:var(--green); }
.prog-dot.current { background:var(--gold);  border-color:var(--gold); box-shadow:0 0 8px var(--gold); }
.prog-dot.pending { background:transparent; border-color:#444; }

/* ── Instruction ── */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.32rem; color:white;
  text-align:center; margin-bottom:12px; min-height:1.6rem;
  position:relative; z-index:1; direction:rtl;
  animation:sp-in .4s ease both;
}
@keyframes sp-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── Board ── */

.board-outer {
  position:relative;
  box-sizing:content-box;
  width:calc(var(--cell)*8); height:calc(var(--cell)*8);
  border:3px solid var(--gold-dark);
  border-radius:5px;
  box-shadow:0 6px 28px rgba(0,0,0,.6), 0 0 22px rgba(244,208,63,.25);
  overflow:visible;
}

.board-outer.flipped {
  transform: rotate(180deg);
}
.board-grid {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr; overflow:hidden; border-radius:2px;
}
.sq { width:var(--cell); height:var(--cell); cursor:pointer; position:relative; touch-action:manipulation; }
.sq.l { background:var(--cell-light); }
.sq.d { background:var(--cell-dark); }
.sq:hover { filter:brightness(1.12); }
.sq.highlight-target {
  background:rgba(82,183,136,.55) !important;
  animation:targetPulse 1s ease-in-out infinite alternate;
}
@keyframes targetPulse { from{filter:brightness(1)} to{filter:brightness(1.2)} }
.sq.check-sq { background:rgba(231,76,60,.5) !important; }
.sq.wrong-flash { animation:wrongFlash .22s ease 2; }
@keyframes wrongFlash { 0%,100%{background-color:inherit} 50%{background:rgba(231,76,60,.65)!important} }

/* ── Floating pieces ── */
.piece {
  position:absolute;
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  z-index:5; cursor:pointer;
  transition:left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1);
  pointer-events:all;
}
.piece.selected {
  filter:drop-shadow(0 0 10px var(--gold)) drop-shadow(0 0 20px rgba(244,208,63,.6));
  animation:selectedPulse 1s ease-in-out infinite;
}
@keyframes selectedPulse {
  0%,100%{ filter:drop-shadow(0 0 8px var(--gold)) drop-shadow(0 0 18px rgba(244,208,63,.5)); }
  50%    { filter:drop-shadow(0 0 18px var(--gold)) drop-shadow(0 0 32px rgba(244,208,63,.8)); transform:scale(1.08); }
}
.piece.moveable-idle {
  animation:moveablePulse 2s ease-in-out infinite;
}
@keyframes moveablePulse {
  0%,100%{ filter:drop-shadow(0 0 6px rgba(244,208,63,.5)); }
  50%    { filter:drop-shadow(0 0 14px rgba(244,208,63,.9)); }
}
.piece.arrive { animation:pieceArrive .6s ease forwards; }
@keyframes pieceArrive {
  0%  { filter:drop-shadow(0 0 4px rgba(0,0,0,.5)); }
  40% { filter:drop-shadow(0 0 18px var(--gold)) drop-shadow(0 0 30px rgba(244,208,63,.7)); }
  100%{ filter:drop-shadow(0 0 4px rgba(0,0,0,.5)); }
}
.piece.shake { animation:shake .35s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
}

/* ── Laser SVG ── */
.laser-svg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10; overflow:visible;
}
.laser-line {
  stroke:var(--red); stroke-width:4; stroke-linecap:round; fill:none; opacity:0;
  filter:drop-shadow(0 0 6px rgba(231,76,60,1)) drop-shadow(0 0 14px rgba(231,76,60,.6));
}
/* ── Flag ── */
.flag-wrap {
  position:absolute; z-index:20; pointer-events:none; font-size:1.8rem;
  opacity:0; transform:scale(0) rotate(-25deg);
  transition:opacity .3s ease, transform .45s cubic-bezier(.175,.885,.32,1.5);
}
.flag-wrap.show { opacity:1; transform:scale(1) rotate(0deg); }
.flag-wrap.flipped-flag.show { opacity:1; transform:scale(1) rotate(0deg) scaleX(-1); }

/* ── Star hint on target square ── */
.sq.hint-sq::after {
  content: '⭐';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--cell) * 0.52);
  animation: starPop .4s cubic-bezier(.175,.885,.32,1.5) both;
  pointer-events: none;
  z-index: 15;
}
@keyframes starPop {
  from { transform: scale(0) rotate(-30deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}

/* ── Arrow hint ── */
.arrow-line {
  stroke: var(--gold);
  stroke-width: 3.5;
  stroke-linecap: round;
  fill: none;
  opacity: 0;
  marker-end: url(#arrowHead);
  filter: drop-shadow(0 0 6px rgba(244,208,63,.9)) drop-shadow(0 0 14px rgba(244,208,63,.5));
  transition: opacity .3s ease;
}
.arrow-line.show { opacity: 1; }

/* ── Piece hint glow ── */
@keyframes hintGlow {
  0%,100% { filter: drop-shadow(0 0 4px rgba(244,208,63,.4)); }
  50%     { filter: drop-shadow(0 0 20px rgba(244,208,63,1)) drop-shadow(0 0 35px rgba(244,208,63,.7)); transform: scale(1.12); }
}
.piece.hint-piece { animation: hintGlow 0.7s ease-in-out infinite; }

/* ── Hint button (below board) ── */
.hint-btn {
  font-family:'Fredoka One',cursive; font-size:1.05rem;
  background:rgba(126,200,227,.15); border:2px solid var(--blue);
  color:var(--blue); border-radius:50px; padding:8px 24px; cursor:pointer;
  touch-action:manipulation; transition:background .2s; margin-top:14px; position:relative; z-index:1;
  min-height:44px; box-sizing:border-box;
  display:inline-flex; align-items:center; justify-content:center;
}
.hint-btn:hover { background:rgba(126,200,227,.28); }

/* ── Continue button (in-flow — מופיע במקום כפתור הרמז אחרי מט, מעבר בשליטת השחקן) ── */
.continue-btn {
  display:none; margin-top:14px; position:relative; z-index:1;
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:10px 40px; border-radius:50px; border:none; cursor:pointer;
  color:#08210f; background:linear-gradient(135deg,#8aff8a,#52B788,#2e9e6b);
  box-shadow:0 0 22px rgba(82,183,136,.55), 0 6px 18px rgba(0,0,0,.4);
  transition:transform .15s, box-shadow .2s; touch-action:manipulation;
  animation:continuePop .4s cubic-bezier(.175,.885,.32,1.5) both;
  min-height:44px; box-sizing:border-box;
}
.continue-btn.show { display:inline-flex; align-items:center; justify-content:center; }
.continue-btn:hover { transform:scale(1.06); }
.continue-btn:active { transform:scale(.97); }
@keyframes continuePop { from{opacity:0;transform:translateY(10px) scale(.85)} to{opacity:1;transform:translateY(0) scale(1)} }

/* ── Overlays ── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.82);
  z-index:500; display:none; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }
.card {
  background:linear-gradient(135deg,#1A3A5C 0%,#0D2035 100%);
  border:2px solid var(--gold); border-radius:20px;
  padding:32px 40px; text-align:center;
  box-shadow:0 0 40px rgba(244,208,63,.3), 0 10px 40px rgba(0,0,0,.6);
  animation:cardIn .4s cubic-bezier(.175,.885,.32,1.5) both;
  max-width:360px;
}
@keyframes cardIn { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.card.red { border-color:var(--red); box-shadow:0 0 40px rgba(231,76,60,.3), 0 10px 40px rgba(0,0,0,.6); }
.card-icon { font-size:4rem; margin-bottom:12px; display:block; }
.card-title {
  font-family:'Fredoka One',cursive; font-size:2rem;
  color:var(--gold); margin-bottom:8px;
}
.card.red .card-title { color:var(--red); }
.card-sub { font-family:'Nunito',sans-serif; font-size:1.05rem; color:#fff; line-height:1.5; margin-bottom:20px; }
.card-btn {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  padding:11px 36px; border-radius:50px; border:none; cursor:pointer; color:white;
  background:linear-gradient(135deg,#F4D03F,#C9A227,#9A7B1A);
  box-shadow:0 0 20px rgba(244,208,63,.5);
  transition:transform .15s; touch-action:manipulation;
}
.card-btn:hover { transform:scale(1.05); }
.card-btn.red-btn {
  background:linear-gradient(135deg,#E74C3C,#C0392B);
  box-shadow:0 0 20px rgba(231,76,60,.4);
}

/* ── Win overlay ── */
#winOverlay .card-title { font-size:2.2rem; }

/* ── Score popup ── */
/* ── Orange guard arrows ── */
.control-line {
  stroke:var(--orange); stroke-width:3; stroke-linecap:round; fill:none; opacity:0;
  marker-end:url(#controlHead);
  filter:drop-shadow(0 0 5px rgba(255,107,53,.9));
  transition:opacity .35s ease;
}
.control-line.show { opacity:1; }

/* ── Turn indicator ── */
.turn-indicator {
  display:flex; align-items:center; gap:8px;
  margin-top:12px; position:relative; z-index:1;
}
.turn-circle {
  width:20px; height:20px; border-radius:50%; border:2px solid #555;
  transition:all .3s ease;
}
.turn-circle.white {
  background:#fff; border-color:var(--gold);
  animation:turnBlinkWhite 1s ease-in-out infinite;
}
.turn-circle.black {
  background:#222; border-color:#aaa;
  animation:turnBlinkBlack 1s ease-in-out infinite;
}
@keyframes turnBlinkWhite {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(244,208,63,.8); transform:scale(1); }
  50%    { opacity:.25; box-shadow:0 0 4px 1px rgba(244,208,63,.2); transform:scale(.85); }
}
@keyframes turnBlinkBlack {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(200,200,200,.6); transform:scale(1); }
  50%    { opacity:.25; box-shadow:0 0 4px 1px rgba(200,200,200,.1); transform:scale(.85); }
}

/* ── Continue button ── */
/* ── Hint text overlay (רמז 3) ── */
#hintTextOverlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  z-index:400; display:none; align-items:flex-end; justify-content:center;
  padding-bottom:80px;
}
#hintTextOverlay.show { display:flex; }
.hint-text-card {
  background:linear-gradient(135deg,#1A3A5C,#0D2035);
  border:2px solid var(--blue); border-radius:16px;
  padding:18px 26px; max-width:340px; text-align:center;
  box-shadow:0 0 30px rgba(126,200,227,.3);
  animation:cardIn .35s cubic-bezier(.175,.885,.32,1.5) both;
  direction:rtl;
}
.hint-text-card p {
  font-family:'Fredoka One',cursive; font-size:1.1rem;
  color:#fff; line-height:1.55; margin-bottom:14px;
  direction:rtl; unicode-bidi:bidi-override;
}
.hint-close-btn {
  font-family:'Fredoka One',cursive; font-size:1rem;
  background:rgba(126,200,227,.18); border:2px solid var(--blue);
  color:var(--blue); border-radius:50px; padding:7px 22px; cursor:pointer;
}

/* ── Sparks ── */
.pspark {
  position:fixed; width:7px; height:7px; border-radius:50%;
  pointer-events:none; animation:psparkFly ease-out forwards; z-index:999;
}
@keyframes psparkFly {
  from{opacity:1;transform:translate(0,0) scale(1)}
  to  {opacity:0;transform:translate(var(--px),var(--py)) scale(.2)}
}



@media (max-height: 700px) {
  body { padding-top:10px; }
  .instruction { margin-bottom:8px; }
}

.board-coord-wrap {
  display:flex; flex-direction:row;
  align-items:flex-start; direction:ltr;
  max-width: min(100vw, calc(80px * 8 + 60px));
}
.coord-ranks {
  display:flex; flex-direction:column;
  width:18px; height:calc(var(--cell)*8);
  flex-shrink:0; padding-right:3px;
}
.coord-ranks span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  height:var(--cell);
  display:flex; align-items:center; justify-content:center;
}
.board-col { display:flex; flex-direction:column; }
.coord-files {
  display:flex; direction:ltr;
  width:calc(var(--cell)*8); margin-top:4px;
}
.coord-files span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  width:var(--cell); text-align:center;
}


/* ── overlay buttons ── */
.overlay-btns { margin-top:8px; }
/* כפתורי Win Screen קנוניים — מקור: rook-stage1, לפי chess-ui-consistency-skill */
.btn-next {
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:12px 34px; border-radius:14px; border:none;
  cursor:pointer; color:#060E1A;
  background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);
  box-shadow:0 4px 18px rgba(244,208,63,.5);
  transition:transform .15s,box-shadow .15s;
  width:100%; margin-bottom:10px;
  touch-action:manipulation;
  min-height:44px; box-sizing:border-box;
  display:flex; align-items:center; justify-content:center;
}
.btn-next:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(244,208,63,.7); }
.btn-retry {
  background:transparent; color:rgba(255,255,255,.6);
  border:1.5px solid rgba(255,255,255,.22); border-radius:14px;
  padding:9px 26px; font-family:'Fredoka One',cursive; font-size:1rem;
  cursor:pointer; touch-action:manipulation;
  transition:color .2s,border-color .2s; width:100%;
  min-height:44px; box-sizing:border-box;
  display:flex; align-items:center; justify-content:center;
}
.btn-retry:hover { color:white; border-color:rgba(255,255,255,.5); }

</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="stage-badge">שלב 2 — מט שורה אחורית</div>
  <div class="score-right">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק/הפעל צלילים">🔊</button>
  </div>
</div>

<!-- Progress dots -->
<div class="progress-row" id="progressRow"></div>

<!-- Instruction -->
<div class="instruction" id="instruction">טוען...</div>

<!-- Board + קואורדינטות -->
<div class="board-coord-wrap">
  <div class="coord-ranks" id="coordRanks">
    <span>8</span><span>7</span><span>6</span><span>5</span>
    <span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
  <div class="board-col">
    <div class="board-outer" id="boardOuter">
      <div class="board-grid" id="boardGrid"></div>
      <svg class="laser-svg" id="laserSvg" viewBox="0 0 512 512">
    <defs>
      <marker id="arrowHead" markerWidth="6" markerHeight="6"
              refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#F4D03F"/>
      </marker>
      <marker id="controlHead" markerWidth="6" markerHeight="6"
              refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#FF6B35"/>
      </marker>
    </defs>
    <line class="laser-line" id="laserLine"/>
    <line class="arrow-line" id="arrowLine"/>
      </svg>
    </div>
    <div class="coord-files" id="coordFiles">
      <span>A</span><span>B</span><span>C</span><span>D</span>
      <span>E</span><span>F</span><span>G</span><span>H</span>
    </div>
  </div>
</div>

<!-- Turn indicator -->
<div class="turn-indicator" id="turnIndicator">
  <div class="turn-circle" id="turnCircle"></div>
</div>

<!-- Hint button below board -->
<button class="hint-btn" id="hintBtn" onclick="showHint()">💡 רמז</button>

<!-- Continue button (in-flow — מופיע במקום כפתור הרמז אחרי מט, מעבר בשליטת השחקן) -->
<button class="continue-btn" id="continueBtn" onclick="onContinue()">המשיכו ⬅️</button>

<!-- Hint text overlay (רמז 3) -->
<div id="hintTextOverlay">
  <div class="hint-text-card">
    <p id="hintTextMsg"></p>
    <button class="hint-close-btn" onclick="closeHintText()">הבנתי! 👍</button>
  </div>
</div>

<!-- Wrong move overlay -->
<div class="overlay" id="wrongOverlay">
  <div class="card red">
    <span class="card-icon">🤔</span>
    <button class="card-btn red-btn" onclick="closeWrong()">נסו שוב 💪</button>
  </div>
</div>

<!-- Win overlay -->
<div class="overlay" id="winOverlay">
  <div class="card">
    <span class="card-icon">🏆</span>
    <div class="card-title">שלב 2 הושלם! 🎉</div>
    <div class="win-stars" id="winStars">⭐⭐⭐</div>
    <div class="overlay-btns">
      <button class="btn-next" onclick="window.location.href='checkmate-stage3.html'">לשלב 3 ←</button>
      <button class="btn-retry" id="btnRetry" onclick="fullReset()">נסו שוב 🔄</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  CELL SIZE
// ════════════════════════════════════════════
let C = 64;
function computeCell() {
  const newC = Math.max(Math.min(Math.floor((window.innerWidth - 56) / 8), 64), 40);
  if (newC !== C) {
    C = newC;
    document.documentElement.style.setProperty('--cell', C + 'px');
  }
}

// ════════════════════════════════════════════
//  MUTE
// ════════════════════════════════════════════
let muted = false;
function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
}

// ════════════════════════════════════════════
//  SCENARIOS
//  col = file-1 (A=0…H=7), row = 8-rank (rank8=0…rank1=7)
// ════════════════════════════════════════════
// ════════════════════════════════════════════
//  STARS — before buildGrid for validator
// ════════════════════════════════════════════
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star-dot';
  const sz=Math.random()*2.2+.7;

function shuffleScenarios() {
  for (let i = SCENARIOS.length - 1; i > LOCKED_EASY; i--) {
    const j = LOCKED_EASY + Math.floor(Math.random() * (i - LOCKED_EASY + 1));

  }
}

let _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new (window.AudioContext||window.webkitAudioContext)();
  if (_ctx.state==='suspended') _ctx.resume();
  return _ctx;
}
function playZap() {
  if (muted) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    const mk=()=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); return[o,g]; };
    const buf=ctx.createBuffer(1,ctx.sampleRate*.5,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.07));
    const src=ctx.createBufferSource(); src.buffer=buf;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(.55,now); gn.gain.exponentialRampToValueAtTime(.001,now+.45);
    const lpf=ctx.createBiquadFilter(); lpf.type='bandpass'; lpf.frequency.value=1400; lpf.Q.value=2.5;
    src.connect(lpf); lpf.connect(gn); gn.connect(ctx.destination); src.start(now); src.stop(now+.5);
    const [o,gv]=mk(); o.type='square';
    o.frequency.setValueAtTime(500,now); o.frequency.exponentialRampToValueAtTime(1000,now+.12); o.frequency.exponentialRampToValueAtTime(200,now+.32);
    gv.gain.setValueAtTime(.22,now); gv.gain.exponentialRampToValueAtTime(.001,now+.38);
    o.start(now); o.stop(now+.4);
  } catch(e){}
}
function playChime() {
  if (muted) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    [523,659,784].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=f;
      const t=now+i*.1;
      g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.35);
      o.start(t); o.stop(t+.4);
    });
  } catch(e){}
}
function playError() {
  if (muted) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sawtooth'; o.frequency.setValueAtTime(240,now); o.frequency.exponentialRampToValueAtTime(100,now+.28);
    g.gain.setValueAtTime(.2,now); g.gain.exponentialRampToValueAtTime(.001,now+.3);
    o.start(now); o.stop(now+.32);
  } catch(e){}
}
function playWin() {
  if (muted) return;
  try {
    const ctx=getCtx(), now=ctx.currentTime;

  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    const sq = document.createElement('div');
    sq.className = 'sq '+((r+c)%2===0?'l':'d');

    grid.appendChild(sq);
  }
}

function renderPieceInner(p, flipped) {
  const inner = document.createElement('span');
  const dict  = p.white ? WHITE_SVG : BLACK_SVG;
  if (dict[p.sym]) {
    const img  = document.createElement('img');
    img.src    = 'data:image/svg+xml,' + encodeURIComponent(dict[p.sym]);
    const isLarger = p.sym === '♞' || p.sym === '♜';
    const baseSz   = p.sym === '♟' ? 43 : p.sym === '♙' ? 40 : isLarger ? 95 : 90;
    img.style.cssText = `width:${baseSz}%;height:${baseSz}%;object-fit:contain;display:block;margin:auto;`;
    if (!p.white) img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
    if (p.sym === '♙') img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
    if (flipped) img.style.transform = 'rotate(180deg)';
    inner.appendChild(img);
  }
  return inner;
}

function placePieces(sc) {
  // Remove old pieces
  document.querySelectorAll('.piece').forEach(e=>e.remove());
  document.querySelector('#laserLine')?.setAttribute('stroke-dashoffset','9999');
  document.querySelector('#laserLine').style.opacity='0';
  document.querySelectorAll('.flag-wrap').forEach(e=>e.remove());
  document.querySelectorAll('.check-sq').forEach(e=>e.classList.remove('check-sq'));
  pieces = {};
  selected = null;

  sc.pieces.forEach(p=>{
    const el = document.createElement('div');
    el.className = 'piece';
    el.id = 'piece-'+p.id;
    el.appendChild(renderPieceInner(p, !!sc.flipped));
    el.style.left = p.col*C+'px';
    el.style.top  = p.row*C+'px';
    el.addEventListener('click', (e)=>{ e.stopPropagation(); onPieceClick(p.id); });
    document.getElementById('boardOuter').appendChild(el);
    pieces[p.id] = { ...p, el };
  });
}

// ════════════════════════════════════════════
//  SCENARIO SETUP
// ════════════════════════════════════════════
function loadScenario(idx) {
  // שחזור נתוני התרחיש מהעותק הקפוא — מבטיח עמדה נקייה בכל טעינה
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));
  const sc = SCENARIOS[idx];
  hintLevel = 0;
  locked    = false;
  selected  = null;
  resetGuardArrows();
  resetHints();
  document.getElementById('continueBtn').classList.remove('show');
  document.getElementById('hintBtn').style.display = '';   // הצגת כפתור הרמז מחדש לתרחיש הבא
  setInstruction(sc.instruction);
  updateProgress(idx);
  const board = document.getElementById('boardOuter');
  board.classList.toggle('flipped', !!sc.flipped);
  updateCoordLabels(!!sc.flipped);
  placePieces(sc);
  updateTurnIndicator(sc);
  resetLaser();
}

function setInstruction(txt) {
  const el = document.getElementById('instruction');
  el.style.animation='none';
  el.getBoundingClientRect();
  el.style.animation='';
  el.textContent = txt;
}

function updateProgress(idx) {
  const row = document.getElementById('progressRow');
  row.innerHTML='';
  SCENARIOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='prog-dot '+(i<idx?'done':i===idx?'current':'pending');
    row.appendChild(d);
  });
}

// ════════════════════════════════════════════
//  CLICK HANDLERS
// ════════════════════════════════════════════
function onPieceClick(id) {
  if (locked) return;
  const sc     = SCENARIOS[scenIdx];
  const moveId = sc.moveId;
  const p      = pieces[id];

  if (selected && selected !== id) {
    if (p) { onSquareClick(p.row, p.col); return; }
  }

  if (id !== moveId) {
    if (p) onSquareClick(p.row, p.col);
    return;
  }

  if (selected === id) {
    pieces[id].el.classList.remove('selected');
    selected = null;
  } else {
    if (selected) pieces[selected]?.el?.classList.remove('selected');
    selected = id;
    pieces[id].el.classList.add('selected');
  }
}

function onSquareClick(r,c) {
  if (locked || !selected) return;
  const sc = SCENARIOS[scenIdx];
  const moveId  = sc.moveId;
  const target  = sc.target;
  const matedId = sc.matedId;

  // Guard: clicking the selected piece's own square = deselect
  const selPiece = pieces[selected];
  if (selPiece && r===selPiece.row && c===selPiece.col) {
    selPiece.el.classList.remove('selected');
    selected = null;
    return;
  }

  if (r===target.row && c===target.col && selected===moveId) {
    // ✅ Correct piece AND correct destination
    locked = true;
    doCorrectMove(moveId, target, matedId, sc);
  } else {
    // ❌ Wrong piece or wrong destination
    doWrongMove();
  }
}

// ════════════════════════════════════════════
//  MOVE ANIMATIONS
// ════════════════════════════════════════════
function doCorrectMove(moveId, target, matedId, sc) {
  document.getElementById('wrongOverlay').classList.remove('show');
  getCtx();
  const movingPiece = pieces[moveId];

  if (sc.captureId && pieces[sc.captureId]) {
    pieces[sc.captureId].el.remove();
    delete pieces[sc.captureId];
  }

  movingPiece.el.classList.remove('selected','hint-piece');
  document.querySelectorAll('.hint-sq').forEach(e => e.classList.remove('hint-sq'));
  document.getElementById('arrowLine').classList.remove('show');

  movingPiece.el.style.left = target.col*C+'px';
  movingPiece.el.style.top  = target.row*C+'px';
  movingPiece.col = target.col; movingPiece.row = target.row;

  setTimeout(()=>{
    movingPiece.el.classList.add('arrive');
    setTimeout(()=>movingPiece.el.classList.remove('arrive'),700);

    const king = pieces[matedId];
    fireLaser(
      target.col*C + C/2, target.row*C + C/2,
      king.col*C  + C/2,  king.row*C  + C/2
    );
    playZap();
    setTimeout(() => showGuardArrows(sc), 300);

    setTimeout(()=>{
      showFlag(king.col, king.row);
      playChime();
      setTimeout(()=>{
        spawnConfetti();
        showContinueBtn();
        // הלוח נשאר נעול אחרי מט — המעבר היחיד קדימה הוא דרך כפתור "המשיכו".
        // locked משוחרר ב-loadScenario (בלחיצת המשך / נסו שוב).
      }, 1500);
    }, 1500);
  }, 400);
}

function doWrongMove() {
  mistakes++;
  playError();
  // Shake the selected piece
  if (selected && pieces[selected]) {
    pieces[selected].el.classList.add('shake');
    setTimeout(()=>pieces[selected]?.el?.classList.remove('shake'),400);
  }
  const msgs=[
    'כמעט! נסו משבצת אחרת 🤔',
    'לא הפעם! חשבו שוב 💪',
    'אתם על הדרך הנכונה — עוד ניסיון! 🌟',
  ];
  
  setTimeout(() => document.getElementById('wrongOverlay').classList.add('show'), 1500);
}

function closeWrong() {
  document.getElementById('wrongOverlay').classList.remove('show');
}

// ════════════════════════════════════════════
//  LASER
// ════════════════════════════════════════════
function fireLaser(x1,y1,x2,y2) {
  const line = document.getElementById('laserLine');
  const len  = Math.hypot(x2-x1,y2-y1);
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('stroke-dasharray',len);
  line.setAttribute('stroke-dashoffset',len);
  line.style.opacity='1';
  line.style.transition='stroke-dashoffset .3s ease';
  line.setAttribute('stroke-dashoffset','0');
}
function resetLaser() {
  const line = document.getElementById('laserLine');
  line.style.transition='none';
  line.style.opacity='0';
  line.setAttribute('stroke-dashoffset','9999');
}

//  FLAG
// ════════════════════════════════════════════
function showFlag(col,row) {
  const flag = document.createElement('div');
  flag.className='flag-wrap';
  const flipped = SCENARIOS[scenIdx].flipped;
  // left-pointing polygon for flipped scenarios
  const polyPts = flipped ? '14.5,3 3,10 14.5,17' : '14.5,3 26,10 14.5,17';
  const gAttrs  = flipped ? 'transform="rotate(180,14,18)"' : '';
  flag.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 28 36">
    <g ${gAttrs}>
      <rect x="12" y="2" width="2.5" height="33" rx="1" fill="#888"/>
      <polygon points="${polyPts}" fill="white" stroke="#aaa" stroke-width="0.8"/>
    </g>
  </svg>`;
  flag.style.left = flipped ? (col*C - C*0.08)+'px' : (col*C + C*0.58)+'px';
  flag.style.top  = flipped ? (row*C + C*0.78)+'px' : (row*C - C*0.28)+'px';
  document.getElementById('boardOuter').appendChild(flag);
  flag.getBoundingClientRect();
  if (flipped) flag.classList.add('flipped-flag');
  flag.classList.add('show');
}

// ════════════════════════════════════════════
//  OVERLAYS
// ════════════════════════════════════════════
function showContinueBtn() {
  if (scenIdx === SCENARIOS.length - 1) {
    setTimeout(()=>{
      playWin();
      const perfect = (mistakes <= 1) && (hintsUsed === 0);   // 0–1 טעויות = 3⭐ | 2+ טעויות או רמז = 2⭐
      const stars = perfect ? '⭐⭐⭐' : '⭐⭐';
      document.getElementById('winStars').textContent = stars;
      document.getElementById('btnRetry').textContent =
        perfect ? 'שחקו שוב 🎮' : 'נסו שוב 🔄';
      CheckmateState.save('stage2', perfect);
      document.getElementById('winOverlay').classList.add('show');
    }, 600);
  } else {
    // מעבר בשליטת השחקן — מציגים כפתור "המשיכו" במקום מעבר אוטומטי
    document.getElementById('hintBtn').style.display = 'none';   // אין רמזים אחרי מט
    const btn = document.getElementById('continueBtn');
    btn.style.animation = 'none';
    btn.getBoundingClientRect();        // reflow → restart pop animation
    btn.style.animation = '';
    btn.classList.add('show');
  }
}

function onContinue() {
  document.getElementById('continueBtn').classList.remove('show');
  scenIdx++;
  loadScenario(scenIdx);
}

// ════════════════════════════════════════════
//  STATE — v2.1 (מאומת מול bishop הקנוני). תבנית זהה לכל שלבי מודול המט.
//  perfect = עד טעות אחת וללא רמזים. 2+ טעויות או כל רמז → 2⭐.
// ════════════════════════════════════════════
const CheckmateState = {
  MODULE_KEY:'chess_checkmate',
  // STAGE_KEYS + PERFECT_THRESHOLD אינרטיים בשלב ביניים (getModuleStars נקרא רק בשלב
  //    האחרון וב-index.html) — אך נכונים כתבנית. החלטת ברוך: 3⭐ = 6/6 שלבים מושלמים.
  //    ⚠️ חובה ליישם זהה בשלב האחרון, ולעדכן ב-index.html: starThreshold 5→6
  //    (כרגע 5 — לא תואם! אחרת המפה תיתן 3⭐ כבר ב-5/6).
  STAGE_KEYS:['stage1','stage2','stage3','stage4','stage5','stage6'],
  PERFECT_THRESHOLD:6,
  save(stageKey,perfect){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const prev=d[stageKey]||{};
      const bestPerfect=(prev.bestPerfect||prev.perfect||false)||perfect;  // שיא — OR, לא יורד (גם מיגרציה מ-v2)
      d[stageKey]={done:true,perfect,lastPerfect:perfect,bestPerfect};
      localStorage.setItem(this.MODULE_KEY,JSON.stringify(d));
    }catch(e){}
  },
  getModuleStars(){
    try{
      const d=JSON.parse(localStorage.getItem(this.MODULE_KEY)||'{}');
      const done=this.STAGE_KEYS.filter(k=>d[k]?.done).length;
      if(done<this.STAGE_KEYS.length)return{best:0,last:0};
      const bestP=this.STAGE_KEYS.filter(k=>(d[k]?.bestPerfect??d[k]?.perfect)).length;
      const lastP=this.STAGE_KEYS.filter(k=>(d[k]?.lastPerfect??d[k]?.perfect)).length;
      const toStars=p=>p>=this.PERFECT_THRESHOLD?3:2;
      return{best:toStars(bestP),last:toStars(lastP)};
    }catch(e){return{best:0,last:0};}
  }
};

function fullReset() {
  // ריענון מלא — לוח נקי ב-100% (כלל ברזל chess-state). התקדמות כבר נשמרה בעליית מסך הניצחון;
  // הערבוב משוחזר אוטומטית ע"י shuffleScenarios() ב-init.
  location.reload();
}

function updateCoordLabels(flipped) {
  const ranks = flipped ? ['1','2','3','4','5','6','7','8']
                        : ['8','7','6','5','4','3','2','1'];
  const files = flipped ? ['H','G','F','E','D','C','B','A']
                        : ['A','B','C','D','E','F','G','H'];
  document.getElementById('coordRanks')
    .querySelectorAll('span').forEach((s,i) => s.textContent = ranks[i]);
  document.getElementById('coordFiles')
    .querySelectorAll('span').forEach((s,i) => s.textContent = files[i]);
}

function updateTurnIndicator(sc) {
  const moverPiece = sc.pieces.find(p => p.id === sc.moveId);
  const isWhite    = moverPiece && moverPiece.white;
  document.getElementById('turnCircle').className = 'turn-circle ' + (isWhite ? 'white' : 'black');
}

// ════════════════════════════════════════════
//  HINTS
// ════════════════════════════════════════════
function resetHints() {
  hintLevel = 0;
  const btn = document.getElementById('hintBtn');
  btn.textContent = '💡 רמז';
  btn.disabled = false;
  btn.style.opacity = '';
  document.querySelectorAll('.hint-piece').forEach(e => e.classList.remove('hint-piece'));
  document.querySelectorAll('.hint-sq').forEach(e => e.classList.remove('hint-sq'));
  document.getElementById('hintTextOverlay').classList.remove('show');
  const arrow = document.getElementById('arrowLine');
  arrow.classList.remove('show');
  arrow.style.opacity = '0';
}

function showHint() {
  const sc     = SCENARIOS[scenIdx];
  const moveId = sc.moveId;
  const target = sc.target;
  const btn    = document.getElementById('hintBtn');

  hintsUsed++;

  if (hintLevel === 0) {
    document.querySelectorAll('.hint-piece').forEach(e => e.classList.remove('hint-piece'));
    pieces[moveId]?.el?.classList.add('hint-piece');
    hintLevel = 1;
    btn.textContent = '💡 רמז נוסף';

  } else if (hintLevel === 1) {
    const sq = document.getElementById(`sq-${target.row}-${target.col}`);
    if (sq) { sq.classList.add('hint-sq'); setTimeout(() => sq.classList.remove('hint-sq'), 1500); }
    const mover = pieces[moveId];
    if (mover) {
      const arrow = document.getElementById('arrowLine');
      arrow.setAttribute('x1', mover.col * C + C/2);
      arrow.setAttribute('y1', mover.row * C + C/2);
      arrow.setAttribute('x2', target.col * C + C/2);
      arrow.setAttribute('y2', target.row * C + C/2);
      arrow.classList.add('show');
    }
    hintLevel = 2;
    btn.textContent = 'אין יותר רמזים 😊';
    btn.disabled = true;
    btn.style.opacity = '0.45';

  }
}

function closeHintText() {
  document.getElementById('hintTextOverlay').classList.remove('show');
}

function showGuardArrows(sc) {
  if (!sc.guardArrows || !sc.guardArrows.length) return;
  const svg = document.getElementById('laserSvg');
  sc.guardArrows.forEach((ga, i) => {
    const from = pieces[ga.fromId];
    if (!from) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.classList.add('control-line', 'guard-arrow');
    line.setAttribute('x1', from.col * C + C/2);
    line.setAttribute('y1', from.row * C + C/2);
    line.setAttribute('x2', ga.toCol  * C + C/2);
    line.setAttribute('y2', ga.toRow  * C + C/2);
    svg.appendChild(line);
    setTimeout(() => line.classList.add('show'), 80 * i);
  });
}

function resetGuardArrows() {
  document.querySelectorAll('.guard-arrow').forEach(e => e.remove());
}

function spawnConfetti() {
  const colors=['#F4D03F','#7EC8E3','#52B788','#FF6B35','#E74C3C','#fff'];
  const rect=document.getElementById('boardOuter').getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');
    sp.className='pspark';
    const a=Math.random()*Math.PI*2, d=80+Math.random()*120;
    sp.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};animation-duration:${.6+Math.random()*.5}s;`;
    sp.style.setProperty('--px',Math.cos(a)*d+'px');
    sp.style.setProperty('--py',Math.sin(a)*d+'px');
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1100);
  }
}
