<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#060E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>שחמט — מבחן מסכם</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:       #F4D03F;
  --gold-dark:  #C9A227;
  --gold-deep:  #9A7B1A;
  --blue:       #7EC8E3;
  --red:        #E74C3C;
  --green:      #52B788;
  --orange:     #FF6B35;
  --bg1:        #162D4A;
  --bg2:        #0C1E30;
  --bg3:        #060E1A;
  --cell: 64px; /* fallback — overridden by computeCell() */
  --cell-light: #C9E4F5;
  --cell-dark:  #4A7FA5;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: radial-gradient(ellipse at 50% 0%, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
  min-height:100vh; font-family:'Nunito',sans-serif; font-weight:700;
  color:white; user-select:none; overflow-x:hidden;
  overscroll-behavior:none;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
  display:flex; flex-direction:column; align-items:center;
  padding:16px 12px calc(28px + env(safe-area-inset-bottom));
  overflow-y:auto;
}
.star-dot { position:fixed; border-radius:50%; background:white; pointer-events:none;
  animation:twinkle ease-in-out infinite alternate; }
@keyframes twinkle { from{opacity:.1;transform:scale(.8)} to{opacity:.85;transform:scale(1.2)} }

/* ── Header ── */
.hdr {
  width:100%; max-width:580px; display:flex; align-items:center;
  justify-content:space-between; margin-bottom:10px; position:relative; z-index:1;
}
.stage-badge {
  font-family:'Fredoka One',cursive; font-size:1.2rem; color:var(--gold);
  border:2px solid var(--gold); border-radius:50px; padding:4px 14px;
  background:rgba(244,208,63,.12);
  box-shadow: 0 0 12px rgba(244,208,63,.3);
  white-space:nowrap;
}
.instruction-row {
  display:flex; align-items:center; gap:12px;
  width:100%; max-width:580px; justify-content:center;
  margin-bottom:12px; position:relative; z-index:1; flex-wrap:wrap;
}
.score-right { display:flex; align-items:center; gap:8px; }
.btn-mute {
  background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%; width:36px; height:36px; font-size:1.1rem; cursor:pointer; color:white;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s; touch-action:manipulation; flex-shrink:0;
}
.btn-mute:hover { background:rgba(255,255,255,.18); }
.win-stars {
  font-size:1.9rem; letter-spacing:4px;
  text-shadow:0 0 14px rgba(244,208,63,.8);
  margin:6px 0 12px;
}

/* ── Step indicator (only shown for mate-in-2) ── */
.step-indicator {
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px; position:relative; z-index:1;
}
.step-pill {
  font-family:'Fredoka One',cursive; font-size:0.95rem;
  padding:5px 18px; border-radius:50px; border:2px solid #444;
  color:#888; transition:all .3s ease;
}
.step-pill.active { border-color:var(--gold); color:var(--gold); box-shadow:0 0 10px rgba(244,208,63,.4); }
.step-pill.done   { border-color:var(--green); color:var(--green); background:rgba(82,183,136,.1); }
.step-arrow { color:#555; font-size:1.1rem; padding:0 2px; }

/* ── Progress ── */
.progress-row {
  display:flex; gap:8px; margin-bottom:10px; position:relative; z-index:1;
}
.prog-dot {
  width:12px; height:12px; border-radius:50%; border:2px solid #555;
  transition:all .3s ease;
}
.prog-dot.done    { background:var(--green); border-color:var(--green); }
.prog-dot.current { background:var(--gold);  border-color:var(--gold); box-shadow:0 0 8px var(--gold); }
.prog-dot.pending { background:transparent; border-color:#444; }

/* ── Instruction ── */
.instruction {
  font-family:'Fredoka One',cursive; font-size:1.25rem; color:white;
  text-align:center; margin-bottom:12px; min-height:1.6rem;
  position:relative; z-index:1; direction:rtl;
  animation:sp-in .4s ease both;
}
@keyframes sp-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ── Board ── */

.board-outer {
  position:relative;
  box-sizing:content-box;
  width:calc(var(--cell)*8); height:calc(var(--cell)*8);
  border:3px solid var(--gold-dark);
  border-radius:5px;
  box-shadow:0 6px 28px rgba(0,0,0,.6), 0 0 22px rgba(244,208,63,.25);
  overflow:visible;
}

.board-outer.flipped { transform: rotate(180deg); }
.board-grid {
  display:grid;
  grid-template-columns:repeat(8,var(--cell));
  grid-template-rows:repeat(8,var(--cell));
  direction:ltr; overflow:hidden; border-radius:2px;
}
.sq { width:var(--cell); height:var(--cell); cursor:pointer; position:relative; touch-action:manipulation; }
.sq.l { background:var(--cell-light); }
.sq.d { background:var(--cell-dark); }
.sq:hover { filter:brightness(1.12); }
.sq.wrong-flash { animation:wrongFlash .22s ease 2; }
@keyframes wrongFlash { 0%,100%{background-color:inherit} 50%{background:rgba(231,76,60,.65)!important} }

/* ── Floating pieces ── */
.piece {
  position:absolute;
  width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  line-height:1; z-index:5; cursor:default;
  transition:left .38s cubic-bezier(.4,0,.2,1), top .38s cubic-bezier(.4,0,.2,1);
  pointer-events:all;
}
.piece.clickable { cursor:pointer; }
.piece.selected { animation:selectedPulse 1s ease-in-out infinite; }
.piece.selected::after {
  content:''; position:absolute; inset:4px; border-radius:50%;
  background:rgba(244,208,63,0.25);
  box-shadow:0 0 12px 4px rgba(244,208,63,0.6);
  animation:selectedBg 1s ease-in-out infinite;
  pointer-events:none; z-index:-1;
}
@keyframes selectedPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes selectedBg {
  0%,100%{ opacity:.6; box-shadow:0 0 10px 3px rgba(244,208,63,.5); }
  50%    { opacity:1;  box-shadow:0 0 20px 8px rgba(244,208,63,.9); }
}
.piece.arrive { animation:pieceArrive .6s ease forwards; }
@keyframes pieceArrive {
  0%  { filter:drop-shadow(0 0 0 transparent); }
  40% { filter:drop-shadow(0 0 18px rgba(244,208,63,1)); }
  100%{ filter:drop-shadow(0 0 0 transparent); }
}
.piece.shake {
  animation:shakePiece .35s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shakePiece {
  10%,90%{ transform:translateX(-2px) }
  20%,80%{ transform:translateX(4px) }
  30%,50%,70%{ transform:translateX(-4px) }
  40%,60%{ transform:translateX(4px) }
}

/* ── Flag ── */
.flag-wrap {
  position:absolute; width:var(--cell); height:var(--cell);
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; z-index:8; opacity:0;
  transform:scale(0) rotate(-30deg);
  transition:opacity .35s ease, transform .45s cubic-bezier(.175,.885,.32,1.5);
}
.flag-wrap.show { opacity:1; transform:scale(1) rotate(0deg); }
.flag-wrap.flipped-flag.show { opacity:1; transform:scale(1) rotate(0deg) scaleX(-1); }

/* ── Laser SVG ── */
.laser-svg {
  position:absolute; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10; overflow:visible;
}
.laser-line {
  stroke:var(--red); stroke-width:4; stroke-linecap:round; fill:none; opacity:0;
  filter:drop-shadow(0 0 6px rgba(231,76,60,1)) drop-shadow(0 0 14px rgba(231,76,60,.6));
}
.laser-line.show { opacity:1; }
.laser-line.fade { transition:opacity .6s ease; opacity:0; }
.arrow-line {
  stroke:var(--gold); stroke-width:3.5; stroke-linecap:round; fill:none; opacity:0;
  marker-end:url(#arrowHead);
  filter:drop-shadow(0 0 6px rgba(244,208,63,.9)) drop-shadow(0 0 14px rgba(244,208,63,.5));
  transition:opacity .3s ease;
}
.arrow-line.show { opacity:1; }
.control-line {
  stroke:var(--orange); stroke-width:3; stroke-linecap:round; fill:none; opacity:0;
  marker-end:url(#controlHead);
  filter:drop-shadow(0 0 6px rgba(255,107,53,.9));
  transition:opacity .3s ease;
}
.control-line.show { opacity:1; }

/* ── Turn indicator ── */
.turn-indicator {
  display:flex; align-items:center; gap:8px;
  margin-top:12px; position:relative; z-index:1;
}
.turn-circle {
  width:20px; height:20px; border-radius:50%; border:2px solid #555;
  transition:all .3s ease;
}
.turn-circle.white {
  background:#fff; border-color:var(--gold);
  animation:turnBlinkWhite 1s ease-in-out infinite;
}
.turn-circle.black {
  background:#222; border-color:#aaa;
  animation:turnBlinkBlack 1s ease-in-out infinite;
}
@keyframes turnBlinkWhite {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(244,208,63,.8); transform:scale(1); }
  50%    { opacity:.25; box-shadow:0 0 4px 1px rgba(244,208,63,.2); transform:scale(.85); }
}
@keyframes turnBlinkBlack {
  0%,100%{ opacity:1; box-shadow:0 0 10px 3px rgba(200,200,200,.6); transform:scale(1); }
  50%    { opacity:.25; box-shadow:0 0 4px 1px rgba(200,200,200,.1); transform:scale(.85); }
}

/* ── Continue button ── */
/* ── Sparks ── */
.pspark {
  position:fixed; width:7px; height:7px; border-radius:50%;
  pointer-events:none; animation:psparkFly ease-out forwards; z-index:999;
}
@keyframes psparkFly {
  from{opacity:1;transform:translate(0,0) scale(1)}
  to  {opacity:0;transform:translate(var(--px),var(--py)) scale(.2)}
}

/* ── Overlays ── */
.overlay {
  position:fixed; inset:0; background:rgba(6,14,26,.97);
  z-index:500; display:none; align-items:center; justify-content:center;
  backdrop-filter: blur(6px);
}
.overlay.show { display:flex; }
.card {
  background:linear-gradient(160deg,#1a3550,#0d2035);
  border:2px solid var(--gold-dark); border-radius:20px;
  padding:36px 40px; text-align:center; max-width:340px;
  box-shadow:0 0 40px rgba(244,208,63,.15);
  animation:cardPop .35s cubic-bezier(.175,.885,.32,1.5) both;
}
.card.red { border-color:var(--red); box-shadow:0 0 40px rgba(231,76,60,.2); }
@keyframes cardPop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
.card-icon { font-size:4rem; display:block; margin-bottom:12px; }
.card-title {
  font-family:'Fredoka One',cursive; font-size:1.5rem;
  color:var(--gold); margin-bottom:8px;
}
.card.red .card-title { color:var(--red); }
.card-sub { font-size:1rem; color:#ccc; margin-bottom:20px; }

/* ── Boss Warning Overlay ── */
.boss-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.93);
  z-index:600; display:none; align-items:center; justify-content:center;
}
.boss-overlay.show { display:flex; }
.boss-card {
  background:linear-gradient(160deg,#1a0505,#0d0a00);
  border:3px solid var(--red); border-radius:20px;
  padding:40px 44px; text-align:center; max-width:360px;
  box-shadow:0 0 60px rgba(231,76,60,.5), 0 0 120px rgba(231,76,60,.2);
  animation:bossCardPop .5s cubic-bezier(.175,.885,.32,1.5) both;
  position:relative; overflow:hidden;
}
@keyframes bossCardPop {
  0%  { opacity:0; transform:scale(.3) rotate(-5deg); }
  70% { transform:scale(1.08) rotate(1deg); }
  100%{ opacity:1; transform:scale(1) rotate(0deg); }
}
.boss-card::before {
  content:''; position:absolute; inset:0; border-radius:20px;
  border:3px solid var(--red);
  animation:bossGlow 1s ease-in-out infinite;
  pointer-events:none;
}
@keyframes bossGlow {
  0%,100%{ box-shadow:inset 0 0 20px rgba(231,76,60,.3); opacity:.6; }
  50%    { box-shadow:inset 0 0 50px rgba(231,76,60,.8); opacity:1; }
}
.boss-icon { font-size:4.5rem; display:block; margin-bottom:10px;
  animation:bossIconSpin .6s cubic-bezier(.175,.885,.32,1.5) .3s both; }
@keyframes bossIconSpin {
  from{ transform:scale(0) rotate(-180deg); }
  to  { transform:scale(1) rotate(0deg); }
}
.boss-title {
  font-family:'Fredoka One',cursive; font-size:2rem;
  color:var(--red); margin-bottom:6px;
  text-shadow:0 0 20px rgba(231,76,60,.8);
  animation:bossTitlePop .4s ease .5s both;
}
@keyframes bossTitlePop {
  from{ opacity:0; transform:translateY(-20px) scale(.8); }
  to  { opacity:1; transform:none; }
}
.boss-sub {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  color:var(--gold); margin-bottom:24px;
  text-shadow:0 0 12px rgba(244,208,63,.6);
  animation:bossTitlePop .4s ease .7s both;
}
.boss-btn {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  background:linear-gradient(135deg,var(--red),#c0392b);
  border:none; color:white; border-radius:50px;
  padding:14px 40px; cursor:pointer;
  box-shadow:0 0 24px rgba(231,76,60,.6);
  animation:bossBtnPop .4s cubic-bezier(.175,.885,.32,1.5) .9s both;
  transition:transform .15s;
}
.boss-btn:hover { transform:scale(1.07); }
@keyframes bossBtnPop {
  from{ opacity:0; transform:scale(.5) translateY(20px); }
  to  { opacity:1; transform:none; }
}
.card-btn {
  font-family:'Fredoka One',cursive; font-size:1.1rem;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  border:none; color:#1a1a1a; border-radius:50px;
  padding:12px 32px; cursor:pointer; transition:transform .15s;
  touch-action:manipulation;
}
.card-btn:hover { transform:scale(1.05); }
.card-btn.red-btn {
  background:linear-gradient(135deg,var(--red),#c0392b);
  color:white;
}

/* ── overlay buttons ── */
.overlay-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:8px; }
/* Win/card buttons — קנוני + 44px (chess-ui-consistency-skill) */
.btn-next{font-family:'Fredoka One',cursive;font-size:1.2rem;padding:12px 34px;border-radius:14px;border:none;cursor:pointer;color:#060E1A;background:linear-gradient(160deg,var(--gold),var(--gold-dark),#9A7B1A);box-shadow:0 4px 18px rgba(244,208,63,.5);transition:transform .15s,box-shadow .15s;touch-action:manipulation;min-height:44px;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(244,208,63,.7)}
.btn-retry{background:transparent;color:rgba(255,255,255,.6);border:1.5px solid rgba(255,255,255,.22);border-radius:14px;padding:9px 26px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;touch-action:manipulation;transition:color .2s,border-color .2s;min-height:44px;box-sizing:border-box;display:inline-flex;align-items:center;justify-content:center}
.btn-retry:hover{color:white;border-color:rgba(255,255,255,.5)}

/* Continue button (in-flow — מעבר בשליטת השחקן בין שאלות המבחן) */
.continue-btn {
  display:none; margin:14px auto 0; position:relative; z-index:1;
  font-family:'Fredoka One',cursive; font-size:1.2rem;
  padding:10px 40px; border-radius:50px; border:none; cursor:pointer;
  color:#08210f; background:linear-gradient(135deg,#8aff8a,#52B788,#2e9e6b);
  box-shadow:0 0 22px rgba(82,183,136,.55), 0 6px 18px rgba(0,0,0,.4);
  transition:transform .15s, box-shadow .2s; touch-action:manipulation;
  animation:continuePop .4s cubic-bezier(.175,.885,.32,1.5) both;
  min-height:44px; box-sizing:border-box;
}
.continue-btn.show { display:inline-flex; align-items:center; justify-content:center; }
.continue-btn:hover { transform:scale(1.06); }
.continue-btn:active { transform:scale(.97); }
@keyframes continuePop { from{opacity:0;transform:translateY(10px) scale(.85)} to{opacity:1;transform:translateY(0) scale(1)} }




@media (max-height: 700px) {
  body { padding-top:10px; }
  .instruction { margin-bottom:8px; }
}

.board-coord-wrap {
  display:flex; flex-direction:row;
  align-items:flex-start; direction:ltr;
  max-width: min(100vw, calc(80px * 8 + 60px));
}
.coord-ranks {
  display:flex; flex-direction:column;
  width:18px; height:calc(var(--cell)*8);
  flex-shrink:0; padding-right:3px;
}
.coord-ranks span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  height:var(--cell);
  display:flex; align-items:center; justify-content:center;
}
.board-col { display:flex; flex-direction:column; }
.coord-files {
  display:flex; direction:ltr;
  width:calc(var(--cell)*8); margin-top:4px;
}
.coord-files span {
  font-family:'Fredoka One',cursive;
  font-size:0.7rem; font-weight:900;
  color:var(--gold);
  width:var(--cell); text-align:center;
}


/* ── Trading Card ── */
.trading-card {
  width:340px; max-width:92vw;
  background:linear-gradient(160deg,#1a0a2e 0%,#2d0a0a 50%,#1a0a0a 100%);
  border:3px solid #F4D03F;
  border-radius:20px;
  box-shadow:0 0 40px rgba(244,208,63,.6), 0 0 80px rgba(244,208,63,.25);
  overflow:hidden;
  animation:cardReveal .8s cubic-bezier(.175,.885,.32,1.5) both;
  flex-shrink:0;
}
@keyframes cardReveal {
  from{opacity:0;transform:scale(.5) rotateY(90deg);}
  to{opacity:1;transform:scale(1) rotateY(0deg);}
}
.tc-header {
  background:linear-gradient(90deg,#9A7B1A,#F4D03F,#9A7B1A);
  padding:10px 16px; text-align:center;
}
.tc-name {
  font-family:'Fredoka One',cursive; font-size:1.3rem;
  color:#1a0a00; text-shadow:0 1px 2px rgba(255,255,255,.3);
}
.tc-level {
  font-family:'Fredoka One',cursive; font-size:0.8rem;
  color:#5a3a00; letter-spacing:2px;
}
.tc-img-wrap {
  background:#0a0010;
  display:flex; align-items:center; justify-content:center;
}
.tc-img-wrap img { width:100%; height:auto; object-fit:contain; display:block; }
.tc-footer {
  display:flex; flex-wrap:wrap; justify-content:center; gap:6px;
  padding:10px 12px;
  background:rgba(244,208,63,.08);
  border-top:1px solid rgba(244,208,63,.3);
}
.tc-badge {
  font-family:'Fredoka One',cursive; font-size:0.75rem;
  padding:4px 10px; border-radius:20px;
  display:flex; align-items:center; gap:4px;
}
.tc-badge.perfect {
  background:rgba(244,208,63,.18); border:1px solid rgba(244,208,63,.6);
  color:var(--gold);
}
.tc-badge.retry {
  background:rgba(126,200,227,.1); border:1px solid rgba(126,200,227,.4);
  color:#7EC8E3;
  animation: retryBlink 1.2s ease-in-out infinite alternate;
}
@keyframes retryBlink {
  from { opacity:1; }
  to   { opacity:0.4; }
}

</style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <div class="stage-badge">מבחן מסכם 🏆</div>
  <div class="score-right">
    <button class="btn-mute" id="muteBtn" onclick="toggleMute()" title="השתק/הפעל צלילים">🔊</button>
  </div>
</div>

<!-- Step indicator (hidden for single-move scenarios) -->
<div class="step-indicator" id="stepIndicator" style="display:none">
  <div class="step-pill active" id="pill1">מהלך 1</div>
  <div class="step-arrow">←</div>
  <div class="step-pill" id="pill2">מהלך 2</div>
  <div class="step-arrow" id="arrow3">←</div>
  <div class="step-pill" id="pill3">מהלך 3</div>
</div>

<!-- Progress dots -->
<div class="progress-row" id="progressRow"></div>

<!-- Instruction -->
<div class="instruction" id="instruction">טוען...</div>

<!-- Board + קואורדינטות -->
<div class="board-coord-wrap">
  <div class="coord-ranks" id="coordRanks">
    <span>8</span><span>7</span><span>6</span><span>5</span>
    <span>4</span><span>3</span><span>2</span><span>1</span>
  </div>
  <div class="board-col">
    <div class="board-outer" id="boardOuter">
      <div class="board-grid" id="boardGrid"></div>
      <svg class="laser-svg" id="laserSvg" viewBox="0 0 512 512">
    <defs>
      <marker id="arrowHead" markerWidth="6" markerHeight="6"
              refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#F4D03F"/>
      </marker>
      <marker id="controlHead" markerWidth="6" markerHeight="6"
              refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#FF6B35"/>
      </marker>
    </defs>
    <line class="laser-line" id="laserLine"/>
    <line class="arrow-line" id="arrowLine"/>
    <line class="control-line" id="controlLine"/>
      </svg>
    </div>
    <div class="coord-files" id="coordFiles">

// [E] ערבוב חלקי (redteam V1+V5, החלטה פדגוגית): מערבב רק את תרחישי 'single' ביניהם.
// מט-ב-2 ומט-ב-3 נשארים במקומם הקבוע בסוף — שמירה על הסלמת הקושי וטקס "הבוס".
function shuffleScenarios() {
  const singleIdx = [];
  for (let i = 0; i < SCENARIOS.length; i++) {
    if (SCENARIOS[i].type === 'single') singleIdx.push(i);
  }
  // Fisher-Yates על תת-קבוצת ה-single בלבד, מערבב את שני המערכים באותה תמורה
  for (let k = singleIdx.length - 1; k > 0; k--) {
    const m = Math.floor(Math.random() * (k + 1));
    const i = singleIdx[k], j = singleIdx[m];
    [SCENARIOS[i], SCENARIOS[j]] = [SCENARIOS[j], SCENARIOS[i]];
    [ORIGINAL_SCENARIOS[i], ORIGINAL_SCENARIOS[j]] = [ORIGINAL_SCENARIOS[j], ORIGINAL_SCENARIOS[i]];
  }
}

    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'sq ' + ((r + c) % 2 === 0 ? 'l' : 'd');
      sq.id = `sq-${r}-${c}`;
      sq.addEventListener('click', () => onSqClick(r, c));
      grid.appendChild(sq);
    }
  }
}

// ════════════════════════════════════════════
//  PIECES
// ════════════════════════════════════════════
function renderPieceInner(p, sc) {
  const inner = document.createElement('span');
  const scale = p.scale || 1;

  if (!p.white && BLACK_SVG[p.sym]) {
    const img = document.createElement('img');
    img.src = 'data:image/svg+xml,' + encodeURIComponent(BLACK_SVG[p.sym]);
    const baseSz = p.sym === '♟' ? 43 : (p.sym === '♞' || p.sym === '♜') ? 95 : 90;
    img.style.cssText = `width:${Math.round(baseSz*scale)}%;height:${Math.round(baseSz*scale)}%;object-fit:contain;display:block;margin:auto;`;
    img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.9)) drop-shadow(0 0 1px rgba(0,0,0,0.7))';
    if (sc && sc.flipped) img.style.transform = 'rotate(180deg)';
    inner.appendChild(img);

  } else if (p.white && WHITE_SVG[p.sym]) {
    const img = document.createElement('img');
    img.src = 'data:image/svg+xml,' + encodeURIComponent(WHITE_SVG[p.sym]);
    const baseSzW = p.sym === '♙' ? 40 : 90;
    img.style.cssText = `width:${Math.round(baseSzW*scale)}%;height:${Math.round(baseSzW*scale)}%;object-fit:contain;display:block;margin:auto;`;
    if (p.sym === '♙') img.style.filter = 'drop-shadow(0 0 1.5px rgba(0,0,0,0.7))';
    if (sc && sc.flipped) img.style.transform = 'rotate(180deg)';
    inner.appendChild(img);

  } else {
    inner.textContent = p.sym;
    inner.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;line-height:1;';
    if (sc && sc.flipped) { inner.style.display='inline-block'; inner.style.transform='rotate(180deg)'; }
  }
  return inner;
}

function placePieces(sc) {
  document.querySelectorAll('.piece').forEach(e => e.remove());
  document.querySelectorAll('.flag-wrap').forEach(e => e.remove());
  pieces = {};

  sc.pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = 'piece';
    el.id = 'piece-' + p.id;
    el.style.left = p.col * C + 'px';
    el.style.top  = p.row * C + 'px';
    el.appendChild(renderPieceInner(p, sc));
    el.addEventListener('click', (e) => { e.stopPropagation(); onPieceClick(p.id); });
    document.getElementById('boardOuter').appendChild(el);
    pieces[p.id] = { ...p, el };
  });

  setActiveMoveable(sc.type === 'mate2' || sc.type === 'mate3' ? sc.step1.moveId : sc.moveId);
}

function setActiveMoveable(id) {
  Object.values(pieces).forEach(p => {
    p.el.classList.remove('clickable');
    p.el.style.cursor = 'default';
    p.moveable = false;
  });
  if (pieces[id]) {
    pieces[id].moveable = true;
    pieces[id].el.classList.add('clickable');
    pieces[id].el.style.cursor = 'pointer';
  }
}

// ════════════════════════════════════════════
//  LOAD SCENARIO
// ════════════════════════════════════════════
function loadScenario(idx) {
  SCENARIOS[idx] = JSON.parse(JSON.stringify(ORIGINAL_SCENARIOS[idx]));   // [E] שחזור מהעותק הקפוא
  const sc = SCENARIOS[idx];
  locked      = false;
  selected    = null;
  currentStep = 1;
  document.getElementById('continueBtn').classList.remove('show');

  document.getElementById('instruction').textContent = sc.instruction;
  document.getElementById('instruction').style.animation = 'none';
  void document.getElementById('instruction').offsetWidth;
  document.getElementById('instruction').style.animation = '';

  // Step indicator — for mate-in-2 or mate-in-3
  const stepInd = document.getElementById('stepIndicator');
  const isMate3 = sc.type === 'mate3';
  const isMate2 = sc.type === 'mate2';
  if (isMate2 || isMate3) {
    stepInd.style.display = 'flex';
    document.getElementById('pill1').className = 'step-pill active';
    document.getElementById('pill2').className = 'step-pill';
    document.getElementById('pill3').style.display = isMate3 ? '' : 'none';
    document.getElementById('arrow3').style.display = isMate3 ? '' : 'none';
    if (isMate3) document.getElementById('pill3').className = 'step-pill';
  } else {
    stepInd.style.display = 'none';
  }

  // Flip board
  document.getElementById('boardOuter').classList.toggle('flipped', !!sc.flipped);
  updateCoordLabels(!!sc.flipped);

  placePieces(sc);
  resetLaser();
  updateProgress(idx);
  updateTurnIndicator(sc);
}

function updateTurnIndicator(sc) {
  const moverId = (sc.type === 'mate2' || sc.type === 'mate3') ? sc.step1.moveId : sc.moveId;
  const moverPiece = sc.pieces.find(p => p.id === moverId);
  const isWhite = moverPiece && moverPiece.white;
  const circle = document.getElementById('turnCircle');
  circle.className = 'turn-circle ' + (isWhite ? 'white' : 'black');
}

function updateProgress(idx) {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  SCENARIOS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'prog-dot ' + (i < idx ? 'done' : i === idx ? 'current' : 'pending');
    row.appendChild(d);
  });
}

function updateCoordLabels(flipped) {
  const ranks = flipped ? ['1','2','3','4','5','6','7','8'] : ['8','7','6','5','4','3','2','1'];
  const files = flipped ? ['H','G','F','E','D','C','B','A'] : ['A','B','C','D','E','F','G','H'];
  const rEl = document.getElementById('coordRanks');
  const fEl = document.getElementById('coordFiles');
  if (rEl) rEl.querySelectorAll('span').forEach((s,i) => s.textContent = ranks[i]);
  if (fEl) fEl.querySelectorAll('span').forEach((s,i) => s.textContent = files[i]);
}

// ════════════════════════════════════════════
//  CLICK HANDLING
// ════════════════════════════════════════════
function onPieceClick(id) {
  if (locked) return;
  const sc = SCENARIOS[scenIdx];
  const p  = pieces[id];

  if (p.moveable) {
    if (selected && selected !== id) pieces[selected].el.classList.remove('selected');
    if (selected === id) return;  // already selected
    selected = id;
    p.el.classList.add('selected');
  } else if (selected) {
    // treat as square click on that piece's position
    const target = pieces[id];
    onSqClick(target.row, target.col);
  }
}

function onSqClick(r, c) {
  if (locked || !selected) return;
  const sc = SCENARIOS[scenIdx];
  if (sc.type === 'single') {
    handleSingleClick(sc, r, c);
  } else if (sc.type === 'mate3') {
    handleMate3Click(sc, r, c);
  } else {
    handleMate2Click(sc, r, c);
  }
}

// ── Mate-in-2 scenario ──
function handleMate2Click(sc, r, c) {
  if (currentStep === 1) {
    const tgt = sc.step1.target;
    if (r === tgt.row && c === tgt.col) {
      locked = true;
      if (selected) pieces[selected].el.classList.remove('selected');
      doStep1(sc);
    } else { wrongMove(r, c); }
  } else if (currentStep === 2) {
    const tgt = sc.step2.target;
    if (r === tgt.row && c === tgt.col) {
      locked = true;
      if (selected) pieces[selected].el.classList.remove('selected');
      doStep2(sc);
    } else { wrongMove(r, c); }
  }
}

// ── Mate-in-3 scenario ──
function handleMate3Click(sc, r, c) {
  if (currentStep === 1) {
    const tgt = sc.step1.target;
    if (r === tgt.row && c === tgt.col) {
      locked = true;
      if (selected) pieces[selected].el.classList.remove('selected');
      doStep1(sc);
    } else { wrongMove(r, c); }
  } else if (currentStep === 2) {
    const tgt = sc.step2.target;
    if (r === tgt.row && c === tgt.col) {
      locked = true;
      if (selected) pieces[selected].el.classList.remove('selected');
      doStep2mate3(sc);
    } else { wrongMove(r, c); }
  } else if (currentStep === 3) {
    const tgt = sc.step3.target;
    if (r === tgt.row && c === tgt.col) {
      locked = true;
      if (selected) pieces[selected].el.classList.remove('selected');
      doStep3(sc);
    } else { wrongMove(r, c); }
  }
}

function wrongMove(r, c) {
  // shake selected piece
  if (selected) {
    const el = pieces[selected].el;
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 400);
  }
  // flash square
  const sq = document.getElementById(`sq-${r}-${c}`);
  if (sq) {
    sq.classList.remove('wrong-flash');
    void sq.offsetWidth;
    sq.classList.add('wrong-flash');
    setTimeout(() => sq.classList.remove('wrong-flash'), 500);
  }
  mistakes++;
  playFail();
  // show overlay after 1.5s delay
  setTimeout(() => document.getElementById('wrongOverlay').classList.add('show'), 1500);
}

// ════════════════════════════════════════════
//  MOVE EXECUTION — SINGLE
// ════════════════════════════════════════════
function handleSingleClick(sc, r, c) {
  const tgt = sc.target;
  if (r === tgt.row && c === tgt.col) {
    locked = true;
    if (selected) pieces[selected].el.classList.remove('selected');
    doCorrectMove(sc, sc.moveId, tgt.col, tgt.row, sc.captureId, sc.matedId);
  } else { wrongMove(r, c); }
}

function doCorrectMove(sc, moveId, toCol, toRow, captureId, matedId) {
  const p = pieces[moveId];
  // remove capture
  if (captureId && pieces[captureId]) {
    pieces[captureId].el.remove();
    delete pieces[captureId];
  }
  // animate
  p.el.style.left = toCol * C + 'px';
  p.el.style.top  = toRow * C + 'px';
  p.col = toCol; p.row = toRow;

  setTimeout(() => {
    p.el.classList.add('arrive');
    fireLaser(moveId, matedId);
    playLaserSound();
    spawnSparks(toCol * C + C/2, toRow * C + C/2);
    setTimeout(() => {
      showFlag(pieces[matedId].col, pieces[matedId].row, sc.flipped);
    }, 400);
    setTimeout(() => { playApplause(); }, 500);
    setTimeout(() => showContinueBtn(), 1500);
  }, 380);
}

// ════════════════════════════════════════════
//  MOVE EXECUTION — MATE-IN-2 STEP 1
// ════════════════════════════════════════════
function doStep1(sc) {
  const s1 = sc.step1;
  const p  = pieces[s1.moveId];

  let capPiece1 = (s1.captureId && pieces[s1.captureId]) ? pieces[s1.captureId] : null;
  if (capPiece1) delete pieces[s1.captureId];

  p.el.style.left = s1.target.col * C + 'px';
  p.el.style.top  = s1.target.row * C + 'px';
  p.col = s1.target.col; p.row = s1.target.row;

  setTimeout(() => {
    p.el.classList.add('arrive');
    if (capPiece1) {
      const r=capPiece1.row, c=capPiece1.col;
      capPiece1.el.remove();
      showExplosion(r, c, true); playCapture();
    } else playSuccess();
    if (s1.givesCheck) {
      fireLaser(s1.checkerId, s1.checkedId);
      playLaserSound();
      setTimeout(() => {
        resetLaser();
        animateEnemyResponse(sc);
      }, 1500);
    } else {
      animateEnemyResponse(sc);
    }
  }, 380);
}

// ════════════════════════════════════════════
//  ENEMY RESPONSE
// ════════════════════════════════════════════
function animateEnemyResponse(sc) {
  const er = sc.enemyResponse;
  const p  = pieces[er.moveId];
  if (!p) { activateStep2(sc); return; }

  if (er.captureId && pieces[er.captureId]) {
    pieces[er.captureId].el.remove();
    delete pieces[er.captureId];
  }
  p.el.style.left = er.toCol * C + 'px';
  p.el.style.top  = er.toRow * C + 'px';
  p.col = er.toCol; p.row = er.toRow;

  setTimeout(() => activateStep2(sc), 400);
}

function activateStep2(sc) {
  setActiveMoveable(sc.step2.moveId);
  currentStep = 2;
  document.getElementById('pill1').className = 'step-pill done';
  document.getElementById('pill2').className = 'step-pill active';
  locked = false;
  selected = null;
}

function activateStep3(sc) {
  setActiveMoveable(sc.step3.moveId);
  currentStep = 3;
  document.getElementById('pill2').className = 'step-pill done';
  document.getElementById('pill3').className = 'step-pill active';
  locked = false;
  selected = null;
}

// ── Mate-in-3: step2 (gives check, triggers enemyResponse2) ──
function doStep2mate3(sc) {
  const s2 = sc.step2;
  const p  = pieces[s2.moveId];
  let capPiece2m = (s2.captureId && pieces[s2.captureId]) ? pieces[s2.captureId] : null;
  if (capPiece2m) delete pieces[s2.captureId];

  p.el.style.left = s2.target.col * C + 'px';
  p.el.style.top  = s2.target.row * C + 'px';
  p.col = s2.target.col; p.row = s2.target.row;

  setTimeout(() => {
    p.el.classList.add('arrive');
    if (capPiece2m) {
      const r=capPiece2m.row, c=capPiece2m.col;
      capPiece2m.el.remove();
      showExplosion(r, c, true); playCapture();
    } else playSuccess();
    if (s2.givesCheck) {
      fireLaser(s2.checkerId, s2.checkedId);
      playLaserSound();
      setTimeout(() => {
        resetLaser();
        animateEnemyResponse2(sc);
      }, 1500);
    } else {
      animateEnemyResponse2(sc);
    }
  }, 380);
}

function animateEnemyResponse2(sc) {
  const er = sc.enemyResponse2;
  const p  = pieces[er.moveId];
  if (!p) { activateStep3(sc); return; }
  if (er.captureId && pieces[er.captureId]) {
    pieces[er.captureId].el.remove();
    delete pieces[er.captureId];
  }
  p.el.style.left = er.toCol * C + 'px';
  p.el.style.top  = er.toRow * C + 'px';
  p.col = er.toCol; p.row = er.toRow;
  setTimeout(() => activateStep3(sc), 400);
}

// ── Mate-in-3: step3 (final checkmate) ──
function doStep3(sc) {
  const s3 = sc.step3;
  const p  = pieces[s3.moveId];
  let capPiece3 = (s3.captureId && pieces[s3.captureId]) ? pieces[s3.captureId] : null;
  if (capPiece3) delete pieces[s3.captureId];

  p.el.style.left = s3.target.col * C + 'px';
  p.el.style.top  = s3.target.row * C + 'px';
  p.col = s3.target.col; p.row = s3.target.row;

  setTimeout(() => {
    p.el.classList.add('arrive');
    if (capPiece3) {
      const r=capPiece3.row, c=capPiece3.col;
      capPiece3.el.remove();
      showExplosion(r, c, false); playCapture();
    }
    fireLaser(s3.moveId, s3.matedId);
    playLaserSound();
    spawnSparks(s3.target.col * C + C/2, s3.target.row * C + C/2);
    setTimeout(() => {
      showFlag(pieces[s3.matedId].col, pieces[s3.matedId].row, sc.flipped);
    }, 400);
    setTimeout(() => { playApplause(); }, 500);
    setTimeout(() => showContinueBtn(), 1500);
  }, 380);
}

// ════════════════════════════════════════════

function doStep2(sc) {

  let capPiece2 = (s2.captureId && pieces[s2.captureId]) ? pieces[s2.captureId] : null;

    if (capPiece2) {
      const r=capPiece2.row, c=capPiece2.col;

      showExplosion(r, c, false); playCapture();
    }
    fireLaser(s2.moveId, s2.matedId);
    playLaserSound();

      showFlag(pieces[s2.matedId].col, pieces[s2.matedId].row, sc.flipped);

function showContinueBtn() {
  if (scenIdx === SCENARIOS.length - 1) {
    // Last scenario — show win overlay with MODULE-LEVEL aggregate stars
    // Read stages 1–5 from localStorage + calculate stage6 from current session
    let perfectCount = 0;
    try {
      const stored = JSON.parse(localStorage.getItem('chess_checkmate') || '{}');
      ['stage1','stage2','stage3','stage4','stage5'].forEach(k => {
        if (stored[k] && stored[k].perfect) perfectCount++;
      });
    } catch(e) {}
    if (mistakes <= 1 && hintsUsed === 0) perfectCount++; // stage6 — עקבי עם שלבים 1–5
    const PERFECT_THRESHOLD = 6; // 6/6 שלבים מושלמים = ⭐⭐⭐ (תואם starThreshold ב-index.html)
    const stars = perfectCount >= PERFECT_THRESHOLD ? '⭐⭐⭐' : '⭐⭐';
    document.getElementById('winStars').textContent = stars;
    document.getElementById('winOverlay').classList.add('show');
  } else {
    // מעבר בשליטת השחקן — כפתור "המשיכו" במקום מעבר אוטומטי
    const btn = document.getElementById('continueBtn');
    btn.style.animation = 'none';
    btn.getBoundingClientRect();
    btn.style.animation = '';
    btn.classList.add('show');
  }
}

function onContinue() {
  document.getElementById('continueBtn').classList.remove('show');
  advanceScenario();
}

// ════════════════════════════════════════════
//  LASER
// ════════════════════════════════════════════
function fireLaser(fromId, toId) {
  const f = pieces[fromId];
  const t = pieces[toId];
  if (!f || !t) return;
  const fx = (f.col + 0.5) * C / (8 * C) * 512;
  const fy = (f.row + 0.5) * C / (8 * C) * 512;
  const tx = (t.col + 0.5) * C / (8 * C) * 512;
  const ty = (t.row + 0.5) * C / (8 * C) * 512;
  const line = document.getElementById('laserLine');
  line.setAttribute('x1', fx); line.setAttribute('y1', fy);
  line.setAttribute('x2', tx); line.setAttribute('y2', ty);
  line.classList.remove('fade');
  line.classList.add('show');
}

function resetLaser() {
  const line = document.getElementById('laserLine');
  line.classList.remove('show', 'fade');
  const arr  = document.getElementById('arrowLine');
  arr.classList.remove('show');
  const ctrl = document.getElementById('controlLine');
  ctrl.classList.remove('show');
}

// ════════════════════════════════════════════
//  FLAG
// ════════════════════════════════════════════
function showFlag(col, row, flipped) {
  const flag = document.createElement('div');
  flag.className = 'flag-wrap';
  const rotate = flipped ? 'transform="rotate(180,14,18)"' : '';
  flag.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="44" viewBox="0 0 28 36">
    <g ${rotate}>
      <rect x="12" y="2" width="2.5" height="33" rx="1" fill="#888"/>
      <polygon points="14.5,3 26,10 14.5,17" fill="white" stroke="#aaa" stroke-width="0.8"/>
    </g>
  </svg>`;
  if (flipped) {
    flag.style.left = (col*C - C*0.3) + 'px';
    flag.style.top  = (row*C + C*0.15) + 'px';
  } else {
    flag.style.left = (col*C + C*0.3) + 'px';
    flag.style.top  = (row*C - C*0.55) + 'px';
  }
  document.getElementById('boardOuter').appendChild(flag);
  flag.getBoundingClientRect();
  flag.classList.add('show');
}


// ════════════════════════════════════════════
//  RESET TO STEP (return to where mistake was made)
// ════════════════════════════════════════════
function resetToStep(sc, step) {
  placePieces(sc);
  resetLaser();

  function silentMove(moveId, target, captureId) {
    const p = pieces[moveId];
    if (!p) return;
    if (captureId && pieces[captureId]) {
      pieces[captureId].el.remove();
      delete pieces[captureId];
    }
    p.el.style.left = target.col * C + 'px';
    p.el.style.top  = target.row * C + 'px';
    p.col = target.col; p.row = target.row;
  }

  function silentEnemy(er) {
    const p = pieces[er.moveId];
    if (!p) return;
    if (er.captureId && pieces[er.captureId]) {
      pieces[er.captureId].el.remove();
      delete pieces[er.captureId];
    }
    p.el.style.left = er.toCol * C + 'px';
    p.el.style.top  = er.toRow * C + 'px';
    p.col = er.toCol; p.row = er.toRow;
  }

  if (step >= 2) {
    silentMove(sc.step1.moveId, sc.step1.target, sc.step1.captureId);
    silentEnemy(sc.enemyResponse);
  }
  if (step >= 3) {
    silentMove(sc.step2.moveId, sc.step2.target, sc.step2.captureId);
    silentEnemy(sc.enemyResponse2);
  }

  if (step === 1) {
    setActiveMoveable(sc.step1.moveId);
    currentStep = 1;
    document.getElementById('pill1').className = 'step-pill active';
    document.getElementById('pill2').className = 'step-pill';
    if (sc.type === 'mate3') document.getElementById('pill3').className = 'step-pill';
  } else if (step === 2) {
    activateStep2(sc);
  } else if (step === 3) {
    activateStep3(sc);
  }

  locked = false;
  selected = null;
}

// ════════════════════════════════════════════
//  OVERLAYS
// ════════════════════════════════════════════
function advanceScenario() {
  scenIdx++;
  const next = SCENARIOS[scenIdx];
  if (next && (next.type === 'mate2' || next.type === 'mate3')) {
    showBossWarning(next);
  } else {
    loadScenario(scenIdx);
  }
}

function showBossWarning(sc) {
  const moves = sc.type === 'mate3' ? '3' : '2';
  const swords = '🗡️'.repeat(parseInt(moves));
  document.getElementById('bossTitle').textContent = '⚠️ אתגר מיוחד!';
  document.getElementById('bossIcon').textContent  = swords;
  document.getElementById('bossSub').textContent   = `מט ב-${moves} מהלכים`;
  document.getElementById('bossOverlay').classList.add('show');
  playBossSound();
}

function closeBossAndLoad() {
  document.getElementById('bossOverlay').classList.remove('show');
  loadScenario(scenIdx);
}

function playBossSound() {
  try {
    const ctx = getCtx();
    [220, 280, 350, 440].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + i*0.12);
      gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + i*0.12 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
      osc.start(ctx.currentTime + i*0.12);
      osc.stop(ctx.currentTime + i*0.12 + 0.35);
    });
  } catch(e){}
}

function closeWrongAndReset() {
  document.getElementById('wrongOverlay').classList.remove('show');
  const sc = SCENARIOS[scenIdx];
  if (sc.type === 'single' || currentStep === 1) {
    loadScenario(scenIdx);
  } else {
    resetToStep(sc, currentStep);
  }
}

function fullReset() {
  // ריענון מלא — לוח נקי ב-100% (כלל ברזל chess-state). התקדמות נשמרה (saveProgress/showCardScreen);
  // הערבוב משוחזר אוטומטית ע"י shuffleScenarios() ב-init.
  location.reload();
}

function showExplosion(row, col, small) {
  const SZ = C;
  const boardOuter = document.getElementById('boardOuter');
  const W = SZ * 8, H = SZ * 8;
  const cx = col * SZ + SZ/2, cy = row * SZ + SZ/2;
  const count = small ? 20 : 45, speedMult = small ? 0.6 : 1;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  canvas.style.cssText = `position:absolute;left:0;top:0;width:${W}px;height:${H}px;z-index:30;pointer-events:none;`;
  boardOuter.appendChild(canvas);
  const ctx2 = canvas.getContext('2d');
  const COLORS = ['#FF6B00','#FF4500','#FFD700','#FFFFFF','#FF8C00','#FF2200','#FFA500','#FFEE44'];
  const parts = Array.from({length:count}, (_, i) => {
    const a = (i/count)*Math.PI*2 + Math.random()*0.4;
    const spd = (3.5 + Math.random()*9) * speedMult;
    return { x:cx, y:cy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-(1.5+Math.random()),
             r:1.5+Math.random()*5, color:COLORS[Math.floor(Math.random()*COLORS.length)],
             alpha:1, decay:0.018+Math.random()*0.022, gravity:0.18+Math.random()*0.12 };
  });
  let frame = 0;
  function draw() {
    ctx2.clearRect(0, 0, W, H);
    if (frame < 8) {
      const t=frame/7, r=SZ*0.9*t;
      const g=ctx2.createRadialGradient(cx,cy,0,cx,cy,Math.max(r,1));
      g.addColorStop(0,`rgba(255,255,255,${1-t})`); g.addColorStop(0.35,`rgba(255,230,80,${(1-t)*0.9})`);
      g.addColorStop(0.7,`rgba(255,100,0,${(1-t)*0.5})`); g.addColorStop(1,'rgba(200,30,0,0)');
      ctx2.fillStyle=g; ctx2.beginPath(); ctx2.arc(cx,cy,Math.max(r,1),0,Math.PI*2); ctx2.fill();
    }
    ctx2.save();
    parts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.95; p.alpha=Math.max(0,p.alpha-p.decay);
      if(p.alpha<=0) return;
      ctx2.globalAlpha=p.alpha; ctx2.beginPath();
      ctx2.arc(p.x,p.y,Math.max(0.5,p.r*Math.sqrt(p.alpha)),0,Math.PI*2);
      ctx2.fillStyle=p.color; ctx2.fill();
    });
    ctx2.restore();
    frame++;
    if (frame<55) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function playCapture() {
  if (muted) return;
  try {
    const ctx2 = getCtx(); const n = ctx2.currentTime;
    const thud=ctx2.createOscillator(), thudG=ctx2.createGain();
    thud.connect(thudG); thudG.connect(ctx2.destination);
    thud.type='sine'; thud.frequency.setValueAtTime(90,n); thud.frequency.exponentialRampToValueAtTime(20,n+.5);
    thudG.gain.setValueAtTime(.9,n); thudG.gain.exponentialRampToValueAtTime(.001,n+.55);
    thud.start(n); thud.stop(n+.6);
    const punch=ctx2.createOscillator(), punchG=ctx2.createGain();
    punch.connect(punchG); punchG.connect(ctx2.destination);
    punch.type='sine'; punch.frequency.setValueAtTime(200,n); punch.frequency.exponentialRampToValueAtTime(50,n+.18);
    punchG.gain.setValueAtTime(.5,n); punchG.gain.exponentialRampToValueAtTime(.001,n+.2);
    punch.start(n); punch.stop(n+.22);
  } catch(e) {}
}

function spawnSparks(bx, by) {
  const boardEl = document.getElementById('boardOuter');
  const rect = boardEl.getBoundingClientRect();
  const x = rect.left + bx, y = rect.top + by;
  const colors = ['#F4D03F','#FF6B35','#52B788','#7EC8E3','#E74C3C'];
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('div');
    s.className = 'pspark';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 40 + Math.random() * 80;
    s.style.cssText = `left:${x}px;top:${y}px;background:${colors[i%colors.length]};
      --px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;
      animation-duration:${0.6+Math.random()*0.4}s;`;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1200);
  }
}

function playApplause() {
  try {
    const ctx = getCtx();
    const b64 = APPLAUSE_B64.split(',')[1];
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer.slice(0), (buffer) => {
      const src  = ctx.createBufferSource();
      const gain = ctx.createGain();
      src.buffer = buffer;
      gain.gain.value = 0.85;
      src.connect(gain); gain.connect(ctx.destination);
      src.start();
    });
  } catch(e){ console.log('applause err', e); }
}


// ════════════════════════════════════════════
//  WIN SCREENS
// ════════════════════════════════════════════
function saveProgress() {
  try {
    const key  = 'chess_checkmate';
    const data = JSON.parse(localStorage.getItem(key) || '{}');
    const perfect = (mistakes <= 1) && (hintsUsed === 0);   // עקבי עם שלבים 1–5
    const prev = data['stage6'] || {};
    const bestPerfect = (prev.bestPerfect || prev.perfect || false) || perfect;  // שיא — לא יורד
    data['stage6'] = { done: true, perfect, lastPerfect: perfect, bestPerfect };
    localStorage.setItem(key, JSON.stringify(data));
  } catch(e) {}
}

function buildStagesBadges() {
  const STAGES = [
    { key: 'stage1', label: 'שלב 1',       href: 'checkmate-stage1.html' },
    { key: 'stage2', label: 'שלב 2',       href: 'checkmate-stage2.html' },
    { key: 'stage3', label: 'שלב 3',       href: 'checkmate-stage3.html' },
    { key: 'stage4', label: 'שלב 4',       href: 'checkmate-stage4.html' },
    { key: 'stage5', label: 'שלב 5',       href: 'checkmate-stage5.html' },
    { key: 'stage6', label: 'מבחן מסכם',   href: 'checkmate-stage6.html' },
  ];

  let stored = {};
  try { stored = JSON.parse(localStorage.getItem('chess_checkmate') || '{}'); } catch(e) {}

  // Stage 6 — use current game result
  stored['stage6'] = { done: true, perfect: mistakes <= 1 && hintsUsed === 0 };

  const container = document.getElementById('tcStages');
  container.innerHTML = '';
  STAGES.forEach(({ key, label, href }) => {
    const data = stored[key];
    const isPerfect = data && data.perfect;
    const badge = document.createElement('div');
    badge.className = 'tc-badge ' + (isPerfect ? 'perfect' : 'retry');
    badge.innerHTML = isPerfect ? `⭐ ${label}` : `🔄 ${label}`;
    if (!isPerfect) {
      badge.style.cursor = 'pointer';
      badge.style.touchAction = 'manipulation';
      badge.addEventListener('click', () => { window.location.href = href; });
    }
    container.appendChild(badge);
  });
}

function showCardScreen() {
  saveProgress();           // שמור stage6 לפני הצגה
  buildStagesBadges();      // בנה תגים לפי תוצאות
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('cardOverlay').classList.add('show');
  playWinFanfare();
}

function pinToAlbum() {
  try {
    localStorage.setItem('chess_just_completed', 'checkmate');
    const cards = JSON.parse(localStorage.getItem('chess_cards') || '[]');
    if (!cards.includes('checkmate')) {
      cards.push('checkmate');
      localStorage.setItem('chess_cards', JSON.stringify(cards));
    }
  } catch(e) {}
  window.location.href = '../../מסך הפתיחה/index.html';
}

function playWinFanfare() {
  if (muted) return;
  try {
    const ctx = getCtx();
    const notes = [523,659,784,1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch(e){}
}

// ════════════════════════════════════════════
//  STARS
// ════════════════════════════════════════════
function makeStars() {
  // Standard: 55 stars background (S3 requirement)
  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star-dot';
    const sz = Math.random() * 2.5 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*3}s;`;
    document.body.appendChild(s);
  }
}

//  INIT

computeCell();
makeStars();  // 55 stars — called before buildGrid (S3 requirement)
buildGrid();
shuffleScenarios();
loadScenario(0);
document.addEventListener('pointerdown', () => getCtx(), {once:true});
window.addEventListener('resize', ()=>{ computeCell(); buildGrid(); loadScenario(scenIdx); });
</script>
